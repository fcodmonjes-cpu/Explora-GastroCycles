<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explora Atacama — Vinos & Menús</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; font-size: 16px; line-height: 1.6; }

:root {
  --wine-red: #7F77DD;
  --wine-red-light: #EEEDFE;
  --wine-red-dark: #3C3489;
  --gold: #BA7517;
  --gold-light: #FAEEDA;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --bg: #f8f7f4;
  --bg-secondary: #f0eeea;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-md: rgba(0,0,0,0.18);
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-tertiary: #888;
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg-secondary: #242220;
    --surface: #2a2825;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.18);
    --text: #f0eeea;
    --text-secondary: #aaa;
    --text-tertiary: #777;
    --wine-red-light: #2a2660;
    --wine-red-dark: #a9a0f0;
    --gold-light: #3a2a05;
    --teal-light: #0a2e20;
    --coral-light: #3a1a0a;
  }
}

.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

.header { padding: 1rem 0 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; color: var(--text); }
.header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.main-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.tab:hover { background: var(--bg-secondary); }
.tab.active { background: var(--wine-red); color: white; border-color: var(--wine-red); font-weight: 500; }

.search-bar { position: relative; margin-bottom: 1.25rem; }
.search-bar input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
.search-bar input:focus { border-color: var(--wine-red); }
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }

.day-selector { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.day-btn { padding: 5px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.day-btn:hover { background: var(--bg-secondary); }
.day-btn.active { background: var(--gold); color: white; border-color: var(--gold); font-weight: 500; }

/* Day heading */
.day-heading { font-size: 14px; font-weight: 500; color: var(--text); margin: 1.5rem 0 1rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }

/* Service blocks */
.service-block { margin-bottom: 2rem; }
.service-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--border); }
.service-label { font-size: 15px; font-weight: 500; color: var(--text); }
.service-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-lunch { background: var(--gold); }
.dot-dinner { background: var(--wine-red); }
.dot-shared { background: var(--border-md); }

/* Course sections */
.course-section { margin-bottom: 1.25rem; }
.course-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; padding-left: 2px; }
.dish-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

/* Dish cards */
.dish-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; cursor: pointer; transition: border-color 0.15s; }
.dish-card:hover { border-color: var(--border-md); }
.dish-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.dish-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
.dish-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.allergen-row { display: flex; flex-wrap: wrap; gap: 4px; }
.allergen-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }

/* Detail panel */
.detail-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
.detail-panel h2 { font-size: 17px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.detail-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 0.75rem; }
.detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.detail-section { margin-bottom: 1rem; }
.detail-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.allergen-detail { display: flex; flex-wrap: wrap; gap: 5px; }
.allergen-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-md); }
.wine-suggestions { display: flex; flex-direction: column; gap: 8px; }
.wine-chip { background: var(--wine-red-light); border: 0.5px solid rgba(127,119,221,0.3); border-radius: var(--radius-md); padding: 8px 12px; cursor: pointer; transition: opacity 0.15s; }
.wine-chip:hover { opacity: 0.8; }
.wine-chip-name { font-size: 13px; font-weight: 500; color: var(--wine-red-dark); }
.wine-chip-why { font-size: 12px; color: var(--wine-red); margin-top: 2px; }
.close-btn { float: right; font-size: 20px; line-height: 1; cursor: pointer; color: var(--text-tertiary); background: none; border: none; padding: 0 0 0 8px; }
.close-btn:hover { color: var(--text); }

/* Wine tab */
.wine-filter-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.wine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
.wine-card:hover { border-color: var(--border-md); }
.wine-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.wine-type-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.badge-espumante { background: #F4C0D1; color: #72243E; }
.badge-blanco { background: var(--gold-light); color: #633806; }
.badge-rosado { background: var(--coral-light); color: #993C1D; }
.badge-tinto { background: var(--wine-red-light); color: var(--wine-red-dark); }
.badge-dulce { background: var(--teal-light); color: #0F6E56; }
.wine-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.wine-valley { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.wine-aroma { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.wine-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
.wine-detail h2 { font-size: 17px; font-weight: 500; margin-bottom: 2px; color: var(--text); }
.wine-detail .valley { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.wine-section { margin-bottom: 1rem; }
.wine-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.wine-section p { font-size: 13px; color: var(--text); line-height: 1.6; }
.guion-box { background: var(--wine-red-light); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
.guion-label { font-weight: 500; color: var(--wine-red-dark); }
.guion-box p { font-size: 13px; color: var(--wine-red-dark); line-height: 1.6; }
.paired-dishes { display: flex; flex-direction: column; gap: 6px; }
.paired-dish { font-size: 13px; padding: 6px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); color: var(--text); }

/* Guiones */
.guion-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.guion-card h2 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; }
.guion-text { background: var(--wine-red-light); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1rem; font-size: 13px; color: var(--wine-red-dark); line-height: 1.6; }
.guion-section-title { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

.hidden { display: none !important; }
.empty-state { font-size: 13px; color: var(--text-tertiary); padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Explora Atacama — Vinos &amp; Menús</h1>
    <p>Guía de servicio: maridajes, alérgenos y fichas de vino</p>
  </div>

  <div class="main-tabs">
    <button class="tab active" onclick="setTab('menus',this)">Menús por día</button>
    <button class="tab" onclick="setTab('vinos',this)">Fichas de vino</button>
    <button class="tab" onclick="setTab('guiones',this)">Guiones de venta</button>
  </div>

  <!-- MENÚS TAB -->
  <div id="tab-menus">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar plato..." id="dish-search" oninput="renderDishes()">
    </div>
    <div class="day-selector">
      <button class="day-btn active" onclick="setDay('all',this)">Todos los días</button>
      <button class="day-btn" onclick="setDay('1',this)">Día 1</button>
      <button class="day-btn" onclick="setDay('2',this)">Día 2</button>
      <button class="day-btn" onclick="setDay('3',this)">Día 3</button>
      <button class="day-btn" onclick="setDay('4',this)">Día 4</button>
    </div>
    <div id="dish-detail-panel" class="hidden"></div>
    <div id="dish-grid"></div>
  </div>

  <!-- VINOS TAB -->
  <div id="tab-vinos" class="hidden">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar vino o cepa..." id="wine-search" oninput="renderWines()">
    </div>
    <div class="wine-filter-tabs">
      <button class="tab active" onclick="setWineFilter('todos',this)">Todos</button>
      <button class="tab" onclick="setWineFilter('espumante',this)">Espumante</button>
      <button class="tab" onclick="setWineFilter('blanco',this)">Blancos</button>
      <button class="tab" onclick="setWineFilter('rosado',this)">Rosado</button>
      <button class="tab" onclick="setWineFilter('tinto',this)">Tintos</button>
      <button class="tab" onclick="setWineFilter('dulce',this)">Dulce</button>
    </div>
    <div id="wine-detail-panel" class="hidden"></div>
    <div class="wine-grid" id="wine-grid"></div>
  </div>

  <!-- GUIONES TAB -->
  <div id="tab-guiones" class="hidden">
    <div id="guiones-content"></div>
  </div>
</div>

  {id:'glup',type:'tinto',name:'Glup Cinsault',valley:'Longaví, Itata Secano Interior',identity:'Tinto ligero, 100% Cinsault, secano interior del Itata.',terroir:'Lomas cercanas al mar, clima mediterráneo fresco, viñas viejas en cabeza sobre suelos graníticos. Temperaturas moderadas, noches frescas: vinos de baja graduación y gran frescor.',winery:'Línea de Longaví Wines. Variedades patrimoniales, cosecha temprana, poca extracción, crianza sencilla. Vinos gastronómicos muy bebibles.',style:'Guinda, frutilla, flores, pimienta blanca y hierbas. Muy ligero, tanino suave, acidez marcada. Se puede servir ligeramente fresco.',shortpitch:'Es un tinto muy suave y fresco del Itata, ideal para platos algo dulces o cremosos como el pastel de choclo, el pastel de papa o el charquicán.',pitch:'Las viñas están en secano sobre suelos graníticos y se cosechan relativamente temprano, por eso el vino tiene buena acidez y poco tanino. Es perfecto cuando el viajero quiere tinto, pero no algo pesado ni con mucha madera.'},
  {id:'perez-cruz',type:'tinto',name:'Pérez Cruz L.E. Carmenere',valley:'Maipo Andes',identity:'Tinto, Carmenere de selección de parcelas, DO Maipo Andes.',terroir:'Al sur de Santiago, pie de cordillera. Clima mediterráneo, gran amplitud térmica. Suelos aluviales y coluviales, pedregosos, de origen volcánico.',winery:'Viña Pérez Cruz, único viñedo en manejo sustentable. Limited Edition: versiones precisas de cepas bordelesas. Fruta madura, taninos redondos, madera equilibrada.',style:'Fruta negra madura, especias dulces, cacao, pimentón asado, hierbas. Tanino medio-alto pero redondo, cuerpo medio-alto, final largo.',shortpitch:'Es un Carmenere de Maipo Andes, con fruta negra y taninos firmes pero redondos; ideal para asado de tira, costillar y plateada.',pitch:'El viñedo está en la parte alta del Maipo, sobre suelos pedregosos. Eso da un Carmenere con estructura y frescor. Se siente la fruta negra y las especias, y el tanino se agarra muy bien a carnes de cocción lenta, con salsas concentradas.'},
  {id:'cabernet',type:'tinto',name:'Pura Fe Cabernet Sauvignon',valley:'Antiyal, Maipo Andes',identity:'Tinto, 100% Cabernet Sauvignon orgánico, Maipo Andes.',terroir:'Zona referente mundial para Cabernet. Suelos volcánicos, aluviales, con mucha piedra y excelente drenaje. Días calurosos y noches frías: madurez completa con acidez.',winery:'Antiyal, proyecto de Álvaro Espinoza, pionero de la biodinámica en Chile. Orgánico y biodinámico, rendimientos moderados, barrica equilibrada.',style:'Cassis, ciruela, pimentón asado, grafito, tabaco suave, hierbas. Cuerpo lleno, taninos firmes y pulidos, buena acidez, final largo.',shortpitch:'Es nuestro Cabernet orgánico de Maipo Andes, con estructura y fruta negra; perfecto para filetes, asado de tira, cordero y plateada.',pitch:'Es un Cabernet de clima andino, con taninos firmes pero muy pulidos y una acidez que evita que el vino se sienta pesado. Acompaña muy bien la textura de carnes rojas y de cocción larga, y aguanta salsas con fondo de vino tinto.'},
  {id:'syrah',type:'tinto',name:'Clos de Luz "Azuda" Syrah',valley:'Valle de Cachapoal (Almahue)',identity:'Tinto, 100% Syrah, línea Azuda de Clos de Luz, Almahue en Cachapoal.',terroir:'Almahue, interior del valle de Cachapoal. Clima templado, veranos cálidos moderados por la Cordillera. Laderas con suelos graníticos: acidez fresca y taninos finos.',winery:'Clos de Luz, viña familiar. Variedades mediterráneas en viñedos antiguos. Azuda en cubas de concreto y tinajas de greda. Frescor más que potencia.',style:'Fruta negra, moras, especias (pimienta, hierbas), notas florales, fondo mineral. Intenso pero fresco, cuerpo medio-alto, buena acidez, taninos elegantes.',shortpitch:'Es un Syrah de Almahue, intenso pero fresco, con mucha fruta negra y especias; funciona muy bien con cordero, costillar, plateada y pato.',pitch:'Se vinifica en concreto y tinajas, lo que conserva la frescura y el carácter de fruta. Tiene suficiente estructura para carnes de cocción larga, pero al mismo tiempo mantiene una acidez que hace el conjunto más liviano.'},
  {id:'erasmo',type:'dulce',name:'Erasmo Late Harvest Torontel',valley:'Valle del Maule',identity:'Vino dulce natural (Late Harvest), uvas Torontel sobremaduras del Maule.',terroir:'Maule interior, clima mediterráneo, veranos cálidos y otoños secos. Suelos franco-arcillosos y graníticos. La uva concentra azúcar y aromas en la planta.',winery:'Erasmo: tradición italiana con secano del Maule. Late Harvest equilibrado: buena acidez y aromas florales intensos, sin sensaciones empalagosas.',style:'Flores blancas, miel, fruta de hueso, frutas confitadas, piel de naranja. Dulzor marcado con acidez suficiente. Textura untuosa, final largo.',shortpitch:'Es nuestro vino de postre, un Late Harvest de Torontel del Maule, con notas de miel y frutas confitadas; va muy bien con tres leches, cheesecake, carrot cake o la degustación de chañar.',pitch:'La uva se deja sobremadurar en la planta para concentrar azúcar y aromas. El resultado es un vino dulce pero con acidez suficiente para no cansar. Es la mejor opción cuando el viajero quiere cerrar con un maridaje clásico de postre y vino.'}
];

const GUIONES = [
  {title:'Aperitivos y bienvenida',text:'«Mientras revisan la carta, podemos ofrecerles algo fresco por copa. Si prefieren burbuja, tenemos un espumante orgánico del valle del Limarí, muy seco y con burbuja fina. Si prefieren vino, nuestro Sauvignon de Talinay es cítrico y salino, ideal para comenzar, sobre todo si luego van a pedir ceviche o platos de mar.»',wines:['azur','talinay']},
  {title:'Mariscos y pescados',text:'«Para platos de mar como el ceviche, el tiradito o el sudado de trucha, lo que mejor funciona son vinos de costa y clima frío, con buena acidez y salinidad. El Sauvignon de Talinay viene de un viñedo a pocos kilómetros del mar, sobre suelos calcáreos. Si el plato es más cremoso, como el chupe de centolla o el pulpo con pastelera de choclo, sugerimos un Semillón del Itata o un Chardonnay, que tienen más textura para sostener la salsa.»',wines:['talinay','semillon','aquitania']},
  {title:'Carnes rojas, cerdo y cordero',text:'«Para cortes como el asado de tira, el garrón de cordero o la plateada, sugerimos tintos de Maipo Andes o de Almahue. El Cabernet Pura Fe es el estilo clásico del Maipo andino. Si quieren algo más especiado, el Syrah de Almahue tiene fruta negra y especias con tanino más sedoso. Si el plato tiene picor o fritura, un rosado seco funciona mejor que un tinto muy pesado.»',wines:['cabernet','perez-cruz','syrah','garage-rose']},
  {title:'Cocina vegetariana y verduras',text:'«Para platos como la lasaña de vegetales, el zucchini relleno o el charquicán vegetariano, buscamos vinos que acompañen la cremosidad y el umami de las verduras sin taparlos. En blancos, un Chardonnay de Casablanca. En tintos, un Cinsault del Itata o un Pinot de Casablanca son suaves y frescos, con tanino muy fino.»',wines:['aquitania','montsecano','glup']},
  {title:'Postres y cierre de experiencia',text:'«La mayoría de los postres son dulces y cremosos. La mejor combinación suele ser un café o una infusión. Si quieren maridarlo con vino, tenemos un Late Harvest de Torontel del Maule, que va muy bien con tres leches, cheesecake o la degustación de chañar. Si prefieren un cierre más fresco y menos dulce, el espumante seco es ideal con postres de fruta o helado.»',wines:['erasmo','azur']}
];

const COURSE_ORDER = ['Entrada','Plato principal','Postre'];
const SERVICE_ORDER = ['Almuerzo','Cena','Almuerzo y Cena'];

let currentTab = 'menus';
let currentDay = 'all';
let wineFilter = 'todos';
let selectedDish = null;
let selectedWine = null;

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.main-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab));
  if (tab === 'guiones') renderGuiones();
}

function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedDish = null;
  document.getElementById('dish-detail-panel').classList.add('hidden');
  renderDishes();
}

function setWineFilter(f, el) {
  wineFilter = f;
  document.querySelectorAll('.wine-filter-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedWine = null;
  document.getElementById('wine-detail-panel').classList.add('hidden');
  renderWines();
}

function getWine(id) { return WINES.find(w => w.id === id); }
function typeBadgeClass(t) { return {espumante:'badge-espumante',blanco:'badge-blanco',rosado:'badge-rosado',tinto:'badge-tinto',dulce:'badge-dulce'}[t]||''; }
function typeLabel(t) { return {espumante:'Espumante',blanco:'Blanco',rosado:'Rosado',tinto:'Tinto',dulce:'Dulce'}[t]||t; }

function renderDishes() {
  const q = (document.getElementById('dish-search').value||'').toLowerCase();
  const dishes = DISHES.filter(d => {
    const dayOk = currentDay === 'all' || d.day === currentDay;
    const qOk = !q || d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q);
    return dayOk && qOk;
  });
  if (!dishes.length) {
    document.getElementById('dish-grid').innerHTML = '<div class="empty-state">No se encontraron platos</div>';
    return;
  }
  const days = currentDay === 'all' ? ['1','2','3','4'] : [currentDay];
  let html = '';
  days.forEach(day => {
    const dayDishes = dishes.filter(d => d.day === day);
    if (!dayDishes.length) return;
    if (currentDay === 'all') html += `<div class="day-heading">Día ${day}</div>`;
    SERVICE_ORDER.forEach(service => {
      const svcDishes = dayDishes.filter(d => d.service === service);
      if (!svcDishes.length) return;
      const dotClass = service === 'Cena' ? 'dot-dinner' : service === 'Almuerzo y Cena' ? 'dot-shared' : 'dot-lunch';
      html += `<div class="service-block"><div class="service-header"><div class="service-dot ${dotClass}"></div><span class="service-label">${service}</span></div>`;
      COURSE_ORDER.forEach(course => {
        const courseDishes = svcDishes.filter(d => d.course === course);
        if (!courseDishes.length) return;
        html += `<div class="course-section"><div class="course-label">${course}</div><div class="dish-row">`;
        courseDishes.forEach(d => {
          html += `<div class="dish-card${selectedDish===d.id?' selected':''}" onclick="selectDish('${d.id}')">
            <div class="dish-name">${d.name}</div>
            <div class="dish-desc">${d.desc}</div>
            ${d.allergens.length ? `<div class="allergen-row">${d.allergens.map(a=>`<span class="allergen-tag">${a}</span>`).join('')}</div>` : ''}
          </div>`;
        });
        html += `</div></div>`;
      });
      html += `</div>`;
    });
  });
  document.getElementById('dish-grid').innerHTML = html;
}

function selectDish(id) {
  selectedDish = selectedDish === id ? null : id;
  renderDishes();
  const panel = document.getElementById('dish-detail-panel');
  if (!selectedDish) { panel.classList.add('hidden'); return; }
  const d = DISHES.find(x => x.id === id);
  const wineChips = d.wines.map(wid => {
    const w = getWine(wid);
    return `<div class="wine-chip" onclick="openWineFromDish('${wid}')">
      <div class="wine-chip-name">${w.name}</div>
      <div class="wine-chip-why">${d.why[wid]||''}</div>
    </div>`;
  }).join('');
  panel.innerHTML = `<div class="detail-panel">
    <button class="close-btn" onclick="closeDishDetail()">&#215;</button>
    <h2>${d.name}</h2>
    <p class="detail-meta">Día ${d.day} &middot; ${d.service} &middot; ${d.course}</p>
    <p class="detail-desc">${d.desc}</p>
    ${d.allergens.length ? `<div class="detail-section"><h3>Alérgenos</h3><div class="allergen-detail">${d.allergens.map(a=>`<span class="allergen-pill">${a}</span>`).join('')}</div></div>` : ''}
    <div class="detail-section"><h3>Maridajes sugeridos</h3><div class="wine-suggestions">${wineChips}</div></div>
  </div>`;
  panel.classList.remove('hidden');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDishDetail() {
  selectedDish = null;
  document.getElementById('dish-detail-panel').classList.add('hidden');
  renderDishes();
}

function openWineFromDish(wid) {
  document.querySelectorAll('.main-tabs .tab').forEach((t,i) => t.classList.toggle('active', i===1));
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!=='vinos'));
  currentTab = 'vinos';
  selectWine(wid);
}

function renderWines() {
  const q = (document.getElementById('wine-search').value||'').toLowerCase();
  const wines = WINES.filter(w => {
    const typeOk = wineFilter === 'todos' || w.type === wineFilter;
    const qOk = !q || w.name.toLowerCase().includes(q) || w.valley.toLowerCase().includes(q) || w.style.toLowerCase().includes(q);
    return typeOk && qOk;
  });
  document.getElementById('wine-grid').innerHTML = wines.map(w => `
    <div class="wine-card${selectedWine===w.id?' selected':''}" onclick="selectWine('${w.id}')">
      <span class="wine-type-badge ${typeBadgeClass(w.type)}">${typeLabel(w.type)}</span>
      <div class="wine-name">${w.name}</div>
      <div class="wine-valley">${w.valley}</div>
      <div class="wine-aroma">${w.style}</div>
    </div>`).join('');
}

function selectWine(id) {
  selectedWine = selectedWine === id ? null : id;
  renderWines();
  const panel = document.getElementById('wine-detail-panel');
  if (!selectedWine) { panel.classList.add('hidden'); return; }
  const w = WINES.find(x => x.id === id);
  const pairedDishes = DISHES.filter(d => d.wines.includes(id));
  panel.innerHTML = `<div class="wine-detail">
    <button class="close-btn" onclick="closeWineDetail()">&#215;</button>
    <span class="wine-type-badge ${typeBadgeClass(w.type)}">${typeLabel(w.type)}</span>
    <h2>${w.name}</h2>
    <div class="valley">${w.valley}</div>
    <div class="wine-section"><h3>Identidad</h3><p>${w.identity}</p></div>
    <div class="wine-section"><h3>Terroir</h3><p>${w.terroir}</p></div>
    <div class="wine-section"><h3>Viña y filosofía</h3><p>${w.winery}</p></div>
    <div class="wine-section"><h3>Estilo en copa</h3><p>${w.style}</p></div>
    <div class="wine-section"><h3>Guion de venta</h3>
      <div class="guion-box">
        <p><span class="guion-label">Frase corta:</span> ${w.shortpitch}</p>
        <p style="margin-top:8px;"><span class="guion-label">Desarrollo:</span> ${w.pitch}</p>
      </div>
    </div>
    <div class="wine-section"><h3>Platos del menú con este vino (${pairedDishes.length})</h3>
      <div class="paired-dishes">${pairedDishes.map(d=>`<div class="paired-dish">Día ${d.day} &middot; ${d.service} &middot; ${d.course} — ${d.name}</div>`).join('')}</div>
    </div>
  </div>`;
  panel.classList.remove('hidden');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeWineDetail() {
  selectedWine = null;
  document.getElementById('wine-detail-panel').classList.add('hidden');
  renderWines();
}

function renderGuiones() {
  document.getElementById('guiones-content').innerHTML = GUIONES.map(g => {
    const wines = g.wines.map(wid => {
      const w = getWine(wid);
      return `<div class="wine-chip" onclick="openWineFromGuion('${wid}')">
        <div class="wine-chip-name">${w.name}</div>
        <div class="wine-chip-why">${w.valley}</div>
      </div>`;
    }).join('');
    return `<div class="guion-card">
      <h2>${g.title}</h2>
      <div class="guion-text">${g.text}</div>
      <div class="guion-section-title">Vinos mencionados</div>
      <div class="wine-suggestions">${wines}</div>
    </div>`;
  }).join('');
}

function openWineFromGuion(wid) {
  document.querySelectorAll('.main-tabs .tab').forEach((t,i) => t.classList.toggle('active', i===1));
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!=='vinos'));
  currentTab = 'vinos';
  selectWine(wid);
}

renderDishes();
renderWines();
</script>
</body>
</html>
