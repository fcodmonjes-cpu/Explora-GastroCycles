<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ATA Handbook</title>
<!-- Cormorant Garamond — referenced throughout the app as the elegant serif
     family, finally loaded from Google Fonts so italic actually renders
     as italic instead of falling back to Palatino. Subset to the four
     weights/styles the app actually uses; preconnect for fast TLS handshake. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,700&display=swap" rel="stylesheet">
<!-- Vercel Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
.app { will-change: transform; }

:root {
  --wine-red: #7F77DD;
  --wine-red-light: #2a2660;
  --wine-red-dark: #a9a0f0;
  --gold: #BA7517;
  --gold-light: #3a2a05;
  --teal: #1D9E75;
  --teal-light: #0a2e20;
  --coral: #D85A30;
  --coral-light: #3a1a0a;
  --bg: #1a1917;
  --bg-secondary: #242220;
  --surface: #2a2825;
  --border: rgba(255,255,255,0.1);
  --border-md: rgba(255,255,255,0.18);
  --text: #f0eeea;
  --text-secondary: #aaa;
  --text-tertiary: #777;
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg-secondary: #242220;
    --surface: #2a2825;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.18);
    --text: #f0eeea;
    --text-secondary: #aaa;
    --text-tertiary: #777;
    --wine-red-light: #2a2660;
    --wine-red-dark: #a9a0f0;
    --gold-light: #3a2a05;
    --teal-light: #0a2e20;
    --coral-light: #3a1a0a;
  }
}

.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

.header { padding: 1rem 0 1.5rem; margin-bottom: 0; display: flex; align-items: center; justify-content: space-between; }
/* Brand title — italic Cormorant Garamond. Bigger than before so the
   serif italic gets the room it needs to feel composed rather than cramped. */
.header-text h1 { font-family: 'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-style: italic; font-weight: 500; font-size: 28px; line-height: 1.15; color: var(--text); letter-spacing: 0.005em; }
/* "ATA" highlight — burnt sienna / desert clay tone (Valle de la Muerte
   at last light). Slightly bolder weight + a hair more tracking so the
   three letters anchor the title visually. */
.ata-emphasis { font-family: 'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-style: italic; font-weight: 700; color: #c75c2a; letter-spacing: 0.04em; }
.header-text p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
/* Ops strip wrapper — owns the divider line so its children (staffing panel,
   desserts strip) can each be empty without losing the visual separator. */
.ops-strip { margin: 0 0 1.5rem; padding: 0 0 0.9rem; border-bottom: 0.5px solid var(--border); }

/* Staffing panel — child of .ops-strip. No own border; relies on wrapper. */
.staffing-panel { margin: 0 0 0.7rem; padding: 0; font-family: 'Courier Prime','Courier New',monospace; }
.staffing-panel:empty { margin: 0; }
.staffing-head { display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:0.7rem; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; }
/* Subtle opacity pulse — signals "live data, syncing in real time" without
   being distracting. ~1800ms cycle (slower, calmer breathing rhythm). */
.staffing-shift { color: var(--gold); font-weight: 500; animation: staffShiftPulse 1800ms ease-in-out infinite; }
@keyframes staffShiftPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
.staffing-viajeros { color: var(--text-tertiary); }
.staffing-row { display:grid; grid-template-columns: 78px 1fr; gap:14px; align-items:baseline; margin-bottom:3px; }
.staffing-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
.staffing-names { font-family: inherit; font-size: 12px; color: var(--text-secondary); line-height: 1.45; }
.staffing-off { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); opacity: 0.55; padding: 4px 0; }

/* Desserts strip — single horizontal row with H/S/F/N codes, sits right
   above the tabs. Empty state shows a discreet add-button instead. */
.desserts-strip { font-family: 'Courier Prime','Courier New',monospace; font-size: 11px; letter-spacing: 0.06em; color: var(--text-secondary); display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px; min-height: 22px; }
.desserts-strip:empty { display: none; }
.desserts-item { display: inline-flex; gap: 6px; align-items: baseline; white-space: nowrap; }
.desserts-item-label { color: var(--gold); font-weight: 500; letter-spacing: 0.1em; }
.desserts-item-value { color: var(--text-secondary); letter-spacing: 0; font-family: inherit; }
.desserts-edit-btn { margin-left: auto; background: transparent; border: 0.5px solid var(--border); color: var(--text-tertiary); padding: 2px 8px; border-radius: var(--radius-md); font-size: 12px; line-height: 1.2; cursor: pointer; transition: color .15s, border-color .15s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
.desserts-edit-btn:hover { color: var(--gold); border-color: rgba(202,138,4,0.3); }
.desserts-empty-btn { background: transparent; border: 0.5px dashed var(--border-md); color: var(--text-tertiary); font-family: 'Courier Prime','Courier New',monospace; font-size: 11px; letter-spacing: 0.08em; padding: 5px 14px; border-radius: var(--radius-md); cursor: pointer; transition: all .15s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
.desserts-empty-btn:hover { color: var(--gold); border-color: rgba(202,138,4,0.32); }

/* Desserts inline edit form — appears below the strip when ✎ is tapped. */
.desserts-form { margin-top: 12px; padding: 12px 14px; background: rgba(202,138,4,0.04); border: 0.5px solid rgba(202,138,4,0.18); border-radius: var(--radius-md); animation: panelIn 0.22s cubic-bezier(0.34,1.1,0.64,1) both; }
.desserts-form[hidden] { display: none; }
.desserts-form-row { margin-bottom: 10px; }
.desserts-form-label { display: block; font-family: 'Courier Prime','Courier New',monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
.desserts-form-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); color: var(--text); font-size: 16px; padding: 7px 12px; outline: none; font-family: inherit; box-sizing: border-box; }
.desserts-form-input:focus { border-color: var(--gold); }
.desserts-form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
.desserts-form-btn { padding: 7px 14px; border-radius: var(--radius-md); font-size: 12px; cursor: pointer; border: 0.5px solid var(--border-md); background: transparent; color: var(--text-secondary); transition: all .15s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
.desserts-form-btn:hover { color: var(--text); }
.desserts-form-btn.primary { background: var(--wine-red); border-color: var(--wine-red); color: white; }
.desserts-form-btn.primary:hover { opacity: 0.85; }

/* ── Comandera module ────────────────────────────────────────────────────── */
.cmd-root {
  font-family: 'Courier Prime','Courier New',monospace;
  /* Disable text selection across the whole order-pad view. Long-press
     on iOS / Android otherwise pops the native selection menu before
     our drag-to-reorder long-press handler can capture the gesture,
     producing false-positive "grabs" of text instead of items. Inputs
     and textareas re-enable selection below so typing notes still works. */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
.cmd-root input,
.cmd-root textarea {
  -webkit-user-select: text;
  -moz-user-select: text;
  -ms-user-select: text;
  user-select: text;
  -webkit-touch-callout: default;
}
.cmd-gate { text-align:center; padding:2rem 1rem; }
.cmd-gate-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:24px; color:var(--gold); margin-bottom:6px; }
.cmd-gate-sub { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:1.5rem; }
.cmd-pin-display { font-family:'Courier Prime','Courier New',monospace; font-size:28px; letter-spacing:0.3em; color:var(--gold); min-height:42px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
.cmd-pin-error { font-size:11px; color:#e55; min-height:16px; margin-top:8px; }
.cmd-numpad { max-width:232px; margin:0 auto; }
.cmd-numpad-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.cmd-numpad-key { padding:14px 6px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); font-size:18px; cursor:pointer; font-family:inherit; transition:background .12s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-numpad-key:hover { background:var(--bg-secondary); }
.cmd-numpad-key:active { transform:scale(0.95); }
.cmd-numpad-key.cmd-nk-del { color:var(--text-tertiary); font-size:15px; }

/* Home view — list of open mesas */
.cmd-home-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:1rem; }
.cmd-home-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:20px; color:var(--gold); }
.cmd-exit-btn { background:transparent; border:none; color:var(--text-tertiary); font-size:11px; text-decoration:underline; cursor:pointer; padding:0; }
.cmd-mesa-card { display:flex; gap:14px; align-items:center; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .15s, background .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-mesa-card:hover { background:var(--bg-secondary); border-color:var(--gold); }
.cmd-mesa-num { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:24px; color:var(--gold); min-width:40px; text-align:center; }
.cmd-mesa-info { flex:1; min-width:0; font-family:'Courier Prime','Courier New',monospace; }
.cmd-mesa-meta { font-size:11px; color:var(--text-tertiary); letter-spacing:0.08em; text-transform:uppercase; }
.cmd-mesa-summary { font-size:12px; color:var(--text-secondary); margin-top:2px; line-height:1.35; }
.cmd-mesa-elapsed { font-size:13px; color:var(--gold); font-family:'Courier Prime','Courier New',monospace; }
.cmd-mesa-elapsed.warn { color:#e07b3a; }
.cmd-mesa-elapsed.urgent { color:#e55; animation:cfurgentpulse 1.8s ease infinite; }
/* History section — closed mesas of today, listed below the active ones */
.cmd-history-section { margin-top:1.75rem; padding-top:1.1rem; border-top:0.5px solid var(--border); }
.cmd-history-title { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:0.85rem; }
.cmd-mesa-card-closed { opacity:0.6; transition:opacity .15s, border-color .15s, background .15s; }
.cmd-mesa-card-closed:hover { opacity:1; }
.cmd-mesa-card-closed .cmd-mesa-num { color:var(--text-tertiary); }
.cmd-mesa-card-closed .cmd-mesa-elapsed { color:var(--text-tertiary); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; }
.cmd-empty-state { text-align:center; color:var(--text-tertiary); font-size:11px; padding:2.5rem 1rem; letter-spacing:0.1em; text-transform:uppercase; font-family:'Courier Prime','Courier New',monospace; }

/* New-mesa form */
.cmd-new-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:22px; color:var(--gold); text-align:center; margin-bottom:18px; }
.cmd-new-section { margin-bottom:18px; }
.cmd-new-label { display:block; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:7px; text-align:center; }
.cmd-new-mesa-display { font-family:'Courier Prime','Courier New',monospace; font-size:28px; letter-spacing:0.2em; color:var(--gold); min-height:42px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
.cmd-new-mesa-display.empty { color:var(--text-tertiary); font-size:13px; letter-spacing:0.1em; }
.cmd-diners-stepper { display:flex; align-items:center; justify-content:center; gap:14px; }
.cmd-stepper-btn { width:38px; height:38px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); font-size:18px; cursor:pointer; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-stepper-btn:active { transform:scale(0.94); }
.cmd-stepper-val { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:32px; color:var(--gold); min-width:50px; text-align:center; }
.cmd-form-actions { display:flex; gap:8px; justify-content:space-between; margin-top:10px; }
.cmd-btn { padding:9px 16px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:transparent; color:var(--text-secondary); font-size:12px; cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; font-family:inherit; }
.cmd-btn:hover { color:var(--text); }
.cmd-btn:disabled { opacity:0.35; cursor:default; }
.cmd-btn.primary { background:var(--wine-red); border-color:var(--wine-red); color:white; }
.cmd-btn.primary:hover { opacity:0.88; }

/* Active mesa view */
.cmd-active-header { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:1rem; }
.cmd-active-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:20px; color:var(--gold); }
.cmd-active-sub { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); margin-top:2px; }
.cmd-active-controls { display:flex; gap:10px; align-items:center; }
.cmd-timer-btn { background:transparent; border:0.5px solid var(--border-md); border-radius:var(--radius-md); padding:5px 10px; font-family:'Courier Prime','Courier New',monospace; font-size:13px; color:var(--gold); cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; line-height:1.2; }
.cmd-timer-btn:hover { background:rgba(202,138,4,0.08); }
.cmd-timer-btn.warn { color:#e07b3a; border-color:rgba(224,123,58,0.45); }
.cmd-timer-btn.urgent { color:#e55; border-color:rgba(229,85,85,0.5); animation:cfurgentpulse 1.8s ease infinite; }

/* Diner selector */
.cmd-diner-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:6px; }
.cmd-diner-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1rem; padding-bottom:0.85rem; border-bottom:0.5px solid var(--border); }
.cmd-diner-btn { width:42px; height:42px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text-secondary); font-family:'Courier Prime','Courier New',monospace; font-size:15px; font-weight:500; cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.cmd-diner-btn:hover { border-color:rgba(78,160,255,0.5); }
.cmd-diner-btn.active { background:rgba(78,160,255,0.18); color:#9ec9ff; border-color:#4ea0ff; box-shadow:0 0 0 1px rgba(78,160,255,0.55), 0 0 12px rgba(78,160,255,0.32); }
.cmd-diner-btn.cmd-diner-add { color:var(--text-tertiary); font-size:18px; }

/* Adding-to indicator */
.cmd-adding-to { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:8px; }
.cmd-adding-to strong { color:#9ec9ff; font-weight:500; }

/* Category tabs */
.cmd-cats { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:0.85rem; }
.cmd-cat-btn { background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); padding:7px 12px; font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-tertiary); cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-cat-btn:hover { color:var(--text-secondary); }
.cmd-cat-btn.active { background:var(--wine-red); border-color:var(--wine-red); color:white; }

/* Item catalog */
.cmd-cat-panel { background:rgba(255,255,255,0.015); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:8px 10px; margin-bottom:1rem; max-height:46vh; overflow-y:auto; }
.cmd-cat-group { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-tertiary); padding:8px 4px 4px; border-top:0.5px solid var(--border); }
.cmd-cat-group:first-child { border-top:none; padding-top:2px; }
.cmd-item-btn { display:flex; justify-content:space-between; align-items:center; gap:10px; width:100%; text-align:left; padding:9px 6px; border-radius:6px; background:transparent; border:none; color:var(--text); font-size:13px; font-family:inherit; cursor:pointer; transition:background .12s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; line-height:1.3; }
.cmd-item-btn:hover { background:rgba(202,138,4,0.06); }
.cmd-item-btn:active { background:rgba(202,138,4,0.14); }
.cmd-item-name { flex:1; min-width:0; }
.cmd-item-allergen { font-size:14px; color:#e07b3a; cursor:help; flex-shrink:0; }
.cmd-item-allergen-tip { font-size:10px; color:#e07b3a; opacity:0.75; }

/* Custom item inline form */
.cmd-custom-form { padding:10px 12px; background:rgba(202,138,4,0.04); border:0.5px solid rgba(202,138,4,0.2); border-radius:var(--radius-md); margin-bottom:1rem; animation:panelIn 0.22s cubic-bezier(0.34,1.1,0.64,1) both; }
.cmd-custom-row { margin-bottom:8px; }
.cmd-custom-input { width:100%; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); color:var(--text); font-size:16px; padding:7px 12px; outline:none; font-family:inherit; box-sizing:border-box; }
.cmd-custom-input:focus { border-color:var(--gold); }

/* Diner-specific summary block (active diner) */
.cmd-diner-summary { padding-top:0.85rem; border-top:0.5px solid var(--border); margin-bottom:0.85rem; }
.cmd-summary-head { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:7px; }
.cmd-summary-empty { font-size:11px; color:var(--text-tertiary); font-style:italic; padding:4px 0; }
.cmd-line { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-top:0.5px solid rgba(255,255,255,0.04); }
.cmd-line:first-child { border-top:none; }
.cmd-line-qty { color:#9ec9ff; font-family:'Courier Prime','Courier New',monospace; font-size:12px; min-width:24px; flex-shrink:0; padding-top:1px; }
.cmd-line-body { flex:1; min-width:0; font-size:13px; color:var(--text); line-height:1.35; font-family:inherit; }
.cmd-line-name { display:inline; }
.cmd-line-warn { color:#e07b3a; margin-left:4px; }
.cmd-line-note { display:block; font-size:11px; color:var(--gold); font-style:italic; margin-top:2px; font-family:'Courier Prime','Courier New',monospace; }
.cmd-line-cat { display:block; font-size:10px; color:var(--text-tertiary); letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
.cmd-line-actions { display:flex; gap:4px; flex-shrink:0; }
.cmd-line-btn { width:26px; height:26px; border-radius:5px; border:0.5px solid var(--border-md); background:transparent; color:var(--text-tertiary); font-size:12px; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-line-btn:hover { color:var(--gold); }
.cmd-line-btn.cmd-rm:hover { color:#d68a8a; border-color:rgba(214,138,138,0.32); }

/* Footer actions */
.cmd-footer-actions { display:flex; gap:8px; align-items:center; margin-top:1rem; padding-top:0.9rem; border-top:0.5px solid var(--border); }
.cmd-footer-actions .cmd-btn { flex:1; }

/* Note-edit & timer-reset & full-view modal */
.cmd-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.62); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); z-index:1000; display:flex; align-items:flex-end; justify-content:center; padding:0; animation:cmdFade 0.22s ease both; }
@keyframes cmdFade { from{opacity:0} to{opacity:1} }
.cmd-modal-panel { background:var(--bg-primary,#1a1a1a); border-top:0.5px solid var(--border); border-radius:var(--radius-lg) var(--radius-lg) 0 0; max-height:88vh; width:100%; max-width:560px; overflow-y:auto; padding:1.25rem; animation:cmdSlideUp 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
@keyframes cmdSlideUp { from{transform:translateY(20px); opacity:0.7} to{transform:translateY(0); opacity:1} }
.cmd-modal-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:20px; color:var(--gold); margin-bottom:14px; }
.cmd-modal-input { width:100%; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); color:var(--text); font-size:16px; padding:9px 12px; outline:none; font-family:inherit; box-sizing:border-box; resize:vertical; min-height:60px; }
.cmd-modal-input:focus { border-color:var(--gold); }
.cmd-modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

/* Full-view: per-diner sections */
.cmd-full-diner { margin-bottom:1.1rem; padding-bottom:0.85rem; border-bottom:0.5px solid var(--border); }
.cmd-full-diner:last-of-type { border-bottom:none; }
.cmd-full-diner-head { font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#9ec9ff; margin-bottom:7px; }

/* "Mesas" back button — replaces the small "Salir" link with a more
   discoverable styled button on the active mesa header. */
.cmd-mesas-btn { background:var(--surface); border:0.5px solid var(--border-md); color:var(--text-secondary); border-radius:var(--radius-md); padding:5px 11px; font-size:11px; letter-spacing:0.06em; cursor:pointer; font-family:'Courier Prime','Courier New',monospace; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cmd-mesas-btn:hover { border-color:var(--gold); color:var(--gold); }

/* Course / service-time divider inside the diner summary list. Thin gold
   line + tiny caption with the course name. Caption uses the captured
   `group` field (Entrada / Plato principal / Postre / Bebidas / Otros). */
.cmd-course-divider { display:flex; align-items:center; gap:10px; margin:10px 0 6px; font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(202,138,4,0.72); }
.cmd-course-divider::before, .cmd-course-divider::after { content:''; flex:1; height:0.5px; background:rgba(202,138,4,0.32); }
.cmd-course-divider span { flex:0 0 auto; }
.cmd-course-divider:first-child { margin-top:0; }

/* Drag-to-reorder visuals. The grip handle is the leftmost cell of the
   line; only it triggers drag (the rest of the row stays tappable for the
   ⚐ note and ✕ remove buttons). */
.cmd-line { transition: transform .18s cubic-bezier(0.34,1.1,0.64,1), background .15s; touch-action: pan-y; }
.cmd-line-grip { display:flex; align-items:center; justify-content:center; width:24px; flex-shrink:0; color:var(--text-tertiary); cursor:grab; user-select:none; -webkit-tap-highlight-color:transparent; font-size:14px; line-height:1; padding:6px 2px; touch-action:none; opacity:0.55; transition:opacity .15s, color .15s; }
.cmd-line-grip:hover { opacity:1; color:var(--gold); }
.cmd-line-dragging { background:rgba(202,138,4,0.12); border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,0.4); transform:scale(1.01); z-index:5; position:relative; transition:none; }
.cmd-line-dragging .cmd-line-grip { color:var(--gold); opacity:1; cursor:grabbing; }
.lang-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.lang-btn { padding: 4px 9px; border-radius: 6px; border: 0.5px solid var(--border-md); font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-tertiary); letter-spacing: 0.04em; transition: all 0.15s; }
.lang-btn:hover { background: var(--bg-secondary); color: var(--text-secondary); }
.lang-btn.active { background: var(--surface); color: var(--text); border-color: var(--border-md); }

.main-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.tab:hover { background: var(--bg-secondary); }
.tab.active { background: var(--wine-red); color: white; border-color: var(--wine-red); font-weight: 500; }
/* Wine sub-tab that opens a different VIEW (general pairings), not a wine
   filter. A subtle gold halo signals "this isn't a category — it's another
   kind of content". Visible at all times so the distinction is obvious. */
.tab.tab-pairings { border-color: rgba(202,138,4,0.42); color: var(--gold); box-shadow: 0 0 8px rgba(202,138,4,0.18); }
.tab.tab-pairings:hover { background: rgba(202,138,4,0.08); }
.tab.tab-pairings.active { background: var(--wine-red); border-color: var(--wine-red); color: #fff; box-shadow: 0 0 10px rgba(202,138,4,0.32); }

.search-bar { position: relative; margin-bottom: 1.25rem; }
/* Font-size must be ≥ 16px to prevent iOS Safari from auto-zooming when the
   input gains focus. Padding compensated to keep total height visually
   close to the previous 14 px design. */
.search-bar input { width: 100%; padding: 7px 12px 7px 36px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); font-size: 16px; background: var(--surface); color: var(--text); outline: none; }
.search-bar input:focus { border-color: var(--wine-red); }
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }

.day-selector { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.day-btn { padding: 5px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.day-btn:hover { background: var(--bg-secondary); }
.day-btn.active { background: var(--gold); color: white; border-color: var(--gold); font-weight: 500; }
@keyframes today-glow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(14,165,233,0.25), 0 0 7px 1px rgba(14,165,233,0.1); }
  50%       { box-shadow: 0 0 0 1px rgba(14,165,233,0.65), 0 0 14px 4px rgba(14,165,233,0.28); }
}
.day-btn-today { animation: today-glow 3s ease-in-out infinite; }

/* Day heading */
.day-heading { font-size: 14px; font-weight: 500; color: var(--text); margin: 1.5rem 0 1rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }

/* Service blocks */
.service-block { margin-bottom: 2rem; }
.service-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--border); }
.service-label { font-size: 15px; font-weight: 500; color: var(--text); }
.service-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-lunch { background: var(--gold); }
.dot-dinner { background: rgba(139, 26, 46, 0.6); }
.dot-shared { background: var(--border-md); }

/* Course sections */
.course-section { margin-bottom: 1.25rem; }
.course-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; padding-left: 2px; }
.dish-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

/* Dish cards */
.dish-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; cursor: pointer; transition: border-color 0.15s; }
.dish-card:hover { border-color: var(--border-md); }
.dish-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.dish-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
.dish-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.allergen-row { display: flex; flex-wrap: wrap; gap: 4px; }
.allergen-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }
.allergen-tag.tag-mariscos { background: rgba(14,116,144,0.15); color: #67e8f9; border-color: rgba(14,116,144,0.4); }

/* Panel open animation */
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1);    }
}
@keyframes sparkle-pulse {
  0%, 100% { opacity: 0.45; transform: scale(0.85); }
  50%       { opacity: 1;    transform: scale(1.1);  }
}
@keyframes notice-glow {
  0%, 100% { box-shadow: 0 0 6px 0px rgba(202,138,4,0.15), inset 0 0 0px rgba(202,138,4,0); }
  50%       { box-shadow: 0 0 18px 4px rgba(202,138,4,0.35), inset 0 0 8px rgba(202,138,4,0.08); }
}
.tab-sparkle { display:inline-block; color:#fcd34d; font-size:9px; margin-right:4px; vertical-align:middle; animation:sparkle-pulse 2.8s ease-in-out infinite; }

/* Detail panel */
.detail-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
.detail-panel h2 { font-size: 17px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.detail-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 0.75rem; }
.detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.detail-section { margin-bottom: 1rem; }
.detail-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.allergen-detail { display: flex; flex-wrap: wrap; gap: 5px; }
.allergen-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-md); }
.allergen-pill.pill-mariscos { background: rgba(14,116,144,0.15); color: #67e8f9; border-color: rgba(14,116,144,0.4); }
.wine-suggestions { display: flex; flex-direction: column; gap: 8px; }
.wine-chip { background: var(--surface); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 8px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.wine-chip-name { font-size: 13px; font-weight: 500; color: var(--text); }
.wine-chip-why { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
/* chip colors per wine type */
.wine-chip.chip-espumante { background: rgba(14,165,233,0.12); border-color: rgba(14,165,233,0.35); }
.wine-chip.chip-espumante:hover, .wine-chip.chip-espumante.chip-active { background: rgba(14,165,233,0.22); border-color: rgba(14,165,233,0.7); }
.wine-chip.chip-espumante .wine-chip-name { color: #7dd3fc; }
.wine-chip.chip-espumante .wine-chip-why { color: #38bdf8; }
.wine-chip.chip-blanco { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
.wine-chip.chip-blanco:hover, .wine-chip.chip-blanco.chip-active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.6); }
.wine-chip.chip-blanco .wine-chip-name { color: #86efac; }
.wine-chip.chip-blanco .wine-chip-why { color: #4ade80; }
.wine-chip.chip-rosado { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
.wine-chip.chip-rosado:hover, .wine-chip.chip-rosado.chip-active { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.6); }
.wine-chip.chip-rosado .wine-chip-name { color: #fca5a5; }
.wine-chip.chip-rosado .wine-chip-why { color: #f87171; }
.wine-chip.chip-tinto { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.35); }
.wine-chip.chip-tinto:hover, .wine-chip.chip-tinto.chip-active { background: rgba(139,92,246,0.22); border-color: rgba(139,92,246,0.7); }
.wine-chip.chip-tinto .wine-chip-name { color: #c4b5fd; }
.wine-chip.chip-tinto .wine-chip-why { color: #a78bfa; }
.wine-chip.chip-dulce { background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.35); }
.wine-chip.chip-dulce:hover, .wine-chip.chip-dulce.chip-active { background: rgba(251,146,60,0.22); border-color: rgba(251,146,60,0.7); }
.wine-chip.chip-dulce .wine-chip-name { color: #fdba74; }
.wine-chip.chip-dulce .wine-chip-why { color: #fb923c; }
.wine-sub-panel { margin-top: 12px; background: var(--bg-secondary); border: 0.5px solid rgba(139,26,46,0.3); border-radius: var(--radius-md); padding: 1rem; animation: panelIn 0.25s cubic-bezier(0.34,1.1,0.64,1) both; }
.close-btn { float: right; font-size: 20px; line-height: 1; cursor: pointer; color: var(--text-tertiary); background: none; border: none; padding: 0 0 0 8px; }
.close-btn:hover { color: var(--text); }

/* Wine tab */
.wine-filter-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.wine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
.wine-card:hover { border-color: var(--border-md); }
.wine-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.wine-type-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.badge-espumante { background: rgba(14,165,233,0.18); color: #7dd3fc; }
.badge-blanco { background: rgba(34,197,94,0.15); color: #86efac; }
.badge-rosado { background: var(--coral-light); color: #f87171; }
.badge-tinto { background: rgba(139,92,246,0.2); color: #c4b5fd; }
.badge-dulce { background: rgba(251,146,60,0.2); color: #fdba74; }
.wine-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.wine-valley { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.wine-aroma { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.wine-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
.wine-detail h2 { font-size: 17px; font-weight: 500; margin-bottom: 2px; color: var(--text); }
.wine-detail .valley { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.wine-section { margin-bottom: 1rem; }
.wine-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.wine-section p { font-size: 13px; color: var(--text); line-height: 1.6; }
.guion-box { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
.guion-label { font-weight: 500; color: #e8a0aa; }
.guion-box p { font-size: 13px; color: #c97080; line-height: 1.6; }
.paired-dishes { display: flex; flex-direction: column; gap: 6px; }
.paired-dish { font-size: 13px; padding: 6px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); color: var(--text); }

/* Guiones */
.guion-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.guion-card h2 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; }
.guion-text { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1rem; font-size: 13px; color: #c97080; line-height: 1.6; }
.guion-section-title { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

/* Cocktails */
.cocktail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.cocktail-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; transition: border-color .25s ease, box-shadow .25s ease; }
/* Mocktails: distinctive green halo so the no-alcohol cards read as a
   different family at a glance. */
.cocktail-card.cocktail-mocktail { border-color: rgba(120,200,140,0.42); box-shadow: 0 0 12px rgba(120,200,140,0.18); }
.cocktail-card.cocktail-mocktail:hover { box-shadow: 0 0 16px rgba(120,200,140,0.28); }
/* Section dividers ("—— Mocktails ——" / "—— Cocktails ——") that flank the
   two card groups inside the Cocktails tab. The mocktails one carries a
   soft green tint to echo the card halos. */
.cocktail-section-divider { display:flex; align-items:center; gap:12px; margin:0 0 0.9rem; font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-tertiary); }
.cocktail-section-divider span { flex:0 0 auto; }
.cocktail-section-divider::before, .cocktail-section-divider::after { content:''; flex:1; height:0.5px; background:var(--border); }
.cocktail-grid + .cocktail-section-divider { margin-top:1.6rem; }
.cocktail-section-divider.mocktails { color:rgba(150,220,170,0.78); }
.cocktail-section-divider.mocktails::before, .cocktail-section-divider.mocktails::after { background:rgba(120,200,140,0.38); }
.cocktail-name { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.cocktail-method { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.75rem; font-style: italic; }
.cocktail-meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.cocktail-meta-tag { font-size: 11px; color: var(--text-tertiary); background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 8px; }
.cocktail-section-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.cocktail-ingredient-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.cocktail-ingredient-row:last-child { border-bottom: none; }
.cocktail-ingredient-name { font-size: 13px; color: var(--text); }
.cocktail-ingredient-amount { font-size: 12px; color: var(--text-secondary); white-space: nowrap; padding-left: 12px; text-align: right; }
.cocktail-garnish { margin-top: 0.85rem; padding-top: 0.6rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text-secondary); }
.cocktail-garnish strong { color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; display: block; margin-bottom: 2px; }


.hidden { display: none !important; }
.empty-state { font-size: 13px; color: var(--text-tertiary); padding: 2rem 0; text-align: center; }

.momentos-notice { display:flex; align-items:center; gap:10px; background: rgba(202,138,4,0.15); border: 0.5px solid rgba(202,138,4,0.4); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 1.5rem; font-size: 13px; color: #fcd34d; animation: notice-glow 3.2s ease-in-out infinite; }
/* Momentos sub-tab inside Cocktails: full-width banner the same width as the
   search bar, with a light-red halo and subtle cobweb decorations in both
   top corners. Clicking toggles the Momentos view. The cobwebs gently
   breathe via opacity to evoke "abandoned / coming soon" without being
   distracting. */
.momentos-banner { position:relative; display:block; width:100%; padding:14px 18px; margin:0 0 1.25rem; background:var(--surface); border:0.5px solid rgba(255,150,150,0.4); border-radius:var(--radius-md); box-shadow:0 0 14px rgba(255,150,150,0.18); color:rgba(255,200,200,0.85); font-family:inherit; cursor:pointer; overflow:hidden; transition:all .2s ease; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
.momentos-banner:hover { background:rgba(255,150,150,0.05); border-color:rgba(255,150,150,0.6); box-shadow:0 0 18px rgba(255,150,150,0.28); }
.momentos-banner.active { background:rgba(255,150,150,0.08); border-color:rgba(255,150,150,0.75); box-shadow:0 0 22px rgba(255,150,150,0.34); color:rgba(255,220,220,0.96); }
.momentos-banner-text { position:relative; z-index:1; display:block; text-align:center; line-height:1.2; }
.momentos-banner-label { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:18px; letter-spacing:0.05em; display:block; }
.momentos-banner-sub { display:block; margin-top:4px; font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,200,200,0.55); }
.momentos-banner.active .momentos-banner-sub { color:rgba(255,220,220,0.7); }
.momentos-banner-cobweb { position:absolute; top:-2px; width:62px; height:62px; pointer-events:none; background-repeat:no-repeat; background-size:contain; opacity:0.55; animation:cobweb-breathe 4.5s ease-in-out infinite; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><g stroke='%23ffb0b0' stroke-width='0.6' fill='none' opacity='0.9'><line x1='0' y1='0' x2='56' y2='0'/><line x1='0' y1='0' x2='52' y2='18'/><line x1='0' y1='0' x2='42' y2='36'/><line x1='0' y1='0' x2='22' y2='50'/><line x1='0' y1='0' x2='0' y2='56'/><path d='M 12 0 Q 12 12 0 12'/><path d='M 24 0 Q 24 24 0 24'/><path d='M 38 0 Q 38 38 0 38'/></g></svg>"); }
.momentos-banner-cobweb.cobweb-left  { left:-2px; }
.momentos-banner-cobweb.cobweb-right { right:-2px; transform:scaleX(-1); }
@keyframes cobweb-breathe { 0%,100%{ opacity:0.4; transform:translateY(0) } 50%{ opacity:0.7; transform:translateY(0.5px) } }
.momentos-banner.active .momentos-banner-cobweb.cobweb-right { transform:scaleX(-1) translateY(0.5px); }
.momentos-group { margin-bottom: 2rem; }
.momentos-group-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
/* ── COFFEE MODULE ──────────────────────────────────────────────────────── */
.coffee-module { max-width:700px; margin:0 auto; padding:0 0 2rem; }
.coffee-header { text-align:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:0.5px solid var(--border); }
.coffee-roastery-tag { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#c07d2a; margin-bottom:6px; }
.coffee-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:1.8rem; font-weight:300; color:var(--text-primary); margin:0.2rem 0; }
.coffee-title em { font-style:italic; color:#d4a44c; }
.coffee-subtitle { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-tertiary); }
.cf-tabs { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:1.5rem; }
.cf-tab-btn { background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); padding:9px 8px; font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); cursor:pointer; white-space:nowrap; text-align:center; transition:background .15s,color .15s,border-color .15s; }
.cf-tab-btn:hover { background:var(--bg-secondary); color:#c07d2a; }
.cf-tab-btn.active { background:var(--wine-red); border-color:var(--wine-red); color:#fff; font-weight:500; }
.cf-panel { display:none; } .cf-panel.active { display:block; }
/* ── ORDER SYSTEM ────────────────────────────────────────────── */
.cf-service-tab-btn { grid-column:1/-1; background:transparent; border:0.5px solid rgba(192,125,42,0.35); border-radius:var(--radius-md); padding:9px 8px; font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(192,125,42,0.65); cursor:pointer; text-align:center; transition:all .15s; margin-top:2px; }
.cf-service-tab-btn:hover { background:rgba(192,125,42,0.08); color:#d4a44c; }
.cf-service-tab-btn.active { background:rgba(192,125,42,0.14); border-color:#d4a44c; color:#d4a44c; }
.cf-gate { text-align:center; padding:2.5rem 1rem; }
.cf-gate-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:22px; color:var(--gold); margin-bottom:0.4rem; }
.cf-gate-sub { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:1.5rem; }
.cf-pin-error { font-size:11px; color:#e55; margin-top:8px; min-height:16px; text-align:center; }
.cf-numpad { max-width:232px; margin:0 auto; }
.cf-numpad-display { font-family:'Courier Prime','Courier New',monospace; font-size:28px; letter-spacing:0.3em; text-align:center; padding:12px 16px; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); color:var(--gold); margin-bottom:10px; min-height:54px; display:flex; align-items:center; justify-content:center; }
.cf-numpad-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.cf-numpad-key { padding:15px 8px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); font-size:18px; cursor:pointer; text-align:center; transition:background .1s; font-family:'Courier Prime','Courier New',monospace; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; }
.cf-numpad-key:active { background:var(--bg-secondary); }
.cf-numpad-key.cf-nk-del { color:var(--text-tertiary); font-size:15px; }
.cf-numpad-key.cf-nk-ok { background:var(--wine-red); color:#fff; border-color:var(--wine-red); font-size:20px; }
.cf-waiter-header { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:20px; color:var(--gold); margin-bottom:0.2rem; }
.cf-waiter-sub { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:1.25rem; }
.cf-drink-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:1rem; }
.cf-drink-sel-btn { padding:10px 8px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text-secondary); font-size:12px; cursor:pointer; text-align:center; transition:all .15s; touch-action:manipulation; user-select:none; }
.cf-drink-sel-btn:hover { border-color:var(--gold); color:var(--text); }
.cf-drink-sel-btn.selected { border-color:var(--gold); background:rgba(202,138,4,0.12); color:var(--gold); font-weight:500; }
.cf-order-label { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:6px; display:block; }
/* Font-size must be ≥ 16px to prevent iOS Safari from auto-zooming when
   the textarea gains focus. Padding tightened slightly so the visual
   footprint stays close to the prior 13 px design. */
.cf-order-textarea { width:100%; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); color:var(--text); font-size:16px; padding:7px 12px; resize:none; outline:none; box-sizing:border-box; font-family:inherit; line-height:1.35; }
.cf-order-textarea:focus { border-color:var(--gold); }
.cf-order-row { margin-bottom:0.9rem; }
.cf-submit-btn { width:100%; padding:13px; border-radius:var(--radius-md); border:none; background:var(--wine-red); color:#fff; font-size:13px; font-weight:500; letter-spacing:0.04em; cursor:pointer; transition:opacity .15s; margin-top:0.25rem; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-submit-btn:hover { opacity:0.85; }
.cf-submit-btn:disabled { opacity:0.38; cursor:default; }
/* Cart (multi-item order builder) */
.cf-cart-section { background:rgba(78,160,255,0.04); border:0.5px solid rgba(78,160,255,0.28); border-radius:var(--radius-md); padding:10px 12px 6px; margin-bottom:1rem; }
.cf-cart-title { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(158,201,255,0.85); margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
.cf-cart-count { color:rgba(158,201,255,0.6); font-weight:500; }
.cf-cart-row { display:flex; align-items:flex-start; gap:8px; padding:8px 0; border-top:0.5px solid rgba(255,255,255,0.045); }
.cf-cart-row:first-of-type { border-top:none; padding-top:4px; }
.cf-cart-qty { font-family:'Courier Prime','Courier New',monospace; font-size:12px; font-weight:500; color:#9ec9ff; background:rgba(78,160,255,0.14); border:0.5px solid rgba(78,160,255,0.35); border-radius:5px; padding:3px 7px; min-width:30px; text-align:center; flex-shrink:0; line-height:1.2; }
.cf-cart-text { flex:1; min-width:0; padding-top:1px; }
.cf-cart-name { font-size:13px; color:var(--text); line-height:1.25; }
.cf-cart-mods { font-size:11px; color:var(--text-tertiary); line-height:1.35; margin-top:2px; }
.cf-cart-special { font-size:11px; color:var(--gold); font-style:italic; margin-top:2px; }
.cf-cart-actions { display:flex; gap:4px; align-items:center; flex-shrink:0; }
.cf-cart-btn { width:26px; height:26px; border-radius:5px; border:0.5px solid var(--border-md); background:var(--surface); color:var(--text-secondary); font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .1s, background .15s, border-color .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; padding:0; }
.cf-cart-btn:hover { background:var(--bg-secondary); }
.cf-cart-btn:active { transform:scale(0.92); }
.cf-cart-btn.cf-cb-plus { color:#9ec9ff; border-color:rgba(78,160,255,0.4); }
.cf-cart-btn.cf-cb-plus:hover { background:rgba(78,160,255,0.1); }
.cf-cart-btn.cf-cb-rm { color:#d68a8a; border-color:rgba(214,138,138,0.32); font-size:14px; }
.cf-cart-btn.cf-cb-rm:hover { background:rgba(214,138,138,0.08); }
/* "Add to order" button — dashed blue accent so it doesn't compete with
   the wine-red final Submit. */
.cf-add-item-btn { width:100%; padding:11px; border-radius:var(--radius-md); border:0.5px dashed rgba(78,160,255,0.5); background:transparent; color:rgba(158,201,255,0.9); font-size:12px; letter-spacing:0.04em; cursor:pointer; transition:all .15s; margin-top:4px; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-add-item-btn:hover { background:rgba(78,160,255,0.08); border-color:rgba(78,160,255,0.75); color:#bfdaff; }
.cf-add-item-btn:active { transform:scale(0.99); }
.cf-add-item-btn:disabled { opacity:0.35; cursor:default; }
.cf-builder-divider { height:0.5px; background:var(--border); margin:1.1rem 0 1rem; opacity:0.5; }
.cf-confirm-msg { text-align:center; padding:1rem; font-size:14px; color:#4caf50; display:none; letter-spacing:0.04em; }
.cf-barista-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:8px; }
.cf-barista-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:20px; color:var(--gold); }
.cf-clear-btn { font-size:11px; color:var(--text-tertiary); background:none; border:0.5px solid var(--border); border-radius:var(--radius-md); padding:5px 10px; cursor:pointer; }
/* Barista subview tabs (Cola / Historial) */
.cf-bs-tabs { display:flex; gap:4px; }
.cf-bs-tab { font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); background:transparent; border:0.5px solid transparent; border-radius:var(--radius-md); padding:5px 11px; cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-bs-tab:hover { color:var(--text-secondary); border-color:var(--border); }
.cf-bs-tab.active { color:var(--gold); border-color:rgba(202,138,4,0.4); background:rgba(202,138,4,0.08); }
/* History view */
.cf-history-nav { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
.cf-hist-arrow { background:transparent; border:0.5px solid var(--border-md); border-radius:var(--radius-md); width:36px; height:32px; color:var(--text-secondary); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-hist-arrow:hover:not(:disabled) { background:var(--bg-secondary); color:var(--text); border-color:var(--gold); }
.cf-hist-arrow:disabled { opacity:0.3; cursor:default; }
.cf-hist-date-label { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:18px; color:var(--gold); flex:1; text-align:center; text-transform:capitalize; }
.cf-hist-stats { background:rgba(202,138,4,0.06); border:0.5px solid rgba(202,138,4,0.22); border-radius:var(--radius-md); padding:10px 12px; margin-bottom:14px; font-size:12px; color:var(--text-secondary); line-height:1.55; }
.cf-hist-stats-line { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.cf-hist-stats-line strong { color:var(--gold); font-weight:500; font-family:'Courier Prime','Courier New',monospace; }
.cf-hist-stats-top { margin-top:5px; padding-top:5px; border-top:0.5px solid rgba(202,138,4,0.18); font-size:11px; color:var(--text-tertiary); }
.cf-hist-stats-top strong { color:var(--text-secondary); font-weight:500; }
.cf-hist-row { border:0.5px solid var(--border); border-radius:var(--radius-md); background:var(--surface); padding:10px 12px; margin-bottom:6px; }
.cf-hist-head { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:5px; }
.cf-hist-time { font-family:'Courier Prime','Courier New',monospace; font-size:13px; font-weight:500; color:var(--gold); }
.cf-hist-table { font-size:13px; color:var(--text); }
.cf-hist-count { font-size:11px; color:var(--text-tertiary); }
.cf-hist-prep { margin-left:auto; font-family:'Courier Prime','Courier New',monospace; font-size:12px; color:var(--text-secondary); }
.cf-hist-item { display:flex; gap:8px; padding:3px 0; font-size:12px; color:var(--text-secondary); }
.cf-hist-item-qty { color:#9ec9ff; font-family:'Courier Prime','Courier New',monospace; min-width:26px; }
.cf-hist-item-mods { color:var(--text-tertiary); font-size:11px; }
.cf-hist-item-special { color:var(--gold); font-style:italic; font-size:11px; }
.cf-hist-empty { text-align:center; color:var(--text-tertiary); font-size:12px; padding:2.5rem 1rem; font-family:'Courier Prime','Courier New',monospace; letter-spacing:0.08em; }
.cf-hist-loading { text-align:center; color:var(--text-tertiary); font-size:11px; padding:1.5rem 1rem; opacity:0.6; }
.cf-exit-btn { font-size:11px; color:var(--text-tertiary); background:none; border:none; cursor:pointer; padding:0; text-decoration:underline; }
.cf-queue-empty { text-align:center; color:var(--text-tertiary); font-size:12px; padding:3rem 1rem; font-family:'Courier Prime','Courier New',monospace; letter-spacing:0.1em; text-transform:uppercase; }
.cf-order-card {
  border:0.5px solid var(--border); border-radius:var(--radius-md); background:var(--surface);
  margin-bottom:8px; overflow:hidden;
  max-height:2000px; opacity:1; transform:translateY(0);
  transition: border-color .25s ease, box-shadow .3s ease,
              opacity .26s ease, transform .26s ease,
              max-height .32s ease, margin .32s ease,
              padding .32s ease, border-width .32s ease;
  will-change: opacity, transform, max-height;
}
.cf-order-card.cf-card-entering { opacity:0; transform:translateY(-8px); }
.cf-order-card.cf-card-leaving {
  opacity:0; transform:translateX(10px);
  max-height:0 !important; margin-top:0 !important; margin-bottom:0 !important;
  border-width:0 !important; pointer-events:none;
}
.cf-order-card.new-order { border-color:var(--gold); animation:cfpulse 1.4s ease 2; }
@keyframes cfpulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 16px 2px rgba(202,138,4,0.42)} }
.cf-order-top { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; transition:background .18s ease; touch-action:manipulation; user-select:none; }
.cf-order-top:hover { background:rgba(255,255,255,0.025); }
.cf-order-card.open .cf-order-top { background:rgba(255,255,255,0.02); }
.cf-order-drink { font-size:15px; font-weight:500; color:var(--text); }
.cf-order-meta { font-size:11px; color:var(--text-tertiary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cf-order-elapsed { font-family:'Courier Prime','Courier New',monospace; font-size:13px; color:var(--gold); min-width:52px; text-align:right; font-weight:500; flex-shrink:0; transition:color .35s ease; }
.cf-order-elapsed.warn { color:#e07b3a; }
.cf-order-elapsed.urgent { color:#e55; animation:cfurgentpulse 1.8s ease infinite; }
@keyframes cfurgentpulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
.cf-order-body { display:none; padding:12px 14px; border-top:0.5px solid var(--border); }
.cf-order-card.open .cf-order-body { display:block; }
.cf-order-special-full { font-size:13px; color:var(--gold); background:rgba(202,138,4,0.08); border-radius:6px; padding:8px 10px; margin-bottom:10px; }
/* Ticket items — multi-drink order body */
.cf-ticket-items { padding:6px 14px 10px; border-top:0.5px solid rgba(255,255,255,0.05); }
.cf-ticket-item { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-top:0.5px solid rgba(255,255,255,0.04); }
.cf-ticket-item:first-child { border-top:none; padding-top:6px; }
.cf-ti-qty { font-family:'Courier Prime','Courier New',monospace; font-size:13px; font-weight:500; color:#9ec9ff; background:rgba(78,160,255,0.13); border:0.5px solid rgba(78,160,255,0.3); border-radius:5px; padding:3px 7px; min-width:32px; text-align:center; flex-shrink:0; line-height:1.2; }
.cf-ti-text { flex:1; min-width:0; padding-top:1px; }
.cf-ti-name { font-size:14px; font-weight:500; color:var(--text); line-height:1.25; }
.cf-ti-mods { font-size:11px; color:var(--text-tertiary); margin-top:2px; line-height:1.35; }
.cf-ti-special { font-size:11px; color:var(--gold); font-style:italic; margin-top:2px; }
.cf-ticket-footer { padding:0 14px 12px; }
.cf-ticket-footer .cf-done-btn { margin-top:0; }
.cf-done-btn { width:100%; padding:10px; border-radius:var(--radius-md); border:none; background:rgba(76,175,80,0.14); color:#4caf50; font-size:13px; font-weight:500; cursor:pointer; transition:background .15s, transform .1s; margin-top:10px; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-done-btn:hover  { background:rgba(76,175,80,0.25); }
.cf-done-btn:active { background:rgba(76,175,80,0.32); transform:scale(0.98); }
.cf-milk-btns { display:flex; gap:6px; margin-bottom:6px; }
.cf-milk-type-btn,
.cf-shot-type-btn { flex:1; padding:9px 6px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text-secondary); font-size:12px; cursor:pointer; text-align:center; transition:all .18s; touch-action:manipulation; user-select:none; -webkit-tap-highlight-color:transparent; }
.cf-milk-type-btn:hover,
.cf-shot-type-btn:hover { border-color:#4ea0ff; color:var(--text); }
/* Blue-glow selected state — used for milk type + shot type so the chosen
   modifier stands out clearly among the drink/numpad buttons around it. */
.cf-milk-type-btn.selected,
.cf-shot-type-btn.selected {
  border-color:#4ea0ff;
  background:rgba(78,160,255,0.14);
  color:#9ec9ff;
  font-weight:500;
  box-shadow:0 0 0 1px rgba(78,160,255,0.55), 0 0 14px rgba(78,160,255,0.40);
}
.cf-shot-btns { display:flex; gap:6px; margin-bottom:6px; }
.cf-table-numpad { max-width:220px; }
.cf-table-numpad-display { font-family:'Courier Prime','Courier New',monospace; font-size:22px; letter-spacing:0.2em; text-align:center; padding:8px 12px; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-md); color:var(--gold); margin-bottom:8px; min-height:44px; display:flex; align-items:center; justify-content:center; transition:color .15s; }
.cf-table-numpad-display.empty { color:var(--text-tertiary); font-size:13px; letter-spacing:0.05em; }
.cf-nk-sm { padding:11px 6px !important; font-size:16px !important; }
.cf-nk-clr { color:var(--text-tertiary) !important; font-size:13px !important; }
.cf-drink-list { display:flex; flex-direction:column; gap:6px; }
.cf-drink-card { border:0.5px solid var(--border); border-radius:var(--radius-md); background:var(--surface); overflow:hidden; transition:border-color .2s; }
.cf-drink-card.open { border-color:rgba(192,125,42,0.5); }
.cf-drink-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; user-select:none; }
.cf-drink-header:hover { background:rgba(192,125,42,0.04); }
.cf-drink-name { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:1.15rem; font-weight:400; color:var(--text-primary); margin-bottom:2px; }
.cf-drink-tagline { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); }
.cf-drink-toggle { color:var(--text-tertiary); font-size:18px; transition:transform .2s; }
.cf-drink-card.open .cf-drink-toggle { transform:rotate(180deg); }
.cf-drink-body { display:none; padding:0 16px 16px; border-top:0.5px solid var(--border); }
.cf-drink-card.open .cf-drink-body { display:block; }
.cf-philosophy { font-style:italic; font-size:13px; color:var(--text-secondary); border-left:2px solid rgba(192,125,42,0.4); padding:8px 12px; margin:12px 0; line-height:1.6; }
.cf-param-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:12px 0; }
.cf-param-box { background:rgba(192,125,42,0.06); border:0.5px solid rgba(192,125,42,0.15); border-radius:6px; padding:8px 10px; }
.cf-p-label { font-family:'Courier Prime','Courier New',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:3px; }
.cf-p-value { font-size:14px; font-weight:600; color:#d4a44c; }
.cf-p-unit { font-family:'Courier Prime','Courier New',monospace; font-size:9px; color:var(--text-tertiary); }
.cf-steps-label { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#c07d2a; margin:14px 0 8px; }
.cf-step-item { display:flex; gap:10px; margin-bottom:8px; align-items:flex-start; }
.cf-step-num { width:20px; height:20px; border-radius:50%; background:rgba(192,125,42,0.15); border:0.5px solid rgba(192,125,42,0.3); font-size:10px; color:#c07d2a; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
.cf-step-title { font-size:12px; font-weight:600; color:var(--text-primary); margin-bottom:2px; }
.cf-step-desc { font-family:'Courier Prime','Courier New',monospace; font-size:11px; color:var(--text-secondary); line-height:1.5; }
.cf-step-desc em { color:#d4a44c; font-style:normal; }
.cf-milk-block { background:rgba(192,125,42,0.06); border:0.5px solid rgba(192,125,42,0.2); border-radius:6px; padding:10px 12px; margin:10px 0; }
.cf-m-label { font-family:'Courier Prime','Courier New',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#c07d2a; margin-bottom:5px; }
.cf-milk-block p { font-size:12px; color:var(--text-secondary); line-height:1.5; margin:0; }
.cf-service-note { background:rgba(139,58,26,0.08); border:0.5px solid rgba(139,58,26,0.25); border-radius:6px; padding:10px 12px; font-size:12px; color:var(--text-secondary); line-height:1.5; margin-top:10px; }
.cf-service-note strong { color:#c07d2a; }
.cf-section-label { font-family:'Courier Prime','Courier New',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#c07d2a; margin-bottom:6px; }
.cf-section-title { font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif; font-size:1.6rem; font-weight:300; color:var(--text-primary); margin-bottom:1.25rem; }
.cf-info-card { border-left:2.5px solid rgba(192,125,42,0.5); padding:12px 14px; margin-bottom:10px; background:var(--surface); border-radius:0 var(--radius-md) var(--radius-md) 0; }
.cf-ic-label { font-family:'Courier Prime','Courier New',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#c07d2a; margin-bottom:6px; }
.cf-info-card p { font-size:13px; color:var(--text-secondary); line-height:1.6; margin:0; }
.cf-info-card p+p { margin-top:6px; }
.cf-info-card strong { color:var(--text-primary); }
.cf-timer-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:20px; margin-bottom:1rem; }
.cf-timer-drink-select { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
.cf-tds-btn { background:none; border:0.5px solid var(--border); border-radius:20px; padding:6px 14px; font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.06em; color:var(--text-secondary); cursor:pointer; transition:all .15s; }
.cf-tds-btn:hover { border-color:rgba(192,125,42,0.4); color:#c07d2a; }
.cf-tds-btn.active { background:rgba(192,125,42,0.12); border-color:rgba(192,125,42,0.5); color:#d4a44c; }
.cf-timer-display { font-family:'Courier Prime','Courier New',monospace; font-size:4rem; font-weight:700; text-align:center; color:var(--text-tertiary); letter-spacing:0.05em; margin:10px 0; transition:color .3s; }
.cf-timer-display.running { color:#4ade80; } .cf-timer-display.over { color:#fb923c; }
.cf-timer-target { font-family:'Courier Prime','Courier New',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-tertiary); text-align:center; margin-bottom:12px; }
.cf-timer-phase { background:rgba(192,125,42,0.08); border:0.5px solid rgba(192,125,42,0.2); border-radius:6px; padding:10px 14px; font-family:'Courier Prime','Courier New',monospace; font-size:12px; color:var(--text-secondary); text-align:center; margin-bottom:16px; min-height:40px; display:flex; align-items:center; justify-content:center; }
.cf-timer-controls { display:flex; gap:8px; justify-content:center; }
.cf-btn { border-radius:8px; padding:10px 20px; font-family:'Courier Prime','Courier New',monospace; font-size:12px; letter-spacing:0.06em; cursor:pointer; border:none; transition:all .15s; }
.cf-btn-primary { background:rgba(192,125,42,0.85); color:#fff; } .cf-btn-primary:hover { background:rgba(192,125,42,1); }
.cf-btn-ghost { background:none; border:0.5px solid var(--border); color:var(--text-secondary); } .cf-btn-ghost:hover { border-color:rgba(192,125,42,0.4); color:#c07d2a; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-text">
      <h1 id="app-title">The <em class="ata-emphasis">ATA</em> Handbook</h1>
      <p id="app-subtitle">El detalle, a mano.</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
