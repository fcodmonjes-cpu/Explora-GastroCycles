<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explora Atacama — Vinos & Menús</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }

:root {
  --wine-red: #7F77DD;
  --wine-red-light: #2a2660;
  --wine-red-dark: #a9a0f0;
  --gold: #BA7517;
  --gold-light: #3a2a05;
  --teal: #1D9E75;
  --teal-light: #0a2e20;
  --coral: #D85A30;
  --coral-light: #3a1a0a;
  --bg: #1a1917;
  --bg-secondary: #242220;
  --surface: #2a2825;
  --border: rgba(255,255,255,0.1);
  --border-md: rgba(255,255,255,0.18);
  --text: #f0eeea;
  --text-secondary: #aaa;
  --text-tertiary: #777;
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg-secondary: #242220;
    --surface: #2a2825;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.18);
    --text: #f0eeea;
    --text-secondary: #aaa;
    --text-tertiary: #777;
    --wine-red-light: #2a2660;
    --wine-red-dark: #a9a0f0;
    --gold-light: #3a2a05;
    --teal-light: #0a2e20;
    --coral-light: #3a1a0a;
  }
}

.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

.header { padding: 1rem 0 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.header-text h1 { font-size: 20px; font-weight: 500; color: var(--text); }
.header-text p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.lang-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.lang-btn { padding: 4px 9px; border-radius: 6px; border: 0.5px solid var(--border-md); font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-tertiary); letter-spacing: 0.04em; transition: all 0.15s; }
.lang-btn:hover { background: var(--bg-secondary); color: var(--text-secondary); }
.lang-btn.active { background: var(--surface); color: var(--text); border-color: var(--border-md); }

.main-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.tab:hover { background: var(--bg-secondary); }
.tab.active { background: var(--wine-red); color: white; border-color: var(--wine-red); font-weight: 500; }

.search-bar { position: relative; margin-bottom: 1.25rem; }
.search-bar input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
.search-bar input:focus { border-color: var(--wine-red); }
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }

.day-selector { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.day-btn { padding: 5px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.day-btn:hover { background: var(--bg-secondary); }
.day-btn.active { background: var(--gold); color: white; border-color: var(--gold); font-weight: 500; }

/* Day heading */
.day-heading { font-size: 14px; font-weight: 500; color: var(--text); margin: 1.5rem 0 1rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }

/* Service blocks */
.service-block { margin-bottom: 2rem; }
.service-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--border); }
.service-label { font-size: 15px; font-weight: 500; color: var(--text); }
.service-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-lunch { background: var(--gold); }
.dot-dinner { background: rgba(139, 26, 46, 0.6); }
.dot-shared { background: var(--border-md); }

/* Course sections */
.course-section { margin-bottom: 1.25rem; }
.course-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; padding-left: 2px; }
.dish-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

/* Dish cards */
.dish-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; cursor: pointer; transition: border-color 0.15s; }
.dish-card:hover { border-color: var(--border-md); }
.dish-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.dish-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
.dish-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.allergen-row { display: flex; flex-wrap: wrap; gap: 4px; }
.allergen-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }

/* Detail panel */
.detail-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
.detail-panel h2 { font-size: 17px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.detail-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 0.75rem; }
.detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.detail-section { margin-bottom: 1rem; }
.detail-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.allergen-detail { display: flex; flex-wrap: wrap; gap: 5px; }
.allergen-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-md); }
.wine-suggestions { display: flex; flex-direction: column; gap: 8px; }
.wine-chip { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.4); border-radius: var(--radius-md); padding: 8px 12px; cursor: pointer; transition: opacity 0.15s; }
.wine-chip:hover { opacity: 0.8; }
.wine-chip-name { font-size: 13px; font-weight: 500; color: #e8a0aa; }
.wine-chip-why { font-size: 12px; color: #c97080; margin-top: 2px; }
.close-btn { float: right; font-size: 20px; line-height: 1; cursor: pointer; color: var(--text-tertiary); background: none; border: none; padding: 0 0 0 8px; }
.close-btn:hover { color: var(--text); }

/* Wine tab */
.wine-filter-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.wine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
.wine-card:hover { border-color: var(--border-md); }
.wine-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.wine-type-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.badge-espumante { background: #F4C0D1; color: #72243E; }
.badge-blanco { background: var(--gold-light); color: #633806; }
.badge-rosado { background: var(--coral-light); color: #993C1D; }
.badge-tinto { background: var(--wine-red-light); color: var(--wine-red-dark); }
.badge-dulce { background: var(--teal-light); color: #0F6E56; }
.wine-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.wine-valley { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.wine-aroma { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.wine-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
.wine-detail h2 { font-size: 17px; font-weight: 500; margin-bottom: 2px; color: var(--text); }
.wine-detail .valley { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.wine-section { margin-bottom: 1rem; }
.wine-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.wine-section p { font-size: 13px; color: var(--text); line-height: 1.6; }
.guion-box { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
.guion-label { font-weight: 500; color: #e8a0aa; }
.guion-box p { font-size: 13px; color: #c97080; line-height: 1.6; }
.paired-dishes { display: flex; flex-direction: column; gap: 6px; }
.paired-dish { font-size: 13px; padding: 6px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); color: var(--text); }

/* Guiones */
.guion-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.guion-card h2 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; }
.guion-text { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1rem; font-size: 13px; color: #c97080; line-height: 1.6; }
.guion-section-title { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

.hidden { display: none !important; }
.empty-state { font-size: 13px; color: var(--text-tertiary); padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-text">
      <h1 id="app-title">Explora Atacama — Vinos &amp; Menús</h1>
      <p id="app-subtitle">Guía de servicio: maridajes, alérgenos y fichas de vino</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es',this)">ES</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('pt',this)">PT</button>
    </div>
  </div>

  <div class="main-tabs">
    <button class="tab active" onclick="setTab('menus',this)">Menús por día</button>
    <button class="tab" onclick="setTab('vinos',this)">Fichas de vino</button>
    <button class="tab" onclick="setTab('guiones',this)">Guiones de venta</button>
  </div>

  <!-- MENÚS TAB -->
  <div id="tab-menus">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar plato..." id="dish-search" oninput="renderDishes()">
    </div>
    <div class="day-selector">
      <button class="day-btn active" onclick="setDay('all',this)">Todos los días</button>
      <button class="day-btn" onclick="setDay('1',this)">Día 1</button>
      <button class="day-btn" onclick="setDay('2',this)">Día 2</button>
      <button class="day-btn" onclick="setDay('3',this)">Día 3</button>
      <button class="day-btn" onclick="setDay('4',this)">Día 4</button>
    </div>
    <div id="dish-grid"></div>
  </div>

  <!-- VINOS TAB -->
  <div id="tab-vinos" class="hidden">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar vino o cepa..." id="wine-search" oninput="renderWines()">
    </div>
    <div class="wine-filter-tabs">
      <button class="tab active" onclick="setWineFilter('todos',this)">Todos</button>
      <button class="tab" onclick="setWineFilter('espumante',this)">Espumante</button>
      <button class="tab" onclick="setWineFilter('blanco',this)">Blancos</button>
      <button class="tab" onclick="setWineFilter('rosado',this)">Rosado</button>
      <button class="tab" onclick="setWineFilter('tinto',this)">Tintos</button>
      <button class="tab" onclick="setWineFilter('dulce',this)">Dulce</button>
    </div>
    <div class="wine-grid" id="wine-grid"></div>
  </div>

  <!-- GUIONES TAB -->
  <div id="tab-guiones" class="hidden">
    <div id="guiones-content"></div>
  </div>
</div>

<script>
const DISHES = [
  {id:'d1',day:'1',service:'Almuerzo',course:'Plato principal',name:'Trucha asalmonada',desc:'Cocinada en salsa de ají amarillo, ají panca, cebolla, tomates, ajo, vino blanco y fumet. Con vegetales salteados y yucas fritas en dados.',allergens:[],wines:['azur','talinay'],why:{azur:'La burbuja limpia la salsa y realza la trucha.',talinay:'Tensión cítrica y salinidad en línea con el ají amarillo.'}},
  {id:'d2',day:'1',service:'Almuerzo',course:'Plato principal',name:'Pastel de choclo',desc:'Pastelera de choclo, pollo cortado en cubos, aceituna y huevo.',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico equilibran el dulzor del choclo.',glup:'Tinto ligero que no pesa sobre la pastelera.'}},
  {id:'d3',day:'1',service:'Almuerzo',course:'Plato principal',name:'Zucchini relleno',desc:'Sobre mix de hojas verdes. Relleno con sofrito de setas, quinoa y puré de setas. Bechamel con betarraga, gratinado con Grana Padano.',allergens:['Lácteos','Gluten'],wines:['aquitania','semillon'],why:{aquitania:'Cremosidad y acidez integran la bechamel y el queso.',semillon:'Volumen y textura para el umami de las setas.'}},
  {id:'d4',day:'1',service:'Almuerzo',course:'Plato principal',name:'Ceviche del día',desc:'Mezcla de pulpo, trucha, camarón y ostión. Leche de tigre con apio, cilantro, limón, jengibre, ají amarillo, cebolla y ajo. Con choclo peruano, camote y canchita.',allergens:[],wines:['azur','talinay'],why:{azur:'Espumante gastronómico: burbuja y acidez van con el limón.',talinay:'Sauvignon salino y cítrico: sigue la línea del ceviche.'}},
  {id:'d5',day:'1',service:'Cena',course:'Entrada',name:'Hojas verdes (Larache/Sequitor)',desc:'Mix de hojas verdes, quinoas teñidas en betarraga y ají amarillo, choclo peruano quemado. Dressing ácido de mora o frambuesa.',allergens:[],wines:['talinay','garage-rose'],why:{talinay:'Acidez que se alinea con el dressing y las hojas amargas.','garage-rose':'Fruta roja fresca en línea con la mora del dressing.'}},
  {id:'d6',day:'1',service:'Cena',course:'Entrada',name:'Chupe de centolla',desc:'Pastel horneado cremoso. Sofrito de cebolla, pimentón rojo y vino blanco con carne de centolla y pan remojado en leche. Gratinado con Grana Padano.',allergens:['Lácteos','Gluten'],wines:['semillon','aquitania'],why:{semillon:'Textura y acidez para sostener la salsa cremosa de mar.',aquitania:'Volumen del Chardonnay integra la crema del chupe.'}},
  {id:'d7',day:'1',service:'Cena',course:'Entrada',name:'Pasta casera con ragú de pato',desc:'Pasta del día. Ragú de muslo de pato a baja temperatura con mirr pois y vino tinto. Desmenuzado con reducción de salsa y chimichurri.',allergens:['Gluten'],wines:['montsecano','perez-cruz'],why:{montsecano:'Tanino suave y acidez acompañan la grasa del pato.','perez-cruz':'Carmenere para quien quiere estructura con el ragú.'}},
  {id:'d8',day:'1',service:'Cena',course:'Plato principal',name:'Chicharrón de cerdo',desc:'Panceta a baja temperatura, frita con maicena. Demi-glace con algarrobo. Con papas nativas, salsa uchucuta y suflados de Airampo.',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico limpian la fritura y la uchucuta.',glup:'Tinto ligero para no tapar el sabor del chicharrón.'}},
  {id:'d9',day:'1',service:'Cena',course:'Plato principal',name:'Pulpo',desc:'Cocción al vacío a 90°C por 2 horas. Con salsa anticuchera peruana (cebolla, ají amarillo, comino, ají panca, orégano, vinagre y soya).',allergens:['trazas Gluten'],wines:['semillon','talinay'],why:{semillon:'Textura media sostiene la salsa anticuchera.',talinay:'Salinidad y tensión cítrica con el ají y el limón.'}},
  {id:'d10',day:'1',service:'Cena',course:'Plato principal',name:'Risotto de res',desc:'Arroz arbóreo con caldo de rabo de vacuno (5 horas). Mantequilla, Grana Padano y chimichurri tradicional.',allergens:['Lácteos'],wines:['montsecano','perez-cruz'],why:{montsecano:'Tanino sedoso respeta la textura cremosa del risotto.','perez-cruz':'Carmenere para quien quiere tinto con más estructura.'}},
  {id:'d11',day:'1',service:'Cena',course:'Plato principal',name:'Charquicán vegetariano',desc:'Cebolla, pimentón, papa y zapallo con arvejas, choclo y zanahoria. Yema de huevo confitada a 63°C.',allergens:[],wines:['glup','montsecano'],why:{glup:'Fruta fresca y acidez resaltan el zapallo sin pesar.',montsecano:'Pinot elegante para una preparación de verduras.'}},
  {id:'d12',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Texturas de chañar',desc:'Crème brûlée con arrope de chañar, galleta de cacao, tierra y helado de chañar.',allergens:['Lácteos','Gluten'],wines:['erasmo'],why:{erasmo:'Late Harvest con miel y frutas confitadas: maridaje dulce clásico.'}},
  {id:'d13',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Carrot cake',desc:'Bizcocho de zanahorias y cacao. Frosting de queso crema con zeste de naranja. Almendras garrapiñadas.',allergens:['Gluten','Lácteos','Frutos secos'],wines:['erasmo'],why:{erasmo:'El dulzor y las notas de naranja van con el carrot cake.'}},
  {id:'d14',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Flan de vainilla',desc:'Flan tradicional con caramelo (huevo, leche y azúcar).',allergens:['Lácteos'],wines:['erasmo','azur'],why:{erasmo:'Dulzor floral complementa la vainilla.',azur:'Espumante seco como opción de cierre fresco.'}},
  {id:'d15',day:'2',service:'Almuerzo',course:'Plato principal',name:'Ostiones gratinados',desc:'100g de ostiones con bechamel, vino blanco y Grana Padano al horno.',allergens:['Lácteos','Gluten'],wines:['azur','semillon'],why:{azur:'Burbuja y acidez cortan la grasa del gratín.',semillon:'Textura media para la bechamel y el dulzor del ostión.'}},
  {id:'d16',day:'2',service:'Almuerzo',course:'Plato principal',name:'Brócoli rostizado',desc:'Salteado en mantequilla. Puré de vegetales (tomate, zapallo, zucchini, papas) y chutney de tomates.',allergens:['Lácteos'],wines:['aquitania','glup'],why:{aquitania:'Chardonnay cremoso que integra el puré de vegetales.',glup:'Tinto ligero para quien prefiere rojo con verduras asadas.'}},
  {id:'d17',day:'2',service:'Almuerzo',course:'Plato principal',name:'Lomo saltado',desc:'Salteado de carne con soya y cerveza. Cebolla, tomate, cilantro. Arroz y papas.',allergens:['Gluten'],wines:['garage-rose','syrah'],why:{'garage-rose':'Acidez y agarre tánico con la soya y la fritura.',syrah:'Syrah especiado para las notas de la salsa.'}},
  {id:'d18',day:'2',service:'Almuerzo',course:'Plato principal',name:'Tiradito de locos',desc:'Loco laminado cocido. Salsa verde (cebolla, cilantro, ají verde, limón) y mayonesa de limón.',allergens:[],wines:['talinay','azur'],why:{talinay:'Salinidad y tensión cítrica con la salsa verde.',azur:'Burbuja para un maridaje espumante del tiradito.'}},
  {id:'d19',day:'2',service:'Cena',course:'Entrada',name:'Ensalada de hojas con higos',desc:'Dressing de higos con queso azul, almendras garrapiñadas e higos infusionados.',allergens:['Lácteos (penicilina)','Frutos secos'],wines:['erasmo','garage-rose'],why:{erasmo:'Dulzor floral combina con los higos y el queso azul.','garage-rose':'Acidez y fruta roja equilibran el queso azul.'}},
  {id:'d20',day:'2',service:'Cena',course:'Entrada',name:'Sopa de zapallo',desc:'Zapallo y arrope de chañar, cocida y aligerada.',allergens:[],wines:['aquitania','semillon'],why:{aquitania:'Cremosidad y acidez integran el dulzor del zapallo.',semillon:'Textura media para sopa con notas dulces.'}},

'garage-rose':{identity:'Gastronomic dry rosé. Blend of Carignan and Monastrell, old dryland vines, Empedrado/Truquilemu area.',terroir:'Maule interior dryland. Mediterranean climate with hot summers. Head-trained vines, horse-worked, very poor granite soils.',winery:'Garage Wine Co.: small heritage vineyards, ancestral agriculture, minimal intervention. Table rosé, not pool rosé.',style:'Pale colour. Raspberry, cherry, Mediterranean herbs, flowers. Completely dry, high acidity, medium body, slight tannin grip. Very versatile.',shortpitch:'It\'s a rosé from old Maule vines, dry and with good acidity; works very well with fried dishes, slightly spicy preparations and those that mix sea and land.',pitch:'It\'s almost a very pale red: it has red fruit, high acidity and a small tannin grip that helps clean dishes like corn pie, chaufa with fried egg or pork crackling. It\'s a fresher alternative when the dish is intense but the guest doesn\'t want a heavy red.'},
montsecano:{identity:'Cold-climate red, 100% Pinot Noir, DO Casablanca Valley. Biodynamic project.',terroir:'Coastal valley, morning fogs, ocean wind. Decomposed granite and sands: high acidity, fine tannin, great drinkability.',winery:'Small and acclaimed project. Biodynamics, minimal intervention. Fermentation in cement eggs. No new wood make-up.',style:'Strawberry, cherry, flowers, herbs, saline background. Juicy, medium body, silky tannin, vibrant acidity.',shortpitch:'It\'s a Casablanca Pinot Noir, very elegant and fresh, with soft tannin; perfect with duck, risottos, moussaka and juicy red meats.',pitch:'Being a cold-climate red, it has good acidity and very fine tannin. That means it pairs very well with creamy-textured dishes like risotto, and with meats like duck or fillet, without any feeling of heaviness.'},
glup:{identity:'Light red, 100% Cinsault, Itata interior dryland.',terroir:'Hillsides near the sea, cool Mediterranean climate, old head-trained vines on granite soils. Moderate temperatures, cool nights: low-alcohol wines with great freshness.',winery:'Longaví Wines line. Heritage varieties, early harvest, little extraction, simple ageing. Very drinkable gastronomic wines.',style:'Morello cherry, strawberry, flowers, white pepper and herbs. Very light, soft tannin, marked acidity. Can be served slightly chilled.',shortpitch:'It\'s a very light and fresh red from Itata, ideal for slightly sweet or creamy dishes like corn pie, potato pie or charquicán.',pitch:'The vines are on dryland granite soils and harvested relatively early, so the wine has good acidity and little tannin. It\'s perfect when the traveller wants red but not something heavy or oaky.'},
'perez-cruz':{identity:'Red, selected parcel Carmenere, DO Maipo Andes.',terroir:'South of Santiago, Andean foothills. Mediterranean climate, great thermal range. Alluvial and colluvial stony soils of volcanic origin.',winery:'Viña Pérez Cruz, single sustainably-managed vineyard. Limited Edition: precise versions of Bordeaux varieties. Ripe fruit, round tannins, balanced wood.',style:'Ripe black fruit, sweet spices, cocoa, roasted pepper, herbs. Medium-high but round tannin, medium-high body, long finish.',shortpitch:'It\'s a Maipo Andes Carmenere, with black fruit and firm but round tannins; ideal for short ribs, pork ribs and brisket.',pitch:'The vineyard is in the upper Maipo, on stony soils. That gives a Carmenere with structure and freshness. You feel the black fruit and spices, and the tannin grips very well to slow-cooked meats with concentrated sauces.'},
cabernet:{identity:'Red, 100% organic Cabernet Sauvignon, Maipo Andes.',terroir:'World reference zone for Cabernet. Volcanic, alluvial soils with lots of stone and excellent drainage. Hot days and cold nights: full ripeness with acidity.',winery:'Antiyal, Álvaro Espinoza\'s project, biodynamic pioneer in Chile. Organic and biodynamic, moderate yields, balanced barrel.',style:'Cassis, plum, roasted pepper, graphite, soft tobacco, herbs. Full body, firm and polished tannins, good acidity, long finish.',shortpitch:'It\'s our organic Maipo Andes Cabernet, with structure and black fruit; perfect for fillets, short ribs, lamb and brisket.',pitch:'It\'s an Andean-climate Cabernet, with firm but very polished tannins and an acidity that prevents the wine feeling heavy. It pairs very well with the texture of red meats and long-cooked meats, and holds up to sauces with a red wine base.'},
syrah:{identity:'Red, 100% Syrah, Azuda line by Clos de Luz, Almahue in Cachapoal.',terroir:'Almahue, interior of the Cachapoal valley. Temperate climate, moderately warm summers cooled by the Andes. Granite hillsides: fresh acidity and fine tannins.',winery:'Clos de Luz, family winery. Mediterranean varieties in old vineyards. Azuda in concrete tanks and clay amphoras. Freshness over power.',style:'Black fruit, blackberries, spices (pepper, herbs), floral notes, mineral background. Intense but fresh, medium-high body, good acidity, elegant tannins.',shortpitch:'It\'s an Almahue Syrah, intense but fresh, with lots of black fruit and spices; works very well with lamb, ribs, brisket and duck.',pitch:'Vinified in concrete and clay, which preserves freshness and fruit character. It has enough structure for long-cooked meats, but at the same time maintains an acidity that makes the pairing lighter.'},
erasmo:{identity:'Natural sweet wine (Late Harvest), overripe Torontel grapes from Maule.',terroir:'Maule interior, Mediterranean climate, hot summers and dry autumns. Clay-loam and granite soils. The grape concentrates sugar and aromas on the vine.',winery:'Erasmo: Italian tradition with Maule dryland. Balanced Late Harvest: good acidity and intense floral aromas, without cloying sensations.',style:'White flowers, honey, stone fruit, candied fruits, orange peel. Marked sweetness with sufficient acidity. Unctuous texture, long finish.',shortpitch:'It\'s our dessert wine, a Torontel Late Harvest from Maule, with honey and candied fruit notes; pairs very well with tres leches, cheesecake, carrot cake or the chañar tasting.',pitch:'The grape is left to over-ripen on the vine to concentrate sugar and aromas. The result is a sweet wine but with enough acidity not to tire. It\'s the best option when the traveller wants to close with a classic dessert and wine pairing.'}
},
pt:{
azur:{identity:'Espumante orgânico, método tradicional, Extra Brut (muito seco). Blend de uvas de clima frio do Limarí.',terroir:'Vale do Limarí, norte do Chile. Clima semiárido frio de costa, camanchaca, solos calcários. Acidez marcada e sensação mineral muito clara.',winery:'Manejo orgânico. Segunda fermentação em garrafa (método tradicional). Crianza sobre borras. Sem excesso de açúcar de dosagem.',style:'Borbulha fina e persistente. Cítricos, maçã verde, flores brancas e pão torrado. Seco, alta acidez, corpo médio-leve, final salino.',shortpitch:'É um espumante orgânico do Vale do Limarí, muito seco e fresco, com borbulha fina. Ideal para frutos do mar gratinados, camarões ao alho ou para começar com ceviches e tiraditos.',pitch:'Vem do norte do litoral, onde a neblina e o vento mantêm a uva muito fresca. Isso lhe dá alta acidez que limpa a gordura do gratinado ou do alho, e a borbulha arrasta o molho e deixa a boca pronta para o próximo bocado.'},
talinay:{identity:'Branco seco, 100% Sauvignon Blanc, vinhedo Talinay. Um dos terroirs mais frios e calcários do Chile.',terroir:'12 km do Oceano Pacífico. Clima frio de costa, camanchaca matinal, brisas marinhas. Rocha calcária fraturada: altíssima acidez, grande tensão e marcada salinidade.',winery:'Viña Tabalí, pioneira na zona calcária. Baixos rendimentos, vindima manual, fermentação fria, madeira mínima.',style:'Lima, grapefruit, ervas finas, flores brancas, pedra e giz. Muito tenso, alta acidez, corpo médio, longo final cítrico e salino.',shortpitch:'É um Sauvignon de costa muito fria, cítrico e salino, perfeito para ceviches, tiraditos e peixes brancos.',pitch:'As parreiras estão plantadas quase sobre rocha, muito perto do mar. Isso dá ao vinho uma tensão e salinidade naturais que se alinham com o limão e o sal do ceviche ou do tiradito, e ao mesmo tempo limpa o caldo da truta sem tapar o sabor do peixe.'},
aquitania:{identity:'Branco seco, 100% Chardonnay, DO Vale de Casablanca.',terroir:'Entre Santiago e Valparaíso, perto do oceano. Clima mediterrâneo frio, neblinas matinais, argilas e areias sobre granito.',winery:'Viña Aquitania, longa trajetória. Equilíbrio: frescor, fruta definida e cremosidade moderada, sem excesso de madeira.',style:'Maçã, pera, cítricos, flores brancas, toque de creme ou manteiga suave. Acidez marcada, corpo médio, textura levemente cremosa.',shortpitch:'É um Chardonnay fresco de Casablanca, com alguma cremosidade, muito confortável para sopas, pratos com queijo e peixes com molhos suaves.',pitch:'Vem de um vale de clima frio, por isso mantém muito boa acidez. Ao mesmo tempo tem volume suficiente para acompanhar sopas cremosas, lasanha de legumes ou um peixe com molho, sem que o conjunto fique pesado.'},
semillon:{identity:'Branco seco, 100% Semillon de vinhas velhas (~1900) em Guarilihue, secano do Itata.',terroir:'Sul do Chile, clima mediterrâneo fresco. Colinas de sequeiro sem irrigação, solos graníticos ricos em quartzo. Boa acidez, textura e caráter mineral.',winery:'Carter Mollenhauer: resgate de vinhedos patrimoniais. Orgânico, leveduras nativas, madeira mínima. Parcela emblemática de Semillon centenário.',style:'Cítricos maduros, ervas secas, flores, pedra molhada. Acidez firme, volume médio, às vezes textura cremosa por borras e toque de cascas.',shortpitch:'É um Semillon de vinhas centenárias do Itata, com boa acidez e textura; ideal para chupes, frutos do mar cremosos e a truta estilo salmão.',pitch:'As parreiras foram plantadas há mais de cem anos em colinas de sequeiro sobre granito. Isso dá ao vinho uma acidez natural e uma textura muito fina que se agarra a molhos cremosos, como o chupe ou o polvo com pastelera de milho, mantendo o frescor na boca.'},
'garage-rose':{identity:'Rosé seco gastronômico. Blend de Carinena e Monastrell, vinhas velhas de sequeiro, zona Empedrado/Truquilemu.',terroir:'Maule interior, sequeiro. Clima mediterrâneo com verões quentes. Vinhas em gobelet trabalhadas a cavalo, solos graníticos muito pobres.',winery:'Garage Wine Co.: pequenos vinhedos patrimoniais, agricultura ancestral, mínima intervenção. Rosé de mesa, não de piscina.',style:'Cor pálida. Framboesa, cereja, ervas mediterrâneas, flores. Completamente seco, alta acidez, corpo médio, leve adstringência tânica. Muito versátil.',shortpitch:'É um rosé de vinhas velhas do Maule, seco e com boa acidez; funciona muito bem com frituras, pratos com um pouco de picante e preparações que misturam mar e terra.',pitch:'É quase um tinto muito claro: tem fruta vermelha, alta acidez e uma pequena adstringência tânica que ajuda a limpar pratos como o pastel de milho, o chaufa com ovo frito ou o torresmo. É uma alternativa mais fresca quando o prato é intenso mas o cliente não quer um tinto pesado.'},
montsecano:{identity:'Tinto de clima frio, 100% Pinot Noir, DO Vale de Casablanca. Projeto biodinâmico.',terroir:'Vale costeiro, neblinas matinais, vento do oceano. Granito decomposto e areias: alta acidez, tanino fino, grande beibilidade.',winery:'Projeto pequeno e reconhecido. Biodinâmica, mínima intervenção. Fermentação em ovos de cimento. Sem maquiagem de madeira nova.',style:'Morango, cereja, flores, ervas, fundo salino. Suculento, corpo médio, tanino sedoso, acidez viva.',shortpitch:'É um Pinot Noir de Casablanca, muito elegante e fresco, com tanino suave; vai perfeito com pato, risotos, musaka e carnes vermelhas ao ponto suculento.',pitch:'Por ser um tinto de clima frio, tem boa acidez e tanino muito fino. Isso faz com que se dê muito bem com pratos de textura cremosa como o risoto, e com carnes como o pato ou o filé, sem sensação de peso.'},
glup:{identity:'Tinto leve, 100% Cinsault, sequeiro interior do Itata.',terroir:'Colinas próximas ao mar, clima mediterrâneo fresco, vinhas velhas em gobelet sobre solos graníticos. Temperaturas moderadas, noites frescas: vinhos de baixo teor alcoólico e grande frescor.',winery:'Linha Longaví Wines. Variedades patrimoniais, colheita precoce, pouca extração, crianza simples. Vinhos gastronômicos muito bebíveis.',style:'Ginja, morango, flores, pimenta branca e ervas. Muito leve, tanino suave, acidez marcada. Pode ser servido levemente fresco.',shortpitch:'É um tinto muito suave e fresco do Itata, ideal para pratos com algum dulçor ou cremosos como o pastel de milho, o pastel de batata ou o charquicán.',pitch:'As vinhas estão em sequeiro sobre solos graníticos e são colhidas relativamente cedo, por isso o vinho tem boa acidez e pouco tanino. É perfeito quando o viajante quer tinto, mas não algo pesado nem com muita madeira.'},
'perez-cruz':{identity:'Tinto, Carmenere de seleção de parcelas, DO Maipo Andes.',terroir:'Ao sul de Santiago, sopé da Cordilheira. Clima mediterrâneo, grande amplitude térmica. Solos aluviais e coluviais, pedregosos, de origem vulcânica.',winery:'Viña Pérez Cruz, único vinhedo em manejo sustentável. Limited Edition: versões precisas de castas bordolesas. Fruta madura, taninos redondos, madeira equilibrada.',style:'Fruta negra madura, especiarias doces, cacau, pimentão assado, ervas. Tanino médio-alto mas redondo, corpo médio-alto, longo final.',shortpitch:'É um Carmenere do Maipo Andes, com fruta negra e taninos firmes mas redondos; ideal para costela, costelinha e brisket.',pitch:'O vinhedo está na parte alta do Maipo, sobre solos pedregosos. Isso dá um Carmenere com estrutura e frescor. Sente-se a fruta negra e as especiarias, e o tanino se agarra muito bem a carnes de cozimento lento, com molhos concentrados.'},
cabernet:{identity:'Tinto, 100% Cabernet Sauvignon orgânico, Maipo Andes.',terroir:'Zona de referência mundial para Cabernet. Solos vulcânicos, aluviais, com muita pedra e excelente drenagem. Dias quentes e noites frias: maturação completa com acidez.',winery:'Antiyal, projeto de Álvaro Espinoza, pioneiro da biodinâmica no Chile. Orgânico e biodinâmico, rendimentos moderados, barrica equilibrada.',style:'Cassis, ameixa, pimentão assado, grafite, tabaco suave, ervas. Corpo pleno, taninos firmes e polidos, boa acidez, longo final.',shortpitch:'É o nosso Cabernet orgânico do Maipo Andes, com estrutura e fruta negra; perfeito para filés, costela, cordeiro e brisket.',pitch:'É um Cabernet de clima andino, com taninos firmes mas muito polidos e uma acidez que evita que o vinho fique pesado. Acompanha muito bem a textura de carnes vermelhas e de cozimento longo, e aguenta molhos com fundo de vinho tinto.'},
syrah:{identity:'Tinto, 100% Syrah, linha Azuda de Clos de Luz, Almahue no Cachapoal.',terroir:'Almahue, interior do vale de Cachapoal. Clima temperado, verões quentes moderados pela Cordilheira. Encostas com solos graníticos: acidez fresca e taninos finos.',winery:'Clos de Luz, adega familiar. Variedades mediterrâneas em vinhedos antigos. Azuda em cubas de concreto e ânforas de barro. Frescor mais do que potência.',style:'Fruta negra, amoras, especiarias (pimenta, ervas), notas florais, fundo mineral. Intenso mas fresco, corpo médio-alto, boa acidez, taninos elegantes.',shortpitch:'É um Syrah de Almahue, intenso mas fresco, com muita fruta negra e especiarias; funciona muito bem com cordeiro, costelinha, brisket e pato.',pitch:'Vinificado em concreto e ânforas, o que conserva o frescor e o caráter da fruta. Tem estrutura suficiente para carnes de cozimento longo, mas ao mesmo tempo mantém uma acidez que torna o conjunto mais leve.'},
erasmo:{identity:'Vinho doce natural (Late Harvest), uvas Torontel sobremaduras do Maule.',terroir:'Maule interior, clima mediterrâneo, verões quentes e outonos secos. Solos franco-argilosos e graníticos. A uva concentra açúcar e aromas na planta.',winery:'Erasmo: tradição italiana com o sequeiro do Maule. Late Harvest equilibrado: boa acidez e aromas florais intensos, sem sensações enjoativas.',style:'Flores brancas, mel, fruta de caroço, frutas confitadas, casca de laranja. Dulçor marcado com acidez suficiente. Textura untuosa, longo final.',shortpitch:'É o nosso vinho de sobremesa, um Late Harvest de Torontel do Maule, com notas de mel e frutas confitadas; vai muito bem com tres leches, cheesecake, bolo de cenoura ou a degustação de chañar.',pitch:'A uva é deixada para sobremadurar na planta para concentrar açúcar e aromas. O resultado é um vinho doce mas com acidez suficiente para não cansar. É a melhor opção quando o viajante quer encerrar com uma harmonização clássica de sobremesa e vinho.'}
}};

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getDishTr(d){ const tr=DISH_TRANS[currentLang]?.[d.id]; return tr?{...d,...tr,why:{...d.why,...tr.why}}:d; }
function getWineTr(w){ const tr=WINE_TRANS[currentLang]?.[w.id]; return tr?{...w,...tr}:w; }
function getGuionesTr(){ return GUION_TRANS[currentLang]||GUIONES; }
function serviceLabel(s){ return s==='Almuerzo'?t('lunch'):s==='Cena'?t('dinner'):t('lunchDinner'); }
function courseLabel(c){ return c==='Entrada'?t('starter'):c==='Plato principal'?t('main'):t('dessert'); }

function setLang(lang, el) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  // update static UI
  document.getElementById('app-title').textContent = t('appTitle');
  document.getElementById('app-subtitle').textContent = t('appSubtitle');
  const mainTabs = document.querySelectorAll('.main-tabs .tab');
  if (mainTabs[0]) mainTabs[0].textContent = t('tabMenus');
  if (mainTabs[1]) mainTabs[1].textContent = t('tabWines');
  if (mainTabs[2]) mainTabs[2].textContent = t('tabGuiones');
  const dishSearch = document.getElementById('dish-search');
  if (dishSearch) dishSearch.placeholder = t('searchDish');
  const wineSearch = document.getElementById('wine-search');
  if (wineSearch) wineSearch.placeholder = t('searchWine');
  const dayBtns = document.querySelectorAll('.day-btn');
  if (dayBtns[0]) dayBtns[0].textContent = t('allDays');
  for (let i=1;i<dayBtns.length;i++) dayBtns[i].textContent = t('day')+' '+i;
  const wfTabs = document.querySelectorAll('.wine-filter-tabs .tab');
  const wfKeys = ['all','sparkling','whites','rose','reds','sweet'];
  wfTabs.forEach((b,i) => { if(wfKeys[i]) b.textContent = t(wfKeys[i]); });
  // re-render content
  selectedDish = null; selectedWine = null;
  renderDishes(); renderWines();
  if (currentTab === 'guiones') renderGuiones();
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.main-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab));
  if (tab === 'guiones') renderGuiones();
}

function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedDish = null;
  renderDishes();
}

function setWineFilter(f, el) {
  wineFilter = f;
  document.querySelectorAll('.wine-filter-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedWine = null;
  renderWines();
}

function getWine(id) { return WINES.find(w => w.id === id); }
function typeBadgeClass(t) { return {espumante:'badge-espumante',blanco:'badge-blanco',rosado:'badge-rosado',tinto:'badge-tinto',dulce:'badge-dulce'}[t]||''; }
function typeLabel(tp) { return UI[currentLang]['lbl_'+tp] || UI.es['lbl_'+tp] || tp; }

function renderDishes() {
  const q = (document.getElementById('dish-search').value||'').toLowerCase();
  const dishes = DISHES.filter(d => {
    const tr = getDishTr(d);
    const dayOk = currentDay === 'all' || d.day === currentDay;
    const qOk = !q || tr.name.toLowerCase().includes(q) || tr.desc.toLowerCase().includes(q);
    return dayOk && qOk;
  });
  if (!dishes.length) {
    document.getElementById('dish-grid').innerHTML = `<div class="empty-state">${t('noDishes')}</div>`;
    return;
  }
  const days = currentDay === 'all' ? ['1','2','3','4'] : [currentDay];
  let html = '';
  days.forEach(day => {
    const dayDishes = dishes.filter(d => d.day === day);
    if (!dayDishes.length) return;
    if (currentDay === 'all') html += `<div class="day-heading">${t('day')} ${day}</div>`;
    SERVICE_ORDER.forEach(service => {
      const svcDishes = dayDishes.filter(d => d.service === service);
      if (!svcDishes.length) return;
      const dotClass = service === 'Cena' ? 'dot-dinner' : service === 'Almuerzo y Cena' ? 'dot-shared' : 'dot-lunch';
      html += `<div class="service-block"><div class="service-header"><div class="service-dot ${dotClass}"></div><span class="service-label">${serviceLabel(service)}</span></div>`;
      COURSE_ORDER.forEach(course => {
        const courseDishes = svcDishes.filter(d => d.course === course);
        if (!courseDishes.length) return;
        html += `<div class="course-section"><div class="course-label">${courseLabel(course)}</div><div class="dish-row">`;
        courseDishes.forEach(d => {
          const tr = getDishTr(d);
          html += `<div class="dish-card${selectedDish===d.id?' selected':''}" data-dish-id="${d.id}" onclick="selectDish('${d.id}')">
            <div class="dish-name">${tr.name}</div>
            <div class="dish-desc">${tr.desc}</div>
            ${d.allergens.length ? `<div class="allergen-row">${d.allergens.map(a=>`<span class="allergen-tag">${a}</span>`).join('')}</div>` : ''}
          </div>`;
        });
        html += `</div></div>`; // close dish-row and course-section
      });
      html += `</div>`;
    });
  });
  document.getElementById('dish-grid').innerHTML = html;
}

function selectDish(id) {
  selectedDish = selectedDish === id ? null : id;
  renderDishes();
  if (!selectedDish) return;
  const card = document.querySelector(`[data-dish-id="${selectedDish}"]`);
  if (!card) return;
  const d = DISHES.find(x => x.id === selectedDish);
  const sdtr = getDishTr(d);
  const chips = d.wines.map(wid => {
    const w = getWine(wid);
    return `<div class="wine-chip" onclick="openWineFromDish('${wid}')"><div class="wine-chip-name">${w.name}</div><div class="wine-chip-why">${sdtr.why[wid]||''}</div></div>`;
  }).join('');
  const panelHTML = `<div class="detail-panel" id="dish-inline-panel" style="margin-top:10px;">
    <button class="close-btn" onclick="closeDishDetail()">&#215;</button>
    <h2>${sdtr.name}</h2>
    <p class="detail-meta">${t('day')} ${d.day} &middot; ${serviceLabel(d.service)} &middot; ${courseLabel(d.course)}</p>
    <p class="detail-desc">${sdtr.desc}</p>
    ${d.allergens.length ? `<div class="detail-section"><h3>${t('allergens')}</h3><div class="allergen-detail">${d.allergens.map(a=>`<span class="allergen-pill">${a}</span>`).join('')}</div></div>` : ''}
    <div class="detail-section"><h3>${t('pairings')}</h3><div class="wine-suggestions">${chips}</div></div>
  </div>`;
  card.closest('.dish-row').insertAdjacentHTML('afterend', panelHTML);
  document.getElementById('dish-inline-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDishDetail() {
  selectedDish = null;
  renderDishes();
}

function openWineFromDish(wid) {
  document.querySelectorAll('.main-tabs .tab').forEach((t,i) => t.classList.toggle('active', i===1));
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!=='vinos'));
  currentTab = 'vinos';
  selectWine(wid);
}

function renderWines() {
  const q = (document.getElementById('wine-search').value||'').toLowerCase();
  const wines = WINES.filter(w => {
    const typeOk = wineFilter === 'todos' || w.type === wineFilter;
    const qOk = !q || w.name.toLowerCase().includes(q) || w.valley.toLowerCase().includes(q) || w.style.toLowerCase().includes(q);
    return typeOk && qOk;
  });
  document.getElementById('wine-grid').innerHTML = wines.map(w => {
    const wtr = getWineTr(w);
    return `<div class="wine-card${selectedWine===w.id?' selected':''}" data-wine-id="${w.id}" onclick="selectWine('${w.id}')">
      <span class="wine-type-badge ${typeBadgeClass(w.type)}">${typeLabel(w.type)}</span>
      <div class="wine-name">${w.name}</div>
      <div class="wine-valley">${w.valley}</div>
      <div class="wine-aroma">${wtr.style}</div>
    </div>`;
  }).join('');
}

function selectWine(id) {
  selectedWine = selectedWine === id ? null : id;
  renderWines();
  if (!selectedWine) return;
  const card = document.querySelector(`[data-wine-id="${selectedWine}"]`);
  if (!card) return;
  const w = WINES.find(x => x.id === selectedWine);
  const pairedDishes = DISHES.filter(d => d.wines.includes(selectedWine));
  const wtr = getWineTr(w);
  const panelHTML = `<div class="wine-detail" id="wine-inline-panel" style="margin-top:12px;grid-column:1/-1;">
    <button class="close-btn" onclick="closeWineDetail()">&#215;</button>
    <span class="wine-type-badge ${typeBadgeClass(w.type)}">${typeLabel(w.type)}</span>
    <h2>${w.name}</h2>
    <div class="valley">${w.valley}</div>
    <div class="wine-section"><h3>${t('identity')}</h3><p>${wtr.identity}</p></div>
    <div class="wine-section"><h3>${t('terroir')}</h3><p>${wtr.terroir}</p></div>
    <div class="wine-section"><h3>${t('winery')}</h3><p>${wtr.winery}</p></div>
    <div class="wine-section"><h3>${t('style')}</h3><p>${wtr.style}</p></div>
    <div class="wine-section"><h3>${t('salesScript')}</h3>
      <div class="guion-box">
        <p><span class="guion-label">${t('shortPitch')}</span> ${wtr.shortpitch}</p>
        <p style="margin-top:8px;"><span class="guion-label">${t('development')}</span> ${wtr.pitch}</p>
      </div>
    </div>
    <div class="wine-section"><h3>${t('pairedDishes')} (${pairedDishes.length})</h3>
      <div class="paired-dishes">${pairedDishes.map(d=>{const dtr=getDishTr(d);return`<div class="paired-dish">${t('day')} ${d.day} &middot; ${serviceLabel(d.service)} &middot; ${courseLabel(d.course)} — ${dtr.name}</div>`;}).join('')}</div>
    </div>
  </div>`;
  card.insertAdjacentHTML('afterend', panelHTML);
  document.getElementById('wine-inline-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeWineDetail() {
  selectedWine = null;
  renderWines();
}

function renderGuiones() {
  const guiones = getGuionesTr();
  document.getElementById('guiones-content').innerHTML = GUIONES.map((g, i) => {
    const gtr = guiones[i] || g;
    const wines = g.wines.map(wid => {
      const w = getWine(wid);
      return `<div class="wine-chip" onclick="openWineFromGuion('${wid}')">
        <div class="wine-chip-name">${w.name}</div>
        <div class="wine-chip-why">${w.valley}</div>
      </div>`;
    }).join('');
    return `<div class="guion-card">
      <h2>${gtr.title}</h2>
      <div class="guion-text">${gtr.text}</div>
      <div class="guion-section-title">${t('mentionedWines')}</div>
      <div class="wine-suggestions">${wines}</div>
    </div>`;
  }).join('');
}

function openWineFromGuion(wid) {
  document.querySelectorAll('.main-tabs .tab').forEach((t,i) => t.classList.toggle('active', i===1));
  ['menus','vinos','guiones'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!=='vinos'));
  currentTab = 'vinos';
  selectWine(wid);
}

renderDishes();
renderWines();
</script>
</body>
</html>
