  if (btns[i]) btns[i].classList.add('selected');
  // Show / hide modifier rows
  const milkRow = document.getElementById('cf-milk-row');
  if (milkRow) milkRow.style.display = cf_needsMilk ? 'block' : 'none';
  document.querySelectorAll('.cf-milk-type-btn').forEach(b=>b.classList.remove('selected'));
  const vsr = document.getElementById('cf-vegetal-spec-row');
  if (vsr) vsr.style.display = 'none';
  const shotRow = document.getElementById('cf-shot-row');
  if (shotRow) shotRow.style.display = cf_needsShot ? 'block' : 'none';
  document.querySelectorAll('.cf-shot-type-btn').forEach(b=>b.classList.remove('selected'));
  cfUpdateAddToOrderBtnState();
}

function cfSelectMilkType(type){
  cf_milkType = type;
  document.querySelectorAll('.cf-milk-type-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`.cf-milk-type-btn[data-milk="${type}"]`)?.classList.add('selected');
  const vsr = document.getElementById('cf-vegetal-spec-row');
  if (vsr) vsr.style.display = type === 'vegetal' ? 'block' : 'none';
  cfUpdateAddToOrderBtnState();
}

function cfSelectShotType(type){
  cf_shotType = type;
  document.querySelectorAll('.cf-shot-type-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`.cf-shot-type-btn[data-shot="${type}"]`)?.classList.add('selected');
  cfUpdateAddToOrderBtnState();
}

// "Add to order" enabled only when current builder selection is complete:
//   - a drink is chosen
//   - if drink needs milk, a milk type is picked
//   - if drink needs shot, a shot load is picked
function cfUpdateAddToOrderBtnState(){
  const btn = document.getElementById('cf-add-item-btn');
  if (!btn) return;
  const valid =
    cf_selectedDrinkIdx !== null &&
    (!cf_needsMilk || !!cf_milkType) &&
    (!cf_needsShot || !!cf_shotType);
  btn.disabled = !valid;
}

// Reset only the per-item builder area (drink selection, modifiers, note).
// Cart and table number persist so the waiter can keep adding items.
function cfResetBuilder(){
  cf_selectedDrinkIdx  = null;
  cf_selectedDrinkName = null;
  cf_milkType          = null;
  cf_shotType          = null;
  cf_needsMilk         = false;
  cf_needsShot         = false;
  document.querySelectorAll('.cf-drink-sel-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.cf-milk-type-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.cf-shot-type-btn').forEach(b=>b.classList.remove('selected'));
  const milkRow = document.getElementById('cf-milk-row'); if(milkRow) milkRow.style.display='none';
  const shotRow = document.getElementById('cf-shot-row'); if(shotRow) shotRow.style.display='none';
  const vsr = document.getElementById('cf-vegetal-spec-row'); if(vsr) vsr.style.display='none';
  const vs  = document.getElementById('cf-vegetal-spec'); if(vs) vs.value='';
  const sp  = document.getElementById('cf-order-special'); if(sp) sp.value='';
  cfUpdateAddToOrderBtnState();
}

// Add the current builder selection to the cart. If there's already an item
// with identical drink + modifiers + note, just bump that row's qty so the
// waiter doesn't end up with duplicate cart rows for the same configuration.
function cfAddToCart(){
  if (cf_selectedDrinkIdx === null) return;
  const d = getCoffeeData();
  const drink    = d.drinks[cf_selectedDrinkIdx]?.name || '?';
  const milkSpec = cf_milkType === 'vegetal' ? (document.getElementById('cf-vegetal-spec')?.value||'').trim() : '';
  const special  = (document.getElementById('cf-order-special')?.value||'').trim();
  const item = {
    drinkIdx: cf_selectedDrinkIdx,
    drink,
    milkType: cf_milkType || null,
    milkSpec: milkSpec || null,
    shotType: cf_shotType || null,
    special:  special || '',
    qty: 1
  };
  // Merge with existing matching row
  const matchIdx = cf_cart.findIndex(it =>
    it.drinkIdx === item.drinkIdx &&
    (it.milkType||null) === item.milkType &&
    (it.milkSpec||null) === item.milkSpec &&
    (it.shotType||null) === item.shotType &&
    (it.special||'') === item.special
  );
  if (matchIdx >= 0) cf_cart[matchIdx].qty += 1;
  else cf_cart.push(item);
  cfRenderCart();
  cfResetBuilder();
}

function cfIncCartItem(idx){
  if (!cf_cart[idx]) return;
  cf_cart[idx].qty += 1;
  cfRenderCart();
}
function cfDecCartItem(idx){
  if (!cf_cart[idx]) return;
  cf_cart[idx].qty -= 1;
  if (cf_cart[idx].qty <= 0) cf_cart.splice(idx,1);
  cfRenderCart();
}
function cfRemoveCartItem(idx){
  if (!cf_cart[idx]) return;
  cf_cart.splice(idx,1);
  cfRenderCart();
}

// Build the human-readable modifier string for one cart item.
// Examples:  "doble"   "sin lactosa"   "doble · vegetal — avena"
function cfFormatItemMods(it){
  const parts = [];
  if (it.shotType) parts.push(it.shotType === 'doble' ? t('cfShotDoble').toLowerCase() : t('cfShotSimple').toLowerCase());
  if (it.milkType){
    const milkLabel = it.milkType === 'entera'      ? t('cfMilkEntera').toLowerCase()
                    : it.milkType === 'sin-lactosa' ? t('cfMilkSinLactosa').toLowerCase()
                    : it.milkType === 'vegetal'     ? t('cfMilkVegetal').toLowerCase()
                    : it.milkType;
    parts.push(it.milkSpec ? `${milkLabel} — ${it.milkSpec}` : milkLabel);
  }
  return parts.join(' · ');
}

function cfRenderCart(){
  const section = document.getElementById('cf-cart-section');
  const list    = document.getElementById('cf-cart-list');
  const count   = document.getElementById('cf-cart-count');
  const submit  = document.getElementById('cf-submit-btn');
  if (!section || !list) return;
  if (!cf_cart.length){
    section.style.display = 'none';
    if (submit) submit.disabled = true;
    return;
  }
  section.style.display = 'block';
  const totalQty = cf_cart.reduce((s,it)=>s+(it.qty||1),0);
  if (count) count.textContent = `${totalQty} ${totalQty === 1 ? t('cfCartDrink') : t('cfCartDrinks')}`;
  list.innerHTML = cf_cart.map((it,idx)=>{
    const mods = cfFormatItemMods(it);
    return `
      <div class="cf-cart-row">
        <div class="cf-cart-qty">${it.qty}×</div>
        <div class="cf-cart-text">
          <div class="cf-cart-name">${it.drink}</div>
          ${mods ? `<div class="cf-cart-mods">${mods}</div>` : ''}
          ${it.special ? `<div class="cf-cart-special">⚑ ${it.special}</div>` : ''}
        </div>
        <div class="cf-cart-actions">
          <button class="cf-cart-btn cf-cb-plus"  aria-label="+" onclick="cfIncCartItem(${idx})">+</button>
          <button class="cf-cart-btn"             aria-label="−" onclick="cfDecCartItem(${idx})">−</button>
          <button class="cf-cart-btn cf-cb-rm"    aria-label="×" onclick="cfRemoveCartItem(${idx})">×</button>
        </div>
      </div>`;
  }).join('');
  if (submit) submit.disabled = false;
}

function cfSubmitOrder(){
  if (!cf_cart.length) return;
  const table = cf_tableBuffer.trim();
  const btn   = document.getElementById('cf-submit-btn');
  if (btn) btn.disabled = true;
  // Multi-item ticket: store each cart entry under `items`. Legacy fields
  // (drink, drinkIdx, milkType…) are intentionally omitted — the barista
  // renderer reads `items` first and falls back to legacy shape only when
  // missing (for any old orders still in the DB).
  const items = cf_cart.map(it => ({
    drinkIdx: it.drinkIdx,
    drink:    it.drink,
    milkType: it.milkType || null,
    milkSpec: it.milkSpec || null,
    shotType: it.shotType || null,
    special:  it.special || '',
    qty:      Math.max(1, it.qty|0)
  }));
  cfInitFirebase().ref(CF_ORDERS_PATH).push({
    items, table, timestamp: Date.now(), status:'pending', lang: currentLang
  }).then(()=>{
    const msg = document.getElementById('cf-confirm-msg');
    if (msg){ msg.style.display='block'; setTimeout(()=>msg.style.display='none',2000); }
    // Reset everything for the next order
    cf_cart = [];
    cf_tableBuffer = '';
    cfResetBuilder();
    cfRenderCart();
    const td = document.getElementById('cf-table-display');
    if(td){ td.textContent=t('cfTablePlaceholder'); td.classList.add('empty'); }
  }).catch(()=>{ if(btn) btn.disabled=false; });
}

// ── Barista view ─────────────────────────────────────────────────────────────
function cfRenderBaristaView(){
  cf_lastQueueHash = ''; // force full render on first load
  cf_optimisticallyDone.clear();
  cf_baristaSubMode = 'queue';
  cf_historyDate = cfGetDateKey(Date.now());
  cf_historyData = [];
  const panel = document.getElementById('cf-panel-service');
  if (!panel) return;
  // Both subviews live in the DOM at once; visibility is toggled. This way
  // the live queue's diff-render keeps working in the background even when
  // the barista is browsing history, so switching tabs back is instant.
  panel.innerHTML = `
    <div class="cf-barista-header">
      <div class="cf-bs-tabs">
        <button class="cf-bs-tab active" id="cf-bs-tab-queue"   onclick="cfSwitchBaristaSub('queue')">${t('cfQueueTab')}</button>
        <button class="cf-bs-tab"        id="cf-bs-tab-history" onclick="cfSwitchBaristaSub('history')">${t('cfHistoryTab')}</button>
      </div>
      <button class="cf-exit-btn" onclick="cfExitServiceMode()">${t('cfExit')}</button>
    </div>
    <!-- Queue subview -->
    <div id="cf-bs-queue">
      <div id="cf-queue-list"><p class="cf-queue-empty">${t('cfQueueEmpty')}</p></div>
    </div>
    <!-- History subview (hidden until tapped) -->
    <div id="cf-bs-history" style="display:none">
      <div class="cf-history-nav">
        <button class="cf-hist-arrow" id="cf-hist-prev" onclick="cfHistoryStepDate(-1)">‹</button>
        <div class="cf-hist-date-label" id="cf-hist-date-label">${cfFormatDateLabel(cf_historyDate)}</div>
        <button class="cf-hist-arrow" id="cf-hist-next" onclick="cfHistoryStepDate(1)">›</button>
      </div>
      <div id="cf-hist-stats"></div>
      <div id="cf-hist-list"><p class="cf-hist-loading">${t('cfHistLoading')}</p></div>
    </div>`;

  // Best-effort housekeeping on entry (idempotent, async).
  cfMigrateLegacyDoneOrders();
  cfPurgeOldHistory();

  // Detach any existing listener before subscribing
  if (cf_baristaRef && cf_baristaFn){ cf_baristaRef.off('value',cf_baristaFn); }
  cf_baristaRef = cfInitFirebase().ref(CF_ORDERS_PATH);
  cf_baristaFn  = snap => {
    const orders = [];
    snap.forEach(child=>orders.push({id:child.key,...child.val()}));
    // Sort oldest-first client-side (no Firebase index required)
    orders.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    cfRenderQueue(orders.filter(o=>o.status==='pending'));
  };
  cf_baristaRef.on('value', cf_baristaFn);

  // Polling fallback via REST API (bypasses SDK cache — always hits server).
  // IMPORTANT: polling is STRICTLY ADDITIVE. It can only add orders the
  // WebSocket listener might have missed. It NEVER removes or shrinks the
  // queue. This protects against the empty-state flash that happens when
  // Firebase REST returns transient inconsistent data (null / partial set)
  // during a concurrent write. The WebSocket listener is the single source
  // of truth for removals and state changes.
  if (cf_pollInterval) clearInterval(cf_pollInterval);
  const CF_REST_URL = CF_FIREBASE_CONFIG.databaseURL + '/' + CF_ORDERS_PATH + '.json';
  cf_pollInterval = setInterval(async ()=>{
    if (cf_mode !== 'barista'){ clearInterval(cf_pollInterval); cf_pollInterval=null; return; }
    try {
      const resp = await fetch(CF_REST_URL);
      const data = await resp.json();
      if (cf_mode !== 'barista') return;
      const all = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
      all.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
      cfAddNewOrdersFromPoll(all.filter(o=>o.status==='pending'));
    } catch(e){}
  }, 2000);

  if (cf_elapsedInterval) clearInterval(cf_elapsedInterval);
  cf_elapsedInterval = setInterval(cfTickElapsed, 1000);
}

// Build a fresh DOM element for a single order card. An order is now a
// "ticket" — one table, one or more items. For backwards compatibility,
// orders without an `items` array (legacy single-drink shape) are wrapped
// in a synthetic single-element items list so the same renderer handles both.
function cfBuildOrderCardEl(o, ld){
  const items = (o.items && o.items.length)
    ? o.items
    : [{
        drink: o.drink, drinkIdx: o.drinkIdx,
        milkType: o.milkType, milkSpec: o.milkSpec,
        shotType: o.shotType, special: o.special, qty: 1
      }];
  const totalQty = items.reduce((s,it)=>s+(it.qty||1),0);

  // Modifier label for one item — same shape as the cart side.
  const fmtMods = it => {
    const parts = [];
    if (it.shotType) parts.push(it.shotType === 'doble' ? t('cfShotDoble').toLowerCase() : t('cfShotSimple').toLowerCase());
    if (it.milkType){
      const milkLabel = it.milkType === 'entera'      ? t('cfMilkEntera').toLowerCase()
                      : it.milkType === 'sin-lactosa' ? t('cfMilkSinLactosa').toLowerCase()
                      : it.milkType === 'vegetal'     ? t('cfMilkVegetal').toLowerCase()
                      : it.milkType;
      parts.push(it.milkSpec ? `${milkLabel} — ${it.milkSpec}` : milkLabel);
    }
    return parts.join(' · ');
  };

  const itemsHtml = items.map(it=>{
    const mods = fmtMods(it);
    return `
      <div class="cf-ticket-item">
        <div class="cf-ti-qty">${it.qty || 1}×</div>
        <div class="cf-ti-text">
          <div class="cf-ti-name">${it.drink || '?'}</div>
          ${mods ? `<div class="cf-ti-mods">${mods}</div>` : ''}
          ${it.special ? `<div class="cf-ti-special">⚑ ${it.special}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  const headerLabel = o.table
    ? `⌂ ${o.table} · ${totalQty}`
    : `${totalQty} ${totalQty === 1 ? t('cfCartDrink') : t('cfCartDrinks')}`;

  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="cf-order-card" id="cf-ocard-${o.id}">
      <div class="cf-order-top">
        <div style="flex:1;min-width:0">
          <div class="cf-order-drink">${headerLabel}</div>
        </div>
        <div class="cf-order-elapsed" id="cf-elapsed-${o.id}" data-ts="${o.timestamp}">0s</div>
      </div>
      <div class="cf-ticket-items">${itemsHtml}</div>
      <div class="cf-ticket-footer">
        <button class="cf-done-btn" onclick="cfMarkDone('${o.id}')">${t('cfMarkDone')}</button>
      </div>
    </div>`.trim();
  return wrap.firstElementChild;
}

// Polling-only: append orders the WebSocket listener might have missed.
// Never removes, never re-orders, never updates the hash — leaves all that
// to the listener. This guarantees a transient inconsistent REST response
// can never cause a visual disappearance.
function cfAddNewOrdersFromPoll(orders){
  const list = document.getElementById('cf-queue-list');
  if (!list || !orders.length) return;
  const visibleIds = new Set(
    [...list.querySelectorAll('.cf-order-card')].map(c=>c.id.replace('cf-ocard-',''))
  );
  // Skip orders that the barista just tapped Listo on — even if the REST
  // endpoint hasn't propagated the status:'done' yet, we don't want to
  // resurrect a card the user just dismissed.
  const newOrders = orders.filter(o=>!visibleIds.has(o.id) && !cf_optimisticallyDone.has(o.id));
  if (!newOrders.length) return;
  const empty = list.querySelector('.cf-queue-empty');
  if (empty) empty.remove();
  const ld = COFFEE_DATA[currentLang] || COFFEE_DATA.es;
  newOrders.forEach(o=>{
    try {
      const card = cfBuildOrderCardEl(o, ld);
      card.classList.add('cf-card-entering','new-order');
      list.appendChild(card);
      setTimeout(()=>card.classList.remove('new-order'), 3200);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        if (card.parentElement) card.classList.remove('cf-card-entering');
      }));
    } catch(e){ console.error('[cfAddNewOrdersFromPoll]', e); }
  });
  cfTickElapsed();
}

// Diff-render (called by the WebSocket listener — authoritative):
// adds new cards, fades out completed ones, revives any leaving card whose
// order has come back, leaves all other cards untouched.
function cfRenderQueue(orders){
  const list = document.getElementById('cf-queue-list');
  if (!list) return;

  // Fingerprint: IDs in current order. Bail when nothing changed.
  const hash = orders.map(o=>o.id).join(',');
  if (hash === cf_lastQueueHash) return;
  cf_lastQueueHash = hash;

  // Empty state — animate any remaining cards out, then show placeholder.
  if (!orders.length){
    const remaining = [...list.querySelectorAll('.cf-order-card:not(.cf-card-leaving)')];
    if (!remaining.length){
      if (!list.querySelector('.cf-queue-empty')){
        list.innerHTML = `<p class="cf-queue-empty">${t('cfQueueEmpty')}</p>`;
      }
      return;
    }
    remaining.forEach(c=>c.classList.add('cf-card-leaving'));
    const expected = cf_lastQueueHash;
    setTimeout(()=>{
      if (cf_lastQueueHash !== expected) return;
      list.innerHTML = `<p class="cf-queue-empty">${t('cfQueueEmpty')}</p>`;
    }, 340);
    return;
  }

  // Remove the empty placeholder if present
  const empty = list.querySelector('.cf-queue-empty');
  if (empty) empty.remove();

  const ld = COFFEE_DATA[currentLang] || COFFEE_DATA.es;
  const targetIds = new Set(orders.map(o=>o.id));

  // Phase 0 — REVIVE any card that's currently animating out but whose order
  // has come back into the target set. Skip cards the barista just tapped
  // Listo on — those should stay leaving even if a stale listener event fires
  // with old data showing them still pending.
  list.querySelectorAll('.cf-order-card.cf-card-leaving').forEach(card=>{
    const id = card.id.replace('cf-ocard-','');
    if (targetIds.has(id) && !cf_optimisticallyDone.has(id)){
      card.classList.remove('cf-card-leaving');
      card.style.maxHeight = ''; // restore CSS default
    }
  });

  // Phase 1 — fade-out / collapse cards no longer in the queue.
  list.querySelectorAll('.cf-order-card').forEach(card=>{
    const id = card.id.replace('cf-ocard-','');
    if (!targetIds.has(id) && !card.classList.contains('cf-card-leaving')){
      // Pin current height so the collapse can transition smoothly
      card.style.maxHeight = card.scrollHeight + 'px';
      // force a layout pass so the next class change starts from this height
      void card.offsetHeight;
      card.classList.add('cf-card-leaving');
      // Removal is conditional on the card still being in leaving state when
      // the timer fires — Phase 0 above can revive it before then.
      setTimeout(()=>{
        if (card.parentElement && card.classList.contains('cf-card-leaving')) card.remove();
      }, 360);
    }
  });

  // Phase 2 — insert new cards (existing ones remain untouched).
  // Orders are sorted oldest-first, so existing cards are already in the right
  // order; new ones append at the tail naturally.
  // Calculate "first load" BEFORE inserting anything so subsequent iterations
  // share the same value (otherwise the second card would no longer count as first-load).
  const isFirstLoad = list.querySelectorAll('.cf-order-card').length === 0;
  try {
    orders.forEach(o=>{
      if (document.getElementById('cf-ocard-'+o.id)) return; // already rendered
      const card = cfBuildOrderCardEl(o, ld);
      card.classList.add('cf-card-entering');
      if (!isFirstLoad){
        card.classList.add('new-order');
        setTimeout(()=>card.classList.remove('new-order'), 3200);
      }
      list.appendChild(card);
      // Trigger the entering→base transition on the next paint
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        if (card.parentElement) card.classList.remove('cf-card-entering');
      }));
    });
    cfTickElapsed();
  } catch(e){ console.error('[cfRenderQueue]', e); }
}

function cfToggleOrderCard(id){
  document.getElementById('cf-ocard-'+id)?.classList.toggle('open');
}

function cfTickElapsed(){
  const now = Date.now();
  document.querySelectorAll('[id^="cf-elapsed-"]').forEach(el=>{
    const ts   = parseInt(el.dataset.ts||0);
    const diff = now - ts;
    const mins = Math.floor(diff/60000);
    const secs = Math.floor((diff%60000)/1000);
    el.textContent = mins>0 ? `${mins}m ${secs}s` : `${secs}s`;
    el.classList.toggle('warn',   mins>=5  && mins<10);
    el.classList.toggle('urgent', mins>=10);
  });
}

// ── History subview ──────────────────────────────────────────────────────────
function cfSwitchBaristaSub(which){
  if (cf_baristaSubMode === which) return;
  cf_baristaSubMode = which;
  document.getElementById('cf-bs-tab-queue')  ?.classList.toggle('active', which === 'queue');
  document.getElementById('cf-bs-tab-history')?.classList.toggle('active', which === 'history');
  const qv = document.getElementById('cf-bs-queue');
  const hv = document.getElementById('cf-bs-history');
  if (qv) qv.style.display = which === 'queue'   ? '' : 'none';
  if (hv) hv.style.display = which === 'history' ? '' : 'none';
  if (which === 'history') cfFetchHistoryForDate(cf_historyDate);
}

function cfHistoryStepDate(delta){
  const todayKey = cfGetDateKey(Date.now());
  const oldestKey = cfShiftDateKey(todayKey, -CF_HISTORY_RETENTION_DAYS);
  const next = cfShiftDateKey(cf_historyDate, delta);
  // Clamp: can't go forward past today, can't go back past retention window.
  if (delta > 0 && next > todayKey)  return;
  if (delta < 0 && next < oldestKey) return;
  cf_historyDate = next;
  cfFetchHistoryForDate(cf_historyDate);
}

// Fetch via REST so we always read fresh server data — bypasses any SDK
// cache that might still hold a stale snapshot from the live /orders listener.
function cfFetchHistoryForDate(dateKey){
  const label = document.getElementById('cf-hist-date-label');
  if (label) label.textContent = cfFormatDateLabel(dateKey);
  // Disable / enable arrows based on bounds
  const todayKey  = cfGetDateKey(Date.now());
  const oldestKey = cfShiftDateKey(todayKey, -CF_HISTORY_RETENTION_DAYS);
  const prevBtn = document.getElementById('cf-hist-prev');
  const nextBtn = document.getElementById('cf-hist-next');
  if (prevBtn) prevBtn.disabled = (cfShiftDateKey(dateKey,-1) < oldestKey);
  if (nextBtn) nextBtn.disabled = (dateKey >= todayKey);

  const list = document.getElementById('cf-hist-list');
  if (list) list.innerHTML = `<p class="cf-hist-loading">${t('cfHistLoading')}</p>`;
  const stats = document.getElementById('cf-hist-stats');
  if (stats) stats.innerHTML = '';

  const url = `${CF_FIREBASE_CONFIG.databaseURL}/${CF_HISTORY_PATH}/${dateKey}.json`;
  fetch(url).then(r=>r.json()).then(data=>{
    // Guard against stale fetches landing after the user already moved on
    if (cf_historyDate !== dateKey || cf_baristaSubMode !== 'history') return;
    const entries = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];
    // Newest-first: most recently completed at the top
    entries.sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
    cf_historyData = entries;
    cfRenderHistoryList();
    cfRenderHistoryStats();
  }).catch(()=>{
    if (list) list.innerHTML = `<p class="cf-hist-empty">${t('cfHistEmpty')}</p>`;
  });
}

function cfRenderHistoryList(){
  const list = document.getElementById('cf-hist-list');
  if (!list) return;
  if (!cf_historyData.length){
    list.innerHTML = `<p class="cf-hist-empty">${t('cfHistEmpty')}</p>`;
    return;
  }
  // Same modifier formatter used in queue cards, kept in sync visually.
  const fmtMods = it => {
    const parts = [];
    if (it.shotType) parts.push(it.shotType === 'doble' ? t('cfShotDoble').toLowerCase() : t('cfShotSimple').toLowerCase());
    if (it.milkType){
      const milkLabel = it.milkType === 'entera'      ? t('cfMilkEntera').toLowerCase()
                      : it.milkType === 'sin-lactosa' ? t('cfMilkSinLactosa').toLowerCase()
                      : it.milkType === 'vegetal'     ? t('cfMilkVegetal').toLowerCase()
                      : it.milkType;
      parts.push(it.milkSpec ? `${milkLabel} — ${it.milkSpec}` : milkLabel);
    }
    return parts.join(' · ');
  };
  list.innerHTML = cf_historyData.map(o=>{
    const items = (o.items && o.items.length) ? o.items : [{
      drink: o.drink, drinkIdx: o.drinkIdx,
      milkType: o.milkType, milkSpec: o.milkSpec,
      shotType: o.shotType, special: o.special, qty: 1
    }];
    const totalQty = items.reduce((s,it)=>s+(it.qty||1),0);
    const itemsHtml = items.map(it=>{
      const mods = fmtMods(it);
      return `
        <div class="cf-hist-item">
          <div class="cf-hist-item-qty">${it.qty || 1}×</div>
          <div style="flex:1;min-width:0">
            <div>${it.drink || '?'}</div>
            ${mods ? `<div class="cf-hist-item-mods">${mods}</div>` : ''}
            ${it.special ? `<div class="cf-hist-item-special">⚑ ${it.special}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    const tableLabel = o.table ? `Mesa ${o.table}` : `${totalQty} ${totalQty === 1 ? t('cfCartDrink') : t('cfCartDrinks')}`;
    const drinkCount = `${totalQty} ${totalQty === 1 ? t('cfCartDrink') : t('cfCartDrinks')}`;
    return `
      <div class="cf-hist-row">
        <div class="cf-hist-head">
          <div class="cf-hist-time">${cfFormatWallTime(o.completedAt || 0)}</div>
          <div class="cf-hist-table">${tableLabel}</div>
          ${o.table ? `<div class="cf-hist-count">· ${drinkCount}</div>` : ''}
          <div class="cf-hist-prep">⏱ ${cfFormatDuration(o.prepMs)}</div>
        </div>
        ${itemsHtml}
      </div>`;
  }).join('');
}

function cfRenderHistoryStats(){
  const stats = document.getElementById('cf-hist-stats');
  if (!stats) return;
  if (!cf_historyData.length){ stats.innerHTML = ''; return; }
  let totalDrinks = 0;
  let totalPrepMs = 0;
  let prepSamples = 0;
  const drinkCounts = new Map();
  cf_historyData.forEach(o=>{
    const items = (o.items && o.items.length) ? o.items : [{
      drink: o.drink, qty: 1
    }];
    items.forEach(it=>{
      const q = it.qty || 1;
      totalDrinks += q;
      const name = it.drink || '?';
      drinkCounts.set(name, (drinkCounts.get(name) || 0) + q);
    });
    if (o.prepMs && o.prepMs > 0){
      totalPrepMs += o.prepMs;
      prepSamples++;
    }
  });
  const avgMs = prepSamples ? totalPrepMs / prepSamples : 0;
  const top = [...drinkCounts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3);
  const ticketWord = cf_historyData.length === 1 ? t('cfHistTicket') : t('cfHistTickets');
  const drinkWord  = totalDrinks === 1 ? t('cfCartDrink') : t('cfCartDrinks');
  stats.innerHTML = `
    <div class="cf-hist-stats">
      <div class="cf-hist-stats-line">
        <span><strong>${cf_historyData.length}</strong> ${ticketWord}</span>
        <span><strong>${totalDrinks}</strong> ${drinkWord}</span>
        <span>${t('cfHistAvgPrep')}: <strong>${cfFormatDuration(avgMs)}</strong></span>
      </div>
      ${top.length ? `<div class="cf-hist-stats-top">${t('cfHistTopDrinks')}: ${top.map(([n,c])=>`<strong>${n}</strong> ${c}`).join(' · ')}</div>` : ''}
    </div>`;
}

function cfMarkDone(id){
  // Optimistic UI: animate the card out IMMEDIATELY, without waiting for the
  // WebSocket listener to fire. If the WebSocket has a hiccup the listener
  // can be delayed or never fire, leaving the card visually stuck even
  // though the database update succeeded (refresh would clear it).
  // Marking the id as "optimistically done" prevents Phase 0 of cfRenderQueue
  // from reviving the card if a stale listener event fires with old data.
  cf_optimisticallyDone.add(id);
  const card = document.getElementById('cf-ocard-'+id);
  if (card && !card.classList.contains('cf-card-leaving')){
    card.style.maxHeight = card.scrollHeight + 'px';
    void card.offsetHeight; // force reflow so the transition has a starting point
    card.classList.add('cf-card-leaving');
    setTimeout(()=>{
      if (card.parentElement && card.classList.contains('cf-card-leaving')) card.remove();
    }, 360);
  }

  // Move the order atomically: read it from /orders, copy to history bucket
  // (with completedAt + prepMs), and delete the live entry — all in one
  // multi-path update so the database is never in a half-state. If anything
  // fails, revive the card visually.
  const db = cfInitFirebase();
  db.ref(CF_ORDERS_PATH+'/'+id).once('value').then(snap=>{
    const order = snap.val();
    if (!order){ cf_optimisticallyDone.delete(id); return; } // already moved/removed
    const completedAt = Date.now();
    const submittedAt = order.timestamp || completedAt;
    const dateKey = cfGetDateKey(completedAt);
    const archived = {
      ...order,
      completedAt,
      prepMs: Math.max(0, completedAt - submittedAt)
    };
    delete archived.status; // status field only meaningful in live queue
    const updates = {};
    updates[`/${CF_ORDERS_PATH}/${id}`] = null;
    updates[`/${CF_HISTORY_PATH}/${dateKey}/${id}`] = archived;
    return db.ref().update(updates).then(()=>{
      // If the barista is currently looking at history for this date, splice
      // the new entry in immediately so they see their own action without
      // having to switch tabs.
      if (cf_baristaSubMode === 'history' && cf_historyDate === dateKey){
        cf_historyData.unshift({ id, ...archived });
        cfRenderHistoryList();
        cfRenderHistoryStats();
      }
    });
  }).catch(()=>{
    cf_optimisticallyDone.delete(id);
    const stillThere = document.getElementById('cf-ocard-'+id);
    if (stillThere && stillThere.classList.contains('cf-card-leaving')){
      stillThere.classList.remove('cf-card-leaving');
      stillThere.style.maxHeight = '';
    }
  });
  // Safety: clear the optimistic flag after enough time for the listener to
  // catch up. After this, normal Phase 0 revival rules apply again.
  setTimeout(()=>cf_optimisticallyDone.delete(id), 5000);
}

// ── Comandera module ────────────────────────────────────────────────────
// PIN-gated order pad. Path: /comandas/{YYYY-MM-DD}/{auto-id}
// Shape:
//   { mesa, diners, openedAt, closedAt, timerStartedAt, items[] }
// Item shape:
//   { id, dinerN, source, sourceId, name, allergens[], qty, notes,
//     addedAt, status }   ← 'status' is 'open' for now; future kitchen/bar
//   integration uses 'sent','served','cancelled'
// Lifecycle:
//   • Waiter taps the tab → PIN gate (666) → home view (open mesas)
//   • Tap "+ Nueva mesa" → enter table # + diner count → opens comanda
//   • Active view: tap diner # to switch focus, tap items to add
//   • Each item gets optional notes; tap ⚐ to edit
//   • "Cerrar mesa" sets closedAt; mesa moves to history
//   • Open mesas idle >12h auto-close; closed mesas >30d auto-purge
// State (COMANDA_*) is at STATE TOP. Functions below; hook registered
// at the very end.

// --- Catalog source registry (the "Source Resolvers" architecture) ----
// Adding a new product family later (juices, empanadas) is two lines:
//   1. Add the data array (e.g., const JUICES = [...])
//   2. Push an entry here with a resolver
const COMANDA_SOURCES = [
  {
    key: 'dishes', labelKey: 'cmdSourceDishes', icon: '🍽',
    items: () => {
      // Resolve today's cycle day (D1-D4) using the same anchor logic
      // as the existing day-highlighter, then return today's dishes
      // filtered by the active service window (lunch / dinner).
      const anchor = new Date(2026, 3, 14); // 2026-04-14 = Día 4
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diff = Math.round((today - anchor) / 86400000);
      const cycleDay = String(((diff + 3) % 4 + 4) % 4 + 1);
      const minOfDay = now.getHours() * 60 + now.getMinutes();
      // Lunch: 11:30 – 17:59 · Dinner: 18:00 – 00:59 (post-midnight)
      const isLunch  = minOfDay >= (11*60+30) && minOfDay < (18*60);
      const isDinner = (minOfDay >= 18*60) || (minOfDay < 60);
      return DISHES.filter(d => {
        if (d.day !== cycleDay) return false;
        const svc = d.service || '';
        if (isLunch)  return svc === 'Almuerzo' || svc === 'Almuerzo y Cena';
        if (isDinner) return svc === 'Cena'     || svc === 'Almuerzo y Cena';
        return false; // outside service hours: empty list, the catalog shows "—"
      }).map(d => ({
        sourceId: d.id, name: d.name,
        group: d.course, allergens: d.allergens || []
      }));
    }
  },
  {
    key: 'wines', labelKey: 'cmdSourceWines', icon: '🍷',
    items: () => WINES.map(w => ({
      sourceId: w.id, name: w.name,
      group: (function(){
        const ti = (w.type || '').toLowerCase();
        const map = { espumante:'lbl_espumante', blanco:'lbl_blanco', rosado:'lbl_rosado', tinto:'lbl_tinto', dulce:'lbl_dulce' };
        return map[ti] ? t(map[ti]) : (w.type || '—');
      })(),
      allergens: []
    }))
  },
  {
    key: 'cocktails', labelKey: 'cmdSourceCocktails', icon: '🍸',
    items: () => [
      ...MOCKTAILS.map(c => ({ sourceId: c.name, name: c.name, group: 'Mocktails', allergens: [] })),
      ...COCKTAILS.map(c => ({ sourceId: c.name, name: c.name, group: 'Cocktails', allergens: [] }))
    ]
  },
  {
    key: 'custom', labelKey: 'cmdSourceCustom', icon: '✎',
    items: 'custom'  // sentinel: the renderer shows a free-text form
  }
];

// --- Helpers ---------------------------------------------------------------
function comandaDateKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function comandaUid(){ return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function comandaFmtMs(ms){
  if (!ms || ms < 0) ms = 0;
  const total = Math.floor(ms/1000);
  const m = Math.floor(total/60);
  const s = total % 60;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}
function comandaFmtMsCompact(ms){
  if (!ms || ms < 0) ms = 0;
  const m = Math.floor(ms/60000);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m/60);
  const rem = m % 60;
  return `${h}h ${rem}m`;
}
// Stopwatch format M:SS or H:MM:SS — used by the active-mesa timer chip
// where second-level resolution makes the running counter feel alive.
function comandaFmtTimer(ms){
  if (!ms || ms < 0) ms = 0;
  const totalSec = Math.floor(ms/1000);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec % 3600)/60);
  const s = totalSec % 60;
  const pad = n => String(n).padStart(2,'0');
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${m}:${pad(s)}`;
}
function comandaTimerClass(ms){
  const min = Math.floor(ms/60000);
  if (min >= 25) return 'urgent';
  if (min >= 15) return 'warn';
  return '';
}

  else if (COMANDA_PIN_BUFFER.length < 3) COMANDA_PIN_BUFFER += key;

  if (COMANDA_PIN_BUFFER.length === 3){
    setTimeout(()=>comandaSubmitPin(), 320);
  }

  if (COMANDA_PIN_BUFFER === COMANDA_PIN_CODE){

    const err = document.getElementById('cmd-pin-error');
    if (err){ err.textContent = t('cmdPinError'); setTimeout(()=>{ if (err) err.textContent=''; }, 2000); }

// --- Firebase REST helpers -------------------------------------------------
function comandaFireUrl(suffix){
  return CF_FIREBASE_CONFIG.databaseURL + '/' + COMANDA_PATH + (suffix ? '/' + suffix : '') + '.json';
}

// --- Home view (list of open mesas) ---------------------------------------
async function comandaFetchOpenMesas(){
  // Fetches today's full set and partitions into open + closed lists.
  // Both populate the home view; closed ones live in the History section
  // below "Mesas activas" and are tappable for read-only review or reopen.
  try {
    const url = comandaFireUrl(comandaDateKey());
    const resp = await fetch(url);
    const data = await resp.json();
    const open = [];
    const closed = [];
    if (data){
      Object.entries(data).forEach(([id, c]) => {
        if (!c) return;
        if (c.closedAt) closed.push({ id, ...c });
        else            open.push({ id, ...c });
      });
    }
    open.sort((a,b)=>(b.openedAt||0)-(a.openedAt||0));
    closed.sort((a,b)=>(b.closedAt||0)-(a.closedAt||0));
    COMANDA_LIST         = open;
    COMANDA_HISTORY_LIST = closed;
  } catch(e){
    COMANDA_LIST = [];
    COMANDA_HISTORY_LIST = [];
  }
  if (COMANDA_VIEW === 'home') comandaRender();
}

// Service order ranks — used both for auto-inserting new items into the
// right position within a diner's list and for drawing the course
// dividers. Items whose group is unknown rank last (raw drinks etc.).
const COMANDA_SERVICE_ORDER = ['Entrada','Plato principal','Postre'];
function comandaGroupOf(it){
  if (!it) return '';
  if (it.source === 'dishes') return it.group || '';
  if (it.source === 'wines')  return 'Vinos';
  if (it.source === 'cocktails' || it.source === 'mocktails') return 'Bebidas';
  return 'Otros';
}
function comandaGroupRank(group){
  const idx = COMANDA_SERVICE_ORDER.indexOf(group);
  if (idx >= 0) return idx;
  // Drinks and others come after dishes
  if (group === 'Vinos')   return 10;
  if (group === 'Bebidas') return 11;
  return 12;
}

function comandaAddItem(source, sourceId, name, allergens, group){
  if (!COMANDA_ACTIVE_DATA) return;
  const item = {
    id: comandaUid(),
    dinerN: COMANDA_ACTIVE_DINER,
    source, sourceId: sourceId || null,
    name, allergens: allergens || [],
    group: group || null,
    qty: 1, notes: '',
    addedAt: Date.now(),
    status: 'open'
  };
  const dinerN = COMANDA_ACTIVE_DINER;
  COMANDA_ACTIVE_DATA.items = COMANDA_ACTIVE_DATA.items || [];
  const items = COMANDA_ACTIVE_DATA.items;

  // Auto-insert by service rank — new dish lands at the end of its course
  // even if the waiter added Postre before Entrada. Drag overrides this.
  const newRank = comandaGroupRank(comandaGroupOf(item));
  let insertAt = items.length;
  let foundAfter = -1;
  for (let i = items.length - 1; i >= 0; i--){
    if (items[i].dinerN !== dinerN) continue;
    if (comandaGroupRank(comandaGroupOf(items[i])) <= newRank){
      foundAfter = i;
      break;
    }
  }
  if (foundAfter >= 0){
    insertAt = foundAfter + 1;
  } else {
    for (let i = 0; i < items.length; i++){
      if (items[i].dinerN === dinerN){ insertAt = i; break; }
    }
  }
  items.splice(insertAt, 0, item);
  // Optimistic UI: render IMMEDIATELY so the tap feels instant. The
  // network write happens fire-and-forget; the queue in comandaPersist
  // serialises and coalesces rapid taps so out-of-order PATCHes can't
  // lose data.
  comandaRender();
  comandaPersist({ items });
}
function comandaRemoveItem(itemId){
  if (!COMANDA_ACTIVE_DATA || !COMANDA_ACTIVE_DATA.items) return;
  COMANDA_ACTIVE_DATA.items = COMANDA_ACTIVE_DATA.items.filter(it => it.id !== itemId);
  comandaRender();                               // immediate
  comandaPersist({ items: COMANDA_ACTIVE_DATA.items }); // background
}
function comandaUpdateNote(itemId, note){
  if (!COMANDA_ACTIVE_DATA || !COMANDA_ACTIVE_DATA.items) return;
  COMANDA_ACTIVE_DATA.items = COMANDA_ACTIVE_DATA.items.map(it =>
    it.id === itemId ? { ...it, notes: note } : it
  );
  comandaPersist({ items: COMANDA_ACTIVE_DATA.items });
}
// Write queue — coalesces rapid taps into the minimum number of network
// round-trips. Each comandaPersist() merges its patch fields into a pending
// payload and (if no write is in flight) starts a loop that drains the
// pending payload until empty. Because every items-PATCH carries the FULL
// items array, only the latest pending state needs to actually hit the
// server — earlier intermediate states get coalesced away. Net effect:
// rapid tap → instant render → single network call.
let _CMD_WRITE_PENDING  = null;
let _CMD_WRITE_INFLIGHT = false;
function comandaPersist(patch){
  if (!COMANDA_ACTIVE_ID) return Promise.resolve();
  _CMD_WRITE_PENDING = Object.assign(_CMD_WRITE_PENDING || {}, patch);
  if (_CMD_WRITE_INFLIGHT) return Promise.resolve();
  return _comandaPersistDrain();
}
async function _comandaPersistDrain(){
  _CMD_WRITE_INFLIGHT = true;
  while (_CMD_WRITE_PENDING && COMANDA_ACTIVE_ID){
    const toSend = _CMD_WRITE_PENDING;
    _CMD_WRITE_PENDING = null;
    try {
      await fetch(comandaFireUrl(comandaDateKey() + '/' + COMANDA_ACTIVE_ID), {
        method: 'PATCH',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(toSend)
      });
    } catch(e){ console.error('[comanda persist]', e); }
  }
  _CMD_WRITE_INFLIGHT = false;
}
function comandaCloseMesa(){
  if (!COMANDA_ACTIVE_ID) return;
  // No confirmation popup — speed wins. Recovery is via the History
  // section in the home view: tap the closed mesa → "Reabrir mesa".
  // Tick stays running; only stops on explicit logout.
  comandaPersist({ closedAt: Date.now() });
  comandaStopPolling();
  COMANDA_ACTIVE_ID = null;
  COMANDA_ACTIVE_DATA = null;
  COMANDA_VIEW = 'home';
  comandaFetchOpenMesas();
  comandaRender();
}
function comandaBackToHome(){
  comandaStopPolling();
  COMANDA_ACTIVE_ID = null;
  COMANDA_ACTIVE_DATA = null;
  COMANDA_VIEW = 'home';
  comandaFetchOpenMesas();
  comandaRender();
}

async function comandaReopenMesa(id){

// --- Tick ----------------------------------------------------------------
// Single 1-second interval drives second-level updates on the active timer
// chip and a slower full re-render on the home view (every 30 ticks). All
// other views are no-ops, so the overhead is negligible.
let COMANDA_TICK_COUNT = 0;
function comandaStartTimerInterval(){
  comandaStopTimerInterval();
  COMANDA_TIMER_INTERVAL = setInterval(()=>{
    if (currentTab !== 'comandera' || !COMANDA_AUTHED) return;
    COMANDA_TICK_COUNT++;
    if (COMANDA_VIEW === 'active'){
      // Single-element update — cheap. Only when the timer is running.
      const chip = document.getElementById('cmd-timer-btn');
      if (!chip || !COMANDA_ACTIVE_DATA || !COMANDA_ACTIVE_DATA.timerStartedAt) return;
      const ms = Date.now() - COMANDA_ACTIVE_DATA.timerStartedAt;
      chip.textContent = '⏱ ' + comandaFmtTimer(ms);
      chip.classList.remove('warn','urgent');
      const cls = comandaTimerClass(ms);
      if (cls) chip.classList.add(cls);
    } else if (COMANDA_VIEW === 'home' && COMANDA_TICK_COUNT % 30 === 0){
      // Home cards display minute-resolution elapsed times; rebuild every 30s.
      comandaRender();
    }
  }, 1000);
}
function comandaStopTimerInterval(){
  if (COMANDA_TIMER_INTERVAL){ clearInterval(COMANDA_TIMER_INTERVAL); COMANDA_TIMER_INTERVAL = null; }
}
async function comandaTimerToggle(){
  if (!COMANDA_ACTIVE_DATA) return;
  if (!COMANDA_ACTIVE_DATA.timerStartedAt){
    // Start
    COMANDA_ACTIVE_DATA.timerStartedAt = Date.now();
    await comandaPersist({ timerStartedAt: COMANDA_ACTIVE_DATA.timerStartedAt });
    comandaRender();
  } else {
    // Already running — confirm reset
    if (confirm(t('cmdTimerReset') + '?')){
      COMANDA_ACTIVE_DATA.timerStartedAt = Date.now();
      await comandaPersist({ timerStartedAt: COMANDA_ACTIVE_DATA.timerStartedAt });
      comandaRender();
    }
  }
}

// --- Polling for cross-device sync ---------------------------------------
function comandaStartPolling(){
  comandaStopPolling();
  COMANDA_POLL_INTERVAL = setInterval(async ()=>{
    if (currentTab !== 'comandera' || !COMANDA_ACTIVE_ID) return;
    // Skip while we have unsent or in-flight writes — server still has the
    // OLD state, so refetching would clobber the user's just-made change.
    // The next tick after the queue drains will pick up the fresh state.
    if (_CMD_WRITE_PENDING || _CMD_WRITE_INFLIGHT) return;
    // Skip while user is actively interacting (note dialog, full-view modal,
    // or mid-drag) — re-rendering would yank their gesture.
    if (COMANDA_NOTE_EDIT_ID || COMANDA_FULL_OPEN || (typeof CMD_DRAG !== 'undefined' && CMD_DRAG)) return;
    try {
      const resp = await fetch(comandaFireUrl(comandaDateKey() + '/' + COMANDA_ACTIVE_ID));
      const data = await resp.json();
      if (!data) return;
      COMANDA_ACTIVE_DATA = { id: COMANDA_ACTIVE_ID, ...data, items: data.items || [] };
      comandaRender();
    } catch(e){}
  }, 8000);
}
function comandaStopPolling(){
  if (COMANDA_POLL_INTERVAL){ clearInterval(COMANDA_POLL_INTERVAL); COMANDA_POLL_INTERVAL = null; }
}

// --- Auto-close stale + auto-purge old days ------------------------------
async function comandaAutoCloseStale(){
  try {
    const url = comandaFireUrl(comandaDateKey());
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data) return;
    const updates = {};
    const now = Date.now();
    Object.entries(data).forEach(([id, c]) => {
      if (c && !c.closedAt && c.openedAt && (now - c.openedAt) > COMANDA_AUTOCLOSE_MS){
        updates[id + '/closedAt'] = now;
      }
    });
    if (Object.keys(updates).length){
      await fetch(url, { method:'PATCH', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(updates) });
    }
  } catch(e){}
}
async function comandaPurgeOldDays(){
  try {
    const root = comandaFireUrl();
    const resp = await fetch(root + '?shallow=true');
    const data = await resp.json();
    if (!data) return;
    const todayKey = comandaDateKey();
    const cutoff = (function(){
      const d = new Date();
      d.setDate(d.getDate() - COMANDA_PURGE_DAYS);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const da = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${da}`;
    })();
    const updates = {};
    Object.keys(data).forEach(key => {
      if (key < cutoff) updates[key] = null;
    });
    if (Object.keys(updates).length){
      await fetch(root, { method:'PATCH', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(updates) });
    }
  } catch(e){}
}

function comandaRenderHistoryModal(){
  const c = COMANDA_HIST_VIEW_DATA;
  if (!c) return '';
  const items = c.items || [];
  const diners = c.diners || 1;
  const sections = [];
  for (let n = 1; n <= diners; n++){
    const its = items.filter(it => it.dinerN === n);
    let lines = '';
    if (its.length){
      let prevGroup = null;
      lines = its.map(it => {
        const grp = comandaGroupOf(it);
        const showDivider = (grp && grp !== prevGroup);
        prevGroup = grp;
        const div = showDivider ? `<div class="cmd-course-divider"><span>${grp}</span></div>` : '';
        return `${div}<div class="cmd-line"><div class="cmd-line-qty">${it.qty||1}×</div><div class="cmd-line-body"><span class="cmd-line-name">${it.name}</span>${it.notes?`<span class="cmd-line-note">⚐ ${it.notes}</span>`:''}</div></div>`;

          </div>
        </div>`;

        const list = activeSrc.items() || [];

          const g = it.group || '—';

          groups[g].push(it);
        });
        const groupHtml = Object.entries(groups).map(([gName, gItems]) => {
          const itemsHtml = gItems.map(it => {
            // Escape single quotes for the inline JS literal, double quotes for the
            // HTML attribute so unusual product names ("L'Aviador", `\"Reserva\"`) don't break
            const safeName = String(it.name||'').replace(/'/g,'\\\'').replace(/"/g,'&quot;');

// ── Drag-to-reorder (touch) ─────────────────────────────────────────────
// Long-press (~280ms) on the ⋮⋮ grip lifts the row; finger moves it; on
// release the items array is reordered to match the visible DOM. The grip
// is the only zone with touch-action:none, so taps on ⚐/✕ buttons elsewhere
// in the row keep working normally.
let CMD_DRAG = null;

function cmdDragReset(){
  if (!CMD_DRAG) return;
  if (CMD_DRAG.longPressTimer) clearTimeout(CMD_DRAG.longPressTimer);
  if (CMD_DRAG.el && CMD_DRAG.active){
    CMD_DRAG.el.classList.remove('cmd-line-dragging');
    CMD_DRAG.el.style.transform = '';
  }
  CMD_DRAG = null;
}

function cmdDragStart(e, itemId){
  // Only fire if the touch landed on the grip handle itself.
  const tgt = e.target;
  if (!tgt || !tgt.classList || !tgt.classList.contains('cmd-line-grip')) return;
  if (e.touches.length !== 1) return;
  const touch = e.touches[0];
  // Find the .cmd-line ancestor (the row)
  let el = tgt;
  while (el && !(el.classList && el.classList.contains('cmd-line'))) el = el.parentNode;
  if (!el) return;
  CMD_DRAG = {
    itemId, el,
    active: false,
    startY: touch.clientY,
    lastY: touch.clientY,
    longPressTimer: setTimeout(()=>{
      if (!CMD_DRAG) return;
      CMD_DRAG.active = true;
      CMD_DRAG.startY = CMD_DRAG.lastY; // start from current finger position
      CMD_DRAG.el.classList.add('cmd-line-dragging');
      if (navigator.vibrate) try { navigator.vibrate(30); } catch(e){}
    }, 280)
  };
}

function cmdDragMove(e){
  if (!CMD_DRAG || e.touches.length !== 1) return;
  const touch = e.touches[0];
  CMD_DRAG.lastY = touch.clientY;

  if (!CMD_DRAG.active){
    // Cancel long-press if user moved before the timer fired (treats as scroll)
    if (Math.abs(touch.clientY - CMD_DRAG.startY) > 8){
      cmdDragReset();
    }
    return;
  }

  // Active drag — prevent page scroll while reordering
  e.preventDefault();
  const dy = touch.clientY - CMD_DRAG.startY;
  CMD_DRAG.el.style.transform = `translateY(${dy}px)`;

  // Detect swap with the closest non-dragging .cmd-line sibling
  const dragRect = CMD_DRAG.el.getBoundingClientRect();
  const dragMid  = dragRect.top + dragRect.height / 2;
  const parent   = CMD_DRAG.el.parentNode;
  const siblings = [...parent.children].filter(s => s.classList && s.classList.contains('cmd-line') && s !== CMD_DRAG.el);
  for (const sib of siblings){
    const r = sib.getBoundingClientRect();
    const m = r.top + r.height / 2;
    if (Math.abs(dragMid - m) < r.height * 0.55){
      // Swap DOM positions, then re-anchor startY so element stays under finger
      const oldRect = CMD_DRAG.el.getBoundingClientRect();
      const dragIdx = [...parent.children].indexOf(CMD_DRAG.el);
      const sibIdx  = [...parent.children].indexOf(sib);
      if (sibIdx < dragIdx) parent.insertBefore(CMD_DRAG.el, sib);
      else                  parent.insertBefore(CMD_DRAG.el, sib.nextSibling);
      const newRect = CMD_DRAG.el.getBoundingClientRect();
      CMD_DRAG.startY += (newRect.top - oldRect.top);
      CMD_DRAG.el.style.transform = `translateY(${touch.clientY - CMD_DRAG.startY}px)`;
      break;
    }
  }
}

function cmdDragEnd(e){
  if (!CMD_DRAG) return;
  const wasActive = CMD_DRAG.active;
  if (CMD_DRAG.longPressTimer) clearTimeout(CMD_DRAG.longPressTimer);
  if (wasActive){
    CMD_DRAG.el.classList.remove('cmd-line-dragging');
    CMD_DRAG.el.style.transform = '';
    cmdDragCommit();
  }
  CMD_DRAG = null;
}

function cmdDragCommit(){
  if (!COMANDA_ACTIVE_DATA) return;
  // Read the new order of the active diner's items from the DOM
  const visibleEls = document.querySelectorAll('.cmd-line[data-item-id]');
  const newOrder = [...visibleEls].map(el => el.dataset.itemId);
  const itemsById = {};
  (COMANDA_ACTIVE_DATA.items || []).forEach(it => { itemsById[it.id] = it; });

  // Rebuild items array: same other-diner items in their original spots,
  // active-diner items pulled in the new order. Walk the original array;
  // every time we encounter an active-diner slot, replace with the next
  // id from newOrder. This preserves the relative positions of items
  // belonging to other diners.
  let newIdx = 0;
  const rebuilt = (COMANDA_ACTIVE_DATA.items || []).map(it => {
    if (it.dinerN !== COMANDA_ACTIVE_DINER) return it;
    const replacement = itemsById[newOrder[newIdx++]];
    return replacement || it;
  });
  COMANDA_ACTIVE_DATA.items = rebuilt;
  comandaPersist({ items: rebuilt });
  // Re-render so course dividers reflect the new order
  comandaRender();
}

// Register for i18n updates so labels swap on language change
onI18nChange(() => { if (currentTab === 'comandera') comandaRender(); });
</script>
