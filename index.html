// ── HELPERS ──────────────────────────────────────────────────────────────────
function getDishTr(d){ const tr=DISH_TRANS[currentLang]?.[d.id]; return tr?{...d,...tr,why:{...d.why,...tr.why}}:d; }
function getWineTr(w){ const tr=WINE_TRANS[currentLang]?.[w.id]; return tr?{...w,...tr}:w; }
function getGuionesTr(){ return GUION_TRANS[currentLang]||GUIONES; }
function serviceLabel(s){ return s==='Almuerzo'?t('lunch'):s==='Cena'?t('dinner'):t('lunchDinner'); }
function courseLabel(c){ return c==='Entrada'?t('starter'):c==='Plato principal'?t('main'):t('dessert'); }

function setLang(lang, el) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  // update static UI
  // innerHTML (not textContent) — the title carries the <em class="ata-emphasis">
  // span that paints "ATA" in desert sienna. Static text → safe to set as HTML.
  document.getElementById('app-title').innerHTML = t('appTitle');
  document.getElementById('app-subtitle').textContent = t('appSubtitle');
  // Order: Menú · Vinos · Cocktails · Café (Momentos lives inside Cocktails as a sub-tab)
  const mainTabs = document.querySelectorAll('.main-tabs .tab');
  if (mainTabs[0]) mainTabs[0].textContent = t('tabMenus');
  if (mainTabs[1]) mainTabs[1].textContent = t('tabWines');
  if (mainTabs[2]) mainTabs[2].textContent = t('tabCocktails');
  // mainTabs[3] is Café (handled below by id)
  // Momentos banner inside Cocktails
  const mLbl = document.getElementById('momentos-banner-label');
  if (mLbl) mLbl.textContent = t('tabMomentos');
  const mSub = document.getElementById('momentos-banner-sub');
  if (mSub) mSub.textContent = t('momentosBannerSub');
  const csearch = document.getElementById('cocktail-search');
  if (csearch) csearch.placeholder = t('ctSearch');

  const dishSearch = document.getElementById('dish-search');
  if (dishSearch) dishSearch.placeholder = t('searchDish');
  const wineSearch = document.getElementById('wine-search');
  if (wineSearch) wineSearch.placeholder = t('searchWine');
  const dayBtns = document.querySelectorAll('.day-btn');
  if (dayBtns[0]) dayBtns[0].textContent = t('allDays');
  for (let i=1;i<dayBtns.length;i++) dayBtns[i].textContent = 'D'+i;
  const wfTabs = document.querySelectorAll('.wine-filter-tabs .tab');
  const wfKeys = ['all','sparkling','whites','rose','reds','sweet','wineFilterPairings'];
  wfTabs.forEach((b,i) => { if(wfKeys[i]) b.textContent = t(wfKeys[i]); });
  // re-render content — preserve open panels across language switches
  const prevDish = selectedDish;
  const prevWine = selectedWine;
  const prevSubWine = document.getElementById('dish-wine-sub-panel')?.dataset?.wid || null;
  selectedDish = null; selectedWine = null;
  renderDishes(); renderWines();
  if (currentTab === 'vinos' && wineFilter === 'maridajes') renderGuiones();
  if (currentTab === 'cocktails'){
    renderCocktails();
    if (cocktailsShowingMomentos) renderMomentos();
  }
  if (currentTab === 'cafe') renderCafeTab();
  if (currentTab === 'comandera' && typeof comandaRender === 'function') comandaRender();
  const cafeBtn = document.getElementById('tab-btn-cafe');
  if (cafeBtn) cafeBtn.textContent = t('tabCafe');
  const cmdBtn = document.getElementById('tab-btn-comandera');
  if (cmdBtn) cmdBtn.textContent = t('tabComandera');
  const mn = document.getElementById('momentos-notice-text');
  if (mn) mn.textContent = t('momentNotice');
  // Fire i18n hooks — modules that need to re-render their labels in the
  // new language register via onI18nChange(). Each call is guarded so a
  // single broken module can't halt setLang for the rest.
  __i18nHooks.forEach(fn => { try { fn(); } catch(e){ console.warn('[i18n hook]', e); } });
  if (prevDish && currentTab === 'menus') {
    selectDish(prevDish);
    if (prevSubWine) openWineFromDish(prevSubWine);
  }
  if (prevWine && currentTab === 'vinos') selectWine(prevWine);
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.main-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  ['menus','vinos','cocktails','cafe','comandera'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab));
  if (tab === 'cocktails'){
    renderCocktails();
    if (cocktailsShowingMomentos) renderMomentos();
  }
  if (tab === 'cafe') renderCafeTab();
  if (tab === 'comandera') comandaEnter();
}

function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedDish = null;
  renderDishes();
}

function setWineFilter(f, el) {
  wineFilter = f;
  document.querySelectorAll('.wine-filter-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  selectedWine = null;
  const grid    = document.getElementById('wine-grid');
  const search  = document.getElementById('wine-search-bar');
  const guiones = document.getElementById('guiones-content');
  if (f === 'maridajes'){
    // Switch to the "general pairings" view inside the Wines tab — wine
    // filter row stays visible, but the search and grid are replaced by
    // the pairing scripts. Search isn't useful for narrative content.
    if (grid)    grid.style.display = 'none';
    if (search)  search.style.display = 'none';
    if (guiones){ guiones.style.display = ''; renderGuiones(); }
  } else {
    if (grid)    grid.style.display = '';
    if (search)  search.style.display = '';
    if (guiones) guiones.style.display = 'none';
    renderWines();
  }
}

function getWine(id) { return WINES.find(w => w.id === id); }
function typeBadgeClass(w) {
  if (w && typeof w === 'object') { if (w.badge) return w.badge; return {espumante:'badge-espumante',blanco:'badge-blanco',rosado:'badge-rosado',tinto:'badge-tinto',dulce:'badge-dulce'}[w.type]||''; }
  return {espumante:'badge-espumante',blanco:'badge-blanco',rosado:'badge-rosado',tinto:'badge-tinto',dulce:'badge-dulce'}[w]||'';
}
function typeChipClass(w) {
  if (!w) return '';
  return {espumante:'chip-espumante',blanco:'chip-blanco',rosado:'chip-rosado',tinto:'chip-tinto',dulce:'chip-dulce'}[w.type]||'';
}
function typeLabel(tp) { return UI[currentLang]['lbl_'+tp] || UI.es['lbl_'+tp] || tp; }

function renderDishes() {
  const q = (document.getElementById('dish-search').value||'').toLowerCase();
  const searching = q.length > 0;
  const dishes = DISHES.filter(d => {
    const tr = getDishTr(d);
    const dayOk = searching || currentDay === 'all' || d.day === currentDay;
    const qOk = !q || tr.name.toLowerCase().includes(q) || tr.desc.toLowerCase().includes(q);
    return dayOk && qOk;
  });
  if (!dishes.length) {
    document.getElementById('dish-grid').innerHTML = `<div class="empty-state">${t('noDishes')}</div>`;
    return;
  }
  const days = (currentDay === 'all' || searching) ? ['1','2','3','4'] : [currentDay];
  let html = '';
  days.forEach(day => {
    const dayDishes = dishes.filter(d => d.day === day);
    if (!dayDishes.length) return;
    if (currentDay === 'all' || searching) html += `<div class="day-heading">${t('day')} ${day}</div>`;
    SERVICE_ORDER.forEach(service => {
      const svcDishes = dayDishes.filter(d => d.service === service);
      if (!svcDishes.length) return;
      const dotClass = service === 'Cena' ? 'dot-dinner' : service === 'Almuerzo y Cena' ? 'dot-shared' : 'dot-lunch';
      html += `<div class="service-block"><div class="service-header"><div class="service-dot ${dotClass}"></div><span class="service-label">${serviceLabel(service)}</span></div>`;
      COURSE_ORDER.forEach(course => {
        const courseDishes = svcDishes.filter(d => d.course === course);
        if (!courseDishes.length) return;
        html += `<div class="course-section"><div class="course-label">${courseLabel(course)}</div><div class="dish-row">`;
        courseDishes.forEach(d => {
          const tr = getDishTr(d);
          html += `<div class="dish-card${selectedDish===d.id?' selected':''}" data-dish-id="${d.id}" onclick="selectDish('${d.id}')">
            <div class="dish-name">${tr.name}</div>
            <div class="dish-desc">${tr.desc}</div>
            ${d.allergens.length ? `<div class="allergen-row">${d.allergens.map(a=>`<span class="allergen-tag${a==='Mariscos'?' tag-mariscos':''}">${a}</span>`).join('')}</div>` : ''}
          </div>`;
        });
        html += `</div></div>`; // close dish-row and course-section
      });
      html += `</div>`;
    });
  });
  document.getElementById('dish-grid').innerHTML = html;
}

function selectDish(id) {
  selectedDish = selectedDish === id ? null : id;
  renderDishes();
  if (!selectedDish) return;
  const card = document.querySelector(`[data-dish-id="${selectedDish}"]`);
  if (!card) return;
  const d = DISHES.find(x => x.id === selectedDish);
  const sdtr = getDishTr(d);
  const chips = d.wines.map(wid => {
    const w = getWine(wid);
    return `<div class="wine-chip ${typeChipClass(w)}" onclick="openWineFromDish('${wid}')"><div class="wine-chip-name">${w.name}</div><div class="wine-chip-why">${sdtr.why[wid]||''}</div></div>`;
  }).join('');
  const panelHTML = `<div class="detail-panel" id="dish-inline-panel" style="margin-top:10px;">
    <button class="close-btn" onclick="closeDishDetail()">&#215;</button>
    <h2>${sdtr.name}</h2>
    <p class="detail-meta">${t('day')} ${d.day} &middot; ${serviceLabel(d.service)} &middot; ${courseLabel(d.course)}</p>
    <p class="detail-desc">${sdtr.desc}</p>
    ${d.allergens.length ? `<div class="detail-section"><h3>${t('allergens')}</h3><div class="allergen-detail">${d.allergens.map(a=>`<span class="allergen-pill${a==='Mariscos'?' pill-mariscos':''}">${a}</span>`).join('')}</div></div>` : ''}
    <div class="detail-section"><h3>${t('pairings')}</h3><div class="wine-suggestions">${chips}</div></div>
  </div>`;
  card.closest('.dish-row').insertAdjacentHTML('afterend', panelHTML);
  document.getElementById('dish-inline-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDishDetail() {
  selectedDish = null;
  renderDishes();
}

function openWineFromDish(wid) {
  // If same wine clicked again → close sub-panel
  const existing = document.getElementById('dish-wine-sub-panel');
  const sameWine = existing && existing.dataset.wid === wid;
  document.querySelectorAll('.wine-chip').forEach(c => c.classList.remove('chip-active'));
  if (existing) existing.remove();
  if (sameWine) return;

  // Mark chip active
  const clickedChip = document.querySelector(`.wine-chip[onclick="openWineFromDish('${wid}')"]`);
  if (clickedChip) clickedChip.classList.add('chip-active');

  const w = WINES.find(x => x.id === wid);
  if (!w) return;
  const wtr = getWineTr(w);
  const subHTML = `<div class="wine-sub-panel" id="dish-wine-sub-panel" data-wid="${wid}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div>
        <span class="wine-type-badge ${typeBadgeClass(w)}" style="margin-bottom:4px;display:inline-block;">${typeLabel(w.type)}</span>
        <div style="font-size:15px;font-weight:500;color:var(--text);">${w.name}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${w.valley}</div>
      </div>
      <button class="close-btn" onclick="closeWineSubPanel()" style="margin-left:8px;">&#215;</button>
    </div>
    <div class="wine-section"><h3>${t('identity')}</h3><p>${wtr.identity}</p></div>
    <div class="wine-section"><h3>${t('style')}</h3><p>${wtr.style}</p></div>
    <div class="wine-section"><h3>${t('salesScript')}</h3>
      <div class="guion-box">
        <p><span class="guion-label">${t('shortPitch')}</span> ${wtr.shortpitch}</p>
        <p style="margin-top:8px;"><span class="guion-label">${t('development')}</span> ${wtr.pitch}</p>
      </div>
    </div>
  </div>`;

  const winesSection = document.querySelector('#dish-inline-panel .wine-suggestions');
  if (winesSection) {
    winesSection.insertAdjacentHTML('afterend', subHTML);
    document.getElementById('dish-wine-sub-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function closeWineSubPanel() {
  const el = document.getElementById('dish-wine-sub-panel');
  if (el) el.remove();
  document.querySelectorAll('.wine-chip').forEach(c => c.classList.remove('chip-active'));
}

function renderWines() {
  const q = (document.getElementById('wine-search').value||'').toLowerCase();
  const wines = WINES.filter(w => {
    const typeOk = wineFilter === 'todos' || w.type === wineFilter;
    const qOk = !q || w.name.toLowerCase().includes(q) || w.valley.toLowerCase().includes(q) || w.style.toLowerCase().includes(q);
    return typeOk && qOk;
  });
  document.getElementById('wine-grid').innerHTML = wines.map(w => {
    const wtr = getWineTr(w);
    return `<div class="wine-card${selectedWine===w.id?' selected':''}" data-wine-id="${w.id}" onclick="selectWine('${w.id}')">
      <span class="wine-type-badge ${typeBadgeClass(w)}">${typeLabel(w.type)}</span>
      <div class="wine-name">${w.name}</div>
      <div class="wine-valley">${w.valley}</div>
      <div class="wine-aroma">${wtr.style}</div>
    </div>`;
  }).join('');
}

function selectWine(id) {
  selectedWine = selectedWine === id ? null : id;
  renderWines();
  if (!selectedWine) return;
  const card = document.querySelector(`[data-wine-id="${selectedWine}"]`);
  if (!card) return;
  const w = WINES.find(x => x.id === selectedWine);
  const pairedDishes = DISHES.filter(d => d.wines.includes(selectedWine));
  const wtr = getWineTr(w);
  const panelHTML = `<div class="wine-detail" id="wine-inline-panel" style="margin-top:12px;grid-column:1/-1;">
    <button class="close-btn" onclick="closeWineDetail()">&#215;</button>
    <span class="wine-type-badge ${typeBadgeClass(w)}">${typeLabel(w.type)}</span>
    <h2>${w.name}</h2>
    <div class="valley">${w.valley}</div>
    <div class="wine-section"><h3>${t('identity')}</h3><p>${wtr.identity}</p></div>
    <div class="wine-section"><h3>${t('terroir')}</h3><p>${wtr.terroir}</p></div>
    <div class="wine-section"><h3>${t('winery')}</h3><p>${wtr.winery}</p></div>
    <div class="wine-section"><h3>${t('style')}</h3><p>${wtr.style}</p></div>
    <div class="wine-section"><h3>${t('salesScript')}</h3>
      <div class="guion-box">
        <p><span class="guion-label">${t('shortPitch')}</span> ${wtr.shortpitch}</p>
        <p style="margin-top:8px;"><span class="guion-label">${t('development')}</span> ${wtr.pitch}</p>
      </div>
    </div>
    <div class="wine-section"><h3>${t('pairedDishes')} (${pairedDishes.length})</h3>
      <div class="paired-dishes">${pairedDishes.map(d=>{const dtr=getDishTr(d);return`<div class="paired-dish">${t('day')} ${d.day} &middot; ${serviceLabel(d.service)} &middot; ${courseLabel(d.course)} — ${dtr.name}</div>`;}).join('')}</div>
    </div>
  </div>`;
  card.insertAdjacentHTML('afterend', panelHTML);
  document.getElementById('wine-inline-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeWineDetail() {
  selectedWine = null;
  renderWines();
}

function renderGuiones() {
  const guiones = getGuionesTr();
  document.getElementById('guiones-content').innerHTML = GUIONES.map((g, i) => {
    const gtr = guiones[i] || g;
    const wines = g.wines.map(wid => {
      const w = getWine(wid);
      return `<div class="wine-chip ${typeChipClass(w)}" onclick="openWineFromGuion('${wid}')">
        <div class="wine-chip-name">${w.name}</div>
        <div class="wine-chip-why">${w.valley}</div>
      </div>`;
    }).join('');
    return `<div class="guion-card">
      <h2>${gtr.title}</h2>
      <div class="guion-text">${gtr.text}</div>
      <div class="guion-section-title">${t('mentionedWines')}</div>
      <div class="wine-suggestions">${wines}</div>
    </div>`;
  }).join('');
}

function openWineFromGuion(wid) {
  // Vinos is already the active main tab when pairings are visible — but
  // the user might be on a different filter; reset to 'todos' so the wine
  // grid is visible (where selectWine will reveal the chosen wine).
  document.querySelectorAll('.main-tabs .tab').forEach((tb,i) => tb.classList.toggle('active', i===1));
  ['menus','vinos','cocktails','cafe','comandera'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!=='vinos'));
  currentTab = 'vinos';
  wineFilter = 'todos';
  const filterTabs = document.querySelectorAll('.wine-filter-tabs .tab');
  filterTabs.forEach((tb,i) => tb.classList.toggle('active', i === 0));
  const grid    = document.getElementById('wine-grid');
  const search  = document.getElementById('wine-search-bar');
  const guiones = document.getElementById('guiones-content');
  if (grid)    grid.style.display = '';
  if (search)  search.style.display = '';
  if (guiones) guiones.style.display = 'none';
  renderWines();
  selectWine(wid);
}

// Boot: sync the DOM to the active language. setLang reads every visible
// label from the UI dictionary, so any hardcoded text in the HTML is
// authoritatively replaced on first paint. Without this, changing a UI
// string would also require editing the matching markup or users would see
// the old text until they tapped a language button. setLang also fires the
// initial renderDishes() / renderWines() internally, so this call replaces
// the explicit render calls that used to live here.
setLang(currentLang, document.querySelectorAll('.lang-btn')[['es','en','pt'].indexOf(currentLang)]);

// Auto-highlight today's menu cycle day
(function() {
  const anchor = new Date(2026, 3, 14); // 2026-04-14 = Día 4
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((today - anchor) / 86400000);
  const cycleDay = ((diff + 3) % 4 + 4) % 4 + 1; // anchor→4, +1→1, +2→2, +3→3
  const btns = document.querySelectorAll('.day-btn');
  if (btns[cycleDay]) btns[cycleDay].classList.add('day-btn-today');
})();

// ── LANGUAGE SHORTCUTS ───────────────────────────────────────────────────────
// Desktop: Tab key cycles ES → EN → PT (skipped when focus is inside an input)
const LANGS = ['es', 'en', 'pt'];
function cycleLang(dir) {
  const idx = LANGS.indexOf(currentLang);
  const next = LANGS[(idx + dir + LANGS.length) % LANGS.length];
  const btn = document.querySelectorAll('.lang-btn')[LANGS.indexOf(next)];
  setLang(next, btn);
}
document.addEventListener('keydown', function(e) {
  const tag = document.activeElement?.tagName;
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  if (e.key === 'Tab' && !typing) {
    e.preventDefault();
    cycleLang(e.shiftKey ? -1 : 1);
    return;
  }

  if (!typing && currentTab === 'menus') {
    const dayMap = {'|':'all','1':'1','2':'2','3':'3','4':'4'};
    if (dayMap[e.key] !== undefined) {
      e.preventDefault();
      const day = dayMap[e.key];
      const btn = document.querySelector(day === 'all'
        ? '.day-btn[onclick*="\'all\'"]'
        : `.day-btn[onclick*="'${day}'"]`);
      setDay(day, btn);
    }
  }
});

// Mobile: follow-finger swipe — pure translateX, no opacity
(function() {
  let sx = 0, sy = 0, tracking = false, aborted = false, busy = false;
  const appEl = document.querySelector('.app');

  function springBack() {
    appEl.style.transition = 'transform 180ms cubic-bezier(0.25,0.46,0.45,0.94)';
    appEl.style.transform  = 'translateX(0)';
    setTimeout(function() { appEl.style.transition = ''; }, 180);
  }

  // True while the user is inside the Café > Service Mode flow (PIN, waiter
  // or barista view). Language swipe is disabled there to avoid accidental
  // language toggles while typing on the numpad or interacting with cards.
  function inServiceMode(){
    return (currentTab === 'cafe' && cf_activeInnerTab === 'service')
        || currentTab === 'comandera';
  }

  document.addEventListener('touchstart', function(e) {
    if (busy || e.touches.length > 1) return;
    if (inServiceMode()) { aborted = true; return; }
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    tracking = false;
    aborted  = false;
    appEl.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (busy || aborted) return;
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!tracking) {
      // wait until movement is clear enough to classify
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      if (Math.abs(dy) >= Math.abs(dx) * 0.75) { aborted = true; return; } // scroll — abort
      tracking = true;
    }
    appEl.style.transform = 'translateX(' + Math.round(dx * 0.55) + 'px)';
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (busy) return;
    // always reset transform if we aborted or never tracked
    if (aborted || !tracking) {
      appEl.style.transition = '';
      appEl.style.transform  = '';
      return;
    }
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) < 45) { springBack(); return; }  // too short — bounce back
    const dir = dx < 0 ? 1 : -1;
    const vw  = window.innerWidth;
    busy = true;
    appEl.style.transition = 'transform 130ms cubic-bezier(0.4,0,1,1)';
    appEl.style.transform  = 'translateX(' + (dir > 0 ? -vw : vw) + 'px)';
    setTimeout(function() {
      cycleLang(dir);
      appEl.style.transition = 'none';
      appEl.style.transform  = 'translateX(' + (dir > 0 ? vw : -vw) + 'px)';
      void appEl.offsetWidth;
      appEl.style.transition = 'transform 190ms cubic-bezier(0,0,0.2,1)';
      appEl.style.transform  = 'translateX(0)';
      setTimeout(function() { appEl.style.transition = ''; busy = false; }, 190);
    }, 130);
  }, { passive: true });
})();

function buildDrinkCard(c, lang, ui, isMocktail) {
  const tr = v => typeof v === 'object' ? v[lang] : v;
  return `
    <div class="cocktail-card${isMocktail ? ' cocktail-mocktail' : ''}">
      <div class="cocktail-name">${c.name}</div>
      <div class="cocktail-method">${c.method[lang]}</div>
      <div class="cocktail-meta-row">
        <span class="cocktail-meta-tag">${ui.ctGlass}: ${c.glass[lang]}</span>
        <span class="cocktail-meta-tag">${ui.ctIce}: ${c.ice[lang]}</span>
      </div>
      <div class="cocktail-section-label">${ui.ctIngredients}</div>
      ${c.ingredients.map(([name, amount]) => `
        <div class="cocktail-ingredient-row">
          <span class="cocktail-ingredient-name">${tr(name)}</span>
          <span class="cocktail-ingredient-amount">${tr(amount)}</span>
        </div>`).join('')}
      <div class="cocktail-garnish">
        <strong>${ui.ctGarnish}</strong>${tr(c.garnish)}
      </div>
    </div>`;
}

// Cocktails view: mocktails first (green-haloed cards) then alcoholic
// cocktails. Each group sits below its own labelled divider so the two
// families read as distinct sections at a glance. Search filters across
// both — empty groups (no matches) drop their divider as well.
function renderCocktails() {
  const lang = currentLang;
  const ui = UI[lang];
  const q = (document.getElementById('cocktail-search')?.value || '').toLowerCase();
  const tr = v => typeof v === 'object' ? (v[lang] || v.es || '') : (v || '');
  const matches = c => {
    if (!q) return true;
    const ingText = c.ingredients.map(([n]) => tr(n)).join(' ');
    const haystack = [c.name, tr(c.garnish), tr(c.method), tr(c.glass), ingText].join(' ').toLowerCase();
    return haystack.includes(q);
  };
  const mList = MOCKTAILS.filter(matches);
  const cList = COCKTAILS.filter(matches);
  let html = '';
  if (mList.length){
    html += `<div class="cocktail-section-divider mocktails"><span>Mocktails</span></div>`;
    html += `<div class="cocktail-grid">${mList.map(c => buildDrinkCard(c, lang, ui, true)).join('')}</div>`;
  }
  if (cList.length){
    html += `<div class="cocktail-section-divider"><span>Cocktails</span></div>`;
    html += `<div class="cocktail-grid">${cList.map(c => buildDrinkCard(c, lang, ui, false)).join('')}</div>`;
  }
  if (!html) html = `<p class="empty-state">${ui.noDishes}</p>`;
  document.getElementById('cocktails-content').innerHTML = html;
}

// Toggle between the cocktails+mocktails listing and the Momentos
// "coming soon" sub-view. Banner stays in the DOM as the back-button.
let cocktailsShowingMomentos = false;
function toggleMomentosSection(){
  cocktailsShowingMomentos = !cocktailsShowingMomentos;
  const banner = document.getElementById('momentos-banner');
  const list   = document.getElementById('cocktails-content');
  const mom    = document.getElementById('momentos-section');
  if (banner) banner.classList.toggle('active', cocktailsShowingMomentos);
  if (list)   list.style.display = cocktailsShowingMomentos ? 'none' : '';
  if (mom)    mom.style.display  = cocktailsShowingMomentos ? '' : 'none';
  if (cocktailsShowingMomentos) renderMomentos();
}

function renderMomentos() {
  const lang = currentLang;
  const ui = UI[lang];
  const groups = [
    { key: 'all-day',      label: t('momentAllDay') },
    { key: 'pre-dinner',   label: t('momentPreDinner') },
    { key: 'after-dinner', label: t('momentAfterDinner') },
  ];
  const html = groups.map(g => {
    const drinks = MOMENTOS.filter(c => c.moment === g.key);
    if (!drinks.length) return '';
    return `<div class="momentos-group">
      <div class="momentos-group-label">${g.label}</div>
      <div class="cocktail-grid">${drinks.map(c => buildDrinkCard(c, lang, ui)).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('momentos-content').innerHTML = html || `<p class="empty-state">${ui.noDishes||''}</p>`;
  const mn = document.getElementById('momentos-notice-text');
  if (mn) mn.textContent = t('momentNotice');
}

    {name:'Flat White',tagline:"The barista's drink",
     philosophy:'Born in Australia and New Zealand in the 1980s, as a reaction to cappuccino with too much foam. It is a double ristretto with perfectly integrated microfoam. No layers, no decoration. Just coffee and milk in their most direct form.',
     params:[{l:'Espresso',v:'2 ristretto',u:'shots'},{l:'Milk',v:'100 ml',u:'microfoam'},{l:'Foam',v:'minimal',u:'~2mm'},{l:'Temp',v:'60°',u:'celsius'},{l:'Cup',v:'150–160',u:'ml'},{l:'Ratio',v:'~1:3',u:'coffee:milk'}],
     steps:[{t:'Pull double ristretto',d:'More concentrated, sweeter. The flat white foundation.'},
            {t:'Steam for microfoam only',d:'Minimal aeration. Milk should be silky, almost liquid.'},
            {t:'Integrate fully',d:'Tap and swirl. The foam should disappear into the milk.'},
            {t:'Pour through the crema',d:'Coffee and milk must fuse. No floating foam layer.'},
            {t:'Finish clean',d:'No decoration. If there is a visible foam layer on top, there is too much.'}],
     milk:'This is the hardest milk to do well. The window between perfect microfoam and textureless milk is narrow. Practice daily.',
     serviceNote:'When undecided between a Flat White and a Cappuccino: ask if they prefer more coffee flavor or more milk comfort. That decides it.'},
    {name:'Latte',tagline:'The gentle introduction',
     philosophy:'Caffè latte means coffee with milk. In Italy it was a home drink — made in the morning at home. Outside Italy it became the most popular café drink in the world. It is soft, accessible and generous. Do not underestimate it: a well-made latte is technically demanding.',
     params:[{l:'Espresso',v:'1–2 shots',u:'30–60ml'},{l:'Milk',v:'200 ml',u:'steamed'},{l:'Foam',v:'5 mm',u:'cap'},{l:'Temp',v:'63°',u:'celsius'},{l:'Cup',v:'240–300',u:'ml'},{l:'Ratio',v:'1:4',u:'coffee:milk'}],
     steps:[{t:'Pull espresso',d:'One or two shots depending on order size.'},
            {t:'Steam a generous pour',d:'More milk, less aeration than cappuccino. Silky texture.'},
            {t:'Pour slowly',d:'From low to gently blend. The milk wraps around the coffee.'},
            {t:'Finish with foam',d:'A thin 5mm cap. No more. It is a latte, not a cappuccino.'}],
     milk:'The latte is the easiest milk drink to make well and also the easiest to make badly. Milk that is too hot or textureless ruins the experience.',
     serviceNote:"For a 'large latte' — use two espresso shots. Never just add more milk."},
    {name:'Cortado',tagline:'Exact proportion',
     philosophy:'Cortado comes from the Spanish cortar — to cut. The milk cuts the acidity of the espresso. It is a drink of exact proportion: no more, no less. It originated in Spain and spread across Latin America, where it is also known as pingado in Brazil and tallat in Catalonia. Ideal for those who want real coffee with just a touch of softness.',
     params:[{l:'Espresso',v:'1 shot',u:'30ml'},{l:'Milk',v:'30 ml',u:'warm'},{l:'Foam',v:'none',u:'—'},{l:'Temp',v:'55–60°',u:'celsius'},{l:'Cup',v:'90 ml',u:'glass'},{l:'Ratio',v:'1:1',u:'exact'}],
     steps:[{t:'Pull standard espresso',d:'No adjustments. The espresso must work on its own.'},
            {t:'Steam with minimal aeration',d:'Just warm and soften. No foam creation.'},
            {t:'Pour flat',d:'Milk falls directly onto the espresso. No latte art.'},
            {t:'Serve without ceremony',d:"It's a cortado. Clean. Direct."}],
     milk:'Cortado milk should be warm and slightly textured but never foamy. If it floats, there was too much aeration.',
     serviceNote:'Serve in a small glass when possible. The glass presentation is part of the cortado identity.'},
    {name:'Macchiato',tagline:'The marked shot',
     philosophy:"Espresso macchiato means 'stained espresso.' A teaspoon of foam on the crema. Nothing more. It is the most discreet way to soften an espresso without altering its character. Appreciated by those who want espresso but with the smallest gesture of milk.",
     params:[{l:'Espresso',v:'1 shot',u:'30ml'},{l:'Foam',v:'1 teaspoon',u:''},{l:'Milk',v:'none',u:'foam only'},{l:'Temp',v:'90°+',u:'serve hot'},{l:'Cup',v:'60 ml',u:'demitasse'},{l:'Ratio',v:'95:5',u:'coffee:foam'}],
     steps:[{t:'Pull espresso',d:'Standard. Crema must be intact.'},
            {t:'Take foam from a steamed pitcher',d:'A small spoonful of dense foam.'},
            {t:'Place on center of crema',d:'A stain. Do not cover everything.'},
            {t:'Serve immediately',d:'The espresso does not wait.'}],
     milk:null,
     serviceNote:"Do not confuse with a Latte Macchiato — which is the opposite: milk stained with espresso. If a macchiato is ordered without specifying, confirm which one."},
    {name:'Americano',tagline:'Espresso extended — with nuance',
     philosophy:'The Americano was born in WWII Europe. American soldiers found espresso too intense and asked for additional water. Over time it became a drink in its own right. Well made, it preserves the complexity of the espresso but at a slower pace.',
     params:[{l:'Espresso',v:'1–2 shots',u:''},{l:'Hot water',v:'120–150',u:'ml'},{l:'Ratio',v:'1:4',u:'esp:water'},{l:'Water temp',v:'90°',u:'celsius'},{l:'Cup',v:'200–240',u:'ml'},{l:'Order',v:'water first',u:'then espresso'}],
     steps:[{t:'Add hot water first',d:'Fill the cup between half and two thirds.'},
            {t:'Pull espresso over the water',d:'The crema floats and is preserved on the surface.'},
            {t:'Do not stir',d:'The natural layering is part of the drink.'}],
     milk:null,
     serviceNote:'Americano vs Long Black: same ingredients, different order. The Long Black is more concentrated and preserves the crema better.'},
    {name:'Long Black',tagline:'The Australasian answer to filter coffee',
     philosophy:"The Long Black is the Flat White's dark twin — also from Australia and New Zealand. Made in reverse order to the Americano: espresso goes over the water, preserving the crema intact. The result is more concentrated, more aromatic, more complex.",
     params:[{l:'Espresso',v:'2 shots',u:'60ml'},{l:'Hot water',v:'120',u:'ml'},{l:'Ratio',v:'1:2',u:'more concentrated'},{l:'Water temp',v:'92°',u:'celsius'},{l:'Cup',v:'200',u:'ml'},{l:'Order',v:'espresso last',u:'over water'}],
     steps:[{t:'Add hot water to cup',d:'Approximately halfway.'},
            {t:'Pull double shot over the water',d:'Crema stays intact and aromatic on the surface.'},
            {t:'Serve without stirring',d:'Whoever drinks it can decide how to integrate it.'}],
     milk:null,
     serviceNote:'If asked for it with milk — suggest a latte or flat white instead. Adding milk to a Long Black removes its reason for existing.'},
    {name:'Iced Latte',tagline:'Coffee with milk, cold',
     philosophy:'The iced latte became popular in the United States in the 1980s as a summer answer to the latte. The idea is simple: a freshly pulled espresso falling over ice and cold milk, preserving the full aroma without cooking the milk. The key is the order — ice, espresso, milk — and not stirring right away. The initial layering shows the coffee was fresh.',
     params:[{l:'Espresso',v:'2 shots',u:'60ml'},{l:'Ice',v:'full',u:'large cubes'},{l:'Cold milk',v:'180–200',u:'ml'},{l:'Glass',v:'350–400',u:'ml tall'},{l:'Ratio',v:'1:3',u:'coffee:milk'},{l:'Service',v:'long straw',u:''}],
     steps:[{t:'Fill the glass with ice',d:'Large cubes — they melt slower and dilute less.'},
            {t:'Pull a double espresso',d:'Standard. Do not adjust the shot — dilution comes from the ice.'},
            {t:'Pour the espresso over the ice',d:'Let it drop directly. The crema is preserved on top.'},
            {t:'Add the cold milk',d:'Pour slowly down the side of the glass to keep the visual contrast.'},
            {t:'Do not stir',d:'The coffee/milk layering is part of the presentation. Whoever drinks it integrates it with the straw.'}],
     milk:'Milk is served cold — straight from the fridge. Do not steam, do not warm. Lukewarm milk would kill the refreshing effect.',
     serviceNote:'If sweetened, use simple syrup (liquid) — granulated sugar will not dissolve in cold liquid. Serve it on the side so the guest can adjust.'},
    {name:'Hot Chocolate',tagline:'Cocoa and textured milk',
     philosophy:'Hot chocolate has its roots in Mesoamerican cultures — Mayans and Aztecs drank it ceremonially, mixed with chili and spices. It reached Europe with the Spanish in the 16th century and evolved into the sweet version we know today. The modern preparation combines cocoa powder with barista-textured milk, giving a silky drink with the same technical base as a cappuccino.',
     params:[{l:'Cocoa',v:'1 sachet',u:'Lavazza'},{l:'Milk',v:'200 ml',u:'steamed'},{l:'Foam',v:'1 cm',u:'silky'},{l:'Temp',v:'62–65°',u:'celsius'},{l:'Cup',v:'200–240',u:'ml'},{l:'Topping',v:'cocoa',u:'optional'}],
     steps:[{t:'Pour the Lavazza cocoa sachet',d:'Directly into the serving cup.'},
            {t:'Dissolve with a little hot milk',d:'Add ~30ml of milk and stir into a smooth paste, no lumps. This concentrated base is the key to the flavor.'},
            {t:'Steam the remaining milk',d:'Cappuccino-style texture — active aeration first, integration after. Glossy, not foamy.'},
            {t:'Pour the textured milk over the paste',d:'From height to integrate in the first seconds, then lower to define the foam cap.'},
            {t:'Finish with cocoa powder',d:'Lightly dust on top. Adds aroma and presentation.'}],
     milk:'Milk should be steamed exactly as for a cappuccino: 60–65°C, silky microfoam. Textureless milk leaves the chocolate flat and separated.',
     serviceNote:'If the sachet does not fully dissolve, keep stirring before adding the steamed milk. A lump at the bottom of the cup ruins the last sips.'}],
  base:[
    {label:'What is espresso',text:'Espresso is coffee prepared by forcing hot water (92°C) through finely ground coffee under high pressure (9 bar) in 25–30 seconds. The result is a concentrated beverage of 25–30 ml, topped with a layer of crema. It is not simply strong coffee — it is an entirely different extraction method.'},
    {label:'Lavazza Intenso — Know your coffee',text:'<strong>Blend:</strong> Arabica and Robusta. <strong>Profile:</strong> dark chocolate, toasted nuts, soft wood. The Robusta contributes body, persistent crema and caffeine. The Arabica brings balanced acidity and aromatic complexity. It is a blend designed for espresso: works well with and without milk.'},
    {label:'The three components of a good shot',text:'<strong>Crema:</strong> the golden, foamy layer on the surface. Indicates freshness, correct pressure and good extraction. <strong>Body:</strong> the central, dark and caramelized part. Where most of the flavors live. <strong>Heart:</strong> the darkest base. If it dominates, the shot is over-extracted.'},
    {label:'What can go wrong',text:'<strong>Too fast (&lt;20s):</strong> under-extracted — sour, thin, no crema. <strong>Too slow (&gt;35s):</strong> over-extracted — bitter, astringent, burnt. <strong>Pale crema:</strong> stale coffee or incorrect temperature. <strong>Persistent bitter finish:</strong> grind too fine or excessive extraction.'}],
  milk:[
    {label:'The philosophy of steamed milk',text:'Steaming milk is transforming a liquid into silk. Heat and steam create microbubbles that completely change the texture and sweetness of the milk. Well-steamed milk is glossy, fluid and almost weightless. Poorly steamed milk is grainy, flat or scorched.'},
    {label:'Temperature',text:'The ideal range is <strong>60–65°C</strong>. At this point the natural sugars in the milk have developed but the proteins have not yet denatured. Above <strong>70°C</strong> the milk begins to taste boiled and loses its texture. Rule of thumb: if you cannot hold your hand on the pitcher for more than 3 seconds, it is too hot.'},
    {label:'The two phases of steaming',text:'<strong>Phase 1 — Aeration:</strong> tip just below the surface. Listen for the chirping sound. Lasts 5–7 seconds. This is where the microbubbles are created. <strong>Phase 2 — Integration:</strong> submerge the tip, create a whirlpool. This is where the bubbles integrate and the texture becomes uniform.'},
    {label:'After steaming',text:'Tap the pitcher twice on the counter to burst large bubbles. Swirl in circles about 10 times to homogenize. Pour within the next 20 seconds — the foam begins separating from the milk quickly.'},
    {label:'Foam ratios by drink',text:'<strong>Cappuccino:</strong> 1/3 espresso · 1/3 milk · 1/3 foam. <strong>Flat White:</strong> microfoam only (2mm), fully integrated. <strong>Latte:</strong> 4/5 steamed milk + 5mm foam cap. <strong>Cortado:</strong> equal parts, no foam. <strong>Macchiato:</strong> just a dense teaspoon of foam.'}]
},

  drinks:[
    {name:'Espresso',tagline:'A base de tudo',
     philosophy:'Um espresso simples é a expressão mais pura do café: 25–30 ml concentrados, sem leite, sem diluição. Nasceu na Itália no início do século XX com a primeira máquina a vapor de Luigi Bezzera, e desde então tornou-se a base sobre a qual se constrói toda a cultura moderna do café. Servido em xícara demitasse aquecida, tradicionalmente acompanhado de um pequeno copo de água sem gás para refrescar o paladar.',
     params:[{l:'Dose',v:'7–8',u:'gramas'},{l:'Rendimento',v:'25–30',u:'ml'},{l:'Tempo',v:'25–30',u:'segundos'},{l:'Temp',v:'92°',u:'celsius'},{l:'Pressão',v:'9',u:'bar'},{l:'Xícara',v:'60 ml',u:'aquecida'}],
     steps:[{t:'Purge o grupo',d:'Deixe correr água quente para limpar resíduos e estabilizar a temperatura.'},
            {t:'Dose e distribua',d:'Pese 7–8g. Distribua uniformemente antes de tampar.'},
            {t:'Tamp',d:'Pressão firme e nivelada. <em>Sem inclinação.</em>'},
            {t:'Extraia',d:'Inicie e observe: a primeira gota deve aparecer em 5–7 segundos.'},
            {t:'Pare e sirva',d:'Corte no volume alvo. Sirva imediatamente.'}],
     milk:null,
     serviceNote:'Nunca deixe um espresso esperar. Começa a oxidar em 30 segundos. Extraia e sirva.'},
    {name:'Cappuccino',tagline:'O ritual da manhã',
     philosophy:'O cappuccino é o café da manhã tradicional da Itália. Seu nome vem da cor do hábito dos frades capuchinhos. Pensado sempre para a manhã — na cultura italiana, leite morno depois do almoço é considerado difícil de digerir. Um cappuccino bem feito é equilibrado: um terço espresso, um terço leite vaporizado, um terço espuma. Sem excessos.',
     params:[{l:'Espresso',v:'1 dose',u:'30ml'},{l:'Leite',v:'60 ml',u:'vaporizado'},{l:'Espuma',v:'1–2 cm',u:'espessa'},{l:'Temp',v:'62°',u:'celsius'},{l:'Xícara',v:'150–180',u:'ml'},{l:'Ratio',v:'1:1:1',u:'esp:leite:espuma'}],
     steps:[{t:'Extraia o espresso',d:'A base primeiro. Sempre.'},
            {t:'Vaporize com aeração ativa',d:'Bico logo abaixo da superfície. <em>Ouça o som chiante.</em>'},
            {t:'Verifique a textura',d:'O leite deve parecer brilhante e fluir como tinta. Sem bolhas grandes.'},
            {t:'Despeje de altura',d:'Solte de 10cm para integrar, depois abaixe para definir a camada.'},
            {t:'Sem tampa ou capa',d:'É um cappuccino. Sirva em xícara, limpo.'}],
     milk:'A espuma de um cappuccino deve se manter por 2–3 minutos sem colapsar. Se cair antes de ser bebido, a textura estava errada.',
     serviceNote:'Não adicione açúcar. Apresente limpo. Quem quiser açúcar vai pedir.'},
    {name:'Flat White',tagline:'A bebida do barista',
     philosophy:'Nasceu na Austrália e Nova Zelândia nos anos 80, como reação ao cappuccino com espuma demais. É um ristretto duplo com microespuma perfeitamente integrada. Sem camadas, sem decoração. Apenas café e leite em sua forma mais direta.',
     params:[{l:'Espresso',v:'2 ristrettos',u:''},{l:'Leite',v:'100 ml',u:'microespuma'},{l:'Espuma',v:'mínima',u:'~2mm'},{l:'Temp',v:'60°',u:'celsius'},{l:'Xícara',v:'150–160',u:'ml'},{l:'Ratio',v:'~1:3',u:'café:leite'}],
     steps:[{t:'Extraia ristretto duplo',d:'Mais concentrado, mais doce. A base do flat white.'},
            {t:'Vaporize apenas microespuma',d:'Aeração mínima. O leite deve ser sedoso, quase líquido.'},
            {t:'Integre completamente',d:'Bata e gire. A espuma deve desaparecer no leite.'},
            {t:'Despeje através da crema',d:'Café e leite devem se fundir. Sem camada de espuma flutuando.'},
            {t:'Termine limpo',d:'Sem decoração. Se há uma camada visível de espuma no topo, é demais.'}],
     milk:'Esta é a bebida de leite mais difícil de fazer bem. A janela entre microespuma perfeita e leite sem textura é estreita. Pratique diariamente.',
     serviceNote:'Em caso de dúvida entre Flat White e Cappuccino: pergunte se prefere mais sabor de café ou mais suavidade de leite. Isso decide.'},
    {name:'Latte',tagline:'A introdução gentil',
     philosophy:'Caffè latte significa café com leite. Na Itália era uma bebida caseira — feita em casa de manhã. Fora da Itália tornou-se a bebida de café mais popular do mundo. É suave, acessível e generosa. Não subestime: um latte bem feito é tecnicamente exigente.',
     params:[{l:'Espresso',v:'1–2 doses',u:'30–60ml'},{l:'Leite',v:'200 ml',u:'vaporizado'},{l:'Espuma',v:'5 mm',u:'cap'},{l:'Temp',v:'63°',u:'celsius'},{l:'Xícara',v:'240–300',u:'ml'},{l:'Ratio',v:'1:4',u:'café:leite'}],
     steps:[{t:'Extraia o espresso',d:'Uma ou duas doses dependendo do tamanho do pedido.'},
            {t:'Vaporize uma porção generosa',d:'Mais leite, menos aeração que o cappuccino. Textura sedosa.'},
            {t:'Despeje lentamente',d:'De baixo para misturar suavemente. O leite envolve o café.'},
            {t:'Termine com espuma',d:'Uma camada fina de 5mm. Não mais. É um latte, não cappuccino.'}],
     milk:'O latte é a bebida de leite mais fácil de fazer bem mas também a mais fácil de fazer mal. Leite quente demais ou sem textura arruína a experiência.',
     serviceNote:"Para um 'latte grande' — use duas doses de espresso. Nunca apenas adicione mais leite."},
    {name:'Cortado',tagline:'Proporção exata',
     philosophy:'Cortado vem do espanhol cortar — o leite corta a acidez do espresso. É uma bebida de proporção exata: nem mais nem menos. Surgiu na Espanha e se popularizou por toda a América Latina, onde também é conhecido como pingado no Brasil ou tallat na Catalunha. Ideal para quem quer café de verdade com um toque de suavidade.',
     params:[{l:'Espresso',v:'1 dose',u:'30ml'},{l:'Leite',v:'30 ml',u:'quente'},{l:'Espuma',v:'nenhuma',u:'—'},{l:'Temp',v:'55–60°',u:'celsius'},{l:'Xícara',v:'90 ml',u:'vidro'},{l:'Ratio',v:'1:1',u:'exato'}],
     steps:[{t:'Extraia espresso padrão',d:'Sem ajustes. O espresso deve funcionar sozinho.'},
            {t:'Vaporize com aeração mínima',d:'Apenas aquecer e suavizar. Sem criar espuma.'},
            {t:'Despeje plano',d:'O leite cai diretamente no espresso. Sem latte art.'},
            {t:'Sirva sem cerimônias',d:'É um cortado. Limpo. Direto.'}],
     milk:'O leite do cortado deve ser quente e levemente texturizado mas nunca espumoso. Se flutua, aeração demais.',
     serviceNote:'Sirva em copo pequeno de vidro quando possível. A apresentação em vidro é parte da identidade do cortado.'},
    {name:'Macchiato',tagline:'O shot marcado',
     philosophy:"Espresso macchiato significa 'espresso manchado'. Uma colher de chá de espuma na crema. Nada mais. É a forma mais discreta de suavizar um espresso sem alterar seu caráter. Apreciado por quem quer espresso mas com o menor gesto de leite.",
     params:[{l:'Espresso',v:'1 dose',u:'30ml'},{l:'Espuma',v:'1 col. chá',u:''},{l:'Leite',v:'nenhum',u:'só espuma'},{l:'Temp',v:'90°+',u:'servir quente'},{l:'Xícara',v:'60 ml',u:'demitasse'},{l:'Ratio',v:'95:5',u:'café:espuma'}],
     steps:[{t:'Extraia o espresso',d:'Padrão. A crema deve estar intacta.'},
            {t:'Retire espuma de uma jarra vaporizada',d:'Uma pequena colherada de espuma densa.'},
            {t:'Coloque no centro da crema',d:'Uma mancha. Não cubra tudo.'},
            {t:'Sirva imediatamente',d:'O espresso não espera.'}],
     milk:null,
     serviceNote:'Não confundir com Latte Macchiato — que é o oposto: leite manchado com espresso. Se for pedido macchiato sem especificar, confirme qual.'},
    {name:'Americano',tagline:'Espresso estendido — com nuances',
     philosophy:'O Americano nasceu na Europa durante a Segunda Guerra Mundial. Os soldados americanos achavam o espresso intenso demais e pediam água adicional. Com o tempo tornou-se uma bebida por direito próprio. Bem feito, preserva a complexidade do espresso mas em ritmo mais lento.',
     params:[{l:'Espresso',v:'1–2 doses',u:''},{l:'Água quente',v:'120–150',u:'ml'},{l:'Ratio',v:'1:4',u:'esp:água'},{l:'Temp água',v:'90°',u:'celsius'},{l:'Xícara',v:'200–240',u:'ml'},{l:'Ordem',v:'água primeiro',u:'depois espresso'}],
     steps:[{t:'Adicione água quente primeiro',d:'Encha a xícara entre a metade e dois terços.'},
            {t:'Extraia o espresso sobre a água',d:'A crema flutua e é preservada na superfície.'},
            {t:'Não misture',d:'A estratificação natural é parte da bebida.'}],
     milk:null,
     serviceNote:'Americano vs Long Black: mesmos ingredientes, ordem diferente. O Long Black é mais concentrado e preserva melhor a crema.'},
    {name:'Long Black',tagline:'A resposta australiana ao café de filtro',
     philosophy:'O Long Black é o gêmeo sombrio do Flat White — também da Austrália e Nova Zelândia. É feito na ordem inversa ao Americano: o espresso vai sobre a água, preservando a crema intacta. O resultado é mais concentrado, mais aromático, mais complexo.',
     params:[{l:'Espresso',v:'2 doses',u:'60ml'},{l:'Água quente',v:'120',u:'ml'},{l:'Ratio',v:'1:2',u:'mais concentrado'},{l:'Temp água',v:'92°',u:'celsius'},{l:'Xícara',v:'200',u:'ml'},{l:'Ordem',v:'espresso por último',u:'sobre água'}],
     steps:[{t:'Adicione água quente à xícara',d:'Aproximadamente até a metade.'},
            {t:'Extraia dose dupla sobre a água',d:'A crema permanece intacta e aromática na superfície.'},
            {t:'Sirva sem misturar',d:'Quem bebe decide como integrar.'}],
     milk:null,

function cfRenderDrinks(){
  const d = getCoffeeData();
  const list = document.getElementById('cf-drink-list');
  if (!list) return;
  // Replace the prior poetic tagline with a compact operational summary
  // built from the first two `params` of each drink. Universal across all
  // drinks because the data shape is consistent (params is always an
  // array of {l,v,u}). Format: "{value} {unit} · {value} {unit}".
  const operSummary = (dr) => {
    if (!dr.params || !dr.params.length) return '';
    return dr.params.slice(0, 2).map(p => {
      const v = (p.v || '').trim();
      const u = (p.u || '').trim();
      return [v, u].filter(Boolean).join(' ');
    }).filter(Boolean).join(' · ');
  };
  list.innerHTML = d.drinks.map((dr,i)=>`
    <div class="cf-drink-card" id="cf-drink-${i}">
      <div class="cf-drink-header" onclick="cfToggleDrink(${i})">
        <div><div class="cf-drink-name">${dr.name}</div><div class="cf-drink-tagline">${operSummary(dr)}</div></div>
        <div class="cf-drink-toggle">▾</div>
      </div>
      <div class="cf-drink-body">
        <p class="cf-philosophy">${dr.philosophy}</p>
        <div class="cf-param-row">${dr.params.map(p=>`<div class="cf-param-box"><div class="cf-p-label">${p.l}</div><div class="cf-p-value">${p.v}</div><div class="cf-p-unit">${p.u}</div></div>`).join('')}</div>
        <div class="cf-steps-label">${d.methodLabel}</div>
        ${dr.steps.map((s,n)=>`<div class="cf-step-item"><div class="cf-step-num">${n+1}</div><div><div class="cf-step-title">${s.t}</div><div class="cf-step-desc">${s.d}</div></div></div>`).join('')}
        ${dr.milk?`<div class="cf-milk-block"><div class="cf-m-label">${d.milkLabel}</div><p>${dr.milk}</p></div>`:''}
        <div class="cf-service-note"><strong>${d.serviceLabel} —</strong> ${dr.serviceNote}</div>
      </div>
    </div>`).join('');
}

function cfToggleDrink(i){
  const card = document.getElementById('cf-drink-'+i);
  if (card) card.classList.toggle('open');
}

function cfSetInnerTab(key, btn){
  cf_activeInnerTab = key;
  document.querySelectorAll('.cf-tab-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.cf-panel').forEach(p=>p.classList.remove('active'));
  const panel = document.getElementById('cf-panel-'+key);
  if (panel) panel.classList.add('active');
  if (key==='timer') cfRenderTimerBtns();
  if (key==='service') cfShowServicePanel();
}

function cfRenderTimerBtns(){
  const d = getCoffeeData();
  const container = document.getElementById('cf-timer-btns');
  if (!container) return;
  container.innerHTML = d.timerDrinks.map((td,i)=>`
    <button class="cf-tds-btn${cf_selectedTimer&&cf_selectedTimer.min===td.min?' active':''}" onclick="cfSelectTimerDrink(${i})">${td.name}</button>`).join('');
}

function cfSelectTimerDrink(i){
  const d = getCoffeeData();
  cf_selectedTimer = d.timerDrinks[i];
  cf_selectedTimer._name = cf_selectedTimer.name;
  document.querySelectorAll('.cf-tds-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  const tgt = document.getElementById('cf-timer-target');
  if (tgt) tgt.textContent = (currentLang==='pt'?'Objetivo: ':currentLang==='en'?'Target: ':'Objetivo: ')+cf_selectedTimer.min+'–'+cf_selectedTimer.max+' '+(currentLang==='pt'?'segundos':currentLang==='en'?'seconds':'segundos');
  cfResetTimer(true);
}

function cfToggleTimer(){
  const d = getCoffeeData();
  const btn = document.getElementById('cf-start-btn');
  if (!cf_running){
    cf_running = true;
    if (btn) btn.textContent = d.stopBtn;
    cf_interval = setInterval(()=>{ cf_ms += 100; cfUpdateTimerDisplay(); }, 100);
  } else {
    clearInterval(cf_interval);
    cf_running = false;
    if (btn) btn.textContent = d.startBtn;
  }
}

function cfResetTimer(keepSelection){
  clearInterval(cf_interval);
  cf_running = false;
  cf_ms = 0;
  const d = getCoffeeData();
  const btn = document.getElementById('cf-start-btn');
  const disp = document.getElementById('cf-timer-display');
  const phase = document.getElementById('cf-timer-phase');
  if (btn) btn.textContent = d.startBtn;
  if (disp){ disp.textContent='0.0'; disp.classList.remove('running','over'); }
  if (phase) phase.textContent = d.phaseDefault;
}

function cfUpdateTimerDisplay(){
  const secs = cf_ms / 1000;
  const disp = document.getElementById('cf-timer-display');
  const phase = document.getElementById('cf-timer-phase');
  if (!disp) return;
  disp.textContent = secs.toFixed(1);
  if (cf_selectedTimer){
    disp.classList.remove('running','over');
    if (secs>=cf_selectedTimer.min && secs<=cf_selectedTimer.max) disp.classList.add('running');
    else if (secs>cf_selectedTimer.max) disp.classList.add('over');
    if (phase){
      const phases = cf_selectedTimer.phases;
      let msg = phases[0].text;
      for (const p of phases){ if (secs>=p.at) msg=p.text; }
      phase.textContent = msg;
    }
  }
}

// ── Shift roster panel ──────────────────────────────────────────────────────
// Pulls from /staffing/{YYYY-MM} once per session, then re-evaluates the
// visible state every minute. The data is operational (changes monthly) so
// it lives entirely in Firebase, never in the HTML. Update via Firebase
// Console: paste a new {day: {viajeros, geo_senior_*, geos_*, apoyo_*}}
// object under /staffing/{nextMonthKey}.
//
// State (STAFFING_PATH, STAFFING_*_START/END, STAFFING_DATA,
// STAFFING_MONTH_KEY) is declared early in the script — see the top — so
// setLang's boot call to staffingRender doesn't trip TDZ on those let/const.

function staffingMonthKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  return `${y}-${m}`;
}
function staffingActiveShift(d){
  const mins = d.getHours()*60 + d.getMinutes();
  if (mins >= STAFFING_AM_START && mins < STAFFING_AM_END) return 'am';
  if (mins >= STAFFING_PM_START && mins < STAFFING_PM_END) return 'pm';
  return null;
}
function staffingNextShift(d){
  const mins = d.getHours()*60 + d.getMinutes();
  // Before 06:30 → AM is next. After 23:30 → AM (tomorrow) is next.
  if (mins < STAFFING_AM_START || mins >= STAFFING_PM_END) return 'am';
  // Between AM end and PM start (won't happen here since they touch at 15:00)
  return 'pm';
}
function staffingFirstName(full){
  return (full || '').trim().split(/\s+/)[0] || '';
}

async function staffingFetch(){
  const monthKey = staffingMonthKey(new Date());
  STAFFING_MONTH_KEY = monthKey;
  try {
    const url = `${CF_FIREBASE_CONFIG.databaseURL}/${STAFFING_PATH}/${monthKey}.json`;
    const resp = await fetch(url);
    STAFFING_DATA = (await resp.json()) || {};
  } catch(e){
    STAFFING_DATA = {};
  }
  staffingRender();
}

function staffingRender(){
  const panel = document.getElementById('staffing-panel');
  if (!panel) return;
  if (!STAFFING_DATA){ panel.innerHTML = ''; return; }
  const now = new Date();
  const day = String(now.getDate());
  const dayData = STAFFING_DATA[day];
  if (!dayData){ panel.innerHTML = ''; return; }
  const shift = staffingActiveShift(now);
  if (!shift){
    // Off-hours: render a single faint line indicating the next shift.
    const next = staffingNextShift(now);
    panel.innerHTML = `<div class="staffing-off">${t('staffNext')} · ${next.toUpperCase()}</div>`;
    return;
  }
  const senior = (dayData[`geo_senior_${shift}`] || []).map(staffingFirstName).filter(Boolean);
  const geos   = (dayData[`geos_${shift}`]       || []).map(staffingFirstName).filter(Boolean);
  const apoyo  = (dayData[`apoyo_${shift}`]      || []).map(staffingFirstName).filter(Boolean);
  let html = `
    <div class="staffing-head">
      <span class="staffing-shift">${shift.toUpperCase()}</span>
      <span class="staffing-viajeros">${dayData.viajeros ?? '—'} ${t('staffViajeros')}</span>
    </div>`;
  if (senior.length) html += `<div class="staffing-row"><span class="staffing-label">${t('staffSenior')}</span><span class="staffing-names">${senior.join(' · ')}</span></div>`;

// ── Daily desserts module ────────────────────────────────────────────────
// Path:    /desserts/{YYYY-MM-DD}
// Shape:   { helado, sorbet, fruta[], ninos, enteredAt }
// Lifecycle:
//   • Anyone can enter via the inline form at any time
//   • Entry is "fresh" for DESSERTS_FRESHNESS_MS (4h) from enteredAt
//   • Stale entries are auto-DELETED from Firebase on next read by any
//     client (eventually-consistent purge — no Cloud Function needed)
//   • Single entry per day; dinner overwrites lunch once lunch is stale
// State (DESSERTS_PATH, DESSERTS_FRESHNESS_MS, DESSERTS_DATA,
// DESSERTS_DATE_KEY, DESSERTS_FORM_OPEN) lives in STATE TOP.

function dessertsDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function dessertsIsStale(data){
  if (!data || !data.enteredAt) return true;
  return (Date.now() - data.enteredAt) > DESSERTS_FRESHNESS_MS;
}

async function dessertsFetch(){
  const key = dessertsDateKey(new Date());
  DESSERTS_DATE_KEY = key;
  const url = `${CF_FIREBASE_CONFIG.databaseURL}/${DESSERTS_PATH}/${key}.json`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data && dessertsIsStale(data)){
      // Stale — delete server-side (eventually-consistent purge), treat as missing
      fetch(url, { method: 'DELETE' }).catch(()=>{});
      DESSERTS_DATA = null;
    } else {
      DESSERTS_DATA = data || null;
    }
  } catch(e){
    DESSERTS_DATA = null;
  }
  dessertsRender();
}

function dessertsRender(){
  const strip = document.getElementById('desserts-strip');
  const form  = document.getElementById('desserts-form');
  if (!strip) return;
  // If form is open, just refresh its labels and leave the strip alone
  if (DESSERTS_FORM_OPEN){
    dessertsRefreshFormLabels();
    return;
  }
  // Empty / stale state → discreet add button
  if (!DESSERTS_DATA || dessertsIsStale(DESSERTS_DATA)){
    strip.innerHTML = `<button class="desserts-empty-btn" onclick="dessertsOpenForm()">+ ${t('dessertsAddBtn')}</button>`;
    if (form) form.hidden = true;
    return;
  }
  const d = DESSERTS_DATA;
  const items = [];
  if (d.helado) items.push({ l:'H', v:d.helado });
  if (d.sorbet) items.push({ l:'S', v:d.sorbet });
  if (d.fruta){
    const list = Array.isArray(d.fruta) ? d.fruta.filter(Boolean) : [d.fruta];
    if (list.length) items.push({ l:'F', v:list.join(', ') });
  }
  if (d.ninos) items.push({ l:'N', v:d.ninos });
  if (!items.length){
    // Document exists but has no values — treat as empty
    strip.innerHTML = `<button class="desserts-empty-btn" onclick="dessertsOpenForm()">+ ${t('dessertsAddBtn')}</button>`;
    return;
  }
  strip.innerHTML =
    items.map(it => `<span class="desserts-item"><span class="desserts-item-label">${it.l}</span>·<span class="desserts-item-value">${it.v}</span></span>`).join('') +
    `<button class="desserts-edit-btn" onclick="dessertsOpenForm()" aria-label="${t('dessertsEditBtn')}">✎</button>`;
  if (form) form.hidden = true;
}

function dessertsRefreshFormLabels(){
  const map = {
    'd-label-helado': 'dessertsLabelHelado',
    'd-label-sorbet': 'dessertsLabelSorbet',
    'd-label-fruta':  'dessertsLabelFruta',
    'd-label-ninos':  'dessertsLabelNinos'
  };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  });
  const save   = document.getElementById('d-save');
  const cancel = document.getElementById('d-cancel');
  if (save)   save.textContent   = t('dessertsSave');
  if (cancel) cancel.textContent = t('dessertsCancel');
}

function dessertsOpenForm(){
  DESSERTS_FORM_OPEN = true;
  const form = document.getElementById('desserts-form');
  if (!form) return;
  // Pre-populate inputs with current fresh data (if any) so editing is incremental
  const d = (DESSERTS_DATA && !dessertsIsStale(DESSERTS_DATA)) ? DESSERTS_DATA : {};
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };
  set('d-helado', d.helado);
  set('d-sorbet', d.sorbet);
  set('d-fruta',  Array.isArray(d.fruta) ? d.fruta.join(', ') : (d.fruta || ''));
  set('d-ninos',  d.ninos);
  dessertsRefreshFormLabels();
  // Always re-enable the save button when the form opens — protects against
  // it being left disabled from a previous submit cycle.
  const saveBtn = document.getElementById('d-save');
  if (saveBtn) saveBtn.disabled = false;
  form.hidden = false;
  // Hide the strip while the form is open to avoid the "+ button" sitting on top
  const strip = document.getElementById('desserts-strip');
  if (strip) strip.innerHTML = '';
}

function dessertsCloseForm(){
  DESSERTS_FORM_OPEN = false;
  const form = document.getElementById('desserts-form');
  if (form) form.hidden = true;
  dessertsRender();
}

async function dessertsSubmitForm(){
  const val = id => (document.getElementById(id)?.value || '').trim();
  const helado = val('d-helado');
  const sorbet = val('d-sorbet');
  const ninos  = val('d-ninos');
  const fruta  = val('d-fruta').split(',').map(s=>s.trim()).filter(Boolean);
  // If the user clears everything, treat as a delete
  if (!helado && !sorbet && !ninos && !fruta.length){
    const key = dessertsDateKey(new Date());
    const url = `${CF_FIREBASE_CONFIG.databaseURL}/${DESSERTS_PATH}/${key}.json`;
    fetch(url, { method:'DELETE' }).catch(()=>{});
    DESSERTS_DATA = null;
    dessertsCloseForm();
    return;
  }
  const payload = { enteredAt: Date.now() };
  if (helado)        payload.helado = helado;
  if (sorbet)        payload.sorbet = sorbet;
  if (fruta.length)  payload.fruta  = fruta;
  if (ninos)         payload.ninos  = ninos;
  const key = dessertsDateKey(new Date());
  const url = `${CF_FIREBASE_CONFIG.databaseURL}/${DESSERTS_PATH}/${key}.json`;
  // Disable the save button while writing
  const saveBtn = document.getElementById('d-save');
  if (saveBtn) saveBtn.disabled = true;
  try {
    await fetch(url, { method:'PUT', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(payload) });
    DESSERTS_DATA = payload;
    if (saveBtn) saveBtn.disabled = false; // re-enable on success too — next open finds it ready
    dessertsCloseForm();
  } catch(e){
    console.error('[desserts]', e);
    if (saveBtn) saveBtn.disabled = false;
  }
}

// Tick: every 60s, freshness check + render. If we have data that just went
// stale, the next fetch deletes it server-side. If we have nothing or it's
// stale already, re-fetch in case another device just entered new data.
setInterval(()=>{
  if (!DESSERTS_DATA || dessertsIsStale(DESSERTS_DATA)){
    dessertsFetch();
  } else {
    // Fresh data — re-render is essentially a no-op but keeps the freshness
    // boundary aligned to the real wall clock
    dessertsRender();
  }
}, 60000);
document.addEventListener('visibilitychange', ()=>{
  if (document.visibilityState === 'visible'){
    // Refetch whenever the user comes back to the tab, so edits made
    // elsewhere propagate as soon as the staff returns to the page
    const newKey = dessertsDateKey(new Date());
    if (newKey !== DESSERTS_DATE_KEY || !DESSERTS_DATA || dessertsIsStale(DESSERTS_DATA)){
      dessertsFetch();
    }
  }
});

// ── History helpers ──────────────────────────────────────────────────────────
// Date bucket key in local time: 'YYYY-MM-DD'. The "Hoy/Ayer" boundary is
// always device-local — a ticket completed at 23:59 belongs to that day,
// one completed at 00:01 belongs to the next.
function cfGetDateKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function cfShiftDateKey(dateKey, deltaDays){
  const [y,m,d] = dateKey.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + deltaDays);
  return cfGetDateKey(dt.getTime());
}
// Friendly label for the date selector. "Hoy / Ayer" for the two most recent
// days, weekday + day-month otherwise.
function cfFormatDateLabel(dateKey){
  const todayKey = cfGetDateKey(Date.now());
  const yesterdayKey = cfShiftDateKey(todayKey, -1);
  if (dateKey === todayKey)    return `${t('cfHistToday')} · ${cfFormatDayMonth(dateKey)}`;
  if (dateKey === yesterdayKey) return `${t('cfHistYesterday')} · ${cfFormatDayMonth(dateKey)}`;
  const [y,m,d] = dateKey.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const locale = currentLang === 'en' ? 'en-US' : currentLang === 'pt' ? 'pt-BR' : 'es-ES';
  const wday = dt.toLocaleDateString(locale, { weekday: 'short' }).replace('.','');
  return `${wday} · ${cfFormatDayMonth(dateKey)}`;
}
function cfFormatDayMonth(dateKey){
  const [y,m,d] = dateKey.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const locale = currentLang === 'en' ? 'en-US' : currentLang === 'pt' ? 'pt-BR' : 'es-ES';
  return dt.toLocaleDateString(locale, { day:'numeric', month:'short' }).replace('.','');
}
// "0:42" / "12:08" — minutes:seconds from milliseconds
function cfFormatDuration(ms){
  if (!ms || ms < 0) ms = 0;
  const totalSec = Math.round(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
// Wall-clock time like "14:36" for a timestamp in local time.
function cfFormatWallTime(ts){
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// One-shot: any legacy 'done' orders still living in /orders (from before the
// move-on-done flow existed) are migrated into the history bucket so they
// don't sit there forever. Idempotent — if there are none, this is a no-op.
function cfMigrateLegacyDoneOrders(){
  const db = cfInitFirebase();
  db.ref(CF_ORDERS_PATH).once('value').then(snap=>{
    const updates = {};
    let any = false;
    snap.forEach(child=>{
      const o = child.val();
      if (o && o.status === 'done'){
        any = true;
        const completedAt = Date.now();
        const submittedAt = o.timestamp || completedAt;
        const dateKey = cfGetDateKey(completedAt);
        const archived = { ...o, completedAt, prepMs: Math.max(0, completedAt - submittedAt) };
        delete archived.status;
        updates[`/${CF_ORDERS_PATH}/${child.key}`] = null;
        updates[`/${CF_HISTORY_PATH}/${dateKey}/${child.key}`] = archived;
      }
    });
    if (any) db.ref().update(updates);
  }).catch(()=>{});
}

// Auto-purge: delete /orders_history buckets older than retention window.
// Runs whenever a barista enters the service mode. Eventually consistent —
// good enough since the app sees daily traffic.
function cfPurgeOldHistory(){
  const db = cfInitFirebase();
  const cutoffKey = cfShiftDateKey(cfGetDateKey(Date.now()), -CF_HISTORY_RETENTION_DAYS);
  // Shallow read of bucket keys only, not their contents — cheap.
  db.ref(CF_HISTORY_PATH).once('value').then(snap=>{
    const updates = {};
    let any = false;
    snap.forEach(bucket=>{
      const dateKey = bucket.key;
      // String comparison works because YYYY-MM-DD is lexicographically sortable.
      if (dateKey < cutoffKey){
        any = true;
        updates[`/${CF_HISTORY_PATH}/${dateKey}`] = null;
      }
    });
    if (any) db.ref().update(updates);
  }).catch(()=>{});
}

  if (key === 'del'){
    cf_pinBuffer = cf_pinBuffer.slice(0,-1);

    cfSubmitPin(cf_pinBuffer);
    return;
  } else {
    if (cf_pinBuffer.length < 3) cf_pinBuffer += key;
  }
  const disp = document.getElementById('cf-numpad-display');
  if (disp) disp.textContent = cf_pinBuffer.length ? cf_pinBuffer.replace(/./g,'●') : '· · ·';
  // Auto-submit as soon as 3 digits are entered (both valid codes are 3 digits)
  if (cf_pinBuffer.length === 3){
    setTimeout(()=>cfSubmitPin(cf_pinBuffer), 350);
  }
}

function cfSubmitPin(val){
  const code = (val||'').trim();
  if (code === CF_WAITER_CODE){ cf_pinBuffer=''; cf_mode='waiter'; cfRenderWaiterView(); }
  else if (code === CF_BARISTA_CODE){ cf_pinBuffer=''; cf_mode='barista'; cfRenderBaristaView(); }
  else {
    cf_pinBuffer = '';
    const err  = document.getElementById('cf-pin-error');
    const disp = document.getElementById('cf-numpad-display');
    if (err){ err.textContent=t('cfPinError'); setTimeout(()=>err.textContent='',2200); }
    if (disp){ disp.textContent='· · ·'; }
  }
}
