<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explora Atacama — Vinos & Menús</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
.app { will-change: transform; }

:root {
  --wine-red: #7F77DD;
  --wine-red-light: #2a2660;
  --wine-red-dark: #a9a0f0;
  --gold: #BA7517;
  --gold-light: #3a2a05;
  --teal: #1D9E75;
  --teal-light: #0a2e20;
  --coral: #D85A30;
  --coral-light: #3a1a0a;
  --bg: #1a1917;
  --bg-secondary: #242220;
  --surface: #2a2825;
  --border: rgba(255,255,255,0.1);
  --border-md: rgba(255,255,255,0.18);
  --text: #f0eeea;
  --text-secondary: #aaa;
  --text-tertiary: #777;
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1917;
    --bg-secondary: #242220;
    --surface: #2a2825;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.18);
    --text: #f0eeea;
    --text-secondary: #aaa;
    --text-tertiary: #777;
    --wine-red-light: #2a2660;
    --wine-red-dark: #a9a0f0;
    --gold-light: #3a2a05;
    --teal-light: #0a2e20;
    --coral-light: #3a1a0a;
  }
}

.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

.header { padding: 1rem 0 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.header-text h1 { font-size: 20px; font-weight: 500; color: var(--text); }
.header-text p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.lang-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.lang-btn { padding: 4px 9px; border-radius: 6px; border: 0.5px solid var(--border-md); font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-tertiary); letter-spacing: 0.04em; transition: all 0.15s; }
.lang-btn:hover { background: var(--bg-secondary); color: var(--text-secondary); }
.lang-btn.active { background: var(--surface); color: var(--text); border-color: var(--border-md); }

.main-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.tab:hover { background: var(--bg-secondary); }
.tab.active { background: var(--wine-red); color: white; border-color: var(--wine-red); font-weight: 500; }

.search-bar { position: relative; margin-bottom: 1.25rem; }
.search-bar input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
.search-bar input:focus { border-color: var(--wine-red); }
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }

.day-selector { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.day-btn { padding: 5px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
.day-btn:hover { background: var(--bg-secondary); }
.day-btn.active { background: var(--gold); color: white; border-color: var(--gold); font-weight: 500; }

/* Day heading */
.day-heading { font-size: 14px; font-weight: 500; color: var(--text); margin: 1.5rem 0 1rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }

/* Service blocks */
.service-block { margin-bottom: 2rem; }
.service-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--border); }
.service-label { font-size: 15px; font-weight: 500; color: var(--text); }
.service-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-lunch { background: var(--gold); }
.dot-dinner { background: rgba(139, 26, 46, 0.6); }
.dot-shared { background: var(--border-md); }

/* Course sections */
.course-section { margin-bottom: 1.25rem; }
.course-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; padding-left: 2px; }
.dish-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

/* Dish cards */
.dish-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; cursor: pointer; transition: border-color 0.15s; }
.dish-card:hover { border-color: var(--border-md); }
.dish-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.dish-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
.dish-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.allergen-row { display: flex; flex-wrap: wrap; gap: 4px; }
.allergen-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }
.allergen-tag.tag-mariscos { background: rgba(14,116,144,0.15); color: #67e8f9; border-color: rgba(14,116,144,0.4); }

/* Panel open animation */
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1);    }
}

/* Detail panel */
.detail-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
.detail-panel h2 { font-size: 17px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.detail-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 0.75rem; }
.detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.detail-section { margin-bottom: 1rem; }
.detail-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.allergen-detail { display: flex; flex-wrap: wrap; gap: 5px; }
.allergen-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-md); }
.allergen-pill.pill-mariscos { background: rgba(14,116,144,0.15); color: #67e8f9; border-color: rgba(14,116,144,0.4); }
.wine-suggestions { display: flex; flex-direction: column; gap: 8px; }
.wine-chip { background: var(--surface); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 8px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.wine-chip-name { font-size: 13px; font-weight: 500; color: var(--text); }
.wine-chip-why { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
/* chip colors per wine type */
.wine-chip.chip-espumante { background: rgba(14,165,233,0.12); border-color: rgba(14,165,233,0.35); }
.wine-chip.chip-espumante:hover, .wine-chip.chip-espumante.chip-active { background: rgba(14,165,233,0.22); border-color: rgba(14,165,233,0.7); }
.wine-chip.chip-espumante .wine-chip-name { color: #7dd3fc; }
.wine-chip.chip-espumante .wine-chip-why { color: #38bdf8; }
.wine-chip.chip-blanco { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
.wine-chip.chip-blanco:hover, .wine-chip.chip-blanco.chip-active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.6); }
.wine-chip.chip-blanco .wine-chip-name { color: #86efac; }
.wine-chip.chip-blanco .wine-chip-why { color: #4ade80; }
.wine-chip.chip-semillon { background: rgba(202,138,4,0.12); border-color: rgba(202,138,4,0.35); }
.wine-chip.chip-semillon:hover, .wine-chip.chip-semillon.chip-active { background: rgba(202,138,4,0.22); border-color: rgba(202,138,4,0.7); }
.wine-chip.chip-semillon .wine-chip-name { color: #fcd34d; }
.wine-chip.chip-semillon .wine-chip-why { color: #f59e0b; }
.wine-chip.chip-rosado { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
.wine-chip.chip-rosado:hover, .wine-chip.chip-rosado.chip-active { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.6); }
.wine-chip.chip-rosado .wine-chip-name { color: #fca5a5; }
.wine-chip.chip-rosado .wine-chip-why { color: #f87171; }
.wine-chip.chip-tinto { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.35); }
.wine-chip.chip-tinto:hover, .wine-chip.chip-tinto.chip-active { background: rgba(139,92,246,0.22); border-color: rgba(139,92,246,0.7); }
.wine-chip.chip-tinto .wine-chip-name { color: #c4b5fd; }
.wine-chip.chip-tinto .wine-chip-why { color: #a78bfa; }
.wine-chip.chip-dulce { background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.35); }
.wine-chip.chip-dulce:hover, .wine-chip.chip-dulce.chip-active { background: rgba(251,146,60,0.22); border-color: rgba(251,146,60,0.7); }
.wine-chip.chip-dulce .wine-chip-name { color: #fdba74; }
.wine-chip.chip-dulce .wine-chip-why { color: #fb923c; }
.wine-sub-panel { margin-top: 12px; background: var(--bg-secondary); border: 0.5px solid rgba(139,26,46,0.3); border-radius: var(--radius-md); padding: 1rem; animation: panelIn 0.25s cubic-bezier(0.34,1.1,0.64,1) both; }
.close-btn { float: right; font-size: 20px; line-height: 1; cursor: pointer; color: var(--text-tertiary); background: none; border: none; padding: 0 0 0 8px; }
.close-btn:hover { color: var(--text); }

/* Wine tab */
.wine-filter-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.wine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
.wine-card:hover { border-color: var(--border-md); }
.wine-card.selected { border-color: var(--wine-red); border-width: 1.5px; }
.wine-type-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.badge-espumante { background: rgba(14,165,233,0.18); color: #7dd3fc; }
.badge-blanco { background: rgba(34,197,94,0.15); color: #86efac; }
.badge-semillon { background: rgba(202,138,4,0.18); color: #fcd34d; }
.badge-rosado { background: var(--coral-light); color: #f87171; }
.badge-tinto { background: rgba(139,92,246,0.2); color: #c4b5fd; }
.badge-dulce { background: rgba(251,146,60,0.2); color: #fdba74; }
.wine-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.wine-valley { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.wine-aroma { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.wine-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
.wine-detail h2 { font-size: 17px; font-weight: 500; margin-bottom: 2px; color: var(--text); }
.wine-detail .valley { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.wine-section { margin-bottom: 1rem; }
.wine-section h3 { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.wine-section p { font-size: 13px; color: var(--text); line-height: 1.6; }
.guion-box { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
.guion-label { font-weight: 500; color: #e8a0aa; }
.guion-box p { font-size: 13px; color: #c97080; line-height: 1.6; }
.paired-dishes { display: flex; flex-direction: column; gap: 6px; }
.paired-dish { font-size: 13px; padding: 6px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); color: var(--text); }

/* Guiones */
.guion-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.guion-card h2 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; }
.guion-text { background: rgba(139, 26, 46, 0.2); border: 0.5px solid rgba(139, 26, 46, 0.35); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1rem; font-size: 13px; color: #c97080; line-height: 1.6; }
.guion-section-title { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

/* Cocktails */
.cocktail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.cocktail-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; animation: panelIn 0.28s cubic-bezier(0.34,1.1,0.64,1) both; }
.cocktail-name { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.cocktail-method { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.75rem; font-style: italic; }
.cocktail-meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.cocktail-meta-tag { font-size: 11px; color: var(--text-tertiary); background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 8px; }
.cocktail-section-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.cocktail-ingredient-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.cocktail-ingredient-row:last-child { border-bottom: none; }
.cocktail-ingredient-name { font-size: 13px; color: var(--text); }
.cocktail-ingredient-amount { font-size: 12px; color: var(--text-secondary); white-space: nowrap; padding-left: 12px; text-align: right; }
.cocktail-garnish { margin-top: 0.85rem; padding-top: 0.6rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text-secondary); }
.cocktail-garnish strong { color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; display: block; margin-bottom: 2px; }


.hidden { display: none !important; }
.empty-state { font-size: 13px; color: var(--text-tertiary); padding: 2rem 0; text-align: center; }
</style>
</head>

  <div class="header">
    <div class="header-text">
      <h1 id="app-title">Explora Atacama — Vinos &amp; Menús</h1>
      <p id="app-subtitle">Guía de servicio: maridajes, alérgenos y fichas de vino</p>
    </div>

        <button class="lang-btn" onclick="setLang('pt',this)">PT</button>
      </div>
    </div>
  </div>

  <div class="main-tabs">
    <button class="tab active" onclick="setTab('menus',this)">Menús por día</button>
    <button class="tab" onclick="setTab('vinos',this)">Fichas de vino</button>
    <button class="tab" onclick="setTab('guiones',this)">Guiones de venta</button>
    <button class="tab" onclick="setTab('cocktails',this)">Cocktails</button>
    <button class="tab" onclick="setTab('mocktails',this)">Mocktails</button>
  </div>

  <!-- MENÚS TAB -->
  <div id="tab-menus">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar plato..." id="dish-search" oninput="renderDishes()">
    </div>
    <div class="day-selector">
      <button class="day-btn active" onclick="setDay('all',this)">Todos los días</button>
      <button class="day-btn" onclick="setDay('1',this)">Día 1</button>
      <button class="day-btn" onclick="setDay('2',this)">Día 2</button>
      <button class="day-btn" onclick="setDay('3',this)">Día 3</button>
      <button class="day-btn" onclick="setDay('4',this)">Día 4</button>
    </div>
    <div id="dish-grid"></div>
  </div>

  <!-- VINOS TAB -->
  <div id="tab-vinos" class="hidden">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>

  {id:'d1',day:'1',service:'Almuerzo',course:'Plato principal',name:'Trucha asalmonada',desc:'Cocinada en una salsa de ají amarillo, ají panca, cebolla, tomates, ajo, vino blanco y fumet (todo triturado). Acompañada con vegetales salteados (cebolla y tomate en gajos) y yucas fritas cortadas en dados.',allergens:[],wines:['azur','talinay'],why:{azur:'La burbuja limpia la salsa y realza la trucha.',talinay:'Tensión cítrica y salinidad en línea con el ají amarillo.'}},
  {id:'d2',day:'1',service:'Almuerzo',course:'Plato principal',name:'Pastel de choclo',desc:'Pastelera de choclo, pollo cortado en cubos, aceituna y huevo.',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico equilibran el dulzor del choclo.',glup:'Tinto ligero que no pesa sobre la pastelera.'}},
  {id:'d3',day:'1',service:'Almuerzo',course:'Plato principal',name:'Zucchini relleno',desc:'Posado sobre mix de hojas verdes de hidroponía Larache. Contiene una bechamel con betarragas y está relleno con un sofrito a base de cebolla, setas, quinoa y puré de setas. Terminado con bechamel y queso Grana Padano para gratinar. Alérgenos: Lácteos (bechamel, queso), Gluten (bechamel).',allergens:['Lácteos','Gluten'],wines:['aquitania','semillon'],why:{aquitania:'Cremosidad y acidez integran la bechamel y el queso.',semillon:'Volumen y textura para el umami de las setas.'}},
  {id:'d4',day:'1',service:'Almuerzo',course:'Plato principal',name:'Ceviche del día',desc:'Mezcla de pulpo, trucha, camarón y ostión. Leche de tigre elaborada con tallo de apio, cilantro, jugo de limón, jengibre, ají amarillo, cebolla y ajo. Acompañado de cebolla, choclo peruano, camote y canchita.',allergens:['Mariscos'],wines:['azur','talinay'],why:{azur:'Espumante gastronómico: burbuja y acidez van con el limón.',talinay:'Sauvignon salino y cítrico: sigue la línea del ceviche.'}},
  {id:'d5',day:'1',service:'Cena',course:'Entrada',name:'Hojas verdes (Larache/Sequitor)',desc:'Mix de Larache y Sequitor, mini hojas de espinaca, mizuna y rumex. Incluye quinoas teñidas en betarraga y ají amarillo, con choclo peruano quemado. Dressing ácido de mora o frambuesa (según disponibilidad). Sugerencia: Verter el dressing sobre la ensalada.',allergens:[],wines:['talinay','garage-rose'],why:{talinay:'Acidez que se alinea con el dressing y las hojas amargas.','garage-rose':'Fruta roja fresca en línea con la mora del dressing.'}},
  {id:'d6',day:'1',service:'Cena',course:'Entrada',name:'Chupe de centolla',desc:'Pastel horneado cremoso. Sofrito de cebolla blanca, pimentón rojo, paprika y vino blanco. Mezclado con carne de centolla y pan remojado con leche. Terminado con queso Grana Padano gratinado. Alérgenos: Lácteos/Lactosa (leche, queso), Gluten (pan).',allergens:['Mariscos','Lácteos','Gluten'],wines:['semillon','aquitania'],why:{semillon:'Textura y acidez para sostener la salsa cremosa de mar.',aquitania:'Volumen del Chardonnay integra la crema del chupe.'}},
  {id:'d7',day:'1',service:'Cena',course:'Entrada',name:'Pasta casera con ragú de pato',desc:'Pasta preparada en el día. Ragú de muslo de pato cocinado a baja temperatura (confitura) con cebolla, tomate, zanahoria, apio y vino tinto. Se sirve desmenuzado con la reducción de la salsa y chimichurri. Alérgenos: Gluten (pasta).',allergens:['Gluten'],wines:['montsecano','perez-cruz'],why:{montsecano:'Tanino suave y acidez acompañan la grasa del pato.','perez-cruz':'Carmenere para quien quiere estructura con el ragú.'}},
  {id:'d8',day:'1',service:'Cena',course:'Plato principal',name:'Chicharrón de cerdo',desc:'Panceta cocinada a baja temperatura, cortada en cubos y frita con maicena. Salsa demi-glace con algarrobo. Acompañado de papas nativas y semilla (cocidas y fritas). Incluye salsa uchucuta (cebolla, ají amarillo, ajo, cilantro, perejil, cancha, queso fresco, aceite y sal) y suflados de Airampo (tapioca frita teñida).',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico limpian la fritura y la uchucuta.',glup:'Tinto ligero para no tapar el sabor del chicharrón.'}},
  {id:'d9',day:'1',service:'Cena',course:'Plato principal',name:'Pulpo',desc:'Cocción al vacío a baja temperatura (90°C por 2 horas). Acompañado de salsa anticuchera peruana (cebolla, ají amarillo, comino, ají panca, orégano, vinagre y soya). Alérgenos: trazas Gluten (soya).',allergens:['Mariscos','trazas Gluten'],wines:['semillon','talinay'],why:{semillon:'Textura media sostiene la salsa anticuchera.',talinay:'Salinidad y tensión cítrica con el ají y el limón.'}},
  {id:'d10',day:'1',service:'Cena',course:'Plato principal',name:'Risotto de res',desc:'Arroz arbóreo con caldo de rabo de vacuno (mirr pois, vino tinto, agua; cocción 5 horas). El caldo se reduce e incorpora al arroz con vino blanco, mantequilla fría y queso Grana Padano. Terminado con chimichurri tradicional (ajo, aceite, cilantro, perejil, ají color, orégano y vinagre). Alérgenos: Lácteos (mantequilla, queso).',allergens:['Lácteos'],wines:['montsecano','perez-cruz'],why:{montsecano:'Tanino sedoso respeta la textura cremosa del risotto.','perez-cruz':'Carmenere para quien quiere tinto con más estructura.'}},
  {id:'d11',day:'1',service:'Cena',course:'Plato principal',name:'Charquicán vegetariano',desc:'Cebolla, pimentón rojo, comino, paprika, orégano, papa y zapallo. Al final se incorporan arvejas, choclo y zanahoria. Servido con una yema de huevo confitada en aceite de oliva a 63°C.',allergens:[],wines:['glup','montsecano'],why:{glup:'Fruta fresca y acidez resaltan el zapallo sin pesar.',montsecano:'Pinot elegante para una preparación de verduras.'}},
  {id:'d12',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Texturas de chañar',desc:'Crème brûlée aromatizado con arrope de chañar y azúcar caramelizada; galleta de cacao chañar cubierta con chocolate blanco; tierra y helado de chañar. Opción Celíacos: El cremoso de chañar se puede pedir sin gluten. Alérgenos: Lácteos (crema, chocolate), Gluten (galleta).',allergens:['Lácteos','Gluten'],wines:['erasmo'],why:{erasmo:'Late Harvest con miel y frutas confitadas: maridaje dulce clásico.'}},
  {id:'d13',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Carrot cake',desc:'Bizcocho de zanahorias y cacao (contiene huevo). Relleno con frosting de queso crema, crema, zeste de naranja y azúcar. Acompañado de almendras garrapiñadas. Alérgenos: Gluten (bizcocho), Lácteos (frosting), Frutos secos (almendras).',allergens:['Gluten','Lácteos','Frutos secos'],wines:['erasmo'],why:{erasmo:'El dulzor y las notas de naranja van con el carrot cake.'}},
  {id:'d14',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Flan de vainilla',desc:'Tradicional con caramelo (huevo, leche y azúcar). Alérgenos: Lácteos (leche).',allergens:['Lácteos'],wines:['erasmo','azur'],why:{erasmo:'Dulzor floral complementa la vainilla.',azur:'Espumante seco como opción de cierre fresco.'}},
  {id:'d15',day:'2',service:'Almuerzo',course:'Plato principal',name:'Ostiones gratinados',desc:'100g de ostiones con bechamel, vino blanco y queso Grana Padano al horno. Alérgenos: Lácteos (bechamel, queso), Gluten (bechamel).',allergens:['Mariscos','Lácteos','Gluten'],wines:['azur','semillon'],why:{azur:'Burbuja y acidez cortan la grasa del gratín.',semillon:'Textura media para la bechamel y el dulzor del ostión.'}},
  {id:'d16',day:'2',service:'Almuerzo',course:'Plato principal',name:'Brócoli rostizado',desc:'Salteado en mantequilla. Base de puré de vegetales (tomate, zapallo, zucchini, papas) y chutney de tomates (mermelada con azúcar y vinagre). Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['aquitania','glup'],why:{aquitania:'Chardonnay cremoso que integra el puré de vegetales.',glup:'Tinto ligero para quien prefiere rojo con verduras asadas.'}},
  {id:'d17',day:'2',service:'Almuerzo',course:'Plato principal',name:'Lomo saltado',desc:'Salteado de carne aderezado con soya y cerveza. Vegetales: cebolla, tomate y cilantro. Acompañado de arroz y papas. Alérgenos: Gluten (soya, cerveza).',allergens:['Gluten'],wines:['garage-rose','syrah'],why:{'garage-rose':'Acidez y agarre tánico con la soya y la fritura.',syrah:'Syrah especiado para las notas de la salsa.'}},
  {id:'d18',day:'2',service:'Almuerzo',course:'Plato principal',name:'Tiradito de locos',desc:'Loco laminado cocido. Servido con salsa verde (cebolla, cilantro, ají verde, limón, sal y aceite) y mayonesa de limón.',allergens:['Mariscos'],wines:['talinay','azur'],why:{talinay:'Salinidad y tensión cítrica con la salsa verde.',azur:'Burbuja para un maridaje espumante del tiradito.'}},
  {id:'d19',day:'2',service:'Cena',course:'Entrada',name:'Ensalada de hojas con higos',desc:'Dressing de higos (contiene almíbar, limón o vinagre). Terminado con queso azul, almendras garrapiñadas e higos infusionados. Alérgenos: Lácteos (queso azul - contiene penicilina), Frutos secos (almendras).',allergens:['Lácteos (penicilina)','Frutos secos'],wines:['erasmo','garage-rose'],why:{erasmo:'Dulzor floral combina con los higos y el queso azul.','garage-rose':'Acidez y fruta roja equilibran el queso azul.'}},
  {id:'d20',day:'2',service:'Cena',course:'Entrada',name:'Sopa de zapallo',desc:'Zapallo y arrope de chañar, cocida y aligerada.',allergens:[],wines:['aquitania','semillon'],why:{aquitania:'Cremosidad y acidez integran el dulzor del zapallo.',semillon:'Textura media para sopa con notas dulces.'}},
  {id:'d21',day:'2',service:'Cena',course:'Entrada',name:'Camarones al ajillo',desc:'Calibre 16-20, condimentados con semillas de cilantro, pimienta y merkén. Aceite de oliva y maravilla. Terminado con láminas de ajo fritas y tostada de pan integral multisemillas. Alérgenos: Gluten (pan).',allergens:['Mariscos','Gluten'],wines:['azur','talinay'],why:{azur:'Burbuja y acidez refrescan entre bocado y bocado.',talinay:'Salinidad y acidez limpian el aceite del ajillo.'}},
  {id:'d22',day:'2',service:'Cena',course:'Entrada',name:'Pasta espirales con betarraga',desc:'Con salsa de betarraga (betarraga cocida emulsionada con aceite). Terminado con chimichurri y mousse de queso de cabra (queso crema y queso de cabra). Alérgenos: Gluten (pasta), Lácteos (quesos).',allergens:['Gluten','Lácteos'],wines:['glup','montsecano'],why:{glup:'Acidez y fruta roja acompañan la betarraga y el queso.',montsecano:'Pinot para quien quiere tinto con la pasta.'}},
  {id:'d23',day:'2',service:'Cena',course:'Plato principal',name:'Asado de tira',desc:'Sellado al vacío con vino tinto y mirr pois (cocción prolongada). Terminado con demi-glace y puré de zapallo rostizado.',allergens:[],wines:['perez-cruz','cabernet'],why:{'perez-cruz':'Carmenere: tanino redondo que agarra el colágeno del corte.',cabernet:'Cabernet para maridaje clásico con carne de cocción larga.'}},
  {id:'d24',day:'2',service:'Cena',course:'Plato principal',name:'Pesca del día',desc:'Corvina, pejeperro, mulata o lenguado. Cocinado suavemente con mantequilla y limón. Acompañado de puré de guisantes (habas, arvejas, espinaca) y guisantes/habas enteras. Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['talinay','aquitania'],why:{talinay:'Salinidad y acidez en línea con el limón y el pescado.',aquitania:'Chardonnay cremoso para el puré de guisantes.'}},

  {id:'d26',day:'2',service:'Cena',course:'Plato principal',name:'Ají de gallina',desc:'Salsa base cremosa (cebolla, ají amarillo estofado, leche, mantequilla, pan triturado y queso Grana Padano). Mezclado con pechuga desmenuzada. Acompañado con arroz simple, huevo y aceitunas. Alérgenos: Lácteos (leche, mantequilla, queso), Gluten (pan).',allergens:['Lácteos','Gluten'],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y leve tánico con el picor cremoso del ají.',glup:'Tinto ligero que no compite con la salsa amarilla.'}},

  {id:'d28',day:'2',service:'Almuerzo y Cena',course:'Postre',name:'Tres leches',desc:'Bizcocho húmedo remojado en tres leches, relleno con frambuesas. Terminado con merengue caramelizado, gel de frambuesas, frambuesas enteras y tierra de manjar. Alérgenos: Gluten (bizcocho), Lácteos (leches, manjar).',allergens:['Gluten','Lácteos'],wines:['erasmo'],why:{erasmo:'Maridaje clásico de vino dulce con postre cremoso.'}},
  {id:'d29',day:'2',service:'Almuerzo y Cena',course:'Postre',name:'Cheesecake con maracuyá',desc:'Queso crema, huevo y gel de maracuyá (usando agar-agar como gelificante). Base de tierra de pistacho. Alérgenos: Lácteos (queso crema), Frutos secos (pistacho).',allergens:['Lácteos','Frutos secos'],wines:['erasmo'],why:{erasmo:'Dulzor floral complementa la acidez del maracuyá.'}},
  {id:'d30',day:'3',service:'Almuerzo',course:'Plato principal',name:'Pastel de papa',desc:'Base de pino chileno con pollo, huevo y aceituna. Cubierto con puré de papas saborizado (mantequilla, leche, sal) y dorado con huevo. Condimento: comino, ají color y orégano. Observación: Puede salir sin mantequilla a pedido. Alérgenos: Lácteos (mantequilla, leche).',allergens:['Lácteos'],wines:['garage-rose','glup'],why:{'garage-rose':'Equilibra el dulzor del pino y la cremosidad del puré.',glup:'Tinto muy ligero para no pesar sobre el pastel.'}},
  {id:'d31',day:'3',service:'Almuerzo',course:'Plato principal',name:'Lasaña de vegetales',desc:'Tomate, zucchini, berenjena (opcionalmente zapallo o champiñones según disponibilidad). Salsa pomodoro, salsa bechamel y queso Grana Padano. Alérgenos: Gluten y Lácteos (bechamel, queso).',allergens:['Gluten','Lácteos'],wines:['aquitania','montsecano'],why:{aquitania:'Chardonnay cremoso integra la bechamel y los vegetales.',montsecano:'Pinot elegante para la lasaña de vegetales.'}},
  {id:'d32',day:'3',service:'Almuerzo',course:'Plato principal',name:'Filete de vacuno',desc:'180g terminado con demi-glace. Acompañado de puré de zanahoria (zanahoria emulsionada con aceite) y zanahorias torneadas glaseadas con miel y mantequilla. Disponibilidad: Inglesa, a punto o 3/4 (la carne se "runnea" primero). Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['cabernet','montsecano'],why:{cabernet:'Cabernet orgánico: maridaje clásico con proteína de carne.',montsecano:'Pinot para quien quiere tinto elegante más que potente.'}},
  {id:'d33',day:'3',service:'Almuerzo',course:'Plato principal',name:'Ceviche de pesca blanca',desc:'Leche de tigre (fumet, limón, apio, jengibre, cilantro, cebolla morada, sal y ají amarillo). Acompañado de cebolla, cancha y camote.',allergens:[],wines:['talinay','azur'],why:{talinay:'Tensión calcárea y salinidad con el limón del ceviche.',azur:'Versión espumante del maridaje clásico con ceviches.'}},
  {id:'d34',day:'3',service:'Cena',course:'Entrada',name:'Mix de hojas (manzana rostizada)',desc:'Manzana rostizada, cebada con dressing de frambuesa, mote con dressing de manzana y emulsión de betarraga. Proveniencia: Sequitor, Larache y Socaire. Observación: No es gluten free (contiene cebada y mote).',allergens:['Gluten (cebada, mote)'],wines:['talinay','garage-rose'],why:{talinay:'Acidez que equilibra el dulzor de la manzana rostizada.','garage-rose':'Fruta roja con la frambuesa y betarraga del dressing.'}},
  {id:'d35',day:'3',service:'Cena',course:'Entrada',name:'Sopa de espinacas',desc:'Base de cebolla, papa y caldo de vegetales (zanahoria, apio, cebolla). Se incorpora clorofila de espinaca (blanqueada y triturada).',allergens:[],wines:['aquitania','talinay'],why:{aquitania:'Volumen y acidez del Chardonnay para la sopa verde.',talinay:'Sauvignon fresco para una sopa ligera de verduras.'}},
  {id:'d36',day:'3',service:'Cena',course:'Entrada',name:'Chupe de mariscos',desc:'Centolla, pulpo, camarón y ostiones. Sofrito de cebolla, pimentón, ají color, vino blanco y mezcla de leche con pan. Terminado con Grana Padano gratinado. Alérgenos: Lácteos (leche, queso), Gluten (pan).',allergens:['Mariscos','Lácteos','Gluten'],wines:['semillon','aquitania'],why:{semillon:'Textura y acidez para la crema de mariscos.',aquitania:'Chardonnay cremoso para el gratinado.'}},
  {id:'d37',day:'3',service:'Cena',course:'Entrada',name:'Pasta corta con zapallo camote',desc:'Salsa de zapallo camote (emulsionada con aceite). Terminado con chimichurri (ajo, perejil, aceite) y queso Grana Padano. Alérgenos: Gluten (pasta), Lácteos (queso).',allergens:['Gluten','Lácteos'],wines:['glup','aquitania'],why:{glup:'Fruta fresca y acidez para el dulzor del zapallo.',aquitania:'Cremosidad del Chardonnay con la salsa de camote.'}},
  {id:'d38',day:'3',service:'Cena',course:'Plato principal',name:'Costillar de cerdo',desc:'Braseado al vacío a baja temperatura con cerveza. Terminado con demi-glace con algarrobo. Acompañado de puré de camote y cebollas encurtidas en vinagre con betarraga. Alérgenos: Gluten (trazas por la cerveza).',allergens:['Gluten (trazas cerveza)'],wines:['syrah','perez-cruz'],why:{syrah:'Syrah especiado para el cerdo y el dulzor del camote.','perez-cruz':'Carmenere con taninos redondos para el costillar.'}},
  {id:'d39',day:'3',service:'Cena',course:'Plato principal',name:'Garrón de cordero',desc:'Garrón delantero al vacío (85°C) con mirr pois y vino tinto reducido. Puré de papa con mantequilla sin lactosa y leche. Observación: Usa mantequilla sin lactosa.',allergens:[],wines:['cabernet','syrah'],why:{cabernet:'Cabernet orgánico para el cordero de cocción larga.',syrah:'Syrah con especias que complementan el guiso.'}},
  {id:'d40',day:'3',service:'Cena',course:'Plato principal',name:'Texturas de coliflor',desc:'Puré de coliflor caramelizada con abundante mantequilla. Encima, coliflor al vacío aromatizada con ají panca, jengibre, sal y mostaza, luego rostizada. Terminado con pebre. Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['aquitania','glup'],why:{aquitania:'Cremosidad y acidez para la coliflor caramelizada.',glup:'Tinto suave si el comensal prefiere rojo con vegetales.'}},

d1:{name:'Truta estilo salmão',desc:'Cozida em um molho de ají amarelo, ají panca, cebola, tomates, alho, vinho branco e fumet de peixe (tudo triturado). Acompanhada de legumes salteados (cebola e tomate em gomos) e yuca frita cortada em cubos.',why:{azur:'A borbulha limpa o molho e realça a truta.',talinay:'Tensão cítrica e salinidade em linha com o ají amarelo.'}},
d2:{name:'Pastel de milho',desc:'Massa de milho com frango em cubos, azeitona e ovo.',why:{'garage-rose':'Acidez e leve tânico equilibram o dulçor do milho.',glup:'Tinto leve que não pesa sobre o pastel.'}},
d3:{name:'Abobrinha recheada',desc:'Colocada sobre mix de folhas verdes da hidroponia Larache. Contém béchamel com beterraba e está recheada com um refogado de cebola, cogumelos, quinoa e purê de cogumelos. Finalizada com béchamel e queijo Grana Padano para gratinar. Alergênicos: Laticínios (béchamel, queijo), Glúten (béchamel).',why:{aquitania:'Cremosidade e acidez integram o béchamel e o queijo.',semillon:'Volume e textura para o umami dos cogumelos.'}},
d4:{name:'Ceviche do dia',desc:'Mix de polvo, truta, camarão e vieira. Leite de tigre elaborado com talo de aipo, coentro, suco de limão, gengibre, ají amarelo, cebola e alho. Acompanhado de cebola, milho peruano, batata-doce e canchita.',why:{azur:'Espumante gastronômico: borbulha e acidez vão com o limão.',talinay:'Sauvignon salino e cítrico: segue a linha do ceviche.'}},
d5:{name:'Salada verde (Larache/Sequitor)',desc:'Mix de Larache e Sequitor, mini folhas de espinafre, mizuna e rumex. Inclui quinoa tingida com beterraba e ají amarelo, com milho peruano queimado. Molho ácido de amora ou framboesa (conforme disponibilidade). Sugestão: Verter o molho sobre a salada.',why:{talinay:'Acidez que se alinha ao molho e às folhas amargas.','garage-rose':'Fruta vermelha fresca em linha com a amora do molho.'}},
d6:{name:'Chupe de centola',desc:'Torta assada cremosa. Refogado de cebola branca, pimentão vermelho, páprica e vinho branco. Misturado com carne de centola e pão embebido em leite. Finalizado com queijo Grana Padano gratinado. Alergênicos: Laticínios/Lactose (leite, queijo), Glúten (pão).',why:{semillon:'Textura e acidez para sustentar o molho cremoso de mar.',aquitania:'Volume do Chardonnay integra o creme do chupe.'}},
d7:{name:'Massa artesanal com ragù de pato',desc:'Massa preparada no dia. Ragù de coxa de pato cozido em baixa temperatura (confit) com cebola, tomate, cenoura, aipo e vinho tinto. Servido desfiado com a redução do molho e chimichurri. Alergênicos: Glúten (massa).',why:{montsecano:'Tânico suave e acidez acompanham a gordura do pato.','perez-cruz':'Carmenere para quem quer estrutura com o ragù.'}},
d8:{name:'Torresmo de porco',desc:'Barriga de porco cozida em baixa temperatura, cortada em cubos e frita com maisena. Molho demi-glace com alfarrobeira. Acompanhado de batatas nativas e de semente (cozidas e fritas). Inclui molho uchucuta (cebola, ají amarelo, alho, coentro, salsa, cancha, queijo fresco, azeite e sal) e suflês de Airampo (tapioca frita tingida).',why:{'garage-rose':'Acidez e leve tânico limpam a fritura e a uchucuta.',glup:'Tinto leve para não tapar o sabor do torresmo.'}},
d9:{name:'Polvo',desc:'Cozimento sous-vide em baixa temperatura (90°C por 2 horas). Acompanhado de molho anticuchera peruano (cebola, ají amarelo, cominho, ají panca, orégano, vinagre e shoyu). Alergênicos: traços de Glúten (shoyu).',why:{semillon:'Textura média sustenta o molho anticuchera.',talinay:'Salinidade e tensão cítrica com o ají e o limão.'}},
d10:{name:'Risoto de boi',desc:'Arroz arbóreo com caldo de rabo bovino (mirepoix, vinho tinto, água; cozimento 5 horas). O caldo é reduzido e incorporado ao arroz com vinho branco, manteiga fria e queijo Grana Padano. Finalizado com chimichurri tradicional (alho, azeite, coentro, salsa, páprica, orégano e vinagre). Alergênicos: Laticínios (manteiga, queijo).',why:{montsecano:'Tânico sedoso respeita a textura cremosa do risoto.','perez-cruz':'Carmenere para quem quer tinto com mais estrutura.'}},
d11:{name:'Charquicán vegetariano',desc:'Cebola, pimentão vermelho, cominho, páprica, orégano, batata e abóbora. Ao final são incorporadas ervilhas, milho e cenoura. Servido com gema de ovo confitada em azeite de oliva a 63°C.',why:{glup:'Fruta fresca e acidez realçam a abóbora sem pesar.',montsecano:'Pinot elegante para uma preparação de verduras.'}},
d12:{name:'Texturas de chañar',desc:'Crème brûlée aromatizado com arrope de chañar e açúcar caramelizado; biscoito de cacau chañar coberto com chocolate branco; terra e sorvete de chañar. Opção para celíacos: O cremoso de chañar pode ser pedido sem glúten. Alergênicos: Laticínios (creme, chocolate), Glúten (biscoito).',why:{erasmo:'Late Harvest com mel e frutas confitadas: harmonização doce clássica.'}},
d13:{name:'Bolo de cenoura',desc:'Pão-de-ló de cenoura e cacau (contém ovo). Recheado com frosting de cream cheese, creme, raspas de laranja e açúcar. Acompanhado de amêndoas caramelizadas. Alergênicos: Glúten (pão-de-ló), Laticínios (frosting), Castanhas (amêndoas).',why:{erasmo:'O dulçor e as notas de laranja vão com o bolo de cenoura.'}},
d14:{name:'Pudim de baunilha',desc:'Tradicional com caramelo (ovo, leite e açúcar). Alergênicos: Laticínios (leite).',why:{erasmo:'Dulçor floral complementa a baunilha.',azur:'Espumante seco como opção de encerramento fresco.'}},
d15:{name:'Vieiras gratinadas',desc:'100g de vieiras com béchamel, vinho branco e queijo Grana Padano ao forno. Alergênicos: Laticínios (béchamel, queijo), Glúten (béchamel).',why:{azur:'Borbulha e acidez cortam a gordura do gratinado.',semillon:'Textura média para o béchamel e o dulçor da vieira.'}},
d16:{name:'Brócolis assado',desc:'Salteado em manteiga. Base de purê de legumes (tomate, abóbora, abobrinha, batatas) e chutney de tomates (geleia com açúcar e vinagre). Alergênicos: Laticínios (manteiga).',why:{aquitania:'Chardonnay cremoso integra o purê de legumes.',glup:'Tinto leve para quem prefere tinto com verduras assadas.'}},
d17:{name:'Lomo saltado',desc:'Refogado de carne temperado com shoyu e cerveja. Legumes: cebola, tomate e coentro. Acompanhado de arroz e batatas. Alergênicos: Glúten (shoyu, cerveja).',why:{'garage-rose':'Acidez e leve tânico com o shoyu e a fritura.',syrah:'Syrah especiado para as notas do molho.'}},
d18:{name:'Tiradito de locos',desc:'Locos laminados cozidos. Servido com molho verde (cebola, coentro, ají verde, limão, sal e azeite) e maionese de limão.',why:{talinay:'Salinidade e tensão cítrica com o molho verde.',azur:'Borbulha para uma harmonização espumante do tiradito.'}},
d19:{name:'Salada de folhas com figos',desc:'Molho de figos (contém calda, limão ou vinagre). Finalizado com queijo gorgonzola, amêndoas caramelizadas e figos infusionados. Alergênicos: Laticínios (queijo azul - contém penicilina), Castanhas (amêndoas).',why:{erasmo:'Dulçor floral combina com os figos e o queijo gorgonzola.','garage-rose':'Acidez e fruta vermelha equilibram o queijo gorgonzola.'}},
d20:{name:'Sopa de abóbora',desc:'Abóbora e arrope de chañar, cozida e aligerada.',why:{aquitania:'Cremosidade e acidez integram o dulçor da abóbora.',semillon:'Textura média para sopa com notas doces.'}},
d21:{name:'Camarões ao alho',desc:'Calibre 16-20, temperados com sementes de coentro, pimenta e merkén. Azeite de oliva e girassol. Finalizado com lâminas de alho fritas e torrada de pão integral multigrãos. Alergênicos: Glúten (pão).',why:{azur:'Borbulha e acidez refrescam entre cada garfada.',talinay:'Salinidade e acidez limpam o azeite do alho.'}},
d22:{name:'Espirais de massa com beterraba',desc:'Com molho de beterraba (beterraba cozida emulsionada com azeite). Finalizado com chimichurri e mousse de queijo de cabra (cream cheese e queijo de cabra). Alergênicos: Glúten (massa), Laticínios (queijos).',why:{glup:'Acidez e fruta vermelha acompanham a beterraba e o queijo.',montsecano:'Pinot para quem quer tinto com massa.'}},
d23:{name:'Costela bovina',desc:'Selada a vácuo com vinho tinto e mirepoix (cozimento prolongado). Finalizado com demi-glace e purê de abóbora assada.',why:{'perez-cruz':'Carmenere: tânico redondo agarra o colágeno do corte.',cabernet:'Cabernet para harmonização clássica com carne de cozimento longo.'}},
d24:{name:'Peixe do dia',desc:'Corvina, pejeperro, mulata ou linguado. Cozido suavemente com manteiga e limão. Acompanhado de purê de ervilhas (favas, ervilhas, espinafre) e ervilhas/favas inteiras. Alergênicos: Laticínios (manteiga).',why:{talinay:'Salinidade e acidez em linha com o limão e o peixe.',aquitania:'Chardonnay cremoso para o purê de ervilhas.'}},
d25:{name:'Musaka de legumes',desc:'Camadas de berinjela e molho pomodoro (tomate, sal, manjericão). Recheada com mistura de ricota, gema, Grana Padano e sal. Alergênicos: Laticínios (queijos).',why:{montsecano:'Pinot delicado para a berinjela e o queijo.',glup:'Tinto suave e fresco que não tapa os legumes.'}},
d26:{name:'Ají de gallina',desc:'Molho base cremoso (cebola, ají amarelo refogado, leite, manteiga, pão triturado e queijo Grana Padano). Misturado com peito de frango desfiado. Acompanhado com arroz simples, ovo e azeitonas. Alergênicos: Laticínios (leite, manteiga, queijo), Glúten (pão).',why:{'garage-rose':'Acidez e leve tânico com o picante cremoso do ají.',glup:'Tinto leve que não compete com o molho amarelo.'}},
d27:{name:'Texturas de chocolate',desc:'Pão-de-ló de chocolate (com manteiga), mousse, papel de chocolate, sorvete de chocolate (variedades 38%, 56%, 70% e puro/nibs) e chocolate branco. Inclui Namelaka (creme de chocolate com gelatina). Alergênicos: Laticínios (manteiga, creme, chocolate).',why:{erasmo:'Late Harvest com frutas confitadas para cacau suave.','perez-cruz':'Carmenere com notas de cacau que acompanham o chocolate.'}},
d28:{name:'Tres leches',desc:'Pão-de-ló úmido embebido em três leites, recheado com framboesas. Finalizado com merengue caramelizado, gel de framboesas, framboesas inteiras e terra de doce de leite. Alergênicos: Glúten (pão-de-ló), Laticínios (leites, doce de leite).',why:{erasmo:'Harmonização clássica de vinho doce com sobremesa cremosa.'}},
d29:{name:'Cheesecake com maracujá',desc:'Cream cheese, ovo e gel de maracujá (usando agar-agar como gelificante). Base de terra de pistache. Alergênicos: Laticínios (cream cheese), Castanhas (pistache).',why:{erasmo:'Dulçor floral complementa a acidez do maracujá.'}},
d30:{name:'Pastel de batata',desc:'Base de recheio chileno (pino) com frango, ovo e azeitona. Coberto com purê de batatas temperado (manteiga, leite, sal) e dourado com ovo. Condimento: cominho, páprica e orégano. Observação: Pode sair sem manteiga a pedido. Alergênicos: Laticínios (manteiga, leite).',why:{'garage-rose':'Equilibra o dulçor do recheio e a cremosidade do purê.',glup:'Tinto muito leve para não pesar sobre o pastel.'}},
d31:{name:'Lasanha de legumes',desc:'Tomate, abobrinha, berinjela (opcionalmente abóbora ou cogumelos conforme disponibilidade). Molho pomodoro, molho béchamel e queijo Grana Padano. Alergênicos: Glúten e Laticínios (béchamel, queijo).',why:{aquitania:'Chardonnay cremoso integra o béchamel e os legumes.',montsecano:'Pinot elegante para a lasanha de legumes.'}},
d32:{name:'Filé bovino',desc:'180g finalizado com demi-glace. Acompanhado de purê de cenoura (cenoura emulsionada com azeite) e cenouras torneadas glaceadas com mel e manteiga. Disponibilidade: Mal passado, ao ponto ou bem passado (a carne é "roteada" primeiro). Alergênicos: Laticínios (manteiga).',why:{cabernet:'Cabernet orgânico: harmonização clássica com proteína bovina.',montsecano:'Pinot para quem quer tinto elegante mais do que potente.'}},
d33:{name:'Ceviche de peixe branco',desc:'Leite de tigre (fumet, limão, aipo, gengibre, coentro, cebola roxa, sal e ají amarelo). Acompanhado de cebola, cancha e batata-doce.',why:{talinay:'Tensão calcária e salinidade com o limão do ceviche.',azur:'Versão espumante da harmonização clássica com ceviches.'}},
d34:{name:'Mix de folhas (maçã assada)',desc:'Maçã assada, cevada com molho de framboesa, mote com molho de maçã e emulsão de beterraba. Proveniência: Sequitor, Larache e Socaire. Observação: Não é sem glúten (contém cevada e mote).',why:{talinay:'Acidez que equilibra o dulçor da maçã assada.','garage-rose':'Fruta vermelha com a framboesa e beterraba do molho.'}},
d35:{name:'Sopa de espinafre',desc:'Base de cebola, batata e caldo de legumes (cenoura, aipo, cebola). É incorporada clorofila de espinafre (branqueado e triturado).',why:{aquitania:'Volume e acidez do Chardonnay para a sopa verde.',talinay:'Sauvignon fresco para uma sopa leve de verduras.'}},
d36:{name:'Chupe de frutos do mar',desc:'Centola, polvo, camarão e vieiras. Refogado de cebola, pimentão, páprica, vinho branco e mistura de leite com pão. Finalizado com Grana Padano gratinado. Alergênicos: Laticínios (leite, queijo), Glúten (pão).',why:{semillon:'Textura e acidez para o creme de frutos do mar.',aquitania:'Chardonnay cremoso para o gratinado.'}},
d37:{name:'Massa curta com abóbora-doce',desc:'Molho de abóbora-doce (emulsionado com azeite). Finalizado com chimichurri (alho, salsa, azeite) e queijo Grana Padano. Alergênicos: Glúten (massa), Laticínios (queijo).',why:{glup:'Fruta fresca e acidez para o dulçor da abóbora.',aquitania:'Cremosidade do Chardonnay com o molho de abóbora-doce.'}},
d38:{name:'Costelinha de porco',desc:'Braseada a vácuo em baixa temperatura com cerveja. Finalizada com demi-glace com alfarrobeira. Acompanhada de purê de batata-doce e cebolas em conserva no vinagre com beterraba. Alergênicos: Glúten (traços de cerveja).',why:{syrah:'Syrah especiado para o porco e o dulçor da batata-doce.','perez-cruz':'Carmenere com taninos redondos para a costelinha.'}},
d39:{name:'Pernil de cordeiro',desc:'Pernil dianteiro a vácuo (85°C) com mirepoix e vinho tinto reduzido. Purê de batata com manteiga sem lactose e leite. Observação: Usa manteiga sem lactose.',why:{cabernet:'Cabernet orgânico para o cordeiro de cozimento longo.',syrah:'Syrah com especiarias que complementam o guisado.'}},
d40:{name:'Texturas de couve-flor',desc:'Purê de couve-flor caramelizada com abundante manteiga. Por cima, couve-flor sous-vide aromatizada com ají panca, gengibre, sal e mostarda, depois assada. Finalizado com pebre. Alergênicos: Laticínios (manteiga).',why:{aquitania:'Cremosidade e acidez para a couve-flor caramelizada.',glup:'Tinto suave se o cliente preferir tinto com legumes.'}},
d41:{name:'Arroz cremoso com frutos do mar',desc:'Base tipo risoto (arroz refogado, vinho branco, caldo de camarão/lagostim com mirepoix). Incorpora tomate e mix de frutos do mar salteados (camarão, lulas, vieiras, polvo) com vinho branco e manteiga. Guarnição de chalaca (cebola, tomate, coentro, limão). Alergênicos: Laticínios (manteiga).',why:{semillon:'Textura e acidez para o molho cremoso de frutos do mar.',aquitania:'Chardonnay com volume para o arroz cremoso.'}},
d42:{name:'Éclair de alfarroba',desc:'Massa choux crocante recheada de mousse de alfarroba, ganache de café descafeinado e telha de alfarroba. Sabor achocolatado e terroso. Alergênicos: Glúten (massa), Laticínios (mousse, ganache).',why:{erasmo:'Dulçor floral com as notas terrosas da alfarroba.'}},
d43:{name:'Torta floresta negra',desc:'Torta de panquecas (não pão-de-ló) embebida em pisco. Recheada de gel de framboesa com creme de chocolate. Finalizada com ganache de baunilha e gel de framboesa. Alergênicos: Glúten (panquecas), Laticínios (creme, ganache).',why:{erasmo:'Frutas confitadas e acidez equilibram o chocolate e o pisco.'}},
d44:{name:'Mil-folhas de maçã',desc:'Lâminas de maçã caramelizadas com açúcar, canela e manteiga sobre terra de canela. Acompanhada de sorvete de rica-rica e papel de airampo. Sem glúten. Alergênicos: Laticínios (manteiga, sorvete).',why:{erasmo:'Mel e frutas confitadas com a canela e a maçã.',azur:'Opção fresca para quem não quer vinho doce.'}},
d45:{name:'Pulmay',desc:'Caldo quente com sobrecoxa de frango, porco, linguiça/chorizo, camarão, choro, mexilhões com concha e batatas nativas. Legumes: pimentão, aipo, cebola, cenoura e vinho branco. Observação: Apto para sem glúten e sem lactose.',why:{azur:'Borbulha refrescante para o mix intenso de frutos do mar e carnes.',talinay:'Branco salino e cítrico para o caldo de frutos do mar.'}},
d46:{name:'Arroz chaufa',desc:'Arroz do dia anterior salteado com carne, ovo e "pachicay" (bulbo de cebolinha, pimentão, azeite de girassol e de gergelim). Temperado com shoyu, gengibre e azeite de gergelim. Finalizado com folhas de cebolinha. Alergênicos: Glúten (shoyu).',why:{'garage-rose':'Acidez e leve tânico com o shoyu e a fritura.',glup:'Tinto leve para não pesar sobre o chaufa.'}},
d47:{name:'Alface de Sequitor ao fogo',desc:'A alface é a protagonista. Acompanhada de purê de peras (ao vinho branco), peras brunoise assadas e demi-glace de legumes (aipo, cenoura, tomate, cogumelo, batata, gengibre cozido por horas).',why:{talinay:'Acidez equilibra o dulçor da pera e as notas defumadas.','garage-rose':'Fruta vermelha fresca com a alface e a pera.'}},
d48:{name:'Tiradito de vieiras',desc:'Servido sobre emulsão de abacate e leite de tigre. Finalizado com bacon crocante e pó de coral desidratado.',why:{talinay:'Salinidade e tensão cítrica em linha com o leite de tigre.',azur:'Borbulha gastronômica para o tiradito.'}},
d49:{name:'Salada de folhas com tomate',desc:'Tomates mondados, papel de tomate crocante, mousse de queijo de cabra e molho de tomate. Alergênicos: Laticínios (queijo de cabra).',why:{talinay:'Acidez e salinidade com a frescura do tomate.','garage-rose':'Fruta vermelha e acidez com o queijo de cabra.'}},
d50:{name:'Sopa de legumes',desc:'Base de batata, cebola e alho-poró.',why:{aquitania:'Volume suave do Chardonnay para a sopa de raízes.',talinay:'Sauvignon fresco para sopa leve de legumes.'}},
d51:{name:'Massa artesanal com mexilhões',desc:'Feita em casa. Molho cremoso de mexilhões com gengibre, limão e vinho branco. Finalizada com coentro e raspas de limão. Alergênicos: Glúten (massa), Laticínios (molho cremoso).',why:{semillon:'Textura e acidez para os mexilhões e o gengibre.',aquitania:'Cremosidade do Chardonnay com o molho de mexilhões.'}},
d52:{name:'Causa de frango',desc:'Desconstruída. Purê de batata com ají amarelo, limão e sal. Frango desfiado com molho golf, ovo, mousse de abacate (com leite de tigre) e chalaca (ají amarelo, tomate, cebola, coentro).',why:{talinay:'Acidez e frescura com o ají amarelo e o limão.','garage-rose':'Rosé versátil para o mix de sabores peruanos.'}},
d53:{name:'Brisket',desc:'16 horas de cozimento a 85°C com legumes e vinho tinto. Acompanhado de legumes da estação salteados (batatas, ollucos, cogumelos, tomate-cereja; pode incluir topinambur ou alcachofra).',why:{cabernet:'Cabernet orgânico para o cozimento longo e os sucos.','perez-cruz':'Carmenere com taninos redondos para o brisket.'}},
d54:{name:'Corvina e texturas de Beterraba',desc:'Acompanhada de texturas de beterraba (purê de beterraba e cubinhos de beterraba) e finalizada com um creme cítrico (fumet e vinho branco), com as beterrabas e grãos de ervilha. Alergênicos: Glúten (gnocchi), Laticínios (creme contém lactose).',why:{aquitania:'Cremosidade para o gnocchi e o molho de beterraba.',semillon:'Textura e acidez para o fumet cítrico.'}},
d55:{name:'Berinjela assada',desc:'Assada e confitada a vácuo em azeite. Purê de homus de feijão pallar misturado com purê de berinjela. Finalizado com chimichurri e crocante de cogumelos (fritos e desidratados).',why:{glup:'Tinto suave para a berinjela e o homus.',montsecano:'Pinot elegante para os cogumelos e a berinjela.'}},
d56:{name:'Pato com mil-folhas de batata',desc:'Pato na chapa/forno (recomendado ao ponto ou bem passado) com azeite de oliva, sal e alecrim. Demi-glace de pato. Mil-folhas temperada com manteiga, sal e tomilho. Alergênicos: Laticínios (manteiga na mil-folhas).',why:{montsecano:'Pinot clássico com pato: tânico suave e acidez viva.',cabernet:'Cabernet para quem quer tinto intenso com o pato.'}},
d57:{name:'Parfait de batata-doce',desc:'Sobremesa fria tipo sanduíche de sorvete. Contém creme, gema, calda e rica-rica. Crocantes de batata-doce, gel de laranja e toffee. Usa gelatina para a textura. Alergênicos: Laticínios (creme, toffee).',why:{erasmo:'Dulçor floral com laranja e batata-doce.',azur:'Espumante seco se preferir um encerramento fresco.'}},
d58:{name:'Tiramisù',desc:'Biscoito champanhe embebido em café descafeinado e licor de amêndoas. Creme de queijo mascarpone decorado com cacau em pó. Alergênicos: Glúten (biscoitos), Laticínios (mascarpone), Castanhas (licor de amêndoas).',why:{erasmo:'Late Harvest com o café e o mascarpone.','perez-cruz':'Carmenere com notas de cacau para o tiramisù.'}},
d59:{name:'Panna cotta de baunilha',desc:'Sobremesa cremosa de laticínio aromatizada com baunilha de Madagascar, gelificada com gelatina. Servida com frutos vermelhos. Alergênicos: Laticínios.',why:{erasmo:'Dulçor floral com a baunilha e os frutos vermelhos.',azur:'Borbulha seca para um encerramento leve.'}},
d60:{name:'Sopa de couve-flor',desc:'Couve-flor picada fina, dourada em manteiga sem lactose até obter sabor avelã, vinho branco e caldo de legumes. Textura cremosa. Sem lactose.',why:{aquitania:'Cremosidade e acidez do Chardonnay integram o sabor avelã da couve-flor.',semillon:'Textura e acidez para o creme de legumes sem lactose.'}}
}};

function getDishTr(d){ const tr=DISH_TRANS[currentLang]?.[d.id]; return tr?{...d,...tr,why:{...d.why,...tr.why}}:d; }
function getWineTr(w){ const tr=WINE_TRANS[currentLang]?.[w.id]; return tr?{...w,...tr}:w; }
function getGuionesTr(){ return GUION_TRANS[currentLang]||GUIONES; }
function serviceLabel(s){ return s==='Almuerzo'?t('lunch'):s==='Cena'?t('dinner'):t('lunchDinner'); }
function courseLabel(c){ return c==='Entrada'?t('starter'):c==='Plato principal'?t('main'):t('dessert'); }

function setLang(lang, el) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  // update static UI
  document.getElementById('app-title').textContent = t('appTitle');
  document.getElementById('app-subtitle').textContent = t('appSubtitle');
  const mainTabs = document.querySelectorAll('.main-tabs .tab');
  if (mainTabs[0]) mainTabs[0].textContent = t('tabMenus');
  if (mainTabs[1]) mainTabs[1].textContent = t('tabWines');
  if (mainTabs[2]) mainTabs[2].textContent = t('tabGuiones');
  if (mainTabs[3]) mainTabs[3].textContent = t('tabCocktails');
  if (mainTabs[4]) mainTabs[4].textContent = t('tabMocktails');
  const csearch = document.getElementById('cocktail-search');
  if (csearch) csearch.placeholder = t('ctSearch');

  const dishSearch = document.getElementById('dish-search');
  if (dishSearch) dishSearch.placeholder = t('searchDish');
  const wineSearch = document.getElementById('wine-search');
  if (wineSearch) wineSearch.placeholder = t('searchWine');
  const dayBtns = document.querySelectorAll('.day-btn');
  if (dayBtns[0]) dayBtns[0].textContent = t('allDays');
  for (let i=1;i<dayBtns.length;i++) dayBtns[i].textContent = t('day')+' '+i;
  const wfTabs = document.querySelectorAll('.wine-filter-tabs .tab');
  const wfKeys = ['all','sparkling','whites','rose','reds','sweet'];
  wfTabs.forEach((b,i) => { if(wfKeys[i]) b.textContent = t(wfKeys[i]); });
  // re-render content — preserve open panels across language switches
  const prevDish = selectedDish;
  const prevWine = selectedWine;
  const prevSubWine = document.getElementById('dish-wine-sub-panel')?.dataset?.wid || null;
  selectedDish = null; selectedWine = null;
  renderDishes(); renderWines();

  if (prevDish && currentTab === 'menus') {

function typeChipClass(w) {
  if (!w) return '';

function renderDishes() {
  const q = (document.getElementById('dish-search').value||'').toLowerCase();
  const dishes = DISHES.filter(d => {
    const tr = getDishTr(d);
    const dayOk = currentDay === 'all' || d.day === currentDay;
    const qOk = !q || tr.name.toLowerCase().includes(q) || tr.desc.toLowerCase().includes(q);
    return dayOk && qOk;
  });
  if (!dishes.length) {
    document.getElementById('dish-grid').innerHTML = `<div class="empty-state">${t('noDishes')}</div>`;
    return;
  }
  const days = currentDay === 'all' ? ['1','2','3','4'] : [currentDay];
  let html = '';
  days.forEach(day => {
    const dayDishes = dishes.filter(d => d.day === day);
    if (!dayDishes.length) return;
    if (currentDay === 'all') html += `<div class="day-heading">${t('day')} ${day}</div>`;
    SERVICE_ORDER.forEach(service => {
      const svcDishes = dayDishes.filter(d => d.service === service);
      if (!svcDishes.length) return;
      const dotClass = service === 'Cena' ? 'dot-dinner' : service === 'Almuerzo y Cena' ? 'dot-shared' : 'dot-lunch';
      html += `<div class="service-block"><div class="service-header"><div class="service-dot ${dotClass}"></div><span class="service-label">${serviceLabel(service)}</span></div>`;
      COURSE_ORDER.forEach(course => {
        const courseDishes = svcDishes.filter(d => d.course === course);
        if (!courseDishes.length) return;
        html += `<div class="course-section"><div class="course-label">${courseLabel(course)}</div><div class="dish-row">`;
        courseDishes.forEach(d => {
          const tr = getDishTr(d);
          html += `<div class="dish-card${selectedDish===d.id?' selected':''}" data-dish-id="${d.id}" onclick="selectDish('${d.id}')">
            <div class="dish-name">${tr.name}</div>
            <div class="dish-desc">${tr.desc}</div>
            ${d.allergens.length ? `<div class="allergen-row">${d.allergens.map(a=>`<span class="allergen-tag${a==='Mariscos'?' tag-mariscos':''}">${a}</span>`).join('')}</div>` : ''}
          </div>`;
        });
        html += `</div></div>`; // close dish-row and course-section
      });
      html += `</div>`;
    });
  });
  document.getElementById('dish-grid').innerHTML = html;
}

// Desktop: Tab key cycles ES → EN → PT (skipped when focus is inside an input)
const LANGS = ['es', 'en', 'pt'];
function cycleLang(dir) {
  const idx = LANGS.indexOf(currentLang);
  const next = LANGS[(idx + dir + LANGS.length) % LANGS.length];
  const btn = document.querySelectorAll('.lang-btn')[LANGS.indexOf(next)];
  setLang(next, btn);
}
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Tab') return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  e.preventDefault();
  cycleLang(e.shiftKey ? -1 : 1);
});

// Mobile: follow-finger swipe — pure translateX, no opacity
(function() {
  let sx = 0, sy = 0, isHoriz = false, busy = false;
  const appEl = document.querySelector('.app');

  document.addEventListener('touchstart', function(e) {
    if (busy) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    isHoriz = false;
    appEl.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (busy) return;
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!isHoriz) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      if (Math.abs(dy) > Math.abs(dx) * 0.8) { sx = -9999; return; } // vertical → abort
      isHoriz = true;
    }
    // follow finger with slight resistance so edges feel natural
    appEl.style.transform = 'translateX(' + Math.round(dx * 0.55) + 'px)';
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (busy) return;
    const dx = e.changedTouches[0].clientX - sx;
    if (!isHoriz || Math.abs(dx) < 45) {
      // not enough — spring back
      appEl.style.transition = 'transform 180ms cubic-bezier(0.25,0.46,0.45,0.94)';
      appEl.style.transform = 'translateX(0)';
      setTimeout(function() { appEl.style.transition = ''; }, 180);
      return;
    }
    const dir = dx < 0 ? 1 : -1; // 1 = next, -1 = prev
    const vw = window.innerWidth;
    busy = true;
    // complete fly-out fast
    appEl.style.transition = 'transform 130ms cubic-bezier(0.4,0,1,1)';
    appEl.style.transform = 'translateX(' + (dir > 0 ? -vw : vw) + 'px)';
    setTimeout(function() {
      cycleLang(dir);
      // jump to opposite off-screen edge instantly
      appEl.style.transition = 'none';
      appEl.style.transform = 'translateX(' + (dir > 0 ? vw : -vw) + 'px)';
      void appEl.offsetWidth; // force reflow
      // slide in smoothly
      appEl.style.transition = 'transform 190ms cubic-bezier(0,0,0.2,1)';
      appEl.style.transform = 'translateX(0)';
      setTimeout(function() { appEl.style.transition = ''; busy = false; }, 190);
    }, 130);
  }, { passive: true });
})();

function buildDrinkCard(c, lang, ui) {
  const tr = v => typeof v === 'object' ? v[lang] : v;
  return `
    <div class="cocktail-card">
      <div class="cocktail-name">${c.name}</div>
      <div class="cocktail-method">${c.method[lang]}</div>
      <div class="cocktail-meta-row">
        <span class="cocktail-meta-tag">${ui.ctGlass}: ${c.glass[lang]}</span>
        <span class="cocktail-meta-tag">${ui.ctIce}: ${c.ice[lang]}</span>
      </div>
      <div class="cocktail-section-label">${ui.ctIngredients}</div>
      ${c.ingredients.map(([name, amount]) => `
        <div class="cocktail-ingredient-row">
          <span class="cocktail-ingredient-name">${tr(name)}</span>
          <span class="cocktail-ingredient-amount">${tr(amount)}</span>
        </div>`).join('')}
      <div class="cocktail-garnish">
        <strong>${ui.ctGarnish}</strong>${tr(c.garnish)}
      </div>
    </div>`;
}

function renderCocktails() {
  const lang = currentLang;
  const ui = UI[lang];
  const q = (document.getElementById('cocktail-search')?.value || '').toLowerCase();
  const tr = v => typeof v === 'object' ? (v[lang] || v.es || '') : (v || '');
  const list = q ? COCKTAILS.filter(c => {
    const ingText = c.ingredients.map(([n]) => tr(n)).join(' ');
    const haystack = [c.name, tr(c.garnish), tr(c.method), tr(c.glass), ingText].join(' ').toLowerCase();
    return haystack.includes(q);
  }) : COCKTAILS;
  document.getElementById('cocktails-content').innerHTML =
    list.length ? `<div class="cocktail-grid">${list.map(c => buildDrinkCard(c, lang, ui)).join('')}</div>`
                : `<p class="empty-state">${ui.noDishes}</p>`;
}

function renderMocktails() {
  const lang = currentLang;
  const ui = UI[lang];
  document.getElementById('mocktails-content').innerHTML =
    `<div class="cocktail-grid">${MOCKTAILS.map(c => buildDrinkCard(c, lang, ui)).join('')}</div>`;
}
