           alt="Explora" style="height:32px;opacity:0.85;">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('es',this)">ES</button>
        <button class="lang-btn" onclick="setLang('en',this)">EN</button>
        <button class="lang-btn" onclick="setLang('pt',this)">PT</button>
      </div>
    </div>
  </div>

  <!-- Operational header zone: shift roster + service desserts. The wrapper
       owns the bottom divider so either child can be empty without losing
       the visual separator before the tabs. -->
  <div class="ops-strip">
    <!-- Shift roster — populated from /staffing/{YYYY-MM}/{day} on Firebase. -->
    <div class="staffing-panel" id="staffing-panel"></div>
    <!-- Service desserts — populated from /desserts/{YYYY-MM-DD}, freshness 4h. -->
    <div class="desserts-strip" id="desserts-strip"></div>
    <!-- Inline edit form for desserts; toggled by dessertsOpenForm()/CloseForm(). -->
    <div class="desserts-form" id="desserts-form" hidden>
      <div class="desserts-form-row">
        <span class="desserts-form-label" id="d-label-helado">Helado</span>
        <input class="desserts-form-input" id="d-helado" type="text" autocomplete="off">
      </div>
      <div class="desserts-form-row">
        <span class="desserts-form-label" id="d-label-sorbet">Sorbet</span>
        <input class="desserts-form-input" id="d-sorbet" type="text" autocomplete="off">
      </div>
      <div class="desserts-form-row">
        <span class="desserts-form-label" id="d-label-fruta">Frutas (coma)</span>
        <input class="desserts-form-input" id="d-fruta" type="text" autocomplete="off">
      </div>
      <div class="desserts-form-row">
        <span class="desserts-form-label" id="d-label-ninos">Niños</span>
        <input class="desserts-form-input" id="d-ninos" type="text" autocomplete="off">
      </div>
      <div class="desserts-form-actions">
        <button class="desserts-form-btn"         id="d-cancel" onclick="dessertsCloseForm()">Cancelar</button>
        <button class="desserts-form-btn primary" id="d-save"   onclick="dessertsSubmitForm()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="main-tabs">
    <button class="tab active" onclick="setTab('menus',this)">Menú</button>
    <button class="tab" onclick="setTab('vinos',this)">Vinos</button>
    <button class="tab" onclick="setTab('cocktails',this)">Cocktails</button>
    <button class="tab" onclick="setTab('cafe',this)" id="tab-btn-cafe">Café</button>
    <button class="tab" onclick="setTab('comandera',this)" id="tab-btn-comandera">E-Check</button>
  </div>

  <!-- MENÚS TAB -->
  <div id="tab-menus">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar plato o ingrediente..." id="dish-search" oninput="renderDishes()">
    </div>
    <div class="day-selector">
      <button class="day-btn active" onclick="setDay('all',this)">Todos</button>
      <button class="day-btn" onclick="setDay('1',this)">D1</button>
      <button class="day-btn" onclick="setDay('2',this)">D2</button>
      <button class="day-btn" onclick="setDay('3',this)">D3</button>
      <button class="day-btn" onclick="setDay('4',this)">D4</button>
    </div>
    <div id="dish-grid"></div>
  </div>

  <!-- VINOS TAB -->
  <div id="tab-vinos" class="hidden">
    <div class="search-bar" id="wine-search-bar">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" placeholder="Buscar vino o cepa..." id="wine-search" oninput="renderWines()">
    </div>
    <div class="wine-filter-tabs">
      <button class="tab active" onclick="setWineFilter('todos',this)">Todos</button>
      <button class="tab" onclick="setWineFilter('espumante',this)">Espumante</button>
      <button class="tab" onclick="setWineFilter('blanco',this)">Blancos</button>
      <button class="tab" onclick="setWineFilter('rosado',this)">Rosado</button>
      <button class="tab" onclick="setWineFilter('tinto',this)">Tintos</button>
      <button class="tab" onclick="setWineFilter('dulce',this)">Dulce</button>
      <button class="tab tab-pairings" onclick="setWineFilter('maridajes',this)">Maridajes generales</button>
    </div>
    <div class="wine-grid" id="wine-grid"></div>
    <div id="guiones-content" style="display:none"></div>
  </div>

  <!-- COCKTAILS TAB — now also hosts Mocktails (with green halo) and Momentos (toggleable section above the search) -->
  <div id="tab-cocktails" class="hidden">
    <!-- Momentos sub-tab: full-width, cobweb animated, light-red halo. Sits ABOVE
         the search bar so it isn't mistaken for a header of the cocktails listing. -->
    <button class="momentos-banner" id="momentos-banner" onclick="toggleMomentosSection()">
      <span class="momentos-banner-cobweb cobweb-left" aria-hidden="true"></span>
      <span class="momentos-banner-cobweb cobweb-right" aria-hidden="true"></span>
      <span class="momentos-banner-text">
        <span class="momentos-banner-label" id="momentos-banner-label">Momentos</span>
        <span class="momentos-banner-sub" id="momentos-banner-sub">Nueva carta por implementar</span>
      </span>
    </button>

    <div class="search-bar" id="cocktail-search-bar" style="margin-bottom:1rem;">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" id="cocktail-search" placeholder="Buscar cocktail..." oninput="renderCocktails()">
    </div>

    <!-- Default view: mocktails (green halo) + cocktails, each with its own labelled divider -->
    <div id="cocktails-content"></div>

    <!-- Toggled view: Momentos (hidden until banner is tapped) -->
    <div id="momentos-section" style="display:none">
      <div class="momentos-notice">
        <span>⚠</span>
        <span id="momentos-notice-text">Próximamente · Esta carta aún no está disponible en el bar</span>
      </div>
      <div id="momentos-content"></div>
    </div>
  </div>

  <!-- CAFÉ TAB -->
  <div id="tab-cafe" class="hidden">
    <div class="coffee-module" id="coffee-module-root"></div>
  </div>

  <!-- COMANDERA TAB — gated order pad. Renders entirely from JS. -->
  <div id="tab-comandera" class="hidden">
    <div class="cmd-root" id="cmd-root"></div>
  </div>

<footer style="margin-top:3rem;padding:1.25rem 0 0.5rem;border-top:0.5px solid var(--border);text-align:center;">
    <p style="font-size:11px;color:var(--text-tertiary);letter-spacing:0.04em;">&copy; Developed by Francisco Monjes</p>
    <p style="font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif;font-style:italic;font-size:15px;color:var(--text-tertiary);opacity:0.55;letter-spacing:0.08em;margin-top:4px;">Bruno</p>
    <p style="font-family:'Cormorant Garamond','Palatino Linotype',Georgia,serif;font-size:10px;color:var(--text-tertiary);opacity:0.35;letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;">Guest Experience Artisan</p>
  </footer>
</div>

<script>
const DISHES = [
  {id:'d1',day:'1',service:'Almuerzo',course:'Plato principal',name:'Trucha asalmonada',desc:'Cocinada en una salsa de ají amarillo, ají panca, cebolla, tomates, ajo, vino blanco y fumet (todo triturado). Acompañada con vegetales salteados (cebolla y tomate en gajos) y yucas fritas cortadas en dados.',allergens:[],wines:['azur','talinay'],why:{azur:'La burbuja limpia la salsa y realza la trucha.',talinay:'Tensión cítrica y salinidad en línea con el ají amarillo.'}},
  {id:'d2',day:'1',service:'Almuerzo',course:'Plato principal',name:'Pastel de choclo',desc:'Pastelera de choclo, pollo cortado en cubos, aceituna y huevo.',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico equilibran el dulzor del choclo.',glup:'Tinto ligero que no pesa sobre la pastelera.'}},
  {id:'d3',day:'1',service:'Almuerzo',course:'Plato principal',name:'Zucchini relleno',desc:'Posado sobre mix de hojas verdes de hidroponía Larache. Contiene una bechamel con betarragas y está relleno con un sofrito a base de cebolla, setas, quinoa y puré de setas. Terminado con bechamel y queso Grana Padano para gratinar. Alérgenos: Lácteos (bechamel, queso), Gluten (bechamel).',allergens:['Lácteos','Gluten'],wines:['aquitania'],why:{aquitania:'Cremosidad y acidez integran la bechamel y el queso.'}},
  {id:'d4',day:'1',service:'Almuerzo',course:'Plato principal',name:'Ceviche del día',desc:'Mezcla de pulpo, trucha, camarón y ostión. Leche de tigre elaborada con tallo de apio, cilantro, jugo de limón, jengibre, ají amarillo, cebolla y ajo. Acompañado de cebolla, choclo peruano, camote y canchita.',allergens:['Mariscos'],wines:['azur','talinay'],why:{azur:'Espumante gastronómico: burbuja y acidez van con el limón.',talinay:'Sauvignon salino y cítrico: sigue la línea del ceviche.'}},
  {id:'d5',day:'1',service:'Cena',course:'Entrada',name:'Hojas verdes (Larache/Sequitor)',desc:'Mix de Larache y Sequitor, mini hojas de espinaca, mizuna y rumex. Incluye quinoas teñidas en betarraga y ají amarillo, con choclo peruano quemado. Dressing ácido de mora o frambuesa (según disponibilidad). Sugerencia: Verter el dressing sobre la ensalada.',allergens:[],wines:['talinay','garage-rose'],why:{talinay:'Acidez que se alinea con el dressing y las hojas amargas.','garage-rose':'Fruta roja fresca en línea con la mora del dressing.'}},
  {id:'d6',day:'1',service:'Cena',course:'Entrada',name:'Chupe de centolla',desc:'Pastel horneado cremoso. Sofrito de cebolla blanca, pimentón rojo, paprika y vino blanco. Mezclado con carne de centolla y pan remojado con leche. Terminado con queso Grana Padano gratinado. Alérgenos: Lácteos/Lactosa (leche, queso), Gluten (pan).',allergens:['Mariscos','Lácteos','Gluten'],wines:['aquitania'],why:{aquitania:'Volumen del Chardonnay integra la crema del chupe.'}},
  {id:'d7',day:'1',service:'Cena',course:'Entrada',name:'Pasta casera con ragú de osobuco',desc:'Pasta preparada en el día. Ragú de osobuco de vacuno cocinado a baja temperatura con cebolla, tomate, zanahoria, apio y vino tinto. Se sirve desmenuzado con la reducción de la salsa y chimichurri. Alérgenos: Gluten (pasta).',allergens:['Gluten'],wines:['perez-cruz'],why:{'perez-cruz':'Carmenere para quien quiere estructura con el ragú.'}},
  {id:'d8',day:'1',service:'Cena',course:'Plato principal',name:'Chicharrón de cerdo',desc:'Panceta cocinada a baja temperatura, cortada en cubos y frita con maicena. Salsa demi-glace con algarrobo. Acompañado de papas nativas (cocidas y fritas). Incluye salsa uchucuta (cebolla, ají amarillo, ajo, cilantro, perejil, cancha, queso fresco, aceite y sal) y suflados de Airampo (tapioca frita teñida).',allergens:[],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico limpian la fritura y la uchucuta.',glup:'Tinto ligero para no tapar el sabor del chicharrón.'}},
  {id:'d9',day:'1',service:'Cena',course:'Plato principal',name:'Pulpo',desc:'Cocción al vacío a baja temperatura (90°C por 2 horas). Acompañado de salsa anticuchera peruana (cebolla, ají amarillo, comino, ají panca, orégano, vinagre y soya) y pastelera de choclo, terminada con puntos de mermelada de rocoto. Alérgenos: trazas Gluten (soya).',side:'Pastelera de choclo',allergens:['Mariscos','trazas Gluten'],wines:['talinay'],why:{talinay:'Salinidad y tensión cítrica con el ají y el limón.'}},
  {id:'d10',day:'1',service:'Cena',course:'Plato principal',name:'Risotto de res',desc:'Arroz arbóreo con caldo de rabo de vacuno (mirr pois, vino tinto, agua; cocción 5 horas). El caldo se reduce e incorpora al arroz con vino blanco, mantequilla fría y queso Grana Padano. Terminado con chimichurri tradicional (ajo, aceite, cilantro, perejil, ají color, orégano y vinagre). Alérgenos: Lácteos (mantequilla, queso).',allergens:['Lácteos'],wines:['perez-cruz'],why:{'perez-cruz':'Carmenere para quien quiere tinto con más estructura.'}},
  {id:'d11',day:'1',service:'Cena',course:'Plato principal',name:'Charquicán vegetariano',desc:'Cebolla, pimentón rojo, comino, paprika, orégano, papa y zapallo. Al final se incorporan arvejas, choclo y zanahoria. Servido con una yema de huevo confitada en aceite de oliva a 63°C.',allergens:[],wines:['glup'],why:{glup:'Fruta fresca y acidez resaltan el zapallo sin pesar.'}},
  {id:'d12',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Texturas de chañar',desc:'Composición de cuatro elementos en torno al chañar. Crème brûlée (crema, leche, yemas, azúcar y arrope de chañar) con costra de azúcar caramelizada. Madeleine de cacao y chañar (huevo, azúcar, cacao, mantequilla, harina y polvo de hornear) cubierta con chocolate blanco. Tierra de chañar (azúcar, harina, sal, mantequilla y arrope de chañar). Helado de chañar (huevo, azúcar, leche, crema y arrope). Opción celíacos: se puede pedir sin madeleine. Alérgenos: Lácteos (crema, leche, chocolate), Gluten (madeleine, tierra).',allergens:['Lácteos','Gluten'],wines:['erasmo'],why:{erasmo:'Late Harvest con miel y frutas confitadas: maridaje dulce clásico.'}},
  {id:'d13',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Carrot cake',desc:'Bizcocho húmedo de zanahoria y cacao (huevo, aceite, azúcar, harina, bicarbonato, canela, zanahoria y cacao). Frosting de queso crema (queso crema, crema, azúcar y zeste de naranja). Almendras garrapiñadas (almíbar y sal). Gel de naranja (naranja, azúcar y agar agar). Alérgenos: Gluten (bizcocho), Lácteos (frosting), Frutos secos (almendras).',allergens:['Gluten','Lácteos','Frutos secos'],wines:['erasmo'],why:{erasmo:'El dulzor y las notas de naranja van con el carrot cake.'}},
  {id:'d14',day:'1',service:'Almuerzo y Cena',course:'Postre',name:'Flan de vainilla',desc:'Flan clásico (vaina de vainilla, leche, azúcar y huevos) desmoldado sobre caramelo de azúcar y agua. Alérgenos: Lácteos (leche).',allergens:['Lácteos'],wines:['erasmo','azur'],why:{erasmo:'Dulzor floral complementa la vainilla.',azur:'Espumante seco como opción de cierre fresco.'}},
  {id:'d15',day:'2',service:'Almuerzo',course:'Plato principal',name:'Ostiones gratinados',desc:'100g de ostiones con bechamel, vino blanco y queso Grana Padano al horno. Alérgenos: Lácteos (bechamel, queso), Gluten (bechamel).',allergens:['Mariscos','Lácteos','Gluten'],wines:['azur'],why:{azur:'Burbuja y acidez cortan la grasa del gratín.'}},
  {id:'d16',day:'2',service:'Almuerzo',course:'Plato principal',name:'Brócoli rostizado',desc:'Salteado en mantequilla. Base de puré de vegetales (tomate, zapallo, zucchini, papas) y chutney de tomates (mermelada con azúcar y vinagre). Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['aquitania','glup'],why:{aquitania:'Chardonnay cremoso que integra el puré de vegetales.',glup:'Tinto ligero para quien prefiere rojo con verduras asadas.'}},
  {id:'d17',day:'2',service:'Almuerzo',course:'Plato principal',name:'Lomo saltado',desc:'Salteado de carne aderezado con soya y cerveza. Vegetales: cebolla, tomate y cilantro. Acompañado de arroz y papas. Alérgenos: Gluten (soya, cerveza).',allergens:['Gluten'],wines:['garage-rose','syrah'],why:{'garage-rose':'Acidez y agarre tánico con la soya y la fritura.',syrah:'Syrah especiado para las notas de la salsa.'}},
  {id:'d18',day:'2',service:'Almuerzo',course:'Plato principal',name:'Tiradito de locos',desc:'Loco laminado cocido. Servido con salsa verde (cebolla, cilantro, ají verde, limón, sal y aceite) y mayonesa de limón.',allergens:['Mariscos'],wines:['talinay','azur'],why:{talinay:'Salinidad y tensión cítrica con la salsa verde.',azur:'Burbuja para un maridaje espumante del tiradito.'}},
  {id:'d19',day:'2',service:'Cena',course:'Entrada',name:'Ensalada de hojas con higos',desc:'Dressing de higos (contiene almíbar, limón o vinagre). Terminado con queso azul, almendras garrapiñadas e higos infusionados. Alérgenos: Lácteos (queso azul - contiene penicilina), Frutos secos (almendras).',allergens:['Lácteos (penicilina)','Frutos secos'],wines:['erasmo','garage-rose'],why:{erasmo:'Dulzor floral combina con los higos y el queso azul.','garage-rose':'Acidez y fruta roja equilibran el queso azul.'}},
  {id:'d20',day:'2',service:'Cena',course:'Entrada',name:'Sopa de zapallo',desc:'Zapallo y arrope de chañar, cocida y aligerada.',allergens:[],wines:['aquitania'],why:{aquitania:'Cremosidad y acidez integran el dulzor del zapallo.'}},
  {id:'d21',day:'2',service:'Cena',course:'Entrada',name:'Camarones al ajillo',desc:'Calibre 16-20, condimentados con semillas de cilantro, pimienta y merkén. Aceite de oliva y maravilla. Terminado con láminas de ajo fritas y tostada de pan integral multisemillas. Alérgenos: Gluten (pan).',allergens:['Mariscos','Gluten'],wines:['azur','talinay'],why:{azur:'Burbuja y acidez refrescan entre bocado y bocado.',talinay:'Salinidad y acidez limpian el aceite del ajillo.'}},
  {id:'d22',day:'2',service:'Cena',course:'Entrada',name:'Pasta espirales con betarraga',desc:'Con salsa de betarraga (betarraga cocida emulsionada con aceite). Terminado con chimichurri y mousse de queso de cabra (queso crema y queso de cabra). Alérgenos: Gluten (pasta), Lácteos (quesos).',allergens:['Gluten','Lácteos'],wines:['glup'],why:{glup:'Acidez y fruta roja acompañan la betarraga y el queso.'}},
  {id:'d23',day:'2',service:'Cena',course:'Plato principal',name:'Asado de tira',desc:'Sellado al vacío con vino tinto y mirr pois (cocción prolongada). Terminado con demi-glace y puré de zapallo rostizado.',allergens:[],wines:['perez-cruz','cabernet'],why:{'perez-cruz':'Carmenere: tanino redondo que agarra el colágeno del corte.',cabernet:'Cabernet para maridaje clásico con carne de cocción larga.'}},
  {id:'d24',day:'2',service:'Cena',course:'Plato principal',name:'Pesca del día',desc:'Corvina, pejeperro, mulata o lenguado. Cocinado suavemente con mantequilla y limón. Acompañado de puré de guisantes (habas, arvejas, espinaca) y guisantes/habas enteras. Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['talinay','aquitania'],why:{talinay:'Salinidad y acidez en línea con el limón y el pescado.',aquitania:'Chardonnay cremoso para el puré de guisantes.'}},
  {id:'d25',day:'2',service:'Cena',course:'Plato principal',name:'Musaka de vegetales',desc:'Capas de berenjena y salsa pomodoro (tomate, sal, albahaca). Rellena con mezcla de ricotta, yema, Grana Padano y sal. Alérgenos: Lácteos (quesos).',allergens:['Lácteos'],wines:['glup'],why:{glup:'Tinto suave y fresco que no tapa las verduras.'}},
  {id:'d26',day:'2',service:'Cena',course:'Plato principal',name:'Ají de gallina',desc:'Salsa base cremosa (cebolla, ají amarillo estofado, leche, mantequilla, pan triturado y queso Grana Padano). Mezclado con pechuga desmenuzada. Acompañado con arroz simple, huevo y aceitunas. Alérgenos: Lácteos (leche, mantequilla, queso), Gluten (pan).',allergens:['Lácteos','Gluten'],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y leve tánico con el picor cremoso del ají.',glup:'Tinto ligero que no compite con la salsa amarilla.'}},
  {id:'d27',day:'2',service:'Almuerzo y Cena',course:'Postre',name:'Texturas de chocolate',desc:'Composición de cinco elementos. Bizcocho de cacao puro (cacao, harina, huevo, azúcar y polvo de hornear). Namelaka de chocolate 56% (chocolate, glucosa, leche, crema y colapez). Tierra de chocolate blanco (chocolate blanco y azúcar). Brigadeiros (leche condensada, crema y chocolate blanco). Nibs de cacao 100%. Alérgenos: Lácteos (crema, leche condensada, chocolate).',allergens:['Lácteos'],wines:['erasmo','perez-cruz'],why:{erasmo:'Late Harvest con frutas confitadas para cacao suave.','perez-cruz':'Carmenere con notas de cacao que acompañan el chocolate.'}},
  {id:'d28',day:'2',service:'Almuerzo y Cena',course:'Postre',name:'Tres leches',desc:'Bizcocho húmedo remojado en mezcla de tres leches (leche condensada, crema y leche evaporada), relleno con frambuesas enteras. Terminado con merengue suizo (claras y azúcar cocinados a baño María hasta disolver los cristales, luego batidos) y gel de frambuesa (frambuesa, pulpa de frambuesa y agar agar). Alérgenos: Gluten (bizcocho), Lácteos (leche condensada, crema, leche evaporada).',allergens:['Gluten','Lácteos'],wines:['erasmo'],why:{erasmo:'Maridaje clásico de vino dulce con postre cremoso.'}},
  {id:'d29',day:'2',service:'Almuerzo y Cena',course:'Postre',name:'Cheesecake con maracuyá',desc:'Relleno cremoso horneado (huevo, crema, queso crema, zeste de limón, azúcar flor y maicena). Cubierto con gel de maracuyá (maracuyá y agar agar). Base de tierra de pistacho (harina de arroz, pistacho, mantequilla y azúcar). Alérgenos: Lácteos (queso crema, crema), Frutos secos (pistacho).',allergens:['Lácteos','Frutos secos'],wines:['erasmo'],why:{erasmo:'Dulzor floral complementa la acidez del maracuyá.'}},
  {id:'d30',day:'3',service:'Almuerzo',course:'Plato principal',name:'Pastel de papa',desc:'Base de pino chileno con carne de vacuno, huevo y aceituna. Cubierto con puré de papas saborizado (mantequilla, leche, sal) y dorado con huevo. Condimento: comino, ají color y orégano. Observación: Puede salir sin mantequilla a pedido. Alérgenos: Lácteos (mantequilla, leche).',allergens:['Lácteos'],wines:['garage-rose','glup'],why:{'garage-rose':'Equilibra el dulzor del pino y la cremosidad del puré.',glup:'Tinto muy ligero para no pesar sobre el pastel.'}},
  {id:'d31',day:'3',service:'Almuerzo',course:'Plato principal',name:'Lasaña de vegetales',desc:'Tomate, zucchini, berenjena (opcionalmente zapallo o champiñones según disponibilidad). Salsa pomodoro, salsa bechamel y queso Grana Padano. Alérgenos: Gluten y Lácteos (bechamel, queso).',allergens:['Gluten','Lácteos'],wines:['aquitania'],why:{aquitania:'Chardonnay cremoso integra la bechamel y los vegetales.'}},
  {id:'d32',day:'3',service:'Almuerzo',course:'Plato principal',name:'Filete de vacuno',desc:'180g terminado con demi-glace. Acompañado de puré de zanahoria (zanahoria emulsionada con aceite) y zanahorias torneadas glaseadas con miel y mantequilla. Disponibilidad: Inglesa, a punto o 3/4 (la carne se "runnea" primero). Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['cabernet'],why:{cabernet:'Cabernet orgánico: maridaje clásico con proteína de carne.'}},
  {id:'d33',day:'3',service:'Almuerzo',course:'Plato principal',name:'Ceviche de pesca blanca',desc:'Leche de tigre (fumet, limón, apio, jengibre, cilantro, cebolla morada, sal y ají amarillo). Acompañado de cebolla, cancha y camote.',allergens:[],wines:['talinay','azur'],why:{talinay:'Tensión calcárea y salinidad con el limón del ceviche.',azur:'Versión espumante del maridaje clásico con ceviches.'}},
  {id:'d34',day:'3',service:'Cena',course:'Entrada',name:'Mix de hojas (manzana rostizada)',desc:'Manzana rostizada, cebada con dressing de frambuesa, mote con dressing de manzana y emulsión de betarraga. Proveniencia: Sequitor, Larache y Socaire. Observación: No es gluten free (contiene cebada y mote).',allergens:['Gluten (cebada, mote)'],wines:['talinay','garage-rose'],why:{talinay:'Acidez que equilibra el dulzor de la manzana rostizada.','garage-rose':'Fruta roja con la frambuesa y betarraga del dressing.'}},
  {id:'d35',day:'3',service:'Cena',course:'Entrada',name:'Sopa de espinacas',desc:'Base de cebolla, papa y caldo de vegetales (zanahoria, apio, cebolla). Se incorpora clorofila de espinaca (blanqueada y triturada).',allergens:[],wines:['aquitania','talinay'],why:{aquitania:'Volumen y acidez del Chardonnay para la sopa verde.',talinay:'Sauvignon fresco para una sopa ligera de verduras.'}},
  {id:'d36',day:'3',service:'Cena',course:'Entrada',name:'Chupe de mariscos',desc:'Centolla, pulpo, camarón y ostiones. Sofrito de cebolla, pimentón, ají color, vino blanco y mezcla de leche con pan. Terminado con Grana Padano gratinado. Alérgenos: Lácteos (leche, queso), Gluten (pan).',allergens:['Mariscos','Lácteos','Gluten'],wines:['aquitania'],why:{aquitania:'Chardonnay cremoso para el gratinado.'}},
  {id:'d37',day:'3',service:'Cena',course:'Entrada',name:'Pasta corta con zapallo camote',desc:'Salsa de zapallo camote (emulsionada con aceite). Terminado con chimichurri (ajo, perejil, aceite) y queso Grana Padano. Alérgenos: Gluten (pasta), Lácteos (queso).',allergens:['Gluten','Lácteos'],wines:['glup','aquitania'],why:{glup:'Fruta fresca y acidez para el dulzor del zapallo.',aquitania:'Cremosidad del Chardonnay con la salsa de camote.'}},
  {id:'d38',day:'3',service:'Cena',course:'Plato principal',name:'Costillar de cerdo',desc:'Braseado al vacío a baja temperatura con cerveza. Terminado con demi-glace con algarrobo. Acompañado de puré de camote y cebollas encurtidas en vinagre con betarraga. Alérgenos: Gluten (trazas por la cerveza).',allergens:['Gluten (trazas cerveza)'],wines:['syrah','perez-cruz'],why:{syrah:'Syrah especiado para el cerdo y el dulzor del camote.','perez-cruz':'Carmenere con taninos redondos para el costillar.'}},
  {id:'d39',day:'3',service:'Cena',course:'Plato principal',name:'Garrón de cordero',desc:'Garrón delantero al vacío (85°C) con mirr pois y vino tinto reducido. Puré de papa con mantequilla sin lactosa y leche. Observación: Usa mantequilla sin lactosa.',allergens:[],wines:['cabernet','syrah'],why:{cabernet:'Cabernet orgánico para el cordero de cocción larga.',syrah:'Syrah con especias que complementan el guiso.'}},
  {id:'d40',day:'3',service:'Cena',course:'Plato principal',name:'Texturas de coliflor',desc:'Puré de coliflor caramelizada con abundante mantequilla. Encima, coliflor al vacío aromatizada con ají panca, jengibre, sal y mostaza, luego rostizada. Terminado con pebre. Alérgenos: Lácteos (mantequilla).',allergens:['Lácteos'],wines:['aquitania','glup'],why:{aquitania:'Cremosidad y acidez para la coliflor caramelizada.',glup:'Tinto suave si el comensal prefiere rojo con vegetales.'}},
  {id:'d41',day:'3',service:'Cena',course:'Plato principal',name:'Arroz cremoso con mariscos',desc:'Base tipo risotto (arroz sofrito, vino blanco, caldo de camarones/langostinos con mirr pois). Incorpora tomate y mix de mariscos salteados (camarón, calamares, ostiones, pulpo) con vino blanco y mantequilla. Garnitura de chalaca (cebolla, tomate, cilantro, limón). Alérgenos: Lácteos (mantequilla).',allergens:['Mariscos','Lácteos'],wines:['aquitania'],why:{aquitania:'Chardonnay con volumen para el arroz cremoso.'}},
  {id:'d42',day:'3',service:'Almuerzo y Cena',course:'Postre',name:'Eclair de algarrobo',desc:'Masa choux crocante (leche, agua, azúcar, sal, mantequilla y harina) rellena de mousse de algarrobo (leche, crema, chocolate, algarrobo, colapez y azúcar). Cubierta con ganache de café descafeinado (crema, chocolate blanco y café decaf). Acompañada de teja crujiente de algarrobo (huevo, mantequilla, azúcar, harina y algarrobo). Alérgenos: Gluten (masa, teja), Lácteos (mousse, ganache).',allergens:['Gluten','Lácteos'],wines:['erasmo'],why:{erasmo:'Dulzor floral con las notas terrosas del algarrobo.'}},
  {id:'d43',day:'3',service:'Almuerzo y Cena',course:'Postre',name:'Torta selva negra',desc:'Torta de panqueques (no bizcocho) remojada en pisco. Rellena de gel de frambuesa con crema de chocolate. Terminada con ganache de vainilla y gel de frambuesa. Alérgenos: Gluten (panqueques), Lácteos (crema, ganache).',allergens:['Gluten','Lácteos'],wines:['erasmo'],why:{erasmo:'Frutas confitadas y acidez equilibran el chocolate y el pisco.'}},
  {id:'d44',day:'3',service:'Almuerzo y Cena',course:'Postre',name:'Milhoja de manzana',desc:'Láminas de manzana caramelizadas con azúcar, canela y mantequilla sobre tierra de canela. Acompañada de helado de rica-rica y papel de airampo. Sin gluten. Alérgenos: Lácteos (mantequilla, helado).',allergens:['Lácteos'],wines:['erasmo','azur'],why:{erasmo:'Miel y frutas confitadas con la canela y la manzana.',azur:'Opción fresca para quien no quiere vino dulce.'}},
  {id:'d45',day:'4',service:'Almuerzo',course:'Plato principal',name:'Pulmay',desc:'Caldo caliente con contramuslo de pollo, cerdo, longaniza/chorizo, camarón, choro, choritos con concha y papas nativas. Vegetales: pimentón, apio, cebolla, zanahoria y vino blanco. Observación: Apto para gluten free y sin lactosa.',allergens:['Mariscos'],wines:['azur','talinay'],why:{azur:'Burbuja refrescante para la mezcla intensa de mariscos y carnes.',talinay:'Blanco salino y cítrico para el caldo de mariscos.'}},
  {id:'d46',day:'4',service:'Almuerzo',course:'Plato principal',name:'Arroz chaufa',desc:'Arroz del día anterior salteado con carne, huevo y "pachicay" (bulbo de cebollín, pimentón, aceite de maravilla y de sésamo). Saborizado con soya, jengibre y aceite de sésamo. Terminado con hojas de cebollín. Alérgenos: Gluten (soya).',allergens:['Gluten (soya)'],wines:['garage-rose','glup'],why:{'garage-rose':'Acidez y agarre tánico con la soya y la fritura.',glup:'Tinto ligero para no pesar sobre el chaufa.'}},
  {id:'d47',day:'4',service:'Almuerzo',course:'Plato principal',name:'Lechuga de Sequitor al fuego',desc:'Protagonista es la lechuga. Acompañada de puré de peras (al vino blanco), peras brunoise rostizadas y demi-glace de vegetales (apio, zanahoria, tomate, champiñón, papa, jengibre cocinado por horas).',allergens:[],wines:['talinay','garage-rose'],why:{talinay:'Acidez equilibra el dulzor de la pera y las notas ahumadas.','garage-rose':'Fruta roja fresca con la lechuga y la pera.'}},
  {id:'d48',day:'4',service:'Almuerzo',course:'Plato principal',name:'Tiradito de ostiones',desc:'Servido sobre emulsión de palta y leche de tigre. Terminado con tocinos crocantes y polvo de coral deshidratado.',allergens:['Mariscos'],wines:['talinay','azur'],why:{talinay:'Salinidad y tensión cítrica en línea con la leche de tigre.',azur:'Burbuja gastronómica para el tiradito.'}},
  {id:'d49',day:'4',service:'Cena',course:'Entrada',name:'Ensalada hojas con tomate',desc:'Tomates mondados, papel de tomate crocante, mousse de queso de cabra y dressing de tomate. Alérgenos: Lácteos (queso de cabra).',allergens:['Lácteos'],wines:['talinay','garage-rose'],why:{talinay:'Acidez y salinidad con la frescura del tomate.','garage-rose':'Fruta roja y acidez con el queso de cabra.'}},
  {id:'d50',day:'4',service:'Cena',course:'Entrada',name:'Sopa de vegetales',desc:'Base de papa, cebolla y puerros.',allergens:[],wines:['aquitania','talinay'],why:{aquitania:'Volumen suave del Chardonnay para la sopa de raíces.',talinay:'Sauvignon fresco para sopa ligera de vegetales.'}},
  {id:'d51',day:'4',service:'Cena',course:'Entrada',name:'Pasta casera con choritos',desc:'Hecha en casa. Salsa cremosa de choritos con jengibre, limón y vino blanco. Terminada con cilantro y ralladura de limón. Alérgenos: Gluten (pasta), Lácteos (salsa cremosa).',allergens:['Mariscos','Gluten','Lácteos'],wines:['aquitania'],why:{aquitania:'Cremosidad del Chardonnay con la salsa de choritos.'}},
  {id:'d52',day:'4',service:'Cena',course:'Entrada',name:'Causa de pollo',desc:'Deconstruida. Puré de papa con ají amarillo, limón y sal. Pollo desmenuzado con salsa golf, huevo, mousse de palta (con leche de tigre) y chalaca (ají amarillo, tomate, cebolla, cilantro).',allergens:[],wines:['talinay','garage-rose'],why:{talinay:'Acidez y frescura con el ají amarillo y el limón.','garage-rose':'Rosado versátil para la mezcla de sabores peruanos.'}},
  {id:'d53',day:'4',service:'Cena',course:'Plato principal',name:'Plateada (brisket)',desc:'16 horas de cocción a 85°C con vegetales y vino tinto. Acompañada de vegetales de estación salteados (papas, ollucos, champiñones, tomate cherry; puede incluir topinambur o alcachofa).',allergens:[],wines:['cabernet','perez-cruz'],why:{cabernet:'Cabernet orgánico para la cocción larga y los jugos.','perez-cruz':'Carmenere con taninos redondos para la plateada.'}},
  {id:'d54',day:'4',service:'Cena',course:'Plato principal',name:'Corvina y texturas de Betarraga',desc:'Acompañada de texturas de betarraga (puré de betarraga y cubitos de betarraga) y terminado con una crema cítrica (fumet y vino blanco), y las betarragas con granos de arveja. Alérgenos: Gluten (gnocchis), Lácteos (crema contiene lactosa).',allergens:['Gluten','Lácteos (lactosa)'],wines:['aquitania'],why:{aquitania:'Cremosidad para los gnocchis y la salsa de betarraga.'}},
