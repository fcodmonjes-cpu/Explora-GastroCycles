const DISH_TRANS = {
en:{
d1:{name:'Salmon-style trout',desc:'Cooked in a sauce of yellow ají, red ají panca, onion, tomatoes, garlic, white wine and fish fumet (all blended). Served with sautéed vegetables (onion and tomato wedges) and diced fried yuca.',why:{azur:'Bubbles clean the sauce and enhance the trout.',talinay:'Citric tension and salinity in line with the yellow ají.'}},
d2:{name:'Corn pie',desc:'Corn crust with diced chicken pieces, olive and egg.',why:{'garage-rose':'Acidity and light tannin balance the sweetness of the corn.',glup:'Light red that doesn\'t weigh down the pie.'}},
d3:{name:'Stuffed zucchini',desc:'Placed on a mixed green leaf bed from Larache hydroponics. Contains a béchamel with beetroot and is filled with a sofrito of onion, mushrooms, quinoa and mushroom purée. Finished with béchamel and Grana Padano cheese for gratinating. Allergens: Dairy (béchamel, cheese), Gluten (béchamel).',why:{aquitania:'Creaminess and acidity integrate the béchamel and cheese.'}},
d4:{name:'Ceviche of the day',desc:'Mix of octopus, trout, shrimp and scallop. Tiger\'s milk made with celery stalk, cilantro, lemon juice, ginger, yellow ají, onion and garlic. Served with onion, Peruvian corn, sweet potato and canchita.',why:{azur:'Gastronomic sparkling: bubble and acidity go with the lemon.',talinay:'Saline and citric Sauvignon: follows the ceviche line.'}},
d5:{name:'Green salad (Larache/Sequitor)',desc:'Mix from Larache and Sequitor, mini spinach leaves, mizuna and rumex. Includes quinoa dyed with beetroot and yellow ají, with charred Peruvian corn. Acidic blackberry or raspberry dressing (subject to availability). Tip: Pour dressing over the salad.',why:{talinay:'Acidity that aligns with the dressing and bitter leaves.','garage-rose':'Fresh red fruit in line with the blackberry in the dressing.'}},
d6:{name:'King crab chupe',desc:'Baked creamy tart. Sofrito of white onion, red bell pepper, paprika and white wine. Mixed with king crab meat and milk-soaked bread. Finished with gratinated Grana Padano cheese. Allergens: Dairy/Lactose (milk, cheese), Gluten (bread).',why:{aquitania:'Chardonnay volume integrates the chupe cream.'}},
d7:{name:'Homemade pasta with osobuco ragù',desc:'Pasta prepared on the day. Beef osobuco ragù slow-cooked with onion, tomato, carrot, celery and red wine. Served shredded with the sauce reduction and chimichurri. Allergens: Gluten (pasta).',why:{'perez-cruz':'Carmenere for those who want structure with the ragù.'}},
d8:{name:'Pork crackling',desc:'Pork belly slow-cooked, cut into cubes and fried with cornstarch. Demi-glace sauce with algarrobo. Served with native potatoes (cooked and fried). Includes uchucuta sauce (onion, yellow ají, garlic, cilantro, parsley, cancha, fresh cheese, oil and salt) and Airampo puffs (dyed fried tapioca).',why:{'garage-rose':'Acidity and light tannin clean the frying and uchucuta.',glup:'Light red to not overpower the flavour.'}},
d9:{name:'Octopus',desc:'Sous-vide cooked at low temperature (90°C for 2 hours). Served with Peruvian anticuchera sauce (onion, yellow ají, cumin, ají panca, oregano, vinegar and soy) and corn pie, finished with dots of rocoto pepper jam. Allergens: Gluten traces (soy).',why:{talinay:'Salinity and citric tension with the ají and lemon.'}},
d10:{name:'Beef risotto',desc:'Arborio rice with oxtail broth (mirepoix, red wine, water; 5-hour cook). The broth is reduced and incorporated into the rice with white wine, cold butter and Grana Padano cheese. Finished with traditional chimichurri (garlic, oil, cilantro, parsley, paprika, oregano and vinegar). Allergens: Dairy (butter, cheese).',why:{'perez-cruz':'Carmenere for those who want more structure.'}},
d11:{name:'Vegetarian charquicán',desc:'Onion, red bell pepper, cumin, paprika, oregano, potato and squash. Peas, corn and carrot are added at the end. Served with an egg yolk confit in olive oil at 63°C.',why:{glup:'Fresh fruit and acidity enhance the pumpkin without weighing it down.'}},
d12:{name:'Chañar textures',desc:'A composition of four chañar elements. Crème brûlée (cream, milk, egg yolks, sugar and chañar syrup) with caramelised sugar crust. Chañar cocoa madeleine (egg, sugar, cocoa, butter, flour and baking powder) covered with white chocolate. Chañar soil (sugar, flour, salt, butter and chañar syrup). Chañar ice cream (egg, sugar, milk, cream and syrup). Gluten-free option: available without madeleine. Allergens: Dairy (cream, milk, chocolate), Gluten (madeleine, soil).',why:{erasmo:'Late Harvest with honey and candied fruit: classic sweet pairing.'}},
d13:{name:'Carrot cake',desc:'Moist carrot and cocoa sponge (egg, oil, sugar, flour, bicarbonate, cinnamon, carrot and cocoa). Cream cheese frosting (cream cheese, cream, sugar and orange zest). Caramelised almonds (syrup and salt). Orange gel (orange, sugar and agar agar). Allergens: Gluten (sponge), Dairy (frosting), Tree nuts (almonds).',why:{erasmo:'The sweetness and orange notes go with carrot cake.'}},
d14:{name:'Vanilla flan',desc:'Classic flan (vanilla pod, milk, sugar and eggs) unmoulded over a caramel of sugar and water. Allergens: Dairy (milk).',why:{erasmo:'Floral sweetness complements the vanilla.',azur:'Dry sparkling as a fresh closing option.'}},
d15:{name:'Gratinated scallops',desc:'100g scallops with béchamel, white wine and Grana Padano cheese, oven-baked. Allergens: Dairy (béchamel, cheese), Gluten (béchamel).',why:{azur:'Bubble and acidity cut through the gratin fat.'}},
d16:{name:'Roasted broccoli',desc:'Sautéed in butter. Base of vegetable purée (tomato, squash, zucchini, potatoes) and tomato chutney (jam with sugar and vinegar). Allergens: Dairy (butter).',why:{aquitania:'Creamy Chardonnay integrates the vegetable purée.',glup:'Light red for those who prefer red with roasted vegetables.'}},
d17:{name:'Lomo saltado',desc:'Stir-fried beef seasoned with soy sauce and beer. Vegetables: onion, tomato and cilantro. Served with rice and potatoes. Allergens: Gluten (soy sauce, beer).',why:{'garage-rose':'Acidity and tannin grip with the soy and frying.',syrah:'Spiced Syrah for the sauce notes.'}},
d18:{name:'Tiradito of Chilean abalone',desc:'Sliced cooked locos. Served with green sauce (onion, cilantro, green ají, lemon, salt and oil) and lemon mayonnaise.',why:{talinay:'Salinity and citric tension with the green sauce.',azur:'Bubble for a sparkling pairing with tiradito.'}},
d19:{name:'Leaf salad with figs',desc:'Fig dressing (contains syrup, lemon or vinegar). Finished with blue cheese, caramelised almonds and infused figs. Allergens: Dairy (blue cheese - contains penicillin), Tree nuts (almonds).',why:{erasmo:'Floral sweetness combines with the figs and blue cheese.','garage-rose':'Acidity and red fruit balance the blue cheese.'}},
d20:{name:'Pumpkin soup',desc:'Pumpkin and chañar syrup, cooked and lightened.',why:{aquitania:'Creaminess and acidity integrate the pumpkin sweetness.'}},
d21:{name:'Garlic prawns',desc:'Size 16-20, seasoned with coriander seeds, pepper and merkén. Olive oil and sunflower oil. Finished with fried garlic slices and multigrain wholemeal toast. Allergens: Gluten (bread).',why:{azur:'Bubble and acidity refresh between bites.',talinay:'Salinity and acidity clean the garlic oil.'}},
d22:{name:'Spiral pasta with beetroot',desc:'With beetroot sauce (cooked beetroot emulsified with oil). Finished with chimichurri and goat cheese mousse (cream cheese and goat cheese). Allergens: Gluten (pasta), Dairy (cheeses).',why:{glup:'Acidity and red fruit accompany the beetroot and cheese.'}},
d23:{name:'Beef short ribs',desc:'Vacuum-sealed with red wine and mirepoix (extended cook). Finished with demi-glace and roasted butternut squash purée.',why:{'perez-cruz':'Carmenere: round tannin grips the cut\'s collagen.',cabernet:'Cabernet for classic pairing with long-cooked beef.'}},
d24:{name:'Fish of the day',desc:'Corvina, pejeperro, mulata or sole. Gently cooked with butter and lemon. Served with pea purée (broad beans, peas, spinach) and whole peas/broad beans. Allergens: Dairy (butter).',why:{talinay:'Salinity and acidity in line with lemon and fish.',aquitania:'Creamy Chardonnay for the pea purée.'}},
d25:{name:'Vegetable moussaka',desc:'Layers of eggplant and pomodoro sauce (tomato, salt, basil). Filled with a mixture of ricotta, egg yolk, Grana Padano and salt. Allergens: Dairy (cheeses).',why:{glup:'Soft fresh red that doesn\'t overpower the vegetables.'}},
d26:{name:'Ají de gallina',desc:'Creamy base sauce (onion, stewed yellow ají, milk, butter, blended bread and Grana Padano cheese). Mixed with shredded chicken breast. Served with plain rice, egg and olives. Allergens: Dairy (milk, butter, cheese), Gluten (bread).',why:{'garage-rose':'Acidity and slight tannin with the creamy spice of the ají.',glup:'Light red that doesn\'t compete with the yellow sauce.'}},
d27:{name:'Chocolate textures',desc:'A composition of five elements. Pure cocoa sponge (cocoa, flour, egg, sugar and baking powder). 56% chocolate namelaka (chocolate, glucose, milk, cream and gelatine). White chocolate soil (white chocolate and sugar). Brigadeiros (condensed milk, cream and white chocolate). 100% cocoa nibs. Allergens: Dairy (cream, condensed milk, chocolate).',why:{erasmo:'Late Harvest with candied fruit for mild cocoa.','perez-cruz':'Carmenere with cocoa notes that accompany chocolate.'}},
d28:{name:'Tres leches',desc:'Moist sponge soaked in a three-milk blend (condensed milk, cream and evaporated milk), filled with whole raspberries. Finished with Swiss meringue (egg whites and sugar, cooked in a bain-marie until crystals dissolve, then whipped) and raspberry gel (raspberry, raspberry pulp and agar agar). Allergens: Gluten (sponge), Dairy (condensed milk, cream, evaporated milk).',why:{erasmo:'Classic sweet wine pairing with creamy dessert.'}},
d29:{name:'Cheesecake with passion fruit',desc:'Baked creamy filling (egg, cream, cream cheese, lemon zest, icing sugar and cornstarch). Topped with passion fruit gel (passion fruit and agar agar). Pistachio soil base (rice flour, pistachio, butter and sugar). Allergens: Dairy (cream cheese, cream), Tree nuts (pistachio).',why:{erasmo:'Floral sweetness complements the passion fruit acidity.'}},
d30:{name:'Potato pie',desc:'Base of Chilean-style filling (pino) with chicken, egg and olive. Topped with seasoned mashed potato (butter, milk, salt) and browned with egg. Seasoning: cumin, paprika and oregano. Note: Can be served without butter on request. Allergens: Dairy (butter, milk).',why:{'garage-rose':'Balances the sweetness of the filling and the purée creaminess.',glup:'Very light red to not weigh down the pie.'}},
d31:{name:'Vegetable lasagne',desc:'Tomato, zucchini, eggplant (optionally squash or mushrooms subject to availability). Pomodoro sauce, béchamel sauce and Grana Padano cheese. Allergens: Gluten and Dairy (béchamel, cheese).',why:{aquitania:'Creamy Chardonnay integrates the béchamel and vegetables.'}},
d32:{name:'Beef fillet',desc:'180g finished with demi-glace. Served with carrot purée (carrot emulsified with oil) and turned carrots glazed with honey and butter. Available: rare, medium or medium-well (the meat is "run" first). Allergens: Dairy (butter).',why:{cabernet:'Organic Cabernet: classic pairing with beef protein.'}},
d33:{name:'White fish ceviche',desc:'Tiger\'s milk (fish fumet, lemon, celery, ginger, cilantro, red onion, salt and yellow ají). Served with onion, cancha and sweet potato.',why:{talinay:'Calcareous tension and salinity with the ceviche lemon.',azur:'Sparkling version of the classic ceviche pairing.'}},
d34:{name:'Mixed leaves (roasted apple)',desc:'Roasted apple, barley with raspberry dressing, mote with apple dressing and beetroot emulsion. Origin: Sequitor, Larache and Socaire. Note: Not gluten free (contains barley and mote).',why:{talinay:'Acidity that balances the sweetness of roasted apple.','garage-rose':'Red fruit with the raspberry and beetroot in the dressing.'}},
d35:{name:'Spinach soup',desc:'Base of onion, potato and vegetable broth (carrot, celery, onion). Spinach chlorophyll (blanched and blended) is incorporated.',why:{aquitania:'Volume and acidity of Chardonnay for the green soup.',talinay:'Fresh Sauvignon for a light vegetable soup.'}},
d36:{name:'Seafood chupe',desc:'King crab, octopus, shrimp and scallops. Sofrito of onion, bell pepper, paprika, white wine and a mixture of milk with bread. Finished with gratinated Grana Padano. Allergens: Dairy (milk, cheese), Gluten (bread).',why:{aquitania:'Creamy Chardonnay for the gratin.'}},
d37:{name:'Short pasta with sweet pumpkin',desc:'Sweet pumpkin sauce (emulsified with oil). Finished with chimichurri (garlic, parsley, oil) and Grana Padano cheese. Allergens: Gluten (pasta), Dairy (cheese).',why:{glup:'Fresh fruit and acidity for the pumpkin sweetness.',aquitania:'Chardonnay creaminess with the sweet pumpkin sauce.'}},
d38:{name:'Pork ribs',desc:'Braised sous-vide at low temperature with beer. Finished with demi-glace with algarrobo. Served with sweet potato purée and onions pickled in vinegar with beetroot. Allergens: Gluten (beer traces).',why:{syrah:'Spiced Syrah for the pork and sweet potato sweetness.','perez-cruz':'Carmenere with round tannins for the ribs.'}},
d39:{name:'Lamb shank',desc:'Front shank sous-vide (85°C) with mirepoix and reduced red wine. Mashed potato with lactose-free butter and milk. Note: Uses lactose-free butter.',why:{cabernet:'Organic Cabernet for long-cooked lamb.',syrah:'Syrah with spices that complement the stew.'}},
d40:{name:'Cauliflower textures',desc:'Caramelised cauliflower purée with abundant butter. On top, sous-vide cauliflower flavoured with ají panca, ginger, salt and mustard, then roasted. Finished with pebre. Allergens: Dairy (butter).',why:{aquitania:'Creaminess and acidity for caramelised cauliflower.',glup:'Light red if the guest prefers red with vegetables.'}},
d41:{name:'Creamy seafood rice',desc:'Risotto-style base (sautéed rice, white wine, shrimp/langoustine stock with mirepoix). Incorporates tomato and a sautéed seafood mix (shrimp, squid, scallops, octopus) with white wine and butter. Garnished with chalaca (onion, tomato, cilantro, lemon). Allergens: Dairy (butter).',why:{aquitania:'Full Chardonnay volume for the creamy rice.'}},
d42:{name:'Algarrobo éclair',desc:'Crispy choux pastry (milk, water, sugar, salt, butter and flour) filled with algarrobo mousse (milk, cream, chocolate, algarrobo, gelatine and sugar). Topped with decaf coffee ganache (cream, white chocolate and decaf coffee). Served with a crunchy algarrobo tile (egg, butter, sugar, flour and algarrobo). Allergens: Gluten (pastry, tile), Dairy (mousse, ganache).',why:{erasmo:'Floral sweetness with the earthy notes of algarrobo.'}},
d43:{name:'Black Forest cake',desc:'Crepe cake (not sponge) soaked in pisco. Filled with raspberry gel and chocolate cream. Finished with vanilla ganache and raspberry gel. Allergens: Gluten (crepes), Dairy (cream, ganache).',why:{erasmo:'Candied fruit and acidity balance the chocolate and pisco.'}},
d44:{name:'Apple millefeuille',desc:'Caramelised apple slices with sugar, cinnamon and butter on a cinnamon soil. Served with rica-rica ice cream and airampo paper. Gluten free. Allergens: Dairy (butter, ice cream).',why:{erasmo:'Honey and candied fruit with the cinnamon and apple.',azur:'Fresh option for those who don\'t want sweet wine.'}},
d45:{name:'Pulmay',desc:'Hot broth with chicken thigh, pork, sausage/chorizo, shrimp, choro, mussels with shell and native potatoes. Vegetables: bell pepper, celery, onion, carrot and white wine. Note: Suitable for gluten free and lactose free.',why:{azur:'Refreshing bubble for the intense mix of seafood and meat.',talinay:'Saline and citric white for the seafood broth.'}},
d46:{name:'Chaufa rice',desc:'Previous day\'s rice stir-fried with meat, egg and "pachicay" (spring onion bulb, bell pepper, sunflower and sesame oils). Flavoured with soy sauce, ginger and sesame oil. Finished with chive leaves. Allergens: Gluten (soy sauce).',why:{'garage-rose':'Acidity and tannin grip with the soy and frying.',glup:'Light red to not weigh down the chaufa.'}},
d47:{name:'Sequitor lettuce over fire',desc:'Lettuce is the protagonist. Served with pear purée (in white wine), brunoise roasted pears and vegetable demi-glace (celery, carrot, tomato, mushroom, potato, ginger cooked for hours).',why:{talinay:'Acidity balances the pear sweetness and smoky notes.','garage-rose':'Fresh red fruit with the lettuce and pear.'}},
d48:{name:'Scallop tiradito',desc:'Served over avocado and tiger\'s milk emulsion. Finished with crispy bacon and dehydrated coral powder.',why:{talinay:'Salinity and citric tension in line with tiger\'s milk.',azur:'Gastronomic bubble for the tiradito.'}},
d49:{name:'Leaf salad with tomato',desc:'Peeled tomatoes, crispy tomato paper, goat cheese mousse and tomato dressing. Allergens: Dairy (goat cheese).',why:{talinay:'Acidity and salinity with the freshness of tomato.','garage-rose':'Red fruit and acidity with the goat cheese.'}},
d50:{name:'Vegetable soup',desc:'Potato, onion and leek base.',why:{aquitania:'Soft Chardonnay volume for the root vegetable soup.',talinay:'Fresh Sauvignon for a light vegetable soup.'}},
d51:{name:'Homemade pasta with mussels',desc:'Made in-house. Creamy mussel sauce with ginger, lemon and white wine. Finished with cilantro and lemon zest. Allergens: Gluten (pasta), Dairy (creamy sauce).',why:{aquitania:'Chardonnay creaminess with the mussel sauce.'}},
d52:{name:'Chicken causa',desc:'Deconstructed. Potato purée with yellow ají, lemon and salt. Shredded chicken with golf sauce, egg, avocado mousse (with tiger\'s milk) and chalaca (yellow ají, tomato, onion, cilantro).',why:{talinay:'Acidity and freshness with the yellow ají and lemon.','garage-rose':'Versatile rosé for the Peruvian flavour mix.'}},
d53:{name:'Brisket',desc:'16 hours of cooking at 85°C with vegetables and red wine. Served with seasonal sautéed vegetables (potatoes, ollucos, mushrooms, cherry tomatoes; may include sunchoke or artichoke).',why:{cabernet:'Organic Cabernet for long cooking and juices.','perez-cruz':'Carmenere with round tannins for the brisket.'}},
d54:{name:'Corvina and beetroot textures',desc:'Served with beetroot textures (beetroot purée and beetroot cubes) and finished with a citrus cream (fish fumet and white wine), with beetroot and pea kernels. Allergens: Gluten (gnocchi), Dairy (cream contains lactose).',why:{aquitania:'Creaminess for the gnocchi and beetroot sauce.'}},
d55:{name:'Roasted eggplant',desc:'Roasted and confit sous-vide in oil. Pallares bean hummus purée mixed with eggplant purée. Finished with chimichurri and mushroom crunch (fried and dehydrated).',why:{glup:'Light red for the eggplant and hummus.'}},
d56:{name:'Duck with potato millefeuille',desc:'Duck on the grill/oven (recommended medium or medium-well) with olive oil, salt and rosemary. Duck demi-glace. Millefeuille seasoned with butter, salt and thyme. Allergens: Dairy (butter in the millefeuille).',why:{cabernet:'Cabernet for those who want intense red with duck.'}},
d57:{name:'Sweet potato parfait',desc:'Cold dessert ice cream sandwich style. Contains cream, egg yolk, syrup and rica-rica. Sweet potato crunch, orange gel and toffee. Uses gelatine for texture. Allergens: Dairy (cream, toffee).',why:{erasmo:'Floral sweetness with orange and sweet potato.',azur:'Dry sparkling if a fresh close is preferred.'}},
d58:{name:'Tiramisù',desc:'Italian-inspired dessert with two sponge textures: soft baked sponge (egg, flour, baking powder and sugar) and champagne biscuit (vanilla, flour, baking powder, egg and sugar), both soaked in decaf coffee with cocoa powder and almond liqueur (not evaporated). Layered with mascarpone cream and Swiss meringue (egg whites and sugar, bain-marie method). Allergens: Gluten (sponges), Dairy (mascarpone), Tree nuts (almond liqueur).',why:{erasmo:'Late Harvest with the coffee and mascarpone.','perez-cruz':'Carmenere with cocoa notes for the tiramisù.'}},
d59:{name:'Vanilla panna cotta',desc:'Lactose-free panna cotta, no-bake (lactose-free milk, cream, lactose-free yoghurt and gelatine), flavoured with a vanilla pod. Served with orange juice, blackberry jam and fresh red berries (raspberries and blueberries). Allergens: Dairy (cream).',why:{erasmo:'Floral sweetness with vanilla and red berries.',azur:'Dry bubble for a light close.'}},
d60:{name:'Cauliflower soup',desc:'Finely chopped cauliflower, browned in lactose-free butter until nutty, white wine and vegetable broth. Creamy texture. Lactose-free.',why:{aquitania:'Chardonnay creaminess and acidity integrate the nutty cauliflower flavour.'}}
},
pt:{
d1:{name:'Truta estilo salmão',desc:'Cozida em um molho de ají amarelo, ají panca, cebola, tomates, alho, vinho branco e fumet de peixe (tudo triturado). Acompanhada de legumes salteados (cebola e tomate em gomos) e yuca frita cortada em cubos.',why:{azur:'A borbulha limpa o molho e realça a truta.',talinay:'Tensão cítrica e salinidade em linha com o ají amarelo.'}},
d2:{name:'Pastel de milho',desc:'Massa de milho com frango em cubos, azeitona e ovo.',why:{'garage-rose':'Acidez e leve tânico equilibram o dulçor do milho.',glup:'Tinto leve que não pesa sobre o pastel.'}},
d3:{name:'Abobrinha recheada',desc:'Colocada sobre mix de folhas verdes da hidroponia Larache. Contém béchamel com beterraba e está recheada com um refogado de cebola, cogumelos, quinoa e purê de cogumelos. Finalizada com béchamel e queijo Grana Padano para gratinar. Alergênicos: Laticínios (béchamel, queijo), Glúten (béchamel).',why:{aquitania:'Cremosidade e acidez integram o béchamel e o queijo.'}},
d4:{name:'Ceviche do dia',desc:'Mix de polvo, truta, camarão e vieira. Leite de tigre elaborado com talo de aipo, coentro, suco de limão, gengibre, ají amarelo, cebola e alho. Acompanhado de cebola, milho peruano, batata-doce e canchita.',why:{azur:'Espumante gastronômico: borbulha e acidez vão com o limão.',talinay:'Sauvignon salino e cítrico: segue a linha do ceviche.'}},
d5:{name:'Salada verde (Larache/Sequitor)',desc:'Mix de Larache e Sequitor, mini folhas de espinafre, mizuna e rumex. Inclui quinoa tingida com beterraba e ají amarelo, com milho peruano queimado. Molho ácido de amora ou framboesa (conforme disponibilidade). Sugestão: Verter o molho sobre a salada.',why:{talinay:'Acidez que se alinha ao molho e às folhas amargas.','garage-rose':'Fruta vermelha fresca em linha com a amora do molho.'}},
d6:{name:'Chupe de centola',desc:'Torta assada cremosa. Refogado de cebola branca, pimentão vermelho, páprica e vinho branco. Misturado com carne de centola e pão embebido em leite. Finalizado com queijo Grana Padano gratinado. Alergênicos: Laticínios/Lactose (leite, queijo), Glúten (pão).',why:{aquitania:'Volume do Chardonnay integra o creme do chupe.'}},
d7:{name:'Massa artesanal com ragù de osobuco',desc:'Massa preparada no dia. Ragù de osobuco bovino cozido em baixa temperatura com cebola, tomate, cenoura, aipo e vinho tinto. Servido desfiado com a redução do molho e chimichurri. Alergênicos: Glúten (massa).',why:{'perez-cruz':'Carmenere para quem quer estrutura com o ragù.'}},
d8:{name:'Torresmo de porco',desc:'Barriga de porco cozida em baixa temperatura, cortada em cubos e frita com maisena. Molho demi-glace com alfarrobeira. Acompanhado de batatas nativas (cozidas e fritas). Inclui molho uchucuta (cebola, ají amarelo, alho, coentro, salsa, cancha, queijo fresco, azeite e sal) e suflês de Airampo (tapioca frita tingida).',why:{'garage-rose':'Acidez e leve tânico limpam a fritura e a uchucuta.',glup:'Tinto leve para não tapar o sabor do torresmo.'}},
d9:{name:'Polvo',desc:'Cozimento sous-vide em baixa temperatura (90°C por 2 horas). Acompanhado de molho anticuchera peruano (cebola, ají amarelo, cominho, ají panca, orégano, vinagre e shoyu) e pastelera de milho, finalizada com pontos de geleia de rocoto. Alergênicos: traços de Glúten (shoyu).',why:{talinay:'Salinidade e tensão cítrica com o ají e o limão.'}},
d10:{name:'Risoto de boi',desc:'Arroz arbóreo com caldo de rabo bovino (mirepoix, vinho tinto, água; cozimento 5 horas). O caldo é reduzido e incorporado ao arroz com vinho branco, manteiga fria e queijo Grana Padano. Finalizado com chimichurri tradicional (alho, azeite, coentro, salsa, páprica, orégano e vinagre). Alergênicos: Laticínios (manteiga, queijo).',why:{'perez-cruz':'Carmenere para quem quer tinto com mais estrutura.'}},
d11:{name:'Charquicán vegetariano',desc:'Cebola, pimentão vermelho, cominho, páprica, orégano, batata e abóbora. Ao final são incorporadas ervilhas, milho e cenoura. Servido com gema de ovo confitada em azeite de oliva a 63°C.',why:{glup:'Fruta fresca e acidez realçam a abóbora sem pesar.'}},
d12:{name:'Texturas de chañar',desc:'Composição de quatro elementos de chañar. Crème brûlée (creme, leite, gemas, açúcar e arrope de chañar) com crosta de açúcar caramelizado. Madeleine de cacau e chañar (ovo, açúcar, cacau, manteiga, farinha e fermento) coberta com chocolate branco. Terra de chañar (açúcar, farinha, sal, manteiga e arrope de chañar). Sorvete de chañar (ovo, açúcar, leite, creme e arrope). Opção celíacos: disponível sem madeleine. Alergênicos: Laticínios (creme, leite, chocolate), Glúten (madeleine, terra).',why:{erasmo:'Late Harvest com mel e frutas confitadas: harmonização doce clássica.'}},
d13:{name:'Bolo de cenoura',desc:'Pão-de-ló úmido de cenoura e cacau (ovo, óleo, açúcar, farinha, bicarbonato, canela, cenoura e cacau). Frosting de cream cheese (cream cheese, creme, açúcar e raspas de laranja). Amêndoas caramelizadas (calda e sal). Gel de laranja (laranja, açúcar e agar agar). Alergênicos: Glúten (pão-de-ló), Laticínios (frosting), Castanhas (amêndoas).',why:{erasmo:'O dulçor e as notas de laranja vão com o bolo de cenoura.'}},
d14:{name:'Pudim de baunilha',desc:'Pudim clássico (fava de baunilha, leite, açúcar e ovos) desenformado sobre caramelo de açúcar e água. Alergênicos: Laticínios (leite).',why:{erasmo:'Dulçor floral complementa a baunilha.',azur:'Espumante seco como opção de encerramento fresco.'}},
d15:{name:'Vieiras gratinadas',desc:'100g de vieiras com béchamel, vinho branco e queijo Grana Padano ao forno. Alergênicos: Laticínios (béchamel, queijo), Glúten (béchamel).',why:{azur:'Borbulha e acidez cortam a gordura do gratinado.'}},
d16:{name:'Brócolis assado',desc:'Salteado em manteiga. Base de purê de legumes (tomate, abóbora, abobrinha, batatas) e chutney de tomates (geleia com açúcar e vinagre). Alergênicos: Laticínios (manteiga).',why:{aquitania:'Chardonnay cremoso integra o purê de legumes.',glup:'Tinto leve para quem prefere tinto com verduras assadas.'}},
d17:{name:'Lomo saltado',desc:'Refogado de carne temperado com shoyu e cerveja. Legumes: cebola, tomate e coentro. Acompanhado de arroz e batatas. Alergênicos: Glúten (shoyu, cerveja).',why:{'garage-rose':'Acidez e leve tânico com o shoyu e a fritura.',syrah:'Syrah especiado para as notas do molho.'}},
d18:{name:'Tiradito de locos',desc:'Locos laminados cozidos. Servido com molho verde (cebola, coentro, ají verde, limão, sal e azeite) e maionese de limão.',why:{talinay:'Salinidade e tensão cítrica com o molho verde.',azur:'Borbulha para uma harmonização espumante do tiradito.'}},
d19:{name:'Salada de folhas com figos',desc:'Molho de figos (contém calda, limão ou vinagre). Finalizado com queijo gorgonzola, amêndoas caramelizadas e figos infusionados. Alergênicos: Laticínios (queijo azul - contém penicilina), Castanhas (amêndoas).',why:{erasmo:'Dulçor floral combina com os figos e o queijo gorgonzola.','garage-rose':'Acidez e fruta vermelha equilibram o queijo gorgonzola.'}},
d20:{name:'Sopa de abóbora',desc:'Abóbora e arrope de chañar, cozida e aligerada.',why:{aquitania:'Cremosidade e acidez integram o dulçor da abóbora.'}},
d21:{name:'Camarões ao alho',desc:'Calibre 16-20, temperados com sementes de coentro, pimenta e merkén. Azeite de oliva e girassol. Finalizado com lâminas de alho fritas e torrada de pão integral multigrãos. Alergênicos: Glúten (pão).',why:{azur:'Borbulha e acidez refrescam entre cada garfada.',talinay:'Salinidade e acidez limpam o azeite do alho.'}},
d22:{name:'Espirais de massa com beterraba',desc:'Com molho de beterraba (beterraba cozida emulsionada com azeite). Finalizado com chimichurri e mousse de queijo de cabra (cream cheese e queijo de cabra). Alergênicos: Glúten (massa), Laticínios (queijos).',why:{glup:'Acidez e fruta vermelha acompanham a beterraba e o queijo.'}},
d23:{name:'Costela bovina',desc:'Selada a vácuo com vinho tinto e mirepoix (cozimento prolongado). Finalizado com demi-glace e purê de abóbora assada.',why:{'perez-cruz':'Carmenere: tânico redondo agarra o colágeno do corte.',cabernet:'Cabernet para harmonização clássica com carne de cozimento longo.'}},
d24:{name:'Peixe do dia',desc:'Corvina, pejeperro, mulata ou linguado. Cozido suavemente com manteiga e limão. Acompanhado de purê de ervilhas (favas, ervilhas, espinafre) e ervilhas/favas inteiras. Alergênicos: Laticínios (manteiga).',why:{talinay:'Salinidade e acidez em linha com o limão e o peixe.',aquitania:'Chardonnay cremoso para o purê de ervilhas.'}},
d25:{name:'Musaka de legumes',desc:'Camadas de berinjela e molho pomodoro (tomate, sal, manjericão). Recheada com mistura de ricota, gema, Grana Padano e sal. Alergênicos: Laticínios (queijos).',why:{glup:'Tinto suave e fresco que não tapa os legumes.'}},
d26:{name:'Ají de gallina',desc:'Molho base cremoso (cebola, ají amarelo refogado, leite, manteiga, pão triturado e queijo Grana Padano). Misturado com peito de frango desfiado. Acompanhado com arroz simples, ovo e azeitonas. Alergênicos: Laticínios (leite, manteiga, queijo), Glúten (pão).',why:{'garage-rose':'Acidez e leve tânico com o picante cremoso do ají.',glup:'Tinto leve que não compete com o molho amarelo.'}},
d27:{name:'Texturas de chocolate',desc:'Composição de cinco elementos. Pão-de-ló de cacau puro (cacau, farinha, ovo, açúcar e fermento). Namelaka de chocolate 56% (chocolate, glicose, leite, creme e gelatina). Terra de chocolate branco (chocolate branco e açúcar). Brigadeiros (leite condensado, creme e chocolate branco). Nibs de cacau 100%. Alergênicos: Laticínios (creme, leite condensado, chocolate).',why:{erasmo:'Late Harvest com frutas confitadas para cacau suave.','perez-cruz':'Carmenere com notas de cacau que acompanham o chocolate.'}},
d28:{name:'Tres leches',desc:'Pão-de-ló úmido embebido em mistura de três leites (leite condensado, creme e leite evaporado), recheado com framboesas inteiras. Finalizado com merengue suíço (claras e açúcar cozidos em banho-maria até dissolver os cristais, depois batidos) e gel de framboesa (framboesa, polpa de framboesa e agar agar). Alergênicos: Glúten (pão-de-ló), Laticínios (leite condensado, creme, leite evaporado).',why:{erasmo:'Harmonização clássica de vinho doce com sobremesa cremosa.'}},
d29:{name:'Cheesecake com maracujá',desc:'Recheio cremoso assado (ovo, creme, cream cheese, raspas de limão, açúcar de confeiteiro e amido de milho). Coberto com gel de maracujá (maracujá e agar agar). Base de terra de pistache (farinha de arroz, pistache, manteiga e açúcar). Alergênicos: Laticínios (cream cheese, creme), Castanhas (pistache).',why:{erasmo:'Dulçor floral complementa a acidez do maracujá.'}},
d30:{name:'Pastel de batata',desc:'Base de recheio chileno (pino) com frango, ovo e azeitona. Coberto com purê de batatas temperado (manteiga, leite, sal) e dourado com ovo. Condimento: cominho, páprica e orégano. Observação: Pode sair sem manteiga a pedido. Alergênicos: Laticínios (manteiga, leite).',why:{'garage-rose':'Equilibra o dulçor do recheio e a cremosidade do purê.',glup:'Tinto muito leve para não pesar sobre o pastel.'}},
d31:{name:'Lasanha de legumes',desc:'Tomate, abobrinha, berinjela (opcionalmente abóbora ou cogumelos conforme disponibilidade). Molho pomodoro, molho béchamel e queijo Grana Padano. Alergênicos: Glúten e Laticínios (béchamel, queijo).',why:{aquitania:'Chardonnay cremoso integra o béchamel e os legumes.'}},
d32:{name:'Filé bovino',desc:'180g finalizado com demi-glace. Acompanhado de purê de cenoura (cenoura emulsionada com azeite) e cenouras torneadas glaceadas com mel e manteiga. Disponibilidade: Mal passado, ao ponto ou bem passado (a carne é "roteada" primeiro). Alergênicos: Laticínios (manteiga).',why:{cabernet:'Cabernet orgânico: harmonização clássica com proteína bovina.'}},
d33:{name:'Ceviche de peixe branco',desc:'Leite de tigre (fumet, limão, aipo, gengibre, coentro, cebola roxa, sal e ají amarelo). Acompanhado de cebola, cancha e batata-doce.',why:{talinay:'Tensão calcária e salinidade com o limão do ceviche.',azur:'Versão espumante da harmonização clássica com ceviches.'}},
d34:{name:'Mix de folhas (maçã assada)',desc:'Maçã assada, cevada com molho de framboesa, mote com molho de maçã e emulsão de beterraba. Proveniência: Sequitor, Larache e Socaire. Observação: Não é sem glúten (contém cevada e mote).',why:{talinay:'Acidez que equilibra o dulçor da maçã assada.','garage-rose':'Fruta vermelha com a framboesa e beterraba do molho.'}},
d35:{name:'Sopa de espinafre',desc:'Base de cebola, batata e caldo de legumes (cenoura, aipo, cebola). É incorporada clorofila de espinafre (branqueado e triturado).',why:{aquitania:'Volume e acidez do Chardonnay para a sopa verde.',talinay:'Sauvignon fresco para uma sopa leve de verduras.'}},
d36:{name:'Chupe de frutos do mar',desc:'Centola, polvo, camarão e vieiras. Refogado de cebola, pimentão, páprica, vinho branco e mistura de leite com pão. Finalizado com Grana Padano gratinado. Alergênicos: Laticínios (leite, queijo), Glúten (pão).',why:{aquitania:'Chardonnay cremoso para o gratinado.'}},
d37:{name:'Massa curta com abóbora-doce',desc:'Molho de abóbora-doce (emulsionado com azeite). Finalizado com chimichurri (alho, salsa, azeite) e queijo Grana Padano. Alergênicos: Glúten (massa), Laticínios (queijo).',why:{glup:'Fruta fresca e acidez para o dulçor da abóbora.',aquitania:'Cremosidade do Chardonnay com o molho de abóbora-doce.'}},
d38:{name:'Costelinha de porco',desc:'Braseada a vácuo em baixa temperatura com cerveja. Finalizada com demi-glace com alfarrobeira. Acompanhada de purê de batata-doce e cebolas em conserva no vinagre com beterraba. Alergênicos: Glúten (traços de cerveja).',why:{syrah:'Syrah especiado para o porco e o dulçor da batata-doce.','perez-cruz':'Carmenere com taninos redondos para a costelinha.'}},
d39:{name:'Pernil de cordeiro',desc:'Pernil dianteiro a vácuo (85°C) com mirepoix e vinho tinto reduzido. Purê de batata com manteiga sem lactose e leite. Observação: Usa manteiga sem lactose.',why:{cabernet:'Cabernet orgânico para o cordeiro de cozimento longo.',syrah:'Syrah com especiarias que complementam o guisado.'}},
d40:{name:'Texturas de couve-flor',desc:'Purê de couve-flor caramelizada com abundante manteiga. Por cima, couve-flor sous-vide aromatizada com ají panca, gengibre, sal e mostarda, depois assada. Finalizado com pebre. Alergênicos: Laticínios (manteiga).',why:{aquitania:'Cremosidade e acidez para a couve-flor caramelizada.',glup:'Tinto suave se o cliente preferir tinto com legumes.'}},
d41:{name:'Arroz cremoso com frutos do mar',desc:'Base tipo risoto (arroz refogado, vinho branco, caldo de camarão/lagostim com mirepoix). Incorpora tomate e mix de frutos do mar salteados (camarão, lulas, vieiras, polvo) com vinho branco e manteiga. Guarnição de chalaca (cebola, tomate, coentro, limão). Alergênicos: Laticínios (manteiga).',why:{aquitania:'Chardonnay com volume para o arroz cremoso.'}},
d42:{name:'Éclair de alfarroba',desc:'Massa choux crocante (leite, água, açúcar, sal, manteiga e farinha) recheada de mousse de alfarroba (leite, creme, chocolate, alfarroba, gelatina e açúcar). Coberta com ganache de café descafeinado (creme, chocolate branco e café descafeinado). Acompanhada de telha crocante de alfarroba (ovo, manteiga, açúcar, farinha e alfarroba). Alergênicos: Glúten (massa, telha), Laticínios (mousse, ganache).',why:{erasmo:'Dulçor floral com as notas terrosas da alfarroba.'}},
d43:{name:'Torta floresta negra',desc:'Torta de panquecas (não pão-de-ló) embebida em pisco. Recheada de gel de framboesa com creme de chocolate. Finalizada com ganache de baunilha e gel de framboesa. Alergênicos: Glúten (panquecas), Laticínios (creme, ganache).',why:{erasmo:'Frutas confitadas e acidez equilibram o chocolate e o pisco.'}},
d44:{name:'Mil-folhas de maçã',desc:'Lâminas de maçã caramelizadas com açúcar, canela e manteiga sobre terra de canela. Acompanhada de sorvete de rica-rica e papel de airampo. Sem glúten. Alergênicos: Laticínios (manteiga, sorvete).',why:{erasmo:'Mel e frutas confitadas com a canela e a maçã.',azur:'Opção fresca para quem não quer vinho doce.'}},
d45:{name:'Pulmay',desc:'Caldo quente com sobrecoxa de frango, porco, linguiça/chorizo, camarão, choro, mexilhões com concha e batatas nativas. Legumes: pimentão, aipo, cebola, cenoura e vinho branco. Observação: Apto para sem glúten e sem lactose.',why:{azur:'Borbulha refrescante para o mix intenso de frutos do mar e carnes.',talinay:'Branco salino e cítrico para o caldo de frutos do mar.'}},
d46:{name:'Arroz chaufa',desc:'Arroz do dia anterior salteado com carne, ovo e "pachicay" (bulbo de cebolinha, pimentão, azeite de girassol e de gergelim). Temperado com shoyu, gengibre e azeite de gergelim. Finalizado com folhas de cebolinha. Alergênicos: Glúten (shoyu).',why:{'garage-rose':'Acidez e leve tânico com o shoyu e a fritura.',glup:'Tinto leve para não pesar sobre o chaufa.'}},
d47:{name:'Alface de Sequitor ao fogo',desc:'A alface é a protagonista. Acompanhada de purê de peras (ao vinho branco), peras brunoise assadas e demi-glace de legumes (aipo, cenoura, tomate, cogumelo, batata, gengibre cozido por horas).',why:{talinay:'Acidez equilibra o dulçor da pera e as notas defumadas.','garage-rose':'Fruta vermelha fresca com a alface e a pera.'}},
d48:{name:'Tiradito de vieiras',desc:'Servido sobre emulsão de abacate e leite de tigre. Finalizado com bacon crocante e pó de coral desidratado.',why:{talinay:'Salinidade e tensão cítrica em linha com o leite de tigre.',azur:'Borbulha gastronômica para o tiradito.'}},
d49:{name:'Salada de folhas com tomate',desc:'Tomates mondados, papel de tomate crocante, mousse de queijo de cabra e molho de tomate. Alergênicos: Laticínios (queijo de cabra).',why:{talinay:'Acidez e salinidade com a frescura do tomate.','garage-rose':'Fruta vermelha e acidez com o queijo de cabra.'}},
d50:{name:'Sopa de legumes',desc:'Base de batata, cebola e alho-poró.',why:{aquitania:'Volume suave do Chardonnay para a sopa de raízes.',talinay:'Sauvignon fresco para sopa leve de legumes.'}},
d51:{name:'Massa artesanal com mexilhões',desc:'Feita em casa. Molho cremoso de mexilhões com gengibre, limão e vinho branco. Finalizada com coentro e raspas de limão. Alergênicos: Glúten (massa), Laticínios (molho cremoso).',why:{aquitania:'Cremosidade do Chardonnay com o molho de mexilhões.'}},
d52:{name:'Causa de frango',desc:'Desconstruída. Purê de batata com ají amarelo, limão e sal. Frango desfiado com molho golf, ovo, mousse de abacate (com leite de tigre) e chalaca (ají amarelo, tomate, cebola, coentro).',why:{talinay:'Acidez e frescura com o ají amarelo e o limão.','garage-rose':'Rosé versátil para o mix de sabores peruanos.'}},
d53:{name:'Brisket',desc:'16 horas de cozimento a 85°C com legumes e vinho tinto. Acompanhado de legumes da estação salteados (batatas, ollucos, cogumelos, tomate-cereja; pode incluir topinambur ou alcachofra).',why:{cabernet:'Cabernet orgânico para o cozimento longo e os sucos.','perez-cruz':'Carmenere com taninos redondos para o brisket.'}},
d54:{name:'Corvina e texturas de Beterraba',desc:'Acompanhada de texturas de beterraba (purê de beterraba e cubinhos de beterraba) e finalizada com um creme cítrico (fumet e vinho branco), com as beterrabas e grãos de ervilha. Alergênicos: Glúten (gnocchi), Laticínios (creme contém lactose).',why:{aquitania:'Cremosidade para o gnocchi e o molho de beterraba.'}},
d55:{name:'Berinjela assada',desc:'Assada e confitada a vácuo em azeite. Purê de homus de feijão pallar misturado com purê de berinjela. Finalizado com chimichurri e crocante de cogumelos (fritos e desidratados).',why:{glup:'Tinto suave para a berinjela e o homus.'}},
d56:{name:'Pato com mil-folhas de batata',desc:'Pato na chapa/forno (recomendado ao ponto ou bem passado) com azeite de oliva, sal e alecrim. Demi-glace de pato. Mil-folhas temperada com manteiga, sal e tomilho. Alergênicos: Laticínios (manteiga na mil-folhas).',why:{cabernet:'Cabernet para quem quer tinto intenso com o pato.'}},
d57:{name:'Parfait de batata-doce',desc:'Sobremesa fria tipo sanduíche de sorvete. Contém creme, gema, calda e rica-rica. Crocantes de batata-doce, gel de laranja e toffee. Usa gelatina para a textura. Alergênicos: Laticínios (creme, toffee).',why:{erasmo:'Dulçor floral com laranja e batata-doce.',azur:'Espumante seco se preferir um encerramento fresco.'}},
d58:{name:'Tiramisù',desc:'Sobremesa de inspiração italiana com duas texturas de biscoito: biscoito macio assado (ovo, farinha, fermento e açúcar) e biscoito champanhe (baunilha, farinha, fermento, ovo e açúcar), ambos embebidos em café descafeinado com cacau em pó e licor de amêndoas (sem evaporar). Montados com creme de queijo mascarpone e merengue suíço (claras e açúcar em banho-maria). Alergênicos: Glúten (biscoitos), Laticínios (mascarpone), Castanhas (licor de amêndoas).',why:{erasmo:'Late Harvest com o café e o mascarpone.','perez-cruz':'Carmenere com notas de cacau para o tiramisù.'}},
d59:{name:'Panna cotta de baunilha',desc:'Panna cotta sem lactose, sem forno (leite s/L, creme, iogurte s/L e gelatina), aromatizada com fava de baunilha. Servida com suco de laranja, geleia de amora e frutos vermelhos frescos (framboesa e mirtilo). Alergênicos: Laticínios (creme).',why:{erasmo:'Dulçor floral com a baunilha e os frutos vermelhos.',azur:'Borbulha seca para um encerramento leve.'}},
d60:{name:'Sopa de couve-flor',desc:'Couve-flor picada fina, dourada em manteiga sem lactose até obter sabor avelã, vinho branco e caldo de legumes. Textura cremosa. Sem lactose.',why:{aquitania:'Cremosidade e acidez do Chardonnay integram o sabor avelã da couve-flor.'}}
}};

// ── WINE TRANSLATIONS ────────────────────────────────────────────────────────
const WINE_TRANS = {
en:{
azur:{identity:'Organic sparkling, traditional method, Extra Brut (very dry). Blend of cold-climate grapes from Limarí.',terroir:'Limarí Valley, northern Chile. Cold semi-arid coastal climate, camanchaca fog, calcareous soils. Marked acidity and very clear mineral sensation.',winery:'Organic management. Second fermentation in bottle (traditional method). Aged on lees. Without excess dosage sugar.',style:'Fine and persistent bubble. Citrus, green apple, white flowers and toast. Dry, high acidity, medium-light body, saline finish.',shortpitch:'It\'s an organic sparkling from Limarí Valley, very dry and fresh, with fine bubbles. Ideal for gratinated seafood, garlic prawns or to start with ceviches and tiraditos.',pitch:'It comes from the northern coast, where fog and wind keep the grapes very fresh. That gives it high acidity that cleanses the fat of the gratin or garlic, and the bubble carries the sauce away, leaving the palate ready for the next bite.'},
talinay:{identity:'Dry white, 100% Sauvignon Blanc, Talinay vineyard. One of Chile\'s coldest and most calcareous terroirs.',terroir:'12 km from the Pacific Ocean. Cold coastal climate, morning camanchaca fog, sea breezes. Fractured calcareous rock: very high acidity, great tension and marked salinity.',winery:'Viña Tabalí, pioneer in the calcareous zone. Low yields, hand-harvested, cold fermentation, minimal wood.',style:'Lime, grapefruit, fine herbs, white flowers, stone and chalk. Very tense, high acidity, medium body, long citrus and saline finish.',shortpitch:'It\'s a very cold-coast Sauvignon, citric and saline, perfect for ceviches, tiraditos and white fish.',pitch:'The vines are planted almost on rock, very close to the sea. That gives the wine a natural tension and salinity that aligns with the lemon and salt of the ceviche or tiradito, and at the same time cleanses the trout broth without overpowering the fish flavour.'},
aquitania:{identity:'Dry white, 100% Chardonnay, DO Casablanca Valley.',terroir:'Between Santiago and Valparaíso, near the ocean. Cold Mediterranean climate, morning fogs, clays and sands over granite.',winery:'Viña Aquitania, long tradition. Balance: freshness, defined fruit and moderate creaminess, without excess wood.',style:'Apple, pear, citrus, white flowers, hint of cream or soft butter. Marked acidity, medium body, slightly creamy texture.',shortpitch:'It\'s a fresh Casablanca Chardonnay, with some creaminess, very comfortable for soups, cheese dishes and fish with light sauces.',pitch:'It comes from a cold-climate valley, so it maintains very good acidity. At the same time it has enough volume to pair with creamy soups, vegetable lasagne or fish with sauce, without the combination feeling heavy.'},
'garage-rose':{identity:'Gastronomic dry rosé. Blend of Carignan and Monastrell, old dryland vines, Empedrado/Truquilemu area.',terroir:'Maule interior dryland. Mediterranean climate with hot summers. Head-trained vines, horse-worked, very poor granite soils.',winery:'Garage Wine Co.: small heritage vineyards, ancestral agriculture, minimal intervention. Table rosé, not pool rosé.',style:'Pale colour. Raspberry, cherry, Mediterranean herbs, flowers. Completely dry, high acidity, medium body, slight tannin grip. Very versatile.',shortpitch:'It\'s a rosé from old Maule vines, dry and with good acidity; works very well with fried dishes, slightly spicy preparations and those that mix sea and land.',pitch:'It\'s almost a very pale red: it has red fruit, high acidity and a small tannin grip that helps clean dishes like corn pie, chaufa with fried egg or pork crackling. It\'s a fresher alternative when the dish is intense but the guest doesn\'t want a heavy red.'},
glup:{identity:'Light red, 100% Cinsault, Itata interior dryland.',terroir:'Hillsides near the sea, cool Mediterranean climate, old head-trained vines on granite soils. Moderate temperatures, cool nights: low-alcohol wines with great freshness.',winery:'Longaví Wines line. Heritage varieties, early harvest, little extraction, simple ageing. Very drinkable gastronomic wines.',style:'Morello cherry, strawberry, flowers, white pepper and herbs. Very light, soft tannin, marked acidity. Can be served slightly chilled.',shortpitch:'It\'s a very light and fresh red from Itata, ideal for slightly sweet or creamy dishes like corn pie, potato pie or charquicán.',pitch:'The vines are on dryland granite soils and harvested relatively early, so the wine has good acidity and little tannin. It\'s perfect when the traveller wants red but not something heavy or oaky.'},
'perez-cruz':{identity:'Red, selected parcel Carmenere, DO Maipo Andes.',terroir:'South of Santiago, Andean foothills. Mediterranean climate, great thermal range. Alluvial and colluvial stony soils of volcanic origin.',winery:'Viña Pérez Cruz, single sustainably-managed vineyard. Limited Edition: precise versions of Bordeaux varieties. Ripe fruit, round tannins, balanced wood.',style:'Ripe black fruit, sweet spices, cocoa, roasted pepper, herbs. Medium-high but round tannin, medium-high body, long finish.',shortpitch:'It\'s a Maipo Andes Carmenere, with black fruit and firm but round tannins; ideal for short ribs, pork ribs and brisket.',pitch:'The vineyard is in the upper Maipo, on stony soils. That gives a Carmenere with structure and freshness. You feel the black fruit and spices, and the tannin grips very well to slow-cooked meats with concentrated sauces.'},
cabernet:{identity:'Red, 100% organic Cabernet Sauvignon, Maipo Andes.',terroir:'World reference zone for Cabernet. Volcanic, alluvial soils with lots of stone and excellent drainage. Hot days and cold nights: full ripeness with acidity.',winery:'Antiyal, Álvaro Espinoza\'s project, biodynamic pioneer in Chile. Organic and biodynamic, moderate yields, balanced barrel.',style:'Cassis, plum, roasted pepper, graphite, soft tobacco, herbs. Full body, firm and polished tannins, good acidity, long finish.',shortpitch:'It\'s our organic Maipo Andes Cabernet, with structure and black fruit; perfect for fillets, short ribs, lamb and brisket.',pitch:'It\'s an Andean-climate Cabernet, with firm but very polished tannins and an acidity that prevents the wine feeling heavy. It pairs very well with the texture of red meats and long-cooked meats, and holds up to sauces with a red wine base.'},
syrah:{identity:'Red, 100% Syrah, Azuda line by Clos de Luz, Almahue in Cachapoal.',terroir:'Almahue, interior of the Cachapoal valley. Temperate climate, moderately warm summers cooled by the Andes. Granite hillsides: fresh acidity and fine tannins.',winery:'Clos de Luz, family winery. Mediterranean varieties in old vineyards. Azuda in concrete tanks and clay amphoras. Freshness over power.',style:'Black fruit, blackberries, spices (pepper, herbs), floral notes, mineral background. Intense but fresh, medium-high body, good acidity, elegant tannins.',shortpitch:'It\'s an Almahue Syrah, intense but fresh, with lots of black fruit and spices; works very well with lamb, ribs, brisket and duck.',pitch:'Vinified in concrete and clay, which preserves freshness and fruit character. It has enough structure for long-cooked meats, but at the same time maintains an acidity that makes the pairing lighter.'},
erasmo:{identity:'Natural sweet wine (Late Harvest), overripe Torontel grapes from Maule.',terroir:'Maule interior, Mediterranean climate, hot summers and dry autumns. Clay-loam and granite soils. The grape concentrates sugar and aromas on the vine.',winery:'Erasmo: Italian tradition with Maule dryland. Balanced Late Harvest: good acidity and intense floral aromas, without cloying sensations.',style:'White flowers, honey, stone fruit, candied fruits, orange peel. Marked sweetness with sufficient acidity. Unctuous texture, long finish.',shortpitch:'It\'s our dessert wine, a Torontel Late Harvest from Maule, with honey and candied fruit notes; pairs very well with tres leches, cheesecake, carrot cake or the chañar tasting.',pitch:'The grape is left to over-ripen on the vine to concentrate sugar and aromas. The result is a sweet wine but with enough acidity not to tire. It\'s the best option when the traveller wants to close with a classic dessert and wine pairing.'}

pt:{
azur:{identity:'Espumante orgânico, método tradicional, Extra Brut (muito seco). Blend de uvas de clima frio do Limarí.',terroir:'Vale do Limarí, norte do Chile. Clima semiárido frio de costa, camanchaca, solos calcários. Acidez marcada e sensação mineral muito clara.',winery:'Manejo orgânico. Segunda fermentação em garrafa (método tradicional). Crianza sobre borras. Sem excesso de açúcar de dosagem.',style:'Borbulha fina e persistente. Cítricos, maçã verde, flores brancas e pão torrado. Seco, alta acidez, corpo médio-leve, final salino.',shortpitch:'É um espumante orgânico do Vale do Limarí, muito seco e fresco, com borbulha fina. Ideal para frutos do mar gratinados, camarões ao alho ou para começar com ceviches e tiraditos.',pitch:'Vem do norte do litoral, onde a neblina e o vento mantêm a uva muito fresca. Isso lhe dá alta acidez que limpa a gordura do gratinado ou do alho, e a borbulha arrasta o molho e deixa a boca pronta para o próximo bocado.'},
talinay:{identity:'Branco seco, 100% Sauvignon Blanc, vinhedo Talinay. Um dos terroirs mais frios e calcários do Chile.',terroir:'12 km do Oceano Pacífico. Clima frio de costa, camanchaca matinal, brisas marinhas. Rocha calcária fraturada: altíssima acidez, grande tensão e marcada salinidade.',winery:'Viña Tabalí, pioneira na zona calcária. Baixos rendimentos, vindima manual, fermentação fria, madeira mínima.',style:'Lima, grapefruit, ervas finas, flores brancas, pedra e giz. Muito tenso, alta acidez, corpo médio, longo final cítrico e salino.',shortpitch:'É um Sauvignon de costa muito fria, cítrico e salino, perfeito para ceviches, tiraditos e peixes brancos.',pitch:'As parreiras estão plantadas quase sobre rocha, muito perto do mar. Isso dá ao vinho uma tensão e salinidade naturais que se alinham com o limão e o sal do ceviche ou do tiradito, e ao mesmo tempo limpa o caldo da truta sem tapar o sabor do peixe.'},
aquitania:{identity:'Branco seco, 100% Chardonnay, DO Vale de Casablanca.',terroir:'Entre Santiago e Valparaíso, perto do oceano. Clima mediterrâneo frio, neblinas matinais, argilas e areias sobre granito.',winery:'Viña Aquitania, longa trajetória. Equilíbrio: frescor, fruta definida e cremosidade moderada, sem excesso de madeira.',style:'Maçã, pera, cítricos, flores brancas, toque de creme ou manteiga suave. Acidez marcada, corpo médio, textura levemente cremosa.',shortpitch:'É um Chardonnay fresco de Casablanca, com alguma cremosidade, muito confortável para sopas, pratos com queijo e peixes com molhos suaves.',pitch:'Vem de um vale de clima frio, por isso mantém muito boa acidez. Ao mesmo tempo tem volume suficiente para acompanhar sopas cremosas, lasanha de legumes ou um peixe com molho, sem que o conjunto fique pesado.'},
'garage-rose':{identity:'Rosé seco gastronômico. Blend de Carinena e Monastrell, vinhas velhas de sequeiro, zona Empedrado/Truquilemu.',terroir:'Maule interior, sequeiro. Clima mediterrâneo com verões quentes. Vinhas em gobelet trabalhadas a cavalo, solos graníticos muito pobres.',winery:'Garage Wine Co.: pequenos vinhedos patrimoniais, agricultura ancestral, mínima intervenção. Rosé de mesa, não de piscina.',style:'Cor pálida. Framboesa, cereja, ervas mediterrâneas, flores. Completamente seco, alta acidez, corpo médio, leve adstringência tânica. Muito versátil.',shortpitch:'É um rosé de vinhas velhas do Maule, seco e com boa acidez; funciona muito bem com frituras, pratos com um pouco de picante e preparações que misturam mar e terra.',pitch:'É quase um tinto muito claro: tem fruta vermelha, alta acidez e uma pequena adstringência tânica que ajuda a limpar pratos como o pastel de milho, o chaufa com ovo frito ou o torresmo. É uma alternativa mais fresca quando o prato é intenso mas o cliente não quer um tinto pesado.'},
glup:{identity:'Tinto leve, 100% Cinsault, sequeiro interior do Itata.',terroir:'Colinas próximas ao mar, clima mediterrâneo fresco, vinhas velhas em gobelet sobre solos graníticos. Temperaturas moderadas, noites frescas: vinhos de baixo teor alcoólico e grande frescor.',winery:'Linha Longaví Wines. Variedades patrimoniais, colheita precoce, pouca extração, crianza simples. Vinhos gastronômicos muito bebíveis.',style:'Ginja, morango, flores, pimenta branca e ervas. Muito leve, tanino suave, acidez marcada. Pode ser servido levemente fresco.',shortpitch:'É um tinto muito suave e fresco do Itata, ideal para pratos com algum dulçor ou cremosos como o pastel de milho, o pastel de batata ou o charquicán.',pitch:'As vinhas estão em sequeiro sobre solos graníticos e são colhidas relativamente cedo, por isso o vinho tem boa acidez e pouco tanino. É perfeito quando o viajante quer tinto, mas não algo pesado nem com muita madeira.'},
'perez-cruz':{identity:'Tinto, Carmenere de seleção de parcelas, DO Maipo Andes.',terroir:'Ao sul de Santiago, sopé da Cordilheira. Clima mediterrâneo, grande amplitude térmica. Solos aluviais e coluviais, pedregosos, de origem vulcânica.',winery:'Viña Pérez Cruz, único vinhedo em manejo sustentável. Limited Edition: versões precisas de castas bordolesas. Fruta madura, taninos redondos, madeira equilibrada.',style:'Fruta negra madura, especiarias doces, cacau, pimentão assado, ervas. Tanino médio-alto mas redondo, corpo médio-alto, longo final.',shortpitch:'É um Carmenere do Maipo Andes, com fruta negra e taninos firmes mas redondos; ideal para costela, costelinha e brisket.',pitch:'O vinhedo está na parte alta do Maipo, sobre solos pedregosos. Isso dá um Carmenere com estrutura e frescor. Sente-se a fruta negra e as especiarias, e o tanino se agarra muito bem a carnes de cozimento lento, com molhos concentrados.'},
cabernet:{identity:'Tinto, 100% Cabernet Sauvignon orgânico, Maipo Andes.',terroir:'Zona de referência mundial para Cabernet. Solos vulcânicos, aluviais, com muita pedra e excelente drenagem. Dias quentes e noites frias: maturação completa com acidez.',winery:'Antiyal, projeto de Álvaro Espinoza, pioneiro da biodinâmica no Chile. Orgânico e biodinâmico, rendimentos moderados, barrica equilibrada.',style:'Cassis, ameixa, pimentão assado, grafite, tabaco suave, ervas. Corpo pleno, taninos firmes e polidos, boa acidez, longo final.',shortpitch:'É o nosso Cabernet orgânico do Maipo Andes, com estrutura e fruta negra; perfeito para filés, costela, cordeiro e brisket.',pitch:'É um Cabernet de clima andino, com taninos firmes mas muito polidos e uma acidez que evita que o vinho fique pesado. Acompanha muito bem a textura de carnes vermelhas e de cozimento longo, e aguenta molhos com fundo de vinho tinto.'},
syrah:{identity:'Tinto, 100% Syrah, linha Azuda de Clos de Luz, Almahue no Cachapoal.',terroir:'Almahue, interior do vale de Cachapoal. Clima temperado, verões quentes moderados pela Cordilheira. Encostas com solos graníticos: acidez fresca e taninos finos.',winery:'Clos de Luz, adega familiar. Variedades mediterrâneas em vinhedos antigos. Azuda em cubas de concreto e ânforas de barro. Frescor mais do que potência.',style:'Fruta negra, amoras, especiarias (pimenta, ervas), notas florais, fundo mineral. Intenso mas fresco, corpo médio-alto, boa acidez, taninos elegantes.',shortpitch:'É um Syrah de Almahue, intenso mas fresco, com muita fruta negra e especiarias; funciona muito bem com cordeiro, costelinha, brisket e pato.',pitch:'Vinificado em concreto e ânforas, o que conserva o frescor e o caráter da fruta. Tem estrutura suficiente para carnes de cozimento longo, mas ao mesmo tempo mantém uma acidez que torna o conjunto mais leve.'},
erasmo:{identity:'Vinho doce natural (Late Harvest), uvas Torontel sobremaduras do Maule.',terroir:'Maule interior, clima mediterrâneo, verões quentes e outonos secos. Solos franco-argilosos e graníticos. A uva concentra açúcar e aromas na planta.',winery:'Erasmo: tradição italiana com o sequeiro do Maule. Late Harvest equilibrado: boa acidez e aromas florais intensos, sem sensações enjoativas.',style:'Flores brancas, mel, fruta de caroço, frutas confitadas, casca de laranja. Dulçor marcado com acidez suficiente. Textura untuosa, longo final.',shortpitch:'É o nosso vinho de sobremesa, um Late Harvest de Torontel do Maule, com notas de mel e frutas confitadas; vai muito bem com tres leches, cheesecake, bolo de cenoura ou a degustação de chañar.',pitch:'A uva é deixada para sobremadurar na planta para concentrar açúcar e aromas. O resultado é um vinho doce mas com acidez suficiente para não cansar. É a melhor opção quando o viajante quer encerrar com uma harmonização clássica de sobremesa e vinho.'}
}};

{title:'Aperitifs and welcome',text:'"While you look at the menu, we can offer something fresh by the glass. If you prefer bubbles, we have an organic sparkling from Limarí Valley, very dry with fine bubbles. If you prefer wine, our Talinay Sauvignon is citric and saline, ideal to start, especially if you\'ll be ordering ceviche or seafood dishes."'},
{title:'Seafood and fish',text:'"For seafood dishes like ceviche, tiradito or trout sudado, the best match is coastal, cold-climate wines with good acidity and salinity. The Talinay Sauvignon comes from a vineyard a few kilometres from the sea, on calcareous soils. If the dish is creamier, like king crab chupe or octopus with corn pie, we suggest an Itata Semillon or a Chardonnay, which have more texture to sustain the sauce."'},
{title:'Red meats, pork and lamb',text:'"For cuts like short ribs, lamb shank or brisket, we suggest reds from Maipo Andes or Almahue. The Pura Fe Cabernet is the classic Andean Maipo style. If you want something spicier, the Almahue Syrah has black fruit and spices with silkier tannin. If the dish has heat or frying, a dry rosé works better than a very heavy red."'},
{title:'Vegetarian and vegetable cooking',text:'"For dishes like vegetable lasagne, stuffed zucchini or vegetarian charquicán, we look for wines that accompany the creaminess and umami of the vegetables without overpowering them. In whites, a Casablanca Chardonnay. In reds, an Itata Cinsault or a Casablanca Pinot are light and fresh, with very fine tannin."'},
{title:'Desserts and closing experience',text:'"Most desserts are sweet and creamy. The best pairing is usually coffee or an infusion. If you want to pair with wine, we have a Torontel Late Harvest from Maule, which goes very well with tres leches, cheesecake or the chañar tasting. If you prefer a fresher, less sweet close, the dry sparkling is ideal with fruit or ice cream desserts."'}
],
